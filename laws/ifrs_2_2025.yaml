# disclosure-multiagent — 法令・ガイダンス情報 YAML
# カテゴリ: IFRS 2（株式報酬）
# 対象期間: 2025年度（2025-04-01〜2026-03-31）
# スキーマ定義: docs/law_yaml_schema.md
# 作成者: Majiro-ns
#
# 根拠法令・基準:
#   IFRS 2 Share-based Payment（IASB, 2004年公表 / 2005年1月1日以降適用）
#   IFRS 2 改訂: 2008年（条件変更・取消）/ 2009年（グループ間取引）/ 2018年（分類・測定）
#   IFRIC 11 IFRS 2 — Group and Treasury Share Transactions（グループ間株式報酬）
#
# 主要ポイント（IFRS 2の骨子）:
#   (1) 持分決済型 — 付与日公正価値で費用計上・確定期間にわたり期間配分（再測定なし）
#   (2) 現金決済型 — 各報告日に公正価値再測定・負債計上・変動額を損益認識
#   (3) 決済方法選択型 — 取引相手が選択権を持つ場合は複合金融商品として処理
#   (4) 市場条件（株価条件）は公正価値に織り込み・非市場条件は確定数量の見積りに反映
#   (5) 条件変更はサービス提供者に有利な場合のみ追加費用認識
#   (6) 評価モデル（ブラック・ショールズ / 二項モデル / モンテカルロ）の選択と開示
#
# 松竹梅の基準:
#   梅 = 株式報酬費用の総額 + 付与数量・行使価格・残存期間の概要
#   竹 = 評価モデル + 主要インプット（ボラティリティ・RFIR・期待配当等） + NCI測定方法
#   松 = 感応度分析（ボラティリティ変動±10%影響） + 付与条件別の失効率実績と見込み + Pro forma EPS影響

version: "1.0"
effective_period:
  from: "2025-04-01"
  to: "2026-03-31"

amendments:

  # ──────────────────────────────────────────
  # 【第1群】認識・測定（持分決済型・現金決済型）
  # ──────────────────────────────────────────

  - id: "ifrs2-2025-001"
    category: "IFRS（株式報酬）"
    change_type: "継続必須"
    effective_from: "2025-04-01"
    title: "IFRS 2 — 持分決済型の認識・測定（付与日公正価値・確定期間配分）"
    source: "https://www.ifrs.org/issued-standards/list-of-standards/ifrs-2-share-based-payment/"
    source_confirmed: false
    summary: >
      持分決済型株式報酬（equity-settled SBP）は、財・サービスの取得時に
      付与日（grant date）の公正価値で測定した金額を、確定期間（vesting period）にわたって
      費用計上・資本増加として認識する。付与日公正価値は確定期間終了後も再測定せず、
      当初の測定額を基礎として費用を期間配分する点が現金決済型と根本的に異なる。
      確定条件のうち市場条件（market condition: 株価目標・TSR等）は
      オプション評価モデルに織り込み付与日公正価値に反映する（未達成でも費用調整しない）。
      非市場確定条件（勤続条件・利益目標等）は確定見込数量の見積りに反映し、
      各期末に確定予測に基づき累計費用を修正する。失効・権利未確定となった場合は
      その分の費用を取り消すが、権利確定後の失効（行使されない消滅）は費用調整しない。
    target_sections:
      - "株式報酬の注記"
      - "重要な会計方針（持分決済型株式報酬）"
      - "資本の変動"
    required_items:
      - "付与した持分商品の種類（ストックオプション・RS・RSU・ESPP等）"
      - "付与日公正価値の算定に使用した評価モデルおよび主要インプット"
      - "確定期間・確定条件（市場条件・非市場条件の区分）"
      - "当期および累計の株式報酬費用（持分決済型合計）"
      - "確定期間中の未認識残存費用と費用認識予定期間（加重平均）"
    applicable_markets:
      - "プライム"
      - "スタンダード"
    notes: "グループ会社間の株式報酬（例: 親会社が子会社従業員に付与）はIFRIC 11に基づき親会社・子会社双方の処理を検討"
    tier_requirement:
      ume: "必須"
      take: "必須"
      matsu: "必須"

  - id: "ifrs2-2025-002"
    category: "IFRS（株式報酬）"
    change_type: "継続必須"
    effective_from: "2025-04-01"
    title: "IFRS 2 — 現金決済型の認識・測定（報告日公正価値再測定・SARs）"
    source: "https://www.ifrs.org/issued-standards/list-of-standards/ifrs-2-share-based-payment/"
    source_confirmed: false
    summary: >
      現金決済型株式報酬（cash-settled SBP）は、提供された財・サービスと
      これに対して生じる負債を公正価値で認識する。負債は各報告日末に公正価値で
      再測定し、変動額を損益（費用または利益）として認識する。
      代表的な現金決済型取引は株式価値上昇分権利（SARs: Stock Appreciation Rights）・
      ファントムストック・現金決済型RSU等。
      持分決済型との最重要差異は「付与日後も毎期末に公正価値再測定を行う」点であり、
      株価上昇局面では未確定の将来費用が拡大し、株価下落局面では負債の戻入が生じる。
      確定期間中は確定見込割合を乗じた累積負債を各期末の公正価値で再測定する。
      確定後（サービス条件充足後）は権利行使まで毎期末に全額再測定する。
    target_sections:
      - "株式報酬の注記"
      - "重要な会計方針（現金決済型株式報酬）"
      - "引当金・負債の注記"
    required_items:
      - "現金決済型取引の種類（SARs・ファントムストック等）と付与数量"
      - "期末時点の負債残高と当期変動額（新規認識・再測定・決済）"
      - "報告日公正価値の算定モデルおよび主要インプット"
      - "当期損益に認識した現金決済型株式報酬費用（再測定損益含む）"
    applicable_markets:
      - "プライム"
      - "スタンダード"
    notes: "2018年IFRS 2改訂により、現金決済型から持分決済型への分類変更に関する取り扱いが明確化された（純額決済条件に係る規定等）"
    tier_requirement:
      ume: "必須"
      take: "必須"
      matsu: "必須"

  # ──────────────────────────────────────────
  # 【第2群】条件変更・評価モデル・インプット
  # ──────────────────────────────────────────

  - id: "ifrs2-2025-003"
    category: "IFRS（株式報酬）"
    change_type: "継続必須"
    effective_from: "2025-04-01"
    title: "IFRS 2 — 条件変更・キャンセル・買戻しの会計処理"
    source: "https://www.ifrs.org/issued-standards/list-of-standards/ifrs-2-share-based-payment/"
    source_confirmed: false
    summary: >
      付与後の条件変更（modification）・キャンセル・買戻しに係る会計処理。
      条件変更は付与した持分商品の公正価値増加または確定条件の変更に分類される。
      サービス提供者に有利な変更（行使価格引下げ・数量増加・確定条件緩和等）は
      変更日に追加的公正価値を算定し、残存確定期間にわたって追加費用を認識する。
      サービス提供者に不利な変更（行使価格引上げ等）は、当初条件で引き続き費用認識し
      不利な変更の影響は無視する（費用減少は認めない）。
      キャンセル・買戻しは確定期間完了として取り扱い、残存未認識費用を即時認識する。
      ただし買戻し対価が公正価値を超える場合、超過額は持分取引（資本）として処理する。
      会社都合による計画的な失効（フォーフィーチャー）はキャンセルと同様に扱う。
    target_sections:
      - "株式報酬の注記（条件変更・キャンセル）"
      - "重要な会計方針（条件変更の取り扱い）"
    required_items:
      - "条件変更の内容（変更前・変更後の主要条件）"
      - "変更日における追加的公正価値の算定額"
      - "条件変更により追加認識する費用の総額と配分期間"
      - "キャンセル・買戻しにより即時認識した費用額"
    applicable_markets:
      - "プライム"
      - "スタンダード"
    notes: "業績条件の達成困難による付与計画の廃止（de facto cancellation）はキャンセルとして即時費用認識が必要"
    tier_requirement:
      ume: "推奨"
      take: "必須"
      matsu: "必須"

  - id: "ifrs2-2025-004"
    category: "IFRS（株式報酬）"
    change_type: "継続必須"
    effective_from: "2025-04-01"
    title: "IFRS 2 — 評価モデルの開示（ブラック・ショールズ / 二項モデル / モンテカルロ）"
    source: "https://www.ifrs.org/issued-standards/list-of-standards/ifrs-2-share-based-payment/"
    source_confirmed: false
    summary: >
      付与日公正価値の算定に使用したオプション評価モデルとその選択理由を開示する。
      主要な評価モデルは: (1) ブラック・ショールズ・マートンモデル（B-S-M）—
      欧州型オプション（満期にのみ行使可能）に適し計算が単純。早期行使可能な
      米国型オプションには理論的には不適だが実務では簡便法として広く使用。
      (2) 二項モデル（格子モデル）— 各期ごとの株価変動を樹形図で表現し
      早期行使行動をモデル化できるため米国型オプションに理論的に優れる。
      (3) モンテカルロ・シミュレーション — 複雑な市場条件（TSR条件・
      マーケットキャップ条件・相対TSR比較等）を持つオプションに適用。
      評価モデルの選択は付与する持分商品の特性（行使条件・市場条件の複雑さ）に
      照らして適切であることを説明する必要がある。
    target_sections:
      - "株式報酬の注記（評価モデル）"
      - "重要な会計上の判断・見積り"
    required_items:
      - "使用した評価モデルの名称（B-S-M / 二項 / モンテカルロ等）"
      - "モデル選択の理由（付与した持分商品の特性との整合性）"
      - "早期行使を考慮した場合の調整方法（B-S-M使用時の短縮期待行使期間の根拠）"
      - "付与グループ別（行使価格・付与日が異なる場合）の評価モデルと公正価値"
    applicable_markets:
      - "プライム"
      - "スタンダード"
    notes: "モンテカルロ使用時はシミュレーション回数・乱数生成手法まで開示するのは松レベル。竹レベルでは主要仮定の開示で可"
    tier_requirement:
      ume: "推奨"
      take: "必須"
      matsu: "必須"

  - id: "ifrs2-2025-005"
    category: "IFRS（株式報酬）"
    change_type: "継続必須"
    effective_from: "2025-04-01"
    title: "IFRS 2 — 評価モデルの主要インプット（ボラティリティ・期待行使期間・リスクフリーレート・期待配当）"
    source: "https://www.ifrs.org/issued-standards/list-of-standards/ifrs-2-share-based-payment/"
    source_confirmed: false
    summary: >
      株式報酬の公正価値算定に使用した主要なインプット（仮定・パラメータ）の開示。
      IFRS 2 第47項が要求する主要インプット: (1) 加重平均行使価格（exercise price）。
      (2) 期待ボラティリティ（expected volatility）— 株価の将来変動の見積り。
      過去の実績ボラティリティ（通常は期待行使期間に対応する過去期間）または
      インプライドボラティリティ（市場オプション価格から逆算）を使用し、
      採用した手法と根拠を説明する。(3) 期待行使期間（expected term）—
      付与日から権利行使までの見込期間。過去の行使パターンや早期退職率を考慮。
      (4) リスクフリーレート（risk-free rate）— 期待行使期間に対応する
      国債利回り（通常は国債ゼロクーポン利回り）。(5) 期待配当利回り（expected dividend yield）—
      配当を支払う会社では費用計上額に重要な影響を与える。
      付与日時点の加重平均値と、付与グループ別の範囲を開示する。
    target_sections:
      - "株式報酬の注記（評価インプット）"
      - "重要な会計上の見積り（ボラティリティ・期待行使期間）"
    required_items:
      - "加重平均行使価格（付与日）"
      - "期待ボラティリティ（加重平均・算定根拠）"
      - "期待行使期間（加重平均・算定根拠）"
      - "リスクフリーレート（加重平均・参照した国債の年限）"
      - "期待配当利回り（または配当調整方法）"
      - "付与日の株価（加重平均）"
    applicable_markets:
      - "プライム"
      - "スタンダード"
    notes: "インプット間の感応度（特にボラティリティ±10%の費用影響）は松レベルで推奨。スタートアップ企業で過去実績が短い場合は同業比較ボラティリティの使用と根拠を説明"
    tier_requirement:
      ume: "推奨"
      take: "必須"
      matsu: "必須"

  # ──────────────────────────────────────────
  # 【第3群】費用・未確定報酬の開示
  # ──────────────────────────────────────────

  - id: "ifrs2-2025-006"
    category: "IFRS（株式報酬）"
    change_type: "継続必須"
    effective_from: "2025-04-01"
    title: "IFRS 2 — 株式報酬費用の内訳と期間配分（損益計算書上の表示）"
    source: "https://www.ifrs.org/issued-standards/list-of-standards/ifrs-2-share-based-payment/"
    source_confirmed: false
    summary: >
      当期の損益計算書に認識した株式報酬費用の内訳と期間配分の開示。
      費用計上額の区分: (1) 持分決済型費用（付与日公正価値×確定進捗）。
      (2) 現金決済型費用（報告日公正価値再測定ベース）。
      (3) 決済方法選択型費用（持分要素・負債要素の区分）。
      損益計算書上の計上区分（売上原価・販管費・研究開発費等）と
      総額を開示する。従業員区分別（取締役・上級管理職・その他従業員等）の
      開示は松レベルで推奨。確定期間が複数年にわたる場合の各年度の認識予定額
      （費用の将来スケジュール）も投資家の予測に有用な情報として開示が期待される。
      資本として認識した累積額（追加払込資本・別途積立金等への計上額）も開示する。
    target_sections:
      - "株式報酬の注記（費用の内訳）"
      - "販売費及び一般管理費の内訳"
      - "資本の注記（追加払込資本の変動）"
    required_items:
      - "当期に損益認識した株式報酬費用の合計（持分決済型・現金決済型の区分）"
      - "損益計算書上の計上科目別内訳（売上原価・販管費・研究開発費等）"
      - "資本として認識した累積額（期末時点）"
      - "確定期間が複数年の場合: 翌期以降の認識予定額のスケジュール"
    applicable_markets:
      - "プライム"
      - "スタンダード"
    notes: "希薄化EPS（IAS 33）との連携必須。潜在株式数（未行使オプション・未確定RSU等）の計算とIFRS 2費用の整合性を確認すること"
    tier_requirement:
      ume: "必須"
      take: "必須"
      matsu: "必須"

  - id: "ifrs2-2025-007"
    category: "IFRS（株式報酬）"
    change_type: "継続必須"
    effective_from: "2025-04-01"
    title: "IFRS 2 — 未確定報酬の開示（残存確定条件・失効見込・行使残高）"
    source: "https://www.ifrs.org/issued-standards/list-of-standards/ifrs-2-share-based-payment/"
    source_confirmed: false
    summary: >
      期末時点で未確定（unvested）または確定済みで未行使（vested but unexercised）の
      株式報酬残高に関する開示。IFRS 2 第45〜46項に基づく数量・加重平均行使価格・
      残存期間の開示。期首残高→新規付与→権利確定→行使→失効・消滅→期末残高の
      ロールフォワード（期中変動表）を開示する。
      未確定報酬の認識予定費用（unrecognised compensation cost）は、
      残存確定期間（加重平均）とともに開示する。
      失効率（forfeiture rate）の見積方法と実績との乖離も開示が求められる。
      確定済み未行使オプションについては行使可能株数・加重平均行使価格・
      加重平均残存契約期間を示す。行使価格帯別の情報（価格帯・数量・
      加重平均行使価格・残存契約期間）は投資家の希薄化リスク評価に有用。
    target_sections:
      - "株式報酬の注記（残高・期中変動）"
      - "潜在株式（希薄化EPS）との連携注記"
    required_items:
      - "期中変動表（付与・行使・失効・消滅・期末残高）と加重平均行使価格"
      - "期末時点の未確定残高と残存確定期間（加重平均）"
      - "未認識株式報酬費用の総額と認識予定加重平均期間"
      - "確定済み未行使オプションの行使可能数量・加重平均行使価格・残存契約期間"
      - "失効率の見積方法と当期実績失効率"
      - "行使価格帯別の行使可能オプション残高と加重平均情報（松レベル推奨）"
    applicable_markets:
      - "プライム"
      - "スタンダード"
    notes: "RSU・RSA等の行使価格がゼロの場合は加重平均行使価格欄は非適用となるが、数量・期間の開示は同様に必要"
    tier_requirement:
      ume: "必須"
      take: "必須"
      matsu: "必須"
