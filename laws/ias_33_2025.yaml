# disclosure-multiagent — 法令・ガイダンス情報 YAML
# カテゴリ: IFRS（1株当たり利益）
# 対象期間: 2025年度（2025-04-01〜2026-03-31）
# スキーマ定義: docs/law_yaml_schema.md
# 作成者: Majiro-ns
#
# 根拠法令・基準:
#   IAS 33 Earnings per Share (revised 2003): 基本的EPS・希薄化後EPS
#   IFRS 5 Non-current Assets Held for Sale and Discontinued Operations: 非継続事業
#   企業会計基準委員会（ASBJ）日本語版: https://www.asb.or.jp/jp/ifrs/ifrs_all/ias.html

version: "1.0"
effective_period:
  from: "2025-04-01"
  to: "2026-03-31"

amendments:

  # ──────────────────────────────────────────
  # 【第1群】基本的EPS
  # ──────────────────────────────────────────

  - id: "ias33-2025-001"
    category: "IFRS（1株当たり利益）"
    change_type: "追加必須"
    effective_from: "2025-04-01"
    title: "基本的1株当たり利益の算定 — 普通株式帰属利益と加重平均株式数"
    source: "https://www.ifrs.org/issued-standards/list-of-standards/ias-33-earnings-per-share/"
    source_confirmed: true
    summary: >
      IAS 33.10〜29に基づく基本的1株当たり利益（基本的EPS）の算定・開示要件。
      基本的EPSは、当期に普通株主に帰属する利益または損失を、
      当期中の普通株式の加重平均株式数で除して算定する。
      分子となる普通株主帰属利益は、当期純利益から優先株式配当（税引後）・
      優先株式の払戻時に生じる差額等を控除した金額である。
      分母となる加重平均株式数は、期中に発行または消却された株式を
      日数按分により加重平均して算出する。
      IAS 33.10〜29が適用根拠。
    target_sections:
      - "1株当たり情報に関する注記"
      - "財務諸表本表（包括利益計算書または損益計算書）"
    required_items:
      - "基本的EPSの金額（普通株式1株当たり）の表示"
      - "普通株主帰属利益の金額（分子）と算定根拠"
      - "加重平均普通株式数（分母）の算定方法"
      - "優先株式配当等の控除項目の内容と金額"
      - "前期比較数値の開示"
    applicable_markets:
      - "プライム"
      - "スタンダード"
      - "グロース"
    notes: >
      IAS 33は連結財務諸表を公開している企業に強制適用される。
      日本基準との主な相違点は、優先配当の取り扱いと
      加重平均株式数の計算における自己株式の扱いである。
      損失が生じた場合も基本的EPSは算定・開示が必要（負の値）。
    tier_requirement:
      ume: "必須"
      take: "必須"
      matsu: "必須"

  # ──────────────────────────────────────────
  # 【第2群】希薄化後EPS
  # ──────────────────────────────────────────

  - id: "ias33-2025-002"
    category: "IFRS（1株当たり利益）"
    change_type: "追加必須"
    effective_from: "2025-04-01"
    title: "希薄化後EPSの算定 — 潜在普通株式（新株予約権・転換社債）の影響"
    source: "https://www.ifrs.org/issued-standards/list-of-standards/ias-33-earnings-per-share/"
    source_confirmed: true
    summary: >
      IAS 33.30〜63に基づく希薄化後1株当たり利益（希薄化後EPS）の算定・開示要件。
      希薄化後EPSは、潜在普通株式（新株予約権・ストックオプション・転換社債・
      転換優先株式等）が全て行使または転換された場合を仮定して算定する。
      分子調整として、転換社債の利息（税引後）・転換優先配当等を加算する。
      分母調整として、潜在普通株式の加重平均数を加算する。
      新株予約権・ストックオプションは自己株式法（treasury stock method）を用いて
      純増株式数（行使により受け取る対価で買戻せる株式数を控除）を計算する。
      IAS 33.30〜63が適用根拠。
    target_sections:
      - "1株当たり情報に関する注記"
      - "財務諸表本表（包括利益計算書または損益計算書）"
    required_items:
      - "希薄化後EPSの金額の表示（基本的EPSとの対比）"
      - "潜在普通株式の種類・数量・行使条件の開示"
      - "分子調整額（転換社債利息・優先配当等）の内容と金額"
      - "分母調整数（潜在株式の加重平均）の算定方法"
      - "自己株式法適用時の計算根拠（平均市場価格・行使価格）"
    applicable_markets:
      - "プライム"
      - "スタンダード"
      - "グロース"
    notes: >
      転換社債のIFRICS・ストックオプションのIFRS 2適用との連動確認が必要。
      行使価格が期中平均市場価格を上回るオプションは希薄化効果がなく、
      希薄化後EPSの計算から除外する（逆希薄化ではなくanti-dilutiveでもない）。
      潜在株式の数が多い場合は感応度（行使価格シナリオ別のEPS）の開示が
      松ランクでは期待される。
    tier_requirement:
      ume: "任意"
      take: "必須"
      matsu: "必須"

  # ──────────────────────────────────────────
  # 【第3群】継続事業・非継続事業の区分
  # ──────────────────────────────────────────

  - id: "ias33-2025-003"
    category: "IFRS（1株当たり利益）"
    change_type: "追加必須"
    effective_from: "2025-04-01"
    title: "継続事業と非継続事業の区分表示 — IFRS 5との連動によるEPS開示"
    source: "https://www.ifrs.org/issued-standards/list-of-standards/ias-33-earnings-per-share/"
    source_confirmed: true
    summary: >
      IAS 33.66〜69に基づく、継続事業と非継続事業（IFRS 5）を区分した
      1株当たり利益の開示要件。IFRS 5に基づき非継続事業として分類された
      事業セグメントが存在する場合、継続事業に帰属するEPS（基本的・希薄化後）と
      非継続事業に帰属するEPS（基本的・希薄化後）を別掲しなければならない。
      非継続事業のEPSは財務諸表本表の包括利益計算書（または損益計算書）の
      注記として開示してもよい。
      非継続事業の定義はIFRS 5.32〜33に従い、事業の主要な構成要素の
      処分または売却目的保有への分類が必要。
      IAS 33.66〜69、IFRS 5.33(a)が適用根拠。
    target_sections:
      - "1株当たり情報に関する注記"
      - "非継続事業に関する注記"
    required_items:
      - "継続事業帰属の基本的EPSと希薄化後EPS"
      - "非継続事業帰属の基本的EPSと希薄化後EPS（該当する場合）"
      - "非継続事業の定義・事業内容・処分予定の概要"
      - "非継続事業の税引後利益・損失の金額"
      - "前期に非継続事業であった場合の遡及的な区分組み替え"
    applicable_markets:
      - "プライム"
      - "スタンダード"
      - "グロース"
    notes: >
      事業売却・事業再編が発生した期のみ適用が生じる。
      非継続事業の判定はIFRS 5の要件を充たす必要があり、
      単なる事業縮小（リストラ）は非継続事業に該当しない。
      前期の非継続事業EPSは当期比較表示のために組み替えが必要。
    tier_requirement:
      ume: "任意"
      take: "必須"
      matsu: "必須"

  # ──────────────────────────────────────────
  # 【第4群】逆希薄化効果の除外
  # ──────────────────────────────────────────

  - id: "ias33-2025-004"
    category: "IFRS（1株当たり利益）"
    change_type: "追加必須"
    effective_from: "2025-04-01"
    title: "逆希薄化効果のある証券の除外と開示 — IAS 33.41〜43による取り扱い"
    source: "https://www.ifrs.org/issued-standards/list-of-standards/ias-33-earnings-per-share/"
    source_confirmed: true
    summary: >
      IAS 33.41〜43および IAS 33.70(c)に基づく、逆希薄化効果（anti-dilutive effect）を
      持つ潜在普通株式の取り扱いと開示要件。
      潜在普通株式が希薄化後EPSを基本的EPSより増加させる効果（逆希薄化）を
      持つ場合は、その潜在株式を希薄化後EPSの計算から除外しなければならない。
      典型的な逆希薄化の発生パターンとして、（a）当期が損失の場合に
      転換社債の利息控除が損失を減少させ1株当たり損失を縮小させる場合、
      （b）転換社債の1株当たり利益増加効果が既存EPSを上回る場合がある。
      除外した潜在株式については注記で開示することが求められる。
      IAS 33.41〜43、70(c)が適用根拠。
    target_sections:
      - "1株当たり情報に関する注記"
    required_items:
      - "逆希薄化効果のある潜在株式の種類・数量の注記"
      - "逆希薄化と判断した根拠（損失年度・1株当たり効果の方向性）"
      - "除外した結果として基本的EPSと希薄化後EPSが同額となる説明"
      - "将来期間での希薄化効果発生可能性（条件変化のシナリオ）"
    applicable_markets:
      - "プライム"
      - "スタンダード"
      - "グロース"
    notes: >
      当期純損失が生じた場合は原則として全ての潜在株式が逆希薄化となり、
      希薄化後EPSは基本的EPSと同額で開示する。
      投資家向けに、利益回復時に希薄化が生じる潜在株式数を
      開示しておくことが松ランクでは推奨される。
      ストックオプションの数が多い場合（持分報酬コスト計上額との連動）は
      IFRS 2の注記との整合性確認が必要。
    tier_requirement:
      ume: "任意"
      take: "必須"
      matsu: "必須"

  # ──────────────────────────────────────────
  # 【第5群】株式数の調整事項
  # ──────────────────────────────────────────

  - id: "ias33-2025-005"
    category: "IFRS（1株当たり利益）"
    change_type: "追加必須"
    effective_from: "2025-04-01"
    title: "株式数の調整事項 — 株式分割・株式併合・自己株式・無償割当の遡及修正"
    source: "https://www.ifrs.org/issued-standards/list-of-standards/ias-33-earnings-per-share/"
    source_confirmed: true
    summary: >
      IAS 33.26〜29、64〜65に基づく、株式数の変動が生じた場合のEPS算定上の
      調整事項と遡及修正の開示要件。
      株式分割・株式併合・無償割当（株式配当・権利落ち付き有償増資の無償部分）は、
      当期中に発生した場合でも期初から発生したものとして加重平均株式数を遡及修正する。
      前期以前に発生した株式分割・併合についても、当期の比較表示において
      全期間を遡って修正後株式数を使用する（IAS 33.64）。
      自己株式は保有期間中、加重平均株式数の分母から控除する（IAS 33.20）。
      IAS 33.26〜29、64〜65が適用根拠。
    target_sections:
      - "1株当たり情報に関する注記"
      - "資本に関する注記"
    required_items:
      - "株式分割・併合・無償割当の事実・比率・効力発生日の開示"
      - "遡及修正後の加重平均株式数（修正前との対比）"
      - "前期EPS（比較数値）の遡及修正の有無と修正後金額"
      - "自己株式の期中増減（取得・消却・売却）と加重平均株式数への影響"
      - "自社株買いプログラムの概要（取得上限・期間・取得目的）"
    applicable_markets:
      - "プライム"
      - "スタンダード"
      - "グロース"
    notes: >
      株式分割・併合は報告期間終了後・財務諸表承認日前に発生した場合も
      遡及修正の対象となる（IAS 33.64）。
      日本企業では自社株買いによる自己株式取得が多く、
      分母の加重平均株式数が期間によって大きく変動することがある。
      松ランクでは自社株買いによるEPSへの貢献度（純利益成長vs株式数減少の内訳）の
      開示が機関投資家から要求されるケースが増えている。
    tier_requirement:
      ume: "必須"
      take: "必須"
      matsu: "必須"
