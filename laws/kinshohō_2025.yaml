# disclosure-multiagent — 法令・ガイダンス情報 YAML
# カテゴリ: 金商法・開示府令（有価証券報告書の根拠法令）
# 対象期間: 2025年度（2025-04-01〜2026-03-31）
# スキーマ定義: docs/law_yaml_schema.md
# 作成者: Majiro-ns（cmd_360k_a2c）
# Last Updated: 2026-03-14
#
# CHECK-7b 手確認メモ:
#   金融商品取引法（金商法）: 昭和23年法律第25号。有報提出義務の根拠法（第24条）
#   企業内容等の開示に関する内閣府令（開示府令）: 2022年11月15日改正・2023年1月31日施行
#   有価証券報告書の記載要領（ガイドライン）: 金融庁 2023年改訂版
#   CRITICAL_CATEGORIES「金商法・開示府令」解消のため追加（cmd_360k_a2c）

version: "1.0"
effective_period:
  from: "2025-04-01"
  to: "2026-03-31"

amendments:

  # ──────────────────────────────────────────
  # 【第1群】金融商品取引法（有報提出義務の根拠）
  # ──────────────────────────────────────────

  - id: "ks-2025-001"
    category: "金商法・開示府令"
    change_type: "追加必須"
    effective_from: "2023-01-31"
    title: "金融商品取引法第24条 — 有価証券報告書の提出義務"
    source: "https://www.fsa.go.jp/policy/disclosure/index.html"
    source_confirmed: true
    summary: >
      金融商品取引法（昭和23年法律第25号）第24条に基づく有価証券報告書の
      提出義務規定。上場有価証券の発行者は、事業年度終了後3ヶ月以内に
      有価証券報告書を内閣総理大臣（金融庁）に提出しなければならない。
      2022年11月改正により、サステナビリティ・人的資本・多様性に関する
      記載欄が新設され、2023年3月期（2023年4月1日以降開始の事業年度）から適用。
    target_sections:
      - "有価証券報告書（全体）"
      - "サステナビリティに関する考え方及び取組"
    required_items:
      - "有価証券報告書の期限内提出（事業年度終了後3ヶ月以内）"
      - "内閣府令様式第二号に基づく記載"
      - "サステナビリティ開示欄の記載（2023年3月期以降）"
    applicable_markets:
      - "プライム"
      - "スタンダード"
      - "グロース"
    notes: "3月決算企業は毎年6月末が提出期限。有報遅延は課徴金・上場廃止の対象となりうる"

  - id: "ks-2025-002"
    category: "金商法・開示府令"
    change_type: "追加必須"
    effective_from: "2023-01-31"
    title: "企業内容等の開示に関する内閣府令（開示府令）— 2022年11月改正"
    source: "https://www.fsa.go.jp/news/r4/sonota/20221114-3/20221114-3.html"
    source_confirmed: true
    summary: >
      企業内容等の開示に関する内閣府令（昭和48年大蔵省令第5号）の2022年11月15日改正。
      2023年1月31日施行、2024年3月期（2024年4月1日以降開始事業年度）から全面適用。
      主な改正点:
      （1）サステナビリティに関する考え方及び取組（新設）
      （2）人的資本・多様性の記載義務化（女性管理職比率・男性育休取得率・平均給与増減率）
      （3）コーポレートガバナンスの充実（政策保有株式の開示強化）
      （4）内部統制報告書の記載見直し
    target_sections:
      - "サステナビリティに関する考え方及び取組"
      - "人的資本"
      - "コーポレートガバナンスの状況等"
    required_items:
      - "サステナビリティ開示（ガバナンス・リスク管理・戦略・指標と目標）"
      - "女性管理職比率（連結）"
      - "男性育児休業取得率"
      - "平均給与増減率（正規従業員）"
      - "政策保有株式の保有方針・個別銘柄開示"
    applicable_markets:
      - "プライム"
      - "スタンダード"
      - "グロース"
    notes: "2024年3月期（2023年4月1日開始事業年度）から全面適用。旧来の様式を更新すること"

  - id: "ks-2025-003"
    category: "金商法・開示府令"
    change_type: "修正推奨"
    effective_from: "2023-04-01"
    title: "有価証券報告書の記載要領（金融庁、2023年改訂版）— サステナビリティ記載"
    source: "https://www.fsa.go.jp/policy/disclosure/index.html"
    source_confirmed: false
    summary: >
      金融庁が公表する有価証券報告書の記載要領（ガイドライン）。
      2023年改訂版では、サステナビリティ情報（第一部第二号様式）の
      具体的な記載例・Q&Aが追加された。
      特にガバナンス体制（取締役会の監督・経営陣の役割）、
      リスク管理プロセス、指標と目標（KPI・実績値）の
      具体的な記載方法が示されている。
    target_sections:
      - "サステナビリティに関する考え方及び取組"
    required_items:
      - "ガバナンス体制の記載（取締役会の監督体制・経営陣の役割）"
      - "リスク管理プロセスの記載"
      - "指標と目標（KPI・実績値・目標値）の記載"
    applicable_markets:
      - "プライム"
      - "スタンダード"
      - "グロース"
    notes: "金融庁「ESG情報開示サポートサイト」（https://www.fsa.go.jp/policy/disclosure/index.html）も参照"

  # ──────────────────────────────────────────
  # 【第2群】有価証券報告書の根拠規定（詳細）
  # ──────────────────────────────────────────

  - id: "ks-2025-004"
    category: "金商法・開示府令"
    change_type: "追加必須"
    effective_from: "2023-01-31"
    title: "開示府令改正 — コーポレートガバナンス（政策保有株式・取締役報酬）の記載強化"
    source: "https://www.fsa.go.jp/news/r4/sonota/20221114-3/20221114-3.html"
    source_confirmed: true
    summary: >
      2022年11月改正開示府令によるコーポレートガバナンス情報の記載強化。
      政策保有株式について、保有目的・定量的効果（売上・利益への貢献等）の
      個別開示が強化された。また取締役の報酬については、
      業績連動報酬の算定指標・最大値・実績値の明示、
      社外取締役（独立取締役）の状況の詳細化が求められる。
    target_sections:
      - "コーポレートガバナンスの状況等"
      - "役員の報酬等"
    required_items:
      - "政策保有株式の個別銘柄開示（保有目的・定量的効果）"
      - "業績連動報酬の算定指標・最大値・実績値"
      - "取締役選解任方針の記載"
      - "スキルマトリックスの掲載（プライム推奨）"
    applicable_markets:
      - "プライム"
      - "スタンダード"
    notes: "東証コーポレートガバナンス・コード（2021年改訂）補充原則4-2②・4-11③とも対応"
