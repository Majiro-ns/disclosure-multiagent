# disclosure-multiagent — 法令・ガイダンス情報 YAML
# カテゴリ: IFRS（農業）
# 対象期間: 2025年度（2025-04-01〜2026-03-31）
# スキーマ定義: docs/law_yaml_schema.md
# 作成者: Majiro-ns
#
# 根拠法令・基準:
#   IAS 41 Agriculture (issued 2001, amended 2014 for bearer plants): 生物資産の公正価値測定
#   IAS 16 Property, Plant and Equipment: 結実植物（bearer plants）への適用除外後の取り扱い
#   IAS 20 Accounting for Government Grants: 生物資産に係る政府補助金
#   IFRS 13 Fair Value Measurement: 公正価値の測定技法・階層
#   企業会計基準委員会（ASBJ）日本語版: https://www.asb.or.jp/jp/ifrs/ifrs_all/ias.html
#   注記: 日本の農業法人でIFRS適用はまだ少数だが、農林水産業関連上場企業・
#         食品メーカーの連結子会社等で適用事例がある

version: "1.0"
effective_period:
  from: "2025-04-01"
  to: "2026-03-31"

amendments:

  # ──────────────────────────────────────────
  # 【第1群】認識・測定
  # ──────────────────────────────────────────

  - id: "ias41-2025-001"
    category: "IFRS（農業）"
    change_type: "追加必須"
    effective_from: "2025-04-01"
    title: "生物資産の認識と公正価値測定 — 収穫時点の農産物を含む測定原則"
    source: "https://www.ifrs.org/issued-standards/list-of-standards/ias-41-agriculture/"
    source_confirmed: true
    summary: >
      IAS 41.10〜33に基づく生物資産（biological asset）および農産物（agricultural produce）の
      認識基準と公正価値測定の原則。
      生物資産は、（a）過去の事象の結果として企業が資産を支配し、
      （b）将来の経済的便益が企業に流入することが見込まれ、
      （c）公正価値または原価が信頼性をもって測定できる場合に認識する（IAS 41.10）。
      生物資産は認識時点および各報告日において、売却費用控除後の公正価値で測定する
      （IAS 41.12）。公正価値の変動（生物的変化・価格変動）から生じる損益は
      発生した期の損益として認識する（IAS 41.26）。
      収穫時点の農産物は売却費用控除後の公正価値で測定し、
      収穫後はIAS 2（棚卸資産）等の適用に移行する（IAS 41.13）。
      2014年改訂により結実植物（bearer plants: 果樹・茶樹等）は
      IAS 16有形固定資産として処理し（IAS 41.5A）、
      結実植物に付く農産物のみがIAS 41の対象となる。
    target_sections:
      - "生物資産に関する注記"
      - "重要な会計方針（生物資産の測定方針）"
    required_items:
      - "生物資産の認識基準と公正価値測定の会計方針"
      - "公正価値の測定手法（市場価格・DCF・再調達原価等）と主要インプット"
      - "IFRS 13公正価値階層（Level 1/2/3）の分類と根拠"
      - "公正価値変動から生じた利益・損失の内訳（生物的変化分・価格変動分）"
      - "結実植物（bearer plants）をIAS 16で処理している場合の区分説明"
    applicable_markets:
      - "プライム"
      - "スタンダード"
      - "グロース"
    notes: >
      活発な市場が存在しない生物資産（特殊家畜・希少作物等）はLevel 3測定となり、
      主要な観察不能インプット（成長率・死亡率・将来価格等）の開示が必要。
      2014年の結実植物（bearer plants）改訂により、
      果樹園・茶園・ゴム農園等の植物本体はIAS 16で処理し、
      そこから収穫される農産物（果実・茶葉・天然ゴム等）のみがIAS 41の対象。
    tier_requirement:
      ume: "必須"
      take: "必須"
      matsu: "必須"

  - id: "ias41-2025-002"
    category: "IFRS（農業）"
    change_type: "追加必須"
    effective_from: "2025-04-01"
    title: "公正価値を信頼性をもって測定できない場合の原価モデルの適用"
    source: "https://www.ifrs.org/issued-standards/list-of-standards/ias-41-agriculture/"
    source_confirmed: true
    summary: >
      IAS 41.30〜33に基づく、公正価値を信頼性をもって測定できない場合の
      例外的な原価モデルの適用要件と開示。
      生物資産の公正価値を信頼性をもって測定できないという反証可能な推定が
      認識時点においてのみ適用される（IAS 41.30）。
      この場合、生物資産は原価から減価償却累計額および減損損失累計額を
      控除した額で測定する（IAS 41.30）。
      公正価値を信頼性をもって測定できなくなった場合の例として、
      市場価格が存在せず、DCF等の代替的手法も信頼性のある見積りを
      提供できない場合（例：特殊な幼齢家畜・育成中の特定作物）がある。
      公正価値が測定可能になった時点で即座に公正価値測定に切り替える（IAS 41.30）。
    target_sections:
      - "生物資産に関する注記"
      - "重要な会計方針（原価モデルの例外適用）"
    required_items:
      - "原価モデルを適用している生物資産の種類・帳簿価額・減価償却方法"
      - "公正価値を信頼性をもって測定できない理由の説明"
      - "原価モデル適用資産に係る減損損失の認識・戻入れ状況（IAS 36準用）"
      - "公正価値測定が可能になった時点での切り替え時の損益認識"
      - "原価モデル適用資産の将来における公正価値測定可能性の見通し"
    applicable_markets:
      - "プライム"
      - "スタンダード"
      - "グロース"
    notes: >
      原価モデルの適用は例外的であり、大多数の生物資産は公正価値測定が
      適用可能と想定されている。
      IFRS 13に基づくLevel 3の評価技法（DCF・再調達原価法等）を
      使用すれば通常は公正価値を測定できるため、
      この例外の使用は極めて稀なケースに限られる。
    tier_requirement:
      ume: "任意"
      take: "必須"
      matsu: "必須"

  # ──────────────────────────────────────────
  # 【第2群】増減調整表・グループ別開示
  # ──────────────────────────────────────────

  - id: "ias41-2025-003"
    category: "IFRS（農業）"
    change_type: "追加必須"
    effective_from: "2025-04-01"
    title: "生物資産の増減調整表 — 購入・売却・収穫・公正価値変動・為替換算の内訳"
    source: "https://www.ifrs.org/issued-standards/list-of-standards/ias-41-agriculture/"
    source_confirmed: true
    summary: >
      IAS 41.50に基づく生物資産の期首から期末への増減調整表の開示要件。
      増減調整表には以下の変動項目を含める:
      （a）期首帳簿価額（公正価値または原価）、
      （b）当期購入・取得による増加、
      （c）売却による減少、
      （d）収穫による減少（農産物への振替）、
      （e）企業結合による増加（IFRS 3）、
      （f）外貨換算差額、
      （g）価格の変化から生じた公正価値変動（純損益算入）、
      （h）生物的変化から生じた公正価値変動（純損益算入）、
      （i）その他の変動、
      （j）期末帳簿価額（IAS 41.50）。
      公正価値変動は価格変動と生物的変化（成長・生産・変質等）に分けて開示する
      ことが推奨される。
    target_sections:
      - "生物資産に関する注記（増減調整表）"
    required_items:
      - "期首・期末帳簿価額の対比表（生物資産グループ別）"
      - "当期購入・企業結合による増加額"
      - "売却・収穫（農産物への振替）による減少額"
      - "公正価値変動損益（価格変動分・生物的変化分の区分）"
      - "外貨換算差額（在外農場・関連会社がある場合）"
    applicable_markets:
      - "プライム"
      - "スタンダード"
      - "グロース"
    notes: >
      季節性の高い農業事業では四半期ごとの生物資産残高の変動が大きい場合があり、
      中間財務諸表でも同様の増減調整表が求められる場合がある。
      収穫による農産物への振替は収穫時の公正価値（売却費用控除後）で行い、
      その後の農産物はIAS 2棚卸資産として管理する。
    tier_requirement:
      ume: "必須"
      take: "必須"
      matsu: "必須"

  - id: "ias41-2025-004"
    category: "IFRS（農業）"
    change_type: "追加必須"
    effective_from: "2025-04-01"
    title: "生物資産のグループ別開示 — 消費用・生産用/成熟・未成熟の区分表示"
    source: "https://www.ifrs.org/issued-standards/list-of-standards/ias-41-agriculture/"
    source_confirmed: true
    summary: >
      IAS 41.41〜55に基づく生物資産の性質別グループ区分と開示要件。
      IAS 41は生物資産を（a）消費用生物資産（consumable biological assets: 食肉用家畜・
      収穫用作物等）と（b）生産用生物資産（bearer biological assets: 乳牛・産卵鶏・
      結実植物以外の生産用動植物）に区分する（IAS 41.44）。
      さらに各グループを成熟資産（mature assets）と未成熟資産（immature assets）に
      細区分して開示する（IAS 41.41(b)）。
      成熟・未成熟の定義は企業が農業活動の特性に応じて設定し、
      会計方針として開示する。
      グループ別の帳簿価額・数量（頭数・面積・重量等）・公正価値測定手法を
      開示することで財務諸表利用者の理解を助ける。
    target_sections:
      - "生物資産に関する注記（グループ別内訳）"
      - "農業活動の概要"
    required_items:
      - "生物資産のグループ別（消費用・生産用）・成熟度別の帳簿価額"
      - "各グループの物量（頭数・面積・本数・重量等）の開示"
      - "成熟・未成熟の定義基準（月齢・生育ステージ等）の会計方針"
      - "各グループの公正価値測定手法とIFRS 13階層区分"
      - "結実植物がある場合のIAS 16適用資産との区分表示"
    applicable_markets:
      - "プライム"
      - "スタンダード"
      - "グロース"
    notes: >
      グループ区分は企業の農業活動の種類によって大きく異なる。
      例えば酪農企業では「搾乳牛（生産用成熟）」「育成牛（生産用未成熟）」
      「肉牛（消費用成熟）」「子牛（消費用未成熟）」といった区分が典型的。
      林業企業では立木のステージ（幼齢林・壮齢林・伐採適齢林）による区分が有効。
    tier_requirement:
      ume: "必須"
      take: "必須"
      matsu: "必須"

  # ──────────────────────────────────────────
  # 【第3群】政府補助金・リスク管理
  # ──────────────────────────────────────────

  - id: "ias41-2025-005"
    category: "IFRS（農業）"
    change_type: "追加必須"
    effective_from: "2025-04-01"
    title: "政府補助金（IAS 20連携）の開示 — 条件付き・無条件補助金の認識と開示"
    source: "https://www.ifrs.org/issued-standards/list-of-standards/ias-41-agriculture/"
    source_confirmed: true
    summary: >
      IAS 41.34〜38およびIAS 20に基づく、農業活動に係る政府補助金の
      認識・測定・開示要件。
      公正価値で測定される生物資産に関係する無条件の政府補助金は、
      補助金の受領が確実になった時点で収益として認識する（IAS 41.34）。
      条件付き補助金（特定農業活動の実施・特定期間の継続等の条件がある場合）は、
      条件が充足された時点で収益として認識する（IAS 41.35）。
      原価モデルで測定される生物資産に関係する政府補助金は
      IAS 20（政府補助金の会計処理）に従う（IAS 41.37〜38）。
      農業分野の典型的な補助金として、農地維持補助・環境保全型農業助成・
      作物保険補助・農業近代化補助等がある。
    target_sections:
      - "生物資産に関する注記"
      - "政府補助金に関する注記"
    required_items:
      - "農業活動に係る政府補助金の種類・金額・当期認識額"
      - "条件付き補助金の条件内容・充足状況・未充足の場合の返還リスク"
      - "補助金に付された条件（農業活動の種類・期間・方法の制限）の内容"
      - "補助金収益の損益計算書上の表示区分"
      - "将来期間に受領予定の補助金が存在する場合の概要"
    applicable_markets:
      - "プライム"
      - "スタンダード"
      - "グロース"
    notes: >
      日本では農業振興政策（農水省・都道府県）の各種補助金が対象となる。
      EU（共通農業政策CAP）・米国（農業法Farm Bill）等の海外農業補助金は
      条件・返還条件が複雑であり、条件付き補助金の判定に注意が必要。
      炭素クレジット・温室効果ガス削減補助（環境補助）も
      農業法人向けに増加しており、IAS 20との整合が課題となっている。
    tier_requirement:
      ume: "任意"
      take: "必須"
      matsu: "必須"

  - id: "ias41-2025-006"
    category: "IFRS（農業）"
    change_type: "追加必須"
    effective_from: "2025-04-01"
    title: "生物資産に関するリスク管理戦略 — 気候・価格・疾病リスクの定性・定量開示"
    source: "https://www.ifrs.org/issued-standards/list-of-standards/ias-41-agriculture/"
    source_confirmed: true
    summary: >
      IAS 41.49に基づく農業活動のリスク管理戦略の開示要件。
      生物資産の開発・管理に関するリスク管理戦略として、
      （a）気候・天候リスク（干ばつ・洪水・霜害・暴風等）、
      （b）価格変動リスク（農産物の市場価格の変動）、
      （c）疾病・病虫害リスク（家畜疾病・植物病害・農業害虫）、
      （d）供給リスク（種苗・飼料・農薬等の調達リスク）について
      採用しているリスク管理手段（保険・ヘッジ・多様化・契約栽培等）を開示する。
      IFRS 7（金融商品の開示）との連動として、農産物の先物・オプション等を
      用いたヘッジ戦略がある場合はヘッジ会計の適用状況も開示する。
      IAS 41.49および IFRS 7.22〜24が適用根拠。
    target_sections:
      - "生物資産に関する注記（リスク管理）"
      - "財務リスク管理（市場リスク・農業特有リスク）"
    required_items:
      - "農業活動に関連する主要リスクの種類（気候・価格・疾病・供給）の定性説明"
      - "各リスクに対するリスク管理手段（保険・先物・多様化・地理的分散等）"
      - "農産物市場価格リスクのヘッジ状況（IFRS 7との連動）"
      - "気候変動がもたらす長期リスクへの対応方針（TCFD開示との連動）"
      - "主要インプット（農産物価格・気温・降水量）の変化による公正価値感応度"
    applicable_markets:
      - "プライム"
      - "スタンダード"
      - "グロース"
    notes: >
      気候変動リスクの開示はTCFD（気候関連財務情報開示タスクフォース）との
      連動が重要性を増している。農業部門は物理的リスク（気候変動による収量減少）と
      移行リスク（農薬規制・排出規制強化）の双方に大きく晒されている。
      松ランクでは、（a）±1℃気温変化による収量・公正価値への影響、
      （b）主要農産物価格±10%変動によるEPS影響の定量開示が期待される。
    tier_requirement:
      ume: "任意"
      take: "任意"
      matsu: "必須"
