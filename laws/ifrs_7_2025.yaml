# disclosure-multiagent — 法令・ガイダンス情報 YAML
# カテゴリ: IFRS 7（金融商品：開示）
# 対象期間: 2025年度（2025-04-01〜2026-03-31）
# スキーマ定義: docs/law_yaml_schema.md
# 作成者: Majiro-ns
#
# 根拠法令:
#   IFRS 7 Financial Instruments: Disclosures
#     （国際会計基準審議会 / IASB 2005年8月公表、2007年1月適用開始）
#   最終改訂: 2023年5月（仕入先ファイナンス・アレンジメントの開示 — 2024年1月強制適用）
#   IASB公式URL: https://www.ifrs.org/issued-standards/list-of-standards/ifrs-7-financial-instruments-disclosures/
#   日本語訳（ASBJ）: https://www.asb.or.jp/jp/ifrs/translation.html
#
# 松竹梅レベルの考え方:
#   梅（ume）: J-GAAP適用の国内上場企業、またはIFRS採用かつデリバティブ等を
#             ほとんど保有しない事業会社。最小限の定性説明で対応可能な開示。
#   竹（take）: IFRS採用企業（金融機関以外）。信用リスク・市場リスクの
#              定量開示を伴う標準的な開示レベル。主要行等以外の中規模企業。
#   松（matsu）: IFRS採用の金融機関、大規模事業会社、または国際業務を行う企業。
#               3ステージECL・VaR・感応度分析・ストレステストを含む完全開示。

version: "1.0"
effective_period:
  from: "2025-04-01"
  to: "2026-03-31"

amendments:

  # ──────────────────────────────────────────
  # 【第1群】信用リスク開示（IFRS 7.34-38 / 7.35A-35N）
  # ──────────────────────────────────────────

  - id: "ifrs7-2025-001"
    category: "IFRS 7（信用リスク）"
    change_type: "追加必須"
    effective_from: "2025-04-01"
    title: "信用リスクの最大エクスポージャーと担保・信用集中の開示（IFRS 7.36-38）"
    source: "https://www.ifrs.org/issued-standards/list-of-standards/ifrs-7-financial-instruments-disclosures/"
    source_confirmed: true
    summary: >
      IFRS 7.36-38に基づく信用リスクの最大エクスポージャーおよび
      担保・信用補完・信用集中の開示要件。
      担保差し引き前の信用リスク最大エクスポージャー金額を金融商品
      カテゴリー別に示す。保有する担保（不動産担保・有価証券担保等）および
      信用補完（保証・信用デリバティブ等）の概要と金額を記載し、
      エクスポージャーの純額（担保控除後）も開示する。
      信用リスクの集中状況（業種別・地域別・取引相手先別の集中）については
      定性・定量の両面から説明が求められる。
      単一の取引相手先または類似の特性を持つグループに集中している
      信用リスクは特に識別して開示することが必要。
    target_sections:
      - "金融商品に関する注記"
      - "リスク管理の状況"
      - "信用リスク"
    required_items:
      - "信用リスクの最大エクスポージャー金額（担保控除前、カテゴリー別）"
      - "保有担保の種類・金額・評価方法の概要"
      - "信用補完（保証・信用デリバティブ）の種類・金額"
      - "信用リスク集中（業種別・地域別・主要取引相手先別）の開示"
    applicable_markets:
      - "プライム"
      - "スタンダード"
    notes: "IFRS採用企業が対象。J-GAAP企業は金融商品会計基準第181項等に準じる定性説明で代替可能"
    tier_requirement:
      ume: "対象外"
      take: "必須"
      matsu: "必須"

  - id: "ifrs7-2025-002"
    category: "IFRS 7（信用リスク）"
    change_type: "追加必須"
    effective_from: "2025-04-01"
    title: "予想信用損失（ECL）の3ステージ分析と引当金変動表（IFRS 7.35F-35N）"
    source: "https://www.ifrs.org/issued-standards/list-of-standards/ifrs-7-financial-instruments-disclosures/"
    source_confirmed: true
    summary: >
      IFRS 9の予想信用損失（ECL）モデルに連動したIFRS 7.35F-35Nの開示要件。
      金融資産を信用リスクの変化に応じて3区分に分類して開示する。
      ステージ1（信用リスクの著増なし — 12ヶ月ECL）、
      ステージ2（信用リスクの著増 — 全期間ECL）、
      ステージ3（信用毀損 — 全期間ECL）の各残高と損失評価引当金を対照表で示す。
      引当金変動表（期首残高・新規認識・ステージ間移動・取崩・償却・為替影響等）の
      開示も必要。ステージ間移動の判断基準（SICR）の定義、
      フォワードルッキング情報の使用方法（マクロ経済シナリオの重み付け等）も
      説明することが求められる。
    target_sections:
      - "金融商品に関する注記"
      - "信用リスク"
      - "貸倒引当金"
    required_items:
      - "3ステージ別の帳簿価額総額と損失評価引当金残高の対照表"
      - "損失評価引当金の変動表（ステージ間移動・新規認識・取崩・償却を含む）"
      - "SICRの定義・判断基準（定量・定性両面）"
      - "フォワードルッキング情報の使用方法（マクロ経済前提・シナリオ重み付け）"
    applicable_markets:
      - "プライム"
      - "スタンダード"
    notes: "IFRS 9採用企業の必須開示。金融機関は引当率・損失実績率の説明も期待される"
    tier_requirement:
      ume: "対象外"
      take: "必須"
      matsu: "必須"

  - id: "ifrs7-2025-003"
    category: "IFRS 7（信用リスク）"
    change_type: "修正推奨"
    effective_from: "2025-04-01"
    title: "信用格付け別・延滞状況別の信用品質分析（IFRS 7.35I-35J）"
    source: "https://www.ifrs.org/issued-standards/list-of-standards/ifrs-7-financial-instruments-disclosures/"
    source_confirmed: true
    summary: >
      IFRS 7.35I-35Jに基づく金融資産の信用品質分析の開示要件。
      外部信用格付けまたは内部格付けを使用した信用品質区分別の帳簿価額総額を
      ステージ別に開示する（例: 投資適格/非投資適格/格付けなし）。
      延滞している金融資産の延滞期間別内訳（30日以内・31-60日・61-90日・
      91-180日・180日超等）も開示が求められる。
      信用毀損した金融資産（ステージ3）については追加的な定性・定量情報
      （担保評価額・回収見込み額・更生計画の概要等）の提供が推奨される。
      内部格付けを使用する場合、外部格付けへのマッピング表も有用な開示となる。
    target_sections:
      - "金融商品に関する注記"
      - "信用リスク"
    required_items:
      - "格付け区分別（外部または内部格付け）の帳簿価額総額とステージ分類"
      - "延滞状況別の帳簿価額内訳（延滞期間ごと）"
      - "信用毀損資産の担保評価額・回収見込み額"
    applicable_markets:
      - "プライム"
      - "スタンダード"
    notes: "外部格付け非取得企業は内部格付けの定義と外部格付けとのマッピングを説明することが推奨される"
    tier_requirement:
      ume: "対象外"
      take: "推奨"
      matsu: "必須"

  # ──────────────────────────────────────────
  # 【第2群】流動性リスク・市場リスク開示（IFRS 7.39-42）
  # ──────────────────────────────────────────

  - id: "ifrs7-2025-004"
    category: "IFRS 7（流動性リスク）"
    change_type: "追加必須"
    effective_from: "2025-04-01"
    title: "流動性リスクの満期分析表（IFRS 7.39-40）"
    source: "https://www.ifrs.org/issued-standards/list-of-standards/ifrs-7-financial-instruments-disclosures/"
    source_confirmed: true
    summary: >
      IFRS 7.39-40に基づく流動性リスク開示のための満期分析表（maturity analysis）の
      開示要件。金融負債（借入金・社債・仕入債務・金融保証契約等）について
      残存契約満期に基づく期間区分別（1ヶ月以内・1-3ヶ月・3-12ヶ月・
      1-5年・5年超等）の割引前キャッシュフロー表を開示する。
      グロス決済型デリバティブはキャッシュインフロー・アウトフロー双方を、
      ネット決済型デリバティブは純額で、それぞれ別途開示する。
      流動性リスクの管理方針（流動性バッファー・コミットメントライン・
      資金調達手段の多様化等）についても定性的な説明が求められる。
      金融機関は資産サイドの満期分析も提供することが強く期待される。
    target_sections:
      - "金融商品に関する注記"
      - "流動性リスク"
      - "リスク管理の状況"
    required_items:
      - "金融負債の満期区分別割引前キャッシュフロー表"
      - "デリバティブ（グロス/ネット決済別）の満期分析"
      - "流動性リスク管理方針（流動性バッファー・調達手段の多様化）の説明"
      - "コミットメントライン・偶発負債の残高と満期分析"
    applicable_markets:
      - "プライム"
      - "スタンダード"
    notes: "金融機関（銀行・保険）は資産側の満期分析も追加提供することが強く期待される"
    tier_requirement:
      ume: "対象外"
      take: "必須"
      matsu: "必須"

  - id: "ifrs7-2025-005"
    category: "IFRS 7（市場リスク）"
    change_type: "追加必須"
    effective_from: "2025-04-01"
    title: "市場リスクの感応度分析（金利・為替・株価、VaR含む）（IFRS 7.40-42）"
    source: "https://www.ifrs.org/issued-standards/list-of-standards/ifrs-7-financial-instruments-disclosures/"
    source_confirmed: true
    summary: >
      IFRS 7.40-42に基づく市場リスクの感応度分析の開示要件。
      保有する金融商品が晒されている市場リスク（金利リスク・為替リスク・
      その他価格リスク）について、リスク変数の合理的な変動が
      損益またはその他の包括利益（OCI）に与える影響を定量的に示す。
      典型的な変動幅の例: 金利パラレルシフト±100bp、主要為替±10%、
      株価指数±20%。各リスク変数の前提と選定根拠も説明が必要。
      VaR（バリュー・アット・リスク）をリスク管理に使用している場合は
      IFRS 7.41の代替的な開示として認められ、計算方法（パラメトリック法・
      ヒストリカル法・モンテカルロ法）・信頼水準（通常99%）・保有期間・
      期末VaR・期中平均VaR・バックテスト結果を開示する。
    target_sections:
      - "金融商品に関する注記"
      - "市場リスク"
      - "リスク管理の状況"
    required_items:
      - "金利感応度分析（±100bp変動が損益・OCIに与える影響額）"
      - "為替感応度分析（主要通貨±10%変動が損益・OCIに与える影響額）"
      - "その他価格リスク（株価・コモディティ）の感応度分析"
      - "VaR採用時: 計算手法・信頼水準・保有期間・期末VaR・バックテスト結果"
    applicable_markets:
      - "プライム"
      - "スタンダード"
    notes: >
      VaR開示はIFRS 7.41に基づく代替的開示。感応度分析との併用が推奨される。
      感応度分析のパラメータ（変動幅）は過去の実績・ボラティリティを踏まえた合理的な水準とする
    tier_requirement:
      ume: "対象外"
      take: "推奨"
      matsu: "必須"

  - id: "ifrs7-2025-006"
    category: "IFRS 7（市場リスク）"
    change_type: "修正推奨"
    effective_from: "2025-04-01"
    title: "ストレステスト・シナリオ分析による市場リスク評価（IFRS 7.40A補完開示）"
    source: "https://www.ifrs.org/issued-standards/list-of-standards/ifrs-7-financial-instruments-disclosures/"
    source_confirmed: true
    summary: >
      IFRS 7.40Aおよびリスク管理開示の充実に向けた通常の感応度分析を
      補完するストレステストの開示。市場の大幅変動（リーマンショック型・
      2020年コロナ型・急激な金利上昇型・地政学リスク型等）を想定した
      ストレスシナリオを設定し、損益・自己資本への影響を定量的に示す。
      シナリオの選定根拠・過去の重大市場変動との比較・
      対応するリスク低減措置についても説明する。
      通常の感応度分析の限界（非線形性・相関変化・テールリスクの不捕捉）を
      補完する位置付けで提供することが推奨される。
    target_sections:
      - "金融商品に関する注記"
      - "市場リスク"
      - "リスク管理の状況"
    required_items:
      - "ストレスシナリオの設定根拠（過去の重大市場変動の参照）"
      - "各ストレスシナリオが損益・自己資本に与える影響の定量値"
      - "通常の感応度分析との補完関係および限界の説明"
    applicable_markets:
      - "プライム"
    notes: "IFRS 7の強制要件ではなく推奨的な補完開示。金融機関・大規模事業会社に特に期待される"
    tier_requirement:
      ume: "対象外"
      take: "任意"
      matsu: "推奨"

  # ──────────────────────────────────────────
  # 【第3群】公正価値・デリバティブ開示（IFRS 7.22-30 / IFRS 13）
  # ──────────────────────────────────────────

  - id: "ifrs7-2025-007"
    category: "IFRS 7（デリバティブ・公正価値）"
    change_type: "追加必須"
    effective_from: "2025-04-01"
    title: "デリバティブの公正価値・名目元本表（IFRS 7.22-24）"
    source: "https://www.ifrs.org/issued-standards/list-of-standards/ifrs-7-financial-instruments-disclosures/"
    source_confirmed: true
    summary: >
      IFRS 7.22-24に基づくデリバティブ（金利スワップ・通貨スワップ・
      為替先物・金利先物・オプション等）の公正価値および名目元本の開示要件。
      ヘッジ目的と非ヘッジ目的（トレーディング等）を区分し、
      商品種類別・残存満期区分別に正味公正価値（資産・負債別）および
      名目元本を対照表で開示する。
      公正価値の測定に使用した評価技法（IFRS 13準拠）と
      主要インプット（イールドカーブ・ボラティリティ・クレジットスプレッド等）も
      公正価値ヒエラルキー（レベル1/2/3）に従って開示する。
      レベル3評価残高の期中変動表（買付・売却・損益計上・OCI計上）も必要。
    target_sections:
      - "金融商品に関する注記"
      - "デリバティブ"
      - "公正価値の測定"
    required_items:
      - "デリバティブの公正価値（資産・負債別）の商品種類別・満期別内訳"
      - "デリバティブの名目元本の商品種類別・残存満期別内訳"
      - "ヘッジ目的・非ヘッジ目的の区分と各公正価値・名目元本"
      - "公正価値評価技法の説明（レベル1/2/3分類・主要インプット）"
      - "レベル3評価残高の期中変動表"
    applicable_markets:
      - "プライム"
      - "スタンダード"
    notes: "公正価値ヒエラルキー（レベル1/2/3）の開示はIFRS 13が主たる根拠。IFRS 7と連携して開示"
    tier_requirement:
      ume: "対象外"
      take: "必須"
      matsu: "必須"

  - id: "ifrs7-2025-008"
    category: "IFRS 7（公正価値）"
    change_type: "追加必須"
    effective_from: "2025-04-01"
    title: "金融資産・金融負債の帳簿価額と公正価値の比較表（IFRS 7.25-30）"
    source: "https://www.ifrs.org/issued-standards/list-of-standards/ifrs-7-financial-instruments-disclosures/"
    source_confirmed: true
    summary: >
      IFRS 7.25-30に基づく金融資産および金融負債の帳簿価額と
      公正価値の比較開示要件。償却原価で測定している金融商品
      （社債・銀行借入・貸付金・預金・長期売掛金等）について、
      帳簿価額と公正価値の双方を測定カテゴリー別に対比して開示する。
      IFRS 13の公正価値ヒエラルキー（レベル1/2/3）に従った分類と、
      各レベルで使用した評価技法（割引キャッシュフロー法・
      比較市場取引法等）・主要インプット（割引率・クレジットスプレッド等）の
      説明が必要。帳簿価額と公正価値の差額が重要でないと判断した場合は
      開示省略が可能だが、省略の判断根拠を明示することが求められる。
    target_sections:
      - "金融商品に関する注記"
      - "公正価値の測定"
    required_items:
      - "測定カテゴリー別の帳簿価額と公正価値の対照表"
      - "公正価値ヒエラルキー（レベル1/2/3）への分類"
      - "各レベルの評価技法・主要インプット（割引率・クレジットスプレッド等）"
      - "レベル3評価の場合: 合理的に考えられる代替前提の影響（感応度）"
    applicable_markets:
      - "プライム"
      - "スタンダード"
    notes: "短期金融商品（流動資産・流動負債に分類される短期借入等）は帳簿価額≒公正価値として省略可。判断根拠の記載が必要"
    tier_requirement:
      ume: "対象外"
      take: "必須"
      matsu: "必須"

  # ──────────────────────────────────────────
  # 【第4群】ヘッジ会計・移転金融資産（IFRS 7.22-24A / 7.42A-42H）
  # ──────────────────────────────────────────

  - id: "ifrs7-2025-009"
    category: "IFRS 7（ヘッジ会計）"
    change_type: "追加必須"
    effective_from: "2025-04-01"
    title: "ヘッジ関係（CF/公正価値/純投資ヘッジ）の開示（IFRS 7.22-24A）"
    source: "https://www.ifrs.org/issued-standards/list-of-standards/ifrs-7-financial-instruments-disclosures/"
    source_confirmed: true
    summary: >
      IFRS 7.22-24Aに基づくヘッジ会計適用関係の開示要件。
      ヘッジの種類（キャッシュフローヘッジ・公正価値ヘッジ・純投資ヘッジ）ごとに、
      ヘッジ対象のリスクの性質・ヘッジ手段の概要・名目元本・公正価値を開示する。
      ヘッジ手段の価値変動のうちヘッジの有効性評価への影響、
      ヘッジ非有効部分の損益影響、キャッシュフローヘッジのOCI計上額・
      損益組替額（OCI組替時の損益科目）も開示が求められる。
      ヘッジ比率・ヘッジ有効性評価の方法（仮想デリバティブ法・
      ドル・オフセット法等）についても説明する。
      リスク管理目的との整合性（IFRS 9ヘッジ会計の中核要件）の記述も必要。
    target_sections:
      - "金融商品に関する注記"
      - "ヘッジ会計"
      - "デリバティブ"
    required_items:
      - "ヘッジ種類別のヘッジ対象・ヘッジ手段の概要と名目元本・公正価値"
      - "キャッシュフローヘッジのOCI計上額・損益組替額（科目別）"
      - "公正価値ヘッジの損益影響（ヘッジ対象調整額・ヘッジ手段損益）"
      - "ヘッジ非有効部分の損益影響額"
      - "ヘッジ有効性評価の方法・ヘッジ比率・リスク管理目的の説明"
    applicable_markets:
      - "プライム"
      - "スタンダード"
    notes: "IFRS 9でヘッジ会計を適用している企業に必須。IAS 39継続適用企業も基本的に同様の開示が求められる"
    tier_requirement:
      ume: "対象外"
      take: "推奨"
      matsu: "必須"

  - id: "ifrs7-2025-010"
    category: "IFRS 7（移転金融資産）"
    change_type: "追加必須"
    effective_from: "2025-04-01"
    title: "移転した金融資産（証券化・レポ等）の継続認識・認識中止の開示（IFRS 7.42A-42H）"
    source: "https://www.ifrs.org/issued-standards/list-of-standards/ifrs-7-financial-instruments-disclosures/"
    source_confirmed: true
    summary: >
      IFRS 7.42A-42Hに基づく移転した金融資産（証券化・レポ取引・
      貸付有価証券・ファクタリング等）の開示要件。
      認識の中止に至った移転（一括譲渡・証券化等）については、
      譲渡後も保有し続けるリスクとリターン（残存リスク: 劣後持分・
      信用補完・清算請求権等）の性質と帳簿価額・最大エクスポージャーを開示する。
      認識を継続している移転（レポ取引・貸付有価証券・担保差入等）については、
      移転した金融資産の帳簿価額と関連する金融負債の帳簿価額の対照表を示し、
      担保として差し入れた資産の帳簿価額・公正価値、相手方が売却・
      再担保設定できる権利の有無も開示する。
    target_sections:
      - "金融商品に関する注記"
      - "移転した金融資産"
      - "オフバランス取引"
    required_items:
      - "認識中止となった移転金融資産の種類・残存リスクの性質と金額"
      - "継続認識している移転金融資産と関連負債の帳簿価額対照表"
      - "レポ取引・貸付有価証券に係る担保の種類・帳簿価額・公正価値"
      - "証券化に伴うリスク保有状況（劣後持分・保証・清算請求権等）"
    applicable_markets:
      - "プライム"
      - "スタンダード"
    notes: "証券化・レポ取引を行っている金融機関に特に重要。J-GAAP適用企業は企業会計基準第10号に基づき開示"
    tier_requirement:
      ume: "対象外"
      take: "推奨"
      matsu: "必須"

  # ──────────────────────────────────────────
  # 【第5群】仕入先ファイナンス（IFRS 7改訂 2023年5月 / 2024年1月適用）
  # ──────────────────────────────────────────

  - id: "ifrs7-2025-011"
    category: "IFRS 7（仕入先ファイナンス）"
    change_type: "新規追加"
    effective_from: "2024-01-01"
    title: "仕入先ファイナンス・アレンジメントの開示（IFRS 7改訂 2023年5月）"
    source: "https://www.ifrs.org/news-and-events/news/2023/05/iasb-issues-amendments-to-ifrs-7-and-ias-7/"
    source_confirmed: true
    summary: >
      IASBが2023年5月に公表したIFRS 7改訂（仕入先ファイナンス・アレンジメントの開示）。
      2024年1月1日以降開始事業年度から強制適用（日本企業は2025年3月期が多い）。
      サプライヤーファイナンス（動的割引・リバースファクタリング等）を利用している場合、
      アレンジメントの条件（支払条件の延長期間・適用金利・利用可能限度額等）、
      アレンジメント対象の仕入債務帳簿価額（IFRS 9測定カテゴリー別）、
      仕入先ファイナンス提供者への支払残高（期末・前期末）を開示する。
      期末日の直前・直後に利用が集中している場合は、その定性情報も開示が求められる。
      IAS 7改訂（財務活動/営業活動キャッシュフロー分類への影響）と対として開示する。
    target_sections:
      - "金融商品に関する注記"
      - "仕入先ファイナンス"
      - "流動性リスク"
    required_items:
      - "仕入先ファイナンス・アレンジメントの条件（支払条件延長期間・金利等）"
      - "アレンジメント対象の仕入債務帳簿価額（前期比較・測定カテゴリー別）"
      - "仕入先ファイナンス提供者への支払残高（期末・前期末）"
      - "期末日前後の利用集中状況に関する定性情報（重要な場合）"
    applicable_markets:
      - "プライム"
      - "スタンダード"
      - "グロース"
    notes: >
      2024年1月1日以降開始事業年度から強制適用（早期適用可）。
      日本企業の多くは2025年3月期から初回適用となるため、比較期間の遡及開示要否の確認が必要。
      IAS 7.44E-44Gの改訂（調達活動キャッシュフローの分類）と整合させること
    tier_requirement:
      ume: "必須"
      take: "必須"
      matsu: "必須"
