# disclosure-multiagent — 法令・ガイダンス情報 YAML
# カテゴリ: IFRS（公正価値測定）IFRS 13 Fair Value Measurement
# 対象期間: 2025年度（2025-04-01〜2026-03-31）
# スキーマ定義: docs/law_yaml_schema.md
# 作成者: Majiro-ns
#
# 根拠法令:
#   IFRS 13 Fair Value Measurement（公正価値測定）
#   IFRS 9 金融商品（公正価値測定との連動）
#   IAS 36 資産の減損（回収可能価額と公正価値の関係）
#   IAS 40 投資不動産（公正価値モデル）
#   IASB Expert Advisory Panel: Measuring and disclosing the fair value of financial instruments in markets that are no longer active

version: "1.0"
effective_period:
  from: "2025-04-01"
  to: "2026-03-31"

amendments:

  # ──────────────────────────────────────────
  # 【第1群】公正価値測定フレームワーク
  # ──────────────────────────────────────────

  - id: "ifrs13-2025-001"
    category: "IFRS（公正価値測定）"
    change_type: "継続必須"
    effective_from: "2025-04-01"
    title: "公正価値の定義と測定フレームワーク（出口価格・市場参加者・主要市場）"
    source: "IFRS 13.9-31"
    source_confirmed: true
    summary: >
      IFRS 13は公正価値を「測定日において、市場参加者間の秩序ある取引において、
      資産の売却により受け取るまたは負債の移転のために支払う価格（出口価格）」と定義する。
      測定においては、主要市場（取引量・活動量が最も多い市場）または最有利市場
      （主要市場が存在しない場合に最も有利な価格が実現できる市場）における
      仮想的な取引を前提とする。市場参加者の視点から、資産・負債の特性
      （物理的状態・所在地・売却・使用に関する制約等）を反映して測定する。
      公正価値の測定に用いた評価アプローチ（市場アプローチ・コストアプローチ・
      インカムアプローチ）と評価技法の選択根拠を開示することが求められる。
    target_sections:
      - "重要な会計方針"
      - "公正価値測定の注記"
      - "金融商品の注記"
    required_items:
      - "公正価値の定義と測定目的の説明"
      - "主要市場または最有利市場の識別方法"
      - "採用した評価アプローチ（市場/コスト/インカム）の説明"
      - "評価技法の選択における判断の根拠"
      - "公正価値で測定する資産・負債の一覧（測定が継続的か非継続的かの区分）"
    applicable_markets:
      - "プライム"
      - "スタンダード"
      - "グロース"
    notes: >
      IFRS 13は測定基準を定めるものであり、何を公正価値で測定するかはIFRS 9・IAS 40等
      の各基準が規定する。測定フレームワークの開示は各基準の公正価値測定注記と
      一体化して作成するのが実務上効率的
    tier_requirement:
      ume: "評価アプローチの名称と公正価値測定対象の列挙のみ"
      take: "評価技法の選択根拠の定性説明＋主要市場の識別方法"
      matsu: "評価技法ごとのインプット感応度分析＋市場非活性時の代替評価方針"

  - id: "ifrs13-2025-002"
    category: "IFRS（公正価値測定）"
    change_type: "継続必須"
    effective_from: "2025-04-01"
    title: "公正価値ヒエラルキー（レベル1/2/3）の分類と残高開示"
    source: "IFRS 13.72-90"
    source_confirmed: true
    summary: >
      IFRS 13は公正価値測定に使用するインプットを三つのレベルに分類することを要求する。
      レベル1は活発な市場における同一の資産・負債の市場価格（無調整）。
      レベル2はレベル1以外の直接または間接的に観察可能なインプット（類似資産の
      市場価格・観察可能なイールドカーブ・信用スプレッド等）。
      レベル3は市場で観察できないインプット（企業自身の仮定・内部データ等）。
      公正価値で継続的に測定する資産・負債のそれぞれについて、レベル別の
      残高（期末残高・最高・最低レベルの分類根拠）を開示する。
      分類レベルは個々の資産・負債について最も低いレベルの重要なインプットに基づいて決定する。
    target_sections:
      - "公正価値測定の注記"
      - "金融商品の注記"
      - "投資不動産の注記"
    required_items:
      - "継続的公正価値測定の資産・負債別レベル1/2/3残高一覧表"
      - "非継続的公正価値測定の資産・負債別レベル分類（該当する場合）"
      - "レベル分類の判定基準の説明（どの場合にレベル3と判定するか）"
      - "レベル2測定において使用した主要な観察可能インプットの種類"
    applicable_markets:
      - "プライム"
      - "スタンダード"
      - "グロース"
    notes: >
      金融商品が多い金融機関ではレベル別残高表が開示の中核となる。
      非金融業では投資不動産・デリバティブ・持分証券がレベル2・3の主要対象となる場合が多い
    tier_requirement:
      ume: "レベル1/2/3別の残高金額表（資産・負債別）"
      take: "レベル分類の判定基準説明＋レベル2の主要観察可能インプット種類"
      matsu: "レベル別・商品種類別のマトリクス表＋各レベルのインプット詳細記述"

  # ──────────────────────────────────────────
  # 【第2群】レベル3の詳細開示
  # ──────────────────────────────────────────

  - id: "ifrs13-2025-003"
    category: "IFRS（公正価値測定）"
    change_type: "継続必須"
    effective_from: "2025-04-01"
    title: "レベル3の評価技法・観察不能インプットの開示"
    source: "IFRS 13.93(d)(e)"
    source_confirmed: true
    summary: >
      レベル3に分類された資産・負債については、使用した評価技法と
      主要な観察不能インプットの内容・範囲を詳細に開示する。
      評価技法の例としてディスカウント・キャッシュ・フロー法（DCF）、
      類似取引比較法、オプション価格モデル（ブラック・ショールズ・モデル等）がある。
      観察不能インプットの例として、割引率（WACC）の範囲・加重平均値、
      恒久成長率、EBITDA倍率、流動性プレミアム、デフォルト確率等を
      定量的な範囲（最小値・最大値・加重平均）とともに開示することが求められる。
      インプットが広い範囲を有する場合、その範囲のうちどの部分に測定値が
      集中しているかの説明も有用だ。
    target_sections:
      - "公正価値測定の注記"
      - "レベル3資産・負債の詳細開示"
    required_items:
      - "レベル3資産・負債ごとの評価技法の名称"
      - "主要な観察不能インプットの説明と定量的範囲（最小・最大・加重平均）"
      - "評価技法とインプット間の相互関係の説明（インプット上昇が公正価値に与える方向）"
      - "レベル3の公正価値測定に係る評価プロセスの説明（誰が評価し・どう検証するか）"
    applicable_markets:
      - "プライム"
      - "スタンダード"
      - "グロース"
    notes: >
      インプット間の相互関係（例：割引率と恒久成長率の逆相関）を
      テーブル形式で開示することが投資家にとって有用。
      IFRS 13.93(h)の感応度分析（ifrs13-2025-007）と一体的に作成することが実務上効率的
    tier_requirement:
      ume: "評価技法名称と主要インプットの定性記述"
      take: "インプットの定量的範囲（最小・最大・加重平均）＋インプット方向性の説明"
      matsu: "インプット間相関分析テーブル＋評価プロセス（バリデーション担当者・検証頻度）の詳細開示"

  - id: "ifrs13-2025-004"
    category: "IFRS（公正価値測定）"
    change_type: "継続必須"
    effective_from: "2025-04-01"
    title: "公正価値ヒエラルキーのレベル間振替の開示と振替理由"
    source: "IFRS 13.93(c)(e)(iii)"
    source_confirmed: true
    summary: >
      当期に公正価値ヒエラルキーのレベル間で振替が発生した場合、
      振替の金額・方向・理由を開示する。振替の認識時点に関する方針
      （期首・期末・日次等のいずれで認識するか）を開示し、一貫して適用する。
      レベル1とレベル2の間の振替、またはレベル2とレベル3の間の振替を
      それぞれ別個に開示することが求められる。振替の代表的な理由として、
      市場の活性化・非活性化（活発な市場の有無の変化）、評価技法の変更、
      観察可能インプットへのアクセスの変化等がある。
    target_sections:
      - "公正価値測定の注記"
      - "レベル3増減調整表"
    required_items:
      - "レベル間振替の金額（資産・負債別、振替方向別）"
      - "振替の主な理由の定性説明"
      - "振替の認識時点に関する方針（期首認識 or 期末認識 or その他）"
      - "振替が生じなかった場合はその旨の記載"
    applicable_markets:
      - "プライム"
      - "スタンダード"
      - "グロース"
    notes: >
      市場環境の変化（金利急騰・信用収縮等）があった期には振替が多発する傾向がある。
      2025年度は金利正常化局面のため、レベル2からレベル3への振替が増加する可能性がある
    tier_requirement:
      ume: "振替金額と振替方向の開示（理由は概括的記述で可）"
      take: "振替理由の個別説明＋認識時点方針の開示"
      matsu: "振替が生じた主要商品別の詳細説明＋振替前後の公正価値比較"

  # ──────────────────────────────────────────
  # 【第3群】非金融資産・増減調整表・感応度
  # ──────────────────────────────────────────

  - id: "ifrs13-2025-005"
    category: "IFRS（公正価値測定）"
    change_type: "継続必須"
    effective_from: "2025-04-01"
    title: "非金融資産の最有効使用（HBU）の前提と公正価値測定"
    source: "IFRS 13.27-30, IFRS 13.93(i)"
    source_confirmed: true
    summary: >
      非金融資産（不動産・設備・無形資産等）の公正価値測定においては、
      市場参加者が当該資産の価値を最大化する最有効使用（HBU: Highest and Best Use）を
      前提とする。HBUは物理的に可能・法的に許容・財務的に実現可能である必要がある。
      企業が現在の用途でHBUが達成されると判断する場合はその旨を開示する。
      現在の用途がHBUでないと判断する場合、HBUとの差異と公正価値への影響を開示する。
      投資不動産（IAS 40）や農業（IAS 41）の公正価値測定においても
      HBUの前提が重要な役割を果たす。
    target_sections:
      - "公正価値測定の注記"
      - "投資不動産の注記"
      - "有形固定資産の注記（再評価モデル採用の場合）"
    required_items:
      - "非金融資産の公正価値測定における最有効使用の前提の説明"
      - "現在の用途がHBUである根拠（物理的可能性・法的許容性・財務的実現可能性）"
      - "現在の用途がHBUでない場合の開示（HBUとの差異と財務影響）"
      - "HBUの判定に用いた市場参加者の前提"
    applicable_markets:
      - "プライム"
      - "スタンダード"
      - "グロース"
    notes: >
      日本の都市部不動産では容積率・用途地域の変更により理論的HBUが現在用途と
      乖離するケースがある。開発案件や再開発予定地の評価では特に詳細な開示が求められる
    tier_requirement:
      ume: "HBUが現在用途と一致する旨の記述（非金融資産が重要でない場合は省略可）"
      take: "HBUの判定根拠（物理・法的・財務の3要件）の定性説明"
      matsu: "HBU前提別の公正価値シナリオ比較（現在用途 vs 最有効使用ケース）"

  - id: "ifrs13-2025-006"
    category: "IFRS（公正価値測定）"
    change_type: "継続必須"
    effective_from: "2025-04-01"
    title: "レベル3資産・負債の増減調整表（期首残高から期末残高の調整）"
    source: "IFRS 13.93(e)"
    source_confirmed: true
    summary: >
      継続的にレベル3で測定される資産・負債について、期首残高から期末残高への
      増減調整表を開示する。調整項目として、当期の損益認識額（損益計算書計上分・
      OCI計上分の区分表示）、取得・発行額、決済・売却額、レベル間振替額
      （レベル3への振替 vs レベル3からの振替の別個表示）を含める。
      さらに、期末において引き続き保有する資産・負債について当期中に損益認識した
      未実現損益の金額を区分して開示することが求められる（IFRS 13.93(f)）。
    target_sections:
      - "公正価値測定の注記"
      - "レベル3増減調整表"
    required_items:
      - "レベル3資産・負債種類別の増減調整表（期首残高・増減内訳・期末残高）"
      - "損益計算書計上分とOCI計上分の区分表示"
      - "レベル3への振替とレベル3からの振替の別個表示"
      - "期末保有資産・負債に係る当期未実現損益の金額"
    applicable_markets:
      - "プライム"
      - "スタンダード"
      - "グロース"
    notes: >
      未実現損益は損益計算書のどの行項目に含まれるかも開示することが望ましい。
      非上場株式・プライベートデット・事業用不動産等を多く保有するエンティティでは
      レベル3開示が投資家の評価に直接影響する
    tier_requirement:
      ume: "レベル3増減調整表（取得・売却・損益のみ）"
      take: "振替の別個表示＋未実現損益の区分＋損益計算書の行項目への紐付け"
      matsu: "商品種類別の詳細調整表＋振替理由の個別説明＋評価技法変更の影響額"

  - id: "ifrs13-2025-007"
    category: "IFRS（公正価値測定）"
    change_type: "継続必須"
    effective_from: "2025-04-01"
    title: "評価技法の変更と感応度分析（レベル3・観察不能インプット）"
    source: "IFRS 13.93(d)(h)"
    source_confirmed: true
    summary: >
      当期に評価技法を変更した場合（変更の根拠・影響額を含む）、および
      レベル3に分類された継続的公正価値測定について、合理的に考えられる
      代替的仮定を反映した場合の公正価値の感応度分析を開示する。
      感応度分析では、観察不能インプットの変化が公正価値に与える影響を
      定量的に示し、インプット間に相関関係がある場合はその内容を説明する。
      感応度分析の方法（パラメータ変動幅・シナリオ設定の根拠）についても
      開示することが求められる。評価技法変更は会計上の見積りの変更として
      IAS 8に基づき将来に向かって処理し、影響額を開示する。
    target_sections:
      - "公正価値測定の注記"
      - "重要な会計上の見積りの仮定"
    required_items:
      - "評価技法変更の内容・根拠・当期財務諸表への影響額（変更があった場合）"
      - "レベル3の感応度分析：代替的仮定の内容と公正価値への影響額"
      - "感応度分析のパラメータ変動幅の設定根拠"
      - "インプット間に相関がある場合の相互関係の説明"
      - "感応度分析が不利な変動と有利な変動の双方向で実施されているか"
    applicable_markets:
      - "プライム"
      - "スタンダード"
      - "グロース"
    notes: >
      2025年度は金利環境の変化から割引率・恒久成長率の感応度が特に注目される。
      DCF法による未上場株式評価では±1%の割引率変動が公正価値に与える影響が
      投資家にとって重要な判断材料となる
    tier_requirement:
      ume: "評価技法変更の有無の記述（変更ありの場合は影響額）"
      take: "主要インプット変動（±10%等）の感応度分析テーブル"
      matsu: "複数シナリオ（楽観・中立・悲観）別公正価値試算＋インプット相関分析＋将来の評価技法変更リスクの説明"
