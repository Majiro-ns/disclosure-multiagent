# disclosure-multiagent — 法令・ガイダンス情報 YAML
# カテゴリ: 有報 記述情報（経営方針/MD&A/リスク/ガバナンス/役員/株式/設備/研究開発）
# 対象期間: 2024年度（2024-04-01〜2025-03-31）
# スキーマ定義: docs/law_yaml_schema.md
# Last Updated: 2026-03-14
#
# 導出根拠:
#   企業内容等の開示に関する内閣府令（開示府令）様式第二号（有価証券報告書）
#   金融庁「記述情報の開示に関する原則」（2019年3月公表）
#   コーポレートガバナンス・コード（東京証券取引所 2021年6月改訂）
#
# ★著作権注意: 本ファイルは開示府令条文・金融庁公表ガイダンスから独自に導出。
#   JICPAチェックリスト原文は参照せず、有報様式第二号の項目体系を基礎とする。
#
# ID命名規則: jr-YYYY-NNN（jr = 有報記述情報 Yuho Reporting）

version: "1.0"
effective_period:
  from: "2024-04-01"
  to: "2025-03-31"

amendments:

  # ──────────────────────────────────────────
  # 1. 経営方針・経営環境及び対処すべき課題等（2件）
  # 有報様式第二号 第一部 第2【事業の状況】 2
  # ──────────────────────────────────────────

  - id: "jr-2024-001"
    category: "経営方針・経営環境"
    change_type: "修正推奨"
    effective_from: "2023-01-31"
    title: "開示府令 — 経営方針・経営環境及び対処すべき課題等の記載充実（様式第二号）"
    source: "https://www.fsa.go.jp/news/r4/singi/20230131/20230131.html"
    source_confirmed: true
    law_name: "企業内容等の開示に関する内閣府令"
    summary: >
      有報様式第二号「2 経営方針、経営環境及び対処すべき課題等」において、
      単なる事業概況の列記ではなく、経営者が認識する環境変化・リスクと
      それへの対処方針を具体的に記述することが求められる。
      金融庁「記述情報の開示に関する原則」（2019年3月）でも、
      投資家が企業価値を評価できる情報の質的向上を要請している。
    target_sections:
      - "経営方針、経営環境及び対処すべき課題等"
    required_items:
      - "経営理念・長期ビジョンの明示"
      - "経営環境の認識（市場動向・競合・技術変化等）"
      - "中期・短期の経営目標とKPI"
      - "対処すべき課題の具体的な内容と優先順位"
      - "課題への対応策と進捗状況"
    applicable_markets:
      - "プライム"
      - "スタンダード"
      - "グロース"
    notes: "定性的な表現にとどまらず、数値目標・期限・責任部門を明記することが望ましい"

  - id: "jr-2024-002"
    category: "経営方針・経営環境"
    change_type: "参考"
    effective_from: "2021-06-11"
    title: "コーポレートガバナンス・コード — 経営戦略・経営計画の開示（原則3-1・補充原則3-1③）"
    source: "https://www.jpx.co.jp/equities/listing/cg/tvdivq0000008jdy-att/nlsgeu0000034d47.pdf"
    source_confirmed: false
    law_name: "コーポレートガバナンス・コード（東証 2021年6月改訂）"
    summary: >
      東証CGコード原則3-1（情報開示の充実）は、経営戦略・経営計画の開示を
      上場企業に求める。補充原則3-1③（2021年改訂追加）では、
      気候変動をはじめとするサステナビリティへの取り組みを
      有報のサステナビリティ情報欄と整合的に開示することを要請。
    target_sections:
      - "経営方針、経営環境及び対処すべき課題等"
      - "サステナビリティに関する考え方及び取組"
    required_items:
      - "中長期的な経営戦略の記述（定性・定量両面）"
      - "サステナビリティ課題の認識と対応方針"
      - "TCFD等の開示フレームワーク活用状況"
    applicable_markets:
      - "プライム"
    notes: "プライム市場上場企業はTCFD等の国際基準に基づく気候関連情報開示が要請される"

  # ──────────────────────────────────────────
  # 2. MD&A — 経営者による財政状態・経営成績・キャッシュフローの分析（3件）
  # 有報様式第二号 第二部 第2【財務諸表等】 1
  # ──────────────────────────────────────────

  - id: "jr-2024-003"
    category: "MD&A"
    change_type: "修正推奨"
    effective_from: "2019-03-19"
    title: "記述情報の開示に関する原則 — MD&Aの質的向上"
    source: "https://www.fsa.go.jp/news/30/singi/20190319/01.pdf"
    source_confirmed: false
    law_name: "金融庁「記述情報の開示に関する原則」（2019年3月）"
    summary: >
      金融庁「記述情報の開示に関する原則」は、経営者による財政状態・経営成績・
      キャッシュフローの分析（MD&A）において、財務数値の単純な転記を超え、
      経営者の視点からの分析・説明を求める。
      前年度比較のみならず、将来展望・リスク要因との関連付けが重要。
    target_sections:
      - "経営者による財政状態、経営成績及びキャッシュ・フローの状況の分析"
    required_items:
      - "財政状態の分析（総資産・負債・純資産の増減要因）"
      - "経営成績の分析（売上・利益の増減要因の経営者視点での説明）"
      - "キャッシュ・フローの分析（営業・投資・財務CFの状況と使途）"
      - "重要な会計上の見積りと判断（適用した会計方針の不確実性）"
      - "セグメント別業績の分析"
    applicable_markets:
      - "プライム"
      - "スタンダード"
      - "グロース"
    notes: "前年同期比の変動要因を定量・定性の両面で説明すること。定型文の多用は不適切"

  - id: "jr-2024-004"
    category: "MD&A"
    change_type: "追加必須"
    effective_from: "2023-01-31"
    title: "開示府令改正 — 重要な会計上の見積りの記載（様式第二号 注記事項）"
    source: "https://www.fsa.go.jp/news/r4/singi/20230131/20230131.html"
    source_confirmed: true
    law_name: "企業内容等の開示に関する内閣府令"
    summary: >
      有報における「重要な会計上の見積り」の記述が求められており、
      見積りの内容・前提・不確実性・財務諸表への影響額を
      具体的に開示する必要がある。のれんの減損、引当金算定、
      固定資産の回収可能価額等が典型的な記載対象。
    target_sections:
      - "経営者による財政状態、経営成績及びキャッシュ・フローの状況の分析"
      - "重要な会計上の見積り"
    required_items:
      - "重要な会計上の見積りの識別と選定理由"
      - "見積りに用いた主要な仮定・前提条件"
      - "翌事業年度の財務諸表への影響の可能性"
    applicable_markets:
      - "プライム"
      - "スタンダード"
      - "グロース"
    notes: "のれん・繰延税金資産・退職給付債務・固定資産減損等が主要な見積り項目"

  - id: "jr-2024-005"
    category: "MD&A"
    change_type: "修正推奨"
    effective_from: "2023-01-31"
    title: "開示府令 — 資本コスト・資本収益性の開示（様式第二号 経営成績の分析）"
    source: "https://www.fsa.go.jp/news/r4/singi/20230131/20230131.html"
    source_confirmed: true
    law_name: "企業内容等の開示に関する内閣府令"
    summary: >
      金融庁・東証の要請により、上場企業（特にPBR1倍割れ企業）は
      資本コスト・資本収益性（ROE/ROIC等）の現状認識と
      改善に向けた具体的取り組みを開示することが強く求められている。
      2023年改正開示府令の施行と並行して、東証も資本効率改善の
      開示充実を要請（「資本コストや株価を意識した経営」）。
    target_sections:
      - "経営者による財政状態、経営成績及びキャッシュ・フローの状況の分析"
      - "経営方針、経営環境及び対処すべき課題等"
    required_items:
      - "資本コスト（WACC等）の認識水準"
      - "ROE・ROIC等の資本収益性指標の実績と目標"
      - "PBR改善に向けた具体的施策（自社株買い・増配・成長投資等）"
    applicable_markets:
      - "プライム"
      - "スタンダード"
    notes: "東証「資本コストや株価を意識した経営」要請（2023年3月）と整合的に記載"

  # ──────────────────────────────────────────
  # 3. 事業等のリスク（1件）
  # 有報様式第二号 第一部 第2【事業の状況】 1
  # ──────────────────────────────────────────

  - id: "jr-2024-006"
    category: "事業リスク"
    change_type: "修正推奨"
    effective_from: "2019-03-19"
    title: "開示府令 — 事業等のリスクの記載充実（主要リスクの識別・評価・対応）"
    source: "https://www.fsa.go.jp/news/30/singi/20190319/01.pdf"
    source_confirmed: false
    law_name: "企業内容等の開示に関する内閣府令・金融庁記述情報開示原則"
    summary: >
      有報様式第二号「1 事業等のリスク」では、投資者の判断に重要な影響を
      与える可能性のあるリスク要因を具体的に記述することが求められる。
      画一的・網羅的なリスク列挙ではなく、当該企業に固有の重要リスクを
      識別し、発生可能性・影響度・対応策を経営者視点で説明することが重要。
    target_sections:
      - "事業等のリスク"
    required_items:
      - "重要リスクの識別根拠と優先順位づけの方法"
      - "各リスクの発生可能性・影響度の定性的評価"
      - "リスク対応策（軽減・移転・回避・受容）の具体的内容"
      - "気候変動リスク（物理的リスク・移行リスク）"
      - "サイバーセキュリティリスク"
      - "サプライチェーンリスク"
      - "新規リスクの追加（直近に顕在化したリスク）"
    applicable_markets:
      - "プライム"
      - "スタンダード"
      - "グロース"
    notes: "前年度からの変化・新規追加リスクを明示。定型文の繰り返しは金融庁のレビューで指摘対象"

  # ──────────────────────────────────────────
  # 4. コーポレートガバナンスの状況（2件）
  # 有報様式第二号 第一部 第3【設備の状況】→第4【コーポレート情報】
  # ──────────────────────────────────────────

  - id: "jr-2024-007"
    category: "コーポレートガバナンス"
    change_type: "追加必須"
    effective_from: "2023-01-31"
    title: "開示府令改正 — コーポレートガバナンスに関する記載の充実（様式第二号 第一部第4）"
    source: "https://www.fsa.go.jp/news/r4/singi/20230131/20230131.html"
    source_confirmed: true
    law_name: "企業内容等の開示に関する内閣府令"
    summary: >
      2022年11月改正（2023年1月31日施行）の有報改革により、
      コーポレートガバナンスに関する記述情報の有報への集約が進んだ。
      指名・報酬委員会の設置状況、監査委員会・監査等委員会の独立性、
      取締役の選解任方針等の具体的な記述が求められる。
    target_sections:
      - "コーポレートガバナンスの状況等"
    required_items:
      - "コーポレートガバナンス体制の概要（機関設計）"
      - "取締役の選解任・指名に関する方針と手続"
      - "役員報酬の決定方針と算定根拠（固定・業績連動・株式報酬の割合）"
      - "指名委員会・報酬委員会の構成・審議内容"
      - "内部統制システムの整備状況と運用評価"
      - "リスク管理体制（ERM等）の概要"
    applicable_markets:
      - "プライム"
      - "スタンダード"
      - "グロース"
    notes: "CGレポートと有報の記述の整合性を確保すること"

  - id: "jr-2024-008"
    category: "コーポレートガバナンス"
    change_type: "修正推奨"
    effective_from: "2021-06-11"
    title: "CGコード補充原則4-11① — 取締役会の多様性・スキル・独立性の開示"
    source: "https://www.jpx.co.jp/news/1020/20210611-01.html"
    source_confirmed: false
    law_name: "コーポレートガバナンス・コード（東証 2021年6月改訂）補充原則4-11①"
    summary: >
      東証CGコード補充原則4-11①（2021年改訂）は、取締役会の多様性確保のため
      スキルマトリックス（取締役会の構成員の知識・経験・能力の組み合わせ）を
      有報または別途開示することを要請する。
      独立社外取締役の選任理由・期待する役割の個別記述も重要。
    target_sections:
      - "コーポレートガバナンスの状況等"
      - "役員の状況"
    required_items:
      - "スキルマトリックスの開示（取締役の専門分野・経験領域）"
      - "独立社外取締役の独立性判断基準の明示"
      - "各独立社外取締役の選任理由と期待する役割"
      - "取締役会の多様性に関する目標と現状"
    applicable_markets:
      - "プライム"
      - "スタンダード"
    notes: "プライム市場は独立社外取締役1/3以上が原則。指名・報酬委員会の過半数を独立社外取締役に"

  # ──────────────────────────────────────────
  # 5. 役員の状況（1件）
  # 有報様式第二号 第一部 第4 1
  # ──────────────────────────────────────────

  - id: "jr-2024-009"
    category: "役員情報"
    change_type: "修正推奨"
    effective_from: "2023-01-31"
    title: "開示府令改正 — 役員の状況における記述情報の充実（様式第二号）"
    source: "https://www.fsa.go.jp/news/r4/singi/20230131/20230131.html"
    source_confirmed: true
    law_name: "企業内容等の開示に関する内閣府令"
    summary: >
      有報「役員の状況」では、各役員の略歴に加え、
      取締役会における役割・貢献の記述が求められる。
      2022年11月改正（2023年1月施行）後は、
      特に独立社外取締役の活動実績（出席率・発言内容等の定性的記述）と
      スキルマトリックスの有報記載が実務上の標準となっている。
    target_sections:
      - "役員の状況"
    required_items:
      - "取締役・監査役の氏名・略歴・現在の役職"
      - "スキルマトリックスと各役員の専門スキル"
      - "独立社外取締役の独立性判断の根拠"
      - "女性役員比率と多様性に関する記述"
      - "取締役会・委員会への出席状況（出席率）"
    applicable_markets:
      - "プライム"
      - "スタンダード"
      - "グロース"
    notes: "役員一人ひとりの出席率・発言実績の記述が金融庁レビューで注目されている"

  # ──────────────────────────────────────────
  # 6. 株式の状況（政策保有株式含む）（2件）
  # 有報様式第二号 第一部 第4 3・4
  # ──────────────────────────────────────────

  - id: "jr-2024-010"
    category: "株式情報"
    change_type: "追加必須"
    effective_from: "2019-01-31"
    title: "開示府令 — 政策保有株式の保有方針・縮減・議決権行使の開示"
    source: "https://www.fsa.go.jp/singi/singi_kinyu/tosin/20190628/01.pdf"
    source_confirmed: false
    law_name: "企業内容等の開示に関する内閣府令 様式第二号 第一部第4"
    summary: >
      有報「株式の保有状況」において、政策保有株式（いわゆる持合い株式）の
      保有方針・保有の合理性の検証プロセス・縮減方針を定性的に記述し、
      保有銘柄上位60銘柄（または純資産対比1%超）の個別開示が義務づけられている。
      また、被保有株主の議決権行使の基準・実績の開示も求められる。
    target_sections:
      - "株式の保有状況"
    required_items:
      - "政策保有株式の保有方針（保有目的・合理性の検証基準）"
      - "保有規模・縮減の方針と実績（直近5年程度の残高推移）"
      - "個別銘柄の保有目的・定量的効果（銘柄名・株数・貸借対照表計上額等）"
      - "議決権行使の基準と直近の行使実績"
    applicable_markets:
      - "プライム"
      - "スタンダード"
    notes: >
      上位60銘柄の個別開示が義務（純資産対比1%超の銘柄も対象）。
      縮減実績が乏しい場合は理由の説明が求められる

  - id: "jr-2024-011"
    category: "株式情報"
    change_type: "修正推奨"
    effective_from: "2021-06-11"
    title: "CGコード原則1-7・補充原則1-4 — 政策保有株式と株主還元方針の整合的開示"
    source: "https://www.fsa.go.jp/news/r2/singi/20210611/01.pdf"
    source_confirmed: false
    law_name: "コーポレートガバナンス・コード（東証 2021年6月改訂）原則1-4"
    summary: >
      CGコード原則1-4（補充原則1-4①②）は、政策保有株式の削減と
      議決権行使基準の策定・開示を上場企業に求める。
      削減により生じた資本を株主還元（増配・自社株買い）や成長投資に
      振り向ける方針との整合性を有報で説明することが望ましい。
    target_sections:
      - "株式の保有状況"
      - "経営方針、経営環境及び対処すべき課題等"
    required_items:
      - "株主還元方針（配当性向・総還元性向の目標）"
      - "自社株買いの実績と方針"
      - "政策保有株式縮減と株主還元の関係の説明"
    applicable_markets:
      - "プライム"
      - "スタンダード"
    notes: "政策保有株式の縮減益を株主還元に活用するかどうかの方針説明が投資家から注目されている"

  # ──────────────────────────────────────────
  # 7. 設備の状況（1件）
  # 有報様式第二号 第二部 第3【設備の状況】
  # ──────────────────────────────────────────

  - id: "jr-2024-012"
    category: "設備投資"
    change_type: "修正推奨"
    effective_from: "2023-01-31"
