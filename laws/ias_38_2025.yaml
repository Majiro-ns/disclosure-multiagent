# disclosure-multiagent — 法令・ガイダンス情報 YAML
# カテゴリ: IFRS（無形資産）— IAS 38 Intangible Assets
# 対象期間: 2025年度（2025-04-01〜2026-03-31）
# スキーマ定義: docs/law_yaml_schema.md
# 作成者: Majiro-ns
#
# 根拠法令:
#   IAS 38 Intangible Assets (IASB, 改訂2004年3月 / 最終改訂2014年)
#   IAS 38 Amendment — Annual Improvements to IFRSs 2010–2012 Cycle
#   IFRS 3 Business Combinations (PPA関連)
#   東京証券取引所 上場規程・開示ガイドライン（IFRSを任意適用する上場会社向け）

version: "1.0"
effective_period:
  from: "2025-04-01"
  to: "2026-03-31"

amendments:

  # ──────────────────────────────────────────
  # 【第1群】認識・定義要件
  # ──────────────────────────────────────────

  - id: "ias38-2025-001"
    category: "IFRS（無形資産）"
    change_type: "継続必須"
    effective_from: "2004-03-31"
    title: "無形資産の認識要件（識別可能性・支配・将来経済的便益）"
    source: "https://www.ifrs.org/issued-standards/list-of-standards/ias-38-intangible-assets/"
    source_confirmed: true
    summary: >
      IAS 38第10条〜17条に基づく無形資産の認識要件の開示。
      無形資産として認識するための3要件①識別可能性（分離可能または契約・法的権利から生じる）、
      ②支配（将来経済的便益を得る能力と第三者のアクセスを制限できること）、
      ③将来経済的便益の流入の可能性の各要件を充足するかの判断基準と
      会計方針を開示する。のれんとの区別（企業結合で生じる識別不能な超過収益力）、
      顧客関係・ブランド・特許・ライセンス等の識別可能無形資産の認識判断、
      ならびに費用処理した金額（認識要件を充足しなかった支出）の説明も含む。
    target_sections:
      - "重要な会計方針"
      - "注記事項（無形資産）"
      - "無形資産の増減調整表"
    required_items:
      - "無形資産の認識基準（3要件）の会計方針説明"
      - "のれんとの区別基準"
      - "認識した無形資産の種類別一覧"
      - "認識要件を満たさず費用処理した重要な支出の説明"
    applicable_markets:
      - "プライム"
      - "スタンダード"
      - "グロース"
    notes: "ブランド・顧客リスト等の内部創出無形資産は原則として認識不可（IAS 38第63条）"
    tier_requirement:
      ume: "必須"
      take: "必須"
      matsu: "必須"

  - id: "ias38-2025-002"
    category: "IFRS（無形資産）"
    change_type: "継続必須"
    effective_from: "2004-03-31"
    title: "研究費用と開発費の区分（研究=費用 / 開発=資産計上要件6つ）"
    source: "https://www.ifrs.org/issued-standards/list-of-standards/ias-38-intangible-assets/"
    source_confirmed: true
    summary: >
      IAS 38第54条〜67条に基づく研究段階費用と開発段階費用の区分会計と開示要件。
      研究段階（research phase）の支出は発生時に費用処理し資産計上不可。
      開発段階（development phase）の支出は以下6要件をすべて充足する場合に
      無形資産として資産計上する：①技術的実行可能性、②完成・使用・売却の意図、
      ③使用・売却の能力、④将来経済的便益の創出方法の説明可能性、
      ⑤完成に必要な資源の利用可能性、⑥開発費支出の測定可能性。
      研究と開発を区分できない場合は全額費用処理。資産計上した開発費の残高・
      当期増減・償却額とともに、費用処理した研究開発費の総額の開示が必要。
    target_sections:
      - "重要な会計方針"
      - "注記事項（無形資産）"
      - "研究開発費"
    required_items:
      - "研究段階 vs 開発段階の区分基準の会計方針説明"
      - "開発費資産計上の6要件の充足判断方法"
      - "当期に費用処理した研究開発費の総額"
      - "資産計上した開発費の帳簿価額と当期増減"
    applicable_markets:
      - "プライム"
      - "スタンダード"
      - "グロース"
    notes: "IT・製薬・製造業は研究開発費の開示が投資家にとって重要。段階区分の判断根拠の明示が求められる"
    tier_requirement:
      ume: "推奨"
      take: "必須"
      matsu: "必須"

  # ──────────────────────────────────────────
  # 【第2群】耐用年数・償却・減損
  # ──────────────────────────────────────────

  - id: "ias38-2025-003"
    category: "IFRS（無形資産）"
    change_type: "継続必須"
    effective_from: "2004-03-31"
    title: "耐用年数確定 vs 不確定の区分と償却方針"
    source: "https://www.ifrs.org/issued-standards/list-of-standards/ias-38-intangible-assets/"
    source_confirmed: true
    summary: >
      IAS 38第88条〜106条に基づく無形資産の耐用年数分類と償却方針の開示要件。
      無形資産は耐用年数が確定（finite useful life）か不確定（indefinite useful life）
      かに分類する。確定耐用年数の資産は耐用年数にわたり残存価額を控除した金額を
      規則的に償却（残存価額は原則ゼロ）する。償却方法（定額法・逓減残高法・
      生産高比例法）は経済的便益の消費パターンを反映して選択する。
      不確定耐用年数の資産は償却せず、毎年（または毀損の兆候がある都度）
      減損テストを実施する。耐用年数の判断に用いた要因の説明も必要。
    target_sections:
      - "重要な会計方針"
      - "注記事項（無形資産）"
      - "無形資産の増減調整表"
    required_items:
      - "耐用年数確定 vs 不確定の分類基準と判断根拠"
      - "確定耐用年数資産の償却方法・耐用年数・残存価額の設定方針"
      - "不確定耐用年数と判断した根拠（更新・延長の事業上の合理性等）"
      - "当期の償却費（クラス別）"
    applicable_markets:
      - "プライム"
      - "スタンダード"
      - "グロース"
    notes: "耐用年数不確定の資産（ブランド・特定ライセンス等）は毎年の減損テストが義務"
    tier_requirement:
      ume: "必須"
      take: "必須"
      matsu: "必須"

  - id: "ias38-2025-004"
    category: "IFRS（無形資産）"
    change_type: "継続必須"
    effective_from: "2004-03-31"
    title: "のれん以外の不確定耐用年数無形資産の年次減損テスト"
    source: "https://www.ifrs.org/issued-standards/list-of-standards/ias-38-intangible-assets/"
    source_confirmed: true
    summary: >
      IAS 38第108条〜110条および IAS 36（資産の減損）に基づく
      不確定耐用年数無形資産の年次減損テストの開示要件。
      不確定耐用年数の無形資産は、減損の兆候の有無に関わらず毎年
      IAS 36に基づく回収可能価額（使用価値 vs 公正価値マイナス処分コストの高い方）と
      帳簿価額を比較する減損テストを実施する。
      使用価値の算定に用いた割引率・成長率・キャッシュフロー予測期間等の
      主要な仮定と感応度分析（松レベル）を開示する。
      のれんと同様に、不確定耐用年数無形資産を含む現金生成単位（CGU）の
      回収可能価額の見積方法も開示対象。
    target_sections:
      - "注記事項（無形資産）"
      - "減損テスト"
      - "重要な会計上の判断・見積り"
    required_items:
      - "不確定耐用年数無形資産の種類・帳簿価額・配分先CGU"
      - "回収可能価額の算定方法（使用価値 vs 公正価値マイナス処分コスト）"
      - "使用価値算定の主要な仮定（割引率・成長率・予測期間）"
      - "帳簿価額と回収可能価額の比較結果と認識した減損損失（ある場合）"
    applicable_markets:
      - "プライム"
      - "スタンダード"
      - "グロース"
    notes: "IAS 36との連携開示が必要。感応度分析（割引率±1%等）は松レベルで特に重要"
    tier_requirement:
      ume: "推奨"
      take: "必須"
      matsu: "必須"

  # ──────────────────────────────────────────
  # 【第3群】内部創出・増減調整表・個別開示
  # ──────────────────────────────────────────

  - id: "ias38-2025-005"
    category: "IFRS（無形資産）"
    change_type: "継続必須"
    effective_from: "2004-03-31"
    title: "内部創出無形資産（ソフトウェア・特許等）の開示"
    source: "https://www.ifrs.org/issued-standards/list-of-standards/ias-38-intangible-assets/"
    source_confirmed: true
    summary: >
      IAS 38第57条〜67条に基づく内部創出無形資産の認識・測定・開示要件。
      内部創出のブランド・顧客リスト・出版題号等は認識不可だが、
      開発段階の6要件を充足するソフトウェア開発費・特許取得費・
      製品開発プロジェクト等は資産計上可能。
      内部創出無形資産の資産計上開始時期の判断（開発段階への移行の証拠）、
      資産化コストの範囲（直接帰属する人件費・材料費・外部費用等）、
      および資産計上できないコスト（研究費・訓練費・広告宣伝費等）の
      区分基準を開示する。SaaS・技術系企業は特に重要な開示項目となる。
    target_sections:
      - "重要な会計方針"
      - "注記事項（無形資産）"
      - "内部創出無形資産"
    required_items:
      - "内部創出無形資産の種類と資産計上基準（開発段階の判断）"
      - "資産化対象コストの範囲（直接帰属コストの定義）"
      - "内部創出無形資産の帳簿価額と当期増減"
      - "資産計上できず費用処理したコストの説明（重要な場合）"
    applicable_markets:
      - "プライム"
      - "スタンダード"
      - "グロース"
    notes: "SaaS・技術系・製薬企業は内部創出無形資産（ソフトウェア・特許）が業績に直結する重要項目"
    tier_requirement:
      ume: "推奨"
      take: "必須"
      matsu: "必須"

  - id: "ias38-2025-006"
    category: "IFRS（無形資産）"
    change_type: "継続必須"
    effective_from: "2004-03-31"
    title: "無形資産クラス別増減調整表"
    source: "https://www.ifrs.org/issued-standards/list-of-standards/ias-38-intangible-assets/"
    source_confirmed: true
    summary: >
      IAS 38第118条〜120条に基づく無形資産のクラス別増減調整表の開示要件。
      各クラスの無形資産について、期首帳簿価額・当期増加（取得・内部創出・
      企業結合・資本化）・当期減少（売却・廃棄・処分）・当期償却費・
      当期減損損失・換算差異・その他調整・期末帳簿価額を開示する。
      内部創出と外部取得（個別取得・企業結合）の区分ごとの開示も含む。
      取得原価・累計償却・累計減損を合わせた三段表示（gross/accumulated
      amortization/accumulated impairment）での開示が求められる。
    target_sections:
      - "注記事項（無形資産）"
      - "無形資産の増減調整表"
    required_items:
      - "無形資産クラス別の取得原価・累計償却・累計減損・帳簿価額"
      - "当期増加（取得・内部創出・企業結合）の内訳"
      - "当期減少（売却・廃棄）・当期償却費・当期減損損失の内訳"
      - "内部創出 vs 外部取得の区分別残高"
    applicable_markets:
      - "プライム"
      - "スタンダード"
      - "グロース"
    notes: "梅レベルでも増減調整表は必須。クラス分類は業種特性に応じて設定（ソフトウェア/顧客関係/ブランド等）"
    tier_requirement:
      ume: "必須"
      take: "必須"
      matsu: "必須"

  - id: "ias38-2025-007"
    category: "IFRS（無形資産）"
    change_type: "継続必須"
    effective_from: "2004-03-31"
    title: "重要な個別無形資産の開示（帳簿価額・残存償却期間）"
    source: "https://www.ifrs.org/issued-standards/list-of-standards/ias-38-intangible-assets/"
    source_confirmed: true
    summary: >
      IAS 38第122条〜123条に基づく重要な個別無形資産の開示要件。
      財務諸表にとって重要な個別無形資産については、クラス別集計に加えて
      個別の帳簿価額・残存償却期間を開示する。
      特に、帳簿価額が重要な特許・ライセンス・顧客関係・技術・商標について、
      残存耐用年数・償却方法・担保設定の有無・取得価格（企業結合の場合は
      PPA算定に用いた公正価値測定方法）を含めた個別開示が求められる。
      不確定耐用年数と判断した個別資産については、その理由と支持する要因も
      あわせて開示する。
    target_sections:
      - "注記事項（無形資産）"
      - "重要な個別無形資産"
    required_items:
      - "重要な個別無形資産の名称・帳簿価額・残存償却期間"
      - "不確定耐用年数と判断した場合の理由と支持する要因"
      - "担保・質権等の制約が設定されている無形資産の帳簿価額"
      - "取得契約等のコミットメントの有無（企業結合関連を除く）"
    applicable_markets:
      - "プライム"
      - "スタンダード"
      - "グロース"
    notes: "企業買収で取得した顧客基盤・技術・商標等は投資家の価値評価に直結する重要情報"
    tier_requirement:
      ume: "推奨"
      take: "必須"
      matsu: "必須"

  # ──────────────────────────────────────────
  # 【第4群】企業結合・PPA関連
  # ──────────────────────────────────────────

  - id: "ias38-2025-008"
    category: "IFRS（無形資産）"
    change_type: "継続必須"
    effective_from: "2004-03-31"
    title: "取得無形資産の公正価値測定方法（PPA関連）"
    source: "https://www.ifrs.org/issued-standards/list-of-standards/ias-38-intangible-assets/"
    source_confirmed: true
    summary: >
      IAS 38第33条〜43条および IFRS 3第B31条〜B40条に基づく
      企業結合で取得した無形資産（PPA: Purchase Price Allocation）の
      公正価値測定方法と開示要件。企業結合取得時に識別された無形資産
      （顧客関係・技術・商標・受注残・コンテンツ等）は公正価値で認識し、
      その測定に用いた評価手法（マルチピリオド超過収益法・リリーフフロム
      ロイヤリティ法・代替費用法・比較取引法等）を開示する。
      取得価格配分の結果（取得資産・引受負債・識別された無形資産・のれんの
      各配分額）とともに、未確定の初期会計処理（測定期間中の調整）も開示対象。
      松レベルでは各無形資産の評価に用いた割引率・ロイヤリティ率・
      顧客維持率等の主要仮定の開示が求められる。
    target_sections:
      - "注記事項（企業結合）"
      - "注記事項（無形資産）"
      - "PPA（取得価格配分）"
    required_items:
      - "企業結合で識別した無形資産の種類と認識額"
      - "公正価値測定に用いた評価手法の説明"
      - "取得価格配分の内訳（資産・負債・無形資産・のれん）"
      - "測定期間中の暫定値と最終確定額の調整（該当する場合）"
    applicable_markets:
      - "プライム"
      - "スタンダード"
      - "グロース"
    notes: "M&A実施後の有報ではPPA開示の充実度が投資家の評価に直結。評価仮定の透明性が特に重要"
    tier_requirement:
      ume: "任意"
      take: "推奨"
      matsu: "必須"
