# disclosure-multiagent — 法令・ガイダンス情報 YAML
# カテゴリ: IFRS 6（鉱物資源の探査および評価）
# 対象期間: 2025年度（2025-04-01〜2026-03-31）
# スキーマ定義: docs/law_yaml_schema.md
# 作成者: Majiro-ns
#
# 根拠法令・基準:
#   IFRS 6 Exploration for and Evaluation of Mineral Resources（IASB, 2004年公表 / 2006年1月1日以降適用）
#   IAS 36 Impairment of Assets（探査・評価資産の減損テスト）
#   IAS 37 Provisions, Contingent Liabilities and Contingent Assets（環境修復引当金）
#   IAS 16 Property, Plant and Equipment（有形の探査・評価資産の測定）
#   IAS 38 Intangible Assets（無形の探査・評価資産の測定）
#   IFRS 14 Regulatory Deferral Accounts（料金規制事業との接点）
#
# 主要ポイント（IFRS 6の骨子）:
#   (1) 適用範囲の限定 — 探査・評価段階のみ。採掘開始後はIAS 16/38へ移行
#   (2) 会計方針の継続適用 — 既存の成功努力法・全部原価法の継続を暫定的に許容
#   (3) 探査・評価資産の分類 — 有形（掘削設備・車両等）または無形（探査権・試掘費等）
#   (4) 減損の指標 — IFRS 6独自の指標（IAS 36の通常の指標に加え）を定義
#   (5) CGUの柔軟な定義 — 探査・評価段階のCGUはIAS 36より大きく設定可能
#   (6) IFRS 6は暫定基準 — IASBはIFRS 6の全面的な見直しを予定
#
# 松竹梅の基準:
#   梅 = 探査・評価資産の残高 + 採用した会計方針（成功努力法 / 全部原価法）+ 減損損失額
#   竹 = 増減明細（取得・除却・減損・移行） + 減損テストに用いたCGUの定義 + CF分類
#   松 = 鉱区別の埋蔵量見積りとの対比 + 感応度（コモディティ価格±10%影響） + 環境修復引当金の詳細

version: "1.0"
effective_period:
  from: "2025-04-01"
  to: "2026-03-31"

amendments:

  # ──────────────────────────────────────────
  # 【第1群】認識・測定方針
  # ──────────────────────────────────────────

  - id: "ifrs6-2025-001"
    category: "IFRS（鉱物資源探査評価）"
    change_type: "継続必須"
    effective_from: "2025-04-01"
    title: "IFRS 6 — 探査・評価支出の認識方針（成功努力法 vs 全部原価法）"
    source: "https://www.ifrs.org/issued-standards/list-of-standards/ifrs-6-exploration-for-and-evaluation-of-mineral-resources/"
    source_confirmed: false
    summary: >
      IFRS 6は探査・評価支出の認識について、既存の会計方針の継続適用を暫定的に認める
      （IFRS 6 第6〜7項）。主要な2つの方針は以下の通り。
      成功努力法（successful efforts method）: 商業的採算性が確認された鉱区に
      係る探査・評価支出のみを資産計上し、乾坑（ドライホール）等の
      商業的採算性が認められなかった支出は発生時に費用処理する。
      全部原価法（full cost method）: 特定のコストプール（地理的区域等）内の
      全探査・評価支出を資産計上し、商業的採算性の有無にかかわらず資産として認識する。
      採用した方針は重要な会計方針として開示し、方針の変更はIAS 8に準拠して処理する。
      ただしIFRS 6適用前から適用していた方針を継続する場合は、IAS 8の変更の要件（より目的適合・
      信頼性の向上）を満たさなくても継続が許容される（IFRS 6の特例）。
    target_sections:
      - "重要な会計方針（探査・評価支出の認識）"
      - "探査・評価資産の注記"
    required_items:
      - "採用した認識方針（成功努力法 / 全部原価法）の明示"
      - "資産計上の対象となる支出の具体的な範囲（地質調査・掘削費・ライセンス取得費等）"
      - "資産計上から費用処理への移行基準（商業的採算性の判断基準）"
      - "方針変更がある場合: 変更内容・理由・財務諸表への影響額"
    applicable_markets:
      - "プライム"
      - "スタンダード"
    notes: >
      IFRS 6は暫定基準であり、IASBによる全面改訂が予定されている。
      採掘開始・商業的生産開始後はIFRS 6の適用範囲外となりIAS 16またはIAS 38へ移行する。
      日本においてIFRS適用の資源・エネルギー企業（INPEX等）が主な適用対象
    tier_requirement:
      ume: "必須"
      take: "必須"
      matsu: "必須"

  - id: "ifrs6-2025-002"
    category: "IFRS（鉱物資源探査評価）"
    change_type: "継続必須"
    effective_from: "2025-04-01"
    title: "IFRS 6 — 探査・評価資産の分類（有形 vs 無形）と初期測定・移行後の測定"
    source: "https://www.ifrs.org/issued-standards/list-of-standards/ifrs-6-exploration-for-and-evaluation-of-mineral-resources/"
    source_confirmed: false
    summary: >
      探査・評価資産は、その性質に応じて有形資産または無形資産に分類する
      （IFRS 6 第15〜16項）。
      無形の探査・評価資産の例: 掘削権・探査ライセンス・試掘費・地質調査費・
      地震探査データ取得費。有形の探査・評価資産の例: 掘削装置・車両・
      探査用掘削孔（将来的に他の目的に使用される場合）。
      初期測定はコスト（原価）で行う。初期認識後の測定は、
      原価モデル（IAS 16 / IAS 38に準拠）または再評価モデルの選択適用が可能
      （ただし再評価モデルは活発な市場が存在する場合のみ）。
      探査・評価資産が商業的採算性の確認後に採掘・開発段階へ移行する場合は、
      IAS 16（有形固定資産）またはIAS 38（無形資産）へ再分類し、
      移行前に減損テストを実施する（IFRS 6 第17項）。
    target_sections:
      - "探査・評価資産の注記（分類・測定方針）"
      - "有形固定資産 / 無形資産との連携注記"
    required_items:
      - "有形・無形の分類基準と主要な資産種類の例示"
      - "初期測定に含める支出項目の具体的な範囲"
      - "初期認識後の測定モデル（原価モデル / 再評価モデル）の選択とその根拠"
      - "開発段階への移行基準（商業的採算性の判断）と移行時の減損テスト実施方針"
    applicable_markets:
      - "プライム"
      - "スタンダード"
    notes: "有形・無形の分類により適用する減価償却・償却の基準（IAS 16 vs IAS 38）が異なる。採掘設備等は通常UOP法（生産量比例法）を採用"
    tier_requirement:
      ume: "必須"
      take: "必須"
      matsu: "必須"

  # ──────────────────────────────────────────
  # 【第2群】減損・開示
  # ──────────────────────────────────────────

  - id: "ifrs6-2025-003"
    category: "IFRS（鉱物資源探査評価）"
    change_type: "継続必須"
    effective_from: "2025-04-01"
    title: "IFRS 6 — 減損の指標と減損テスト（IAS 36連携・CGUの柔軟な定義）"
    source: "https://www.ifrs.org/issued-standards/list-of-standards/ifrs-6-exploration-for-and-evaluation-of-mineral-resources/"
    source_confirmed: false
    summary: >
      IFRS 6 第18〜22項は、IAS 36の通常の減損指標に加えて、
      探査・評価資産に固有の減損指標（トリガー）を定める。
      IFRS 6固有の減損指標: (1) 探査・評価活動を継続するための権利（鉱業権・ライセンス）が
      当期中に失効しまたは近い将来に更新されない見込み、(2) 探査・評価活動の継続に係る
      実質的な予算・計画がなく、かつ商業的採算性の確認前に活動を中断する予定、
      (3) 商業的採算性の確認前に探査・評価資産の帳簿価額の回収が見込まれない十分な証拠、
      (4) 当該地域における探査・評価の中止決定。
      CGU（資金生成単位）の定義においてIFRS 6はIAS 36より大きい単位を認める
      （例: 地理的地域・鉱区群単位での減損テスト）。
      減損損失の測定・認識・戻入はIAS 36に準拠する。
    target_sections:
      - "探査・評価資産の減損注記"
      - "重要な会計上の判断・見積り（商業的採算性の評価）"
    required_items:
      - "採用した減損指標のリスト（IFRS 6固有 + IAS 36一般指標）"
      - "減損テストに使用したCGUの定義（地理的範囲・事業単位等）とその選択根拠"
      - "回収可能価額の算定方法（使用価値 / 売却コスト控除後公正価値）と主要仮定"
      - "当期認識した減損損失の金額・対象資産・影響したCGU"
      - "減損戻入がある場合: 戻入の根拠・金額"
    applicable_markets:
      - "プライム"
      - "スタンダード"
    notes: >
      商業的採算性の評価は高度な判断を要するため「重要な会計上の見積り」の開示が必要。
      コモディティ価格（原油・金・銅等）の仮定は最大の不確実性要因であり、
      感応度分析（±10%価格変動の回収可能価額・減損への影響）は松レベルで推奨
    tier_requirement:
      ume: "必須"
      take: "必須"
      matsu: "必須"

  - id: "ifrs6-2025-004"
    category: "IFRS（鉱物資源探査評価）"
    change_type: "継続必須"
    effective_from: "2025-04-01"
    title: "IFRS 6 — 探査・評価資産の開示（増減明細・償却・減損・移行）"
    source: "https://www.ifrs.org/issued-standards/list-of-standards/ifrs-6-exploration-for-and-evaluation-of-mineral-resources/"
    source_confirmed: false
    summary: >
      探査・評価資産の残高・増減に関する定量的な開示（IFRS 6 第24〜25項）。
      有形・無形それぞれについて、期中変動表（ロールフォワード）を開示する。
      開示すべき変動項目: 期首残高、当期取得（新規探査権取得・試掘費等）、
      除売却（権利失効・売却・放棄）、開発段階への移行（IAS 16/38への再分類）、
      減損損失の認識（ifrs6-2025-003参照）、減損戻入、
      為替換算差額（在外事業の探査資産）、期末残高。
      償却（有形は減価償却・無形は償却）の方法・耐用年数・残存価額も開示する。
      探査・評価活動から採掘段階へ移行した際の移行金額は、
      開発段階への移行を適切に識別し開示する必要がある。
    target_sections:
      - "探査・評価資産の増減明細注記"
      - "有形固定資産 / 無形資産注記との連携"
    required_items:
      - "期中変動表（有形・無形別）: 期首残高・取得・除却・減損・移行・為替・期末残高"
      - "累積減損損失・累積償却の開示（総額法）"
      - "償却方法・耐用年数または生産量比例率（資産種類別）"
      - "開発段階へ移行した金額と移行後の分類先（IAS 16 / IAS 38）"
    applicable_markets:
      - "プライム"
      - "スタンダード"
    notes: "全部原価法では探査・評価資産がコストプール単位で管理されるため、鉱区別の明細は不要な場合もある。成功努力法では鉱区別の管理が通常"
    tier_requirement:
      ume: "必須"
      take: "必須"
      matsu: "必須"

  # ──────────────────────────────────────────
  # 【第3群】CF分類・鉱業権・環境修復
  # ──────────────────────────────────────────

  - id: "ifrs6-2025-005"
    category: "IFRS（鉱物資源探査評価）"
    change_type: "継続必須"
    effective_from: "2025-04-01"
    title: "IFRS 6 — 探査・評価活動から生じるキャッシュフローの分類"
    source: "https://www.ifrs.org/issued-standards/list-of-standards/ifrs-6-exploration-for-and-evaluation-of-mineral-resources/"
    source_confirmed: false
    summary: >
      探査・評価活動に関するキャッシュフロー計算書上の分類に係る会計方針の開示。
      IAS 7（キャッシュフロー計算書）はキャッシュフローを営業・投資・財務に分類するが、
      探査・評価支出の分類は会社の会計方針によって異なる場合がある。
      投資活動への分類（一般的）: 探査権の取得・試掘・評価等の支出を投資CFに計上。
      理由は探査・評価資産がB/S上に資産計上される場合、その取得支出は投資CFが適切。
      営業活動への分類（例外的）: 探査費用を全額費用処理する方針（成功努力法の一部適用等）の
      場合、当該支出が営業CFに分類される場合もある。
      採用した分類方針とその根拠を重要な会計方針として開示する必要がある。
      また、探査ライセンスの売却収入・鉱区の権益売却収入は通常投資CFの収入として分類する。
    target_sections:
      - "キャッシュフロー計算書の注記"
      - "重要な会計方針（CF分類）"
    required_items:
      - "探査・評価支出のCF区分（営業 / 投資）とその根拠"
      - "探査資産の取得支出額（投資CFに計上した場合）"
      - "探査権・鉱区権益の売却収入の区分（通常は投資CF収入）"
      - "重要な非現金取引（現物出資による探査権取得・株式対価の取引等）の補足開示"
    applicable_markets:
      - "プライム"
      - "スタンダード"
    notes: "IFRS 6はCF分類について明示的な規定を設けておらずIAS 7に委ねる。同業他社との比較のために採用方針の明示が重要"
    tier_requirement:
      ume: "推奨"
      take: "必須"
      matsu: "必須"

  - id: "ifrs6-2025-006"
    category: "IFRS（鉱物資源探査評価）"
    change_type: "継続必須"
    effective_from: "2025-04-01"
    title: "IFRS 6 — 鉱業権・探査ライセンスの開示（取得・更新・失効・権利内容）"
    source: "https://www.ifrs.org/issued-standards/list-of-standards/ifrs-6-exploration-for-and-evaluation-of-mineral-resources/"
    source_confirmed: false
    summary: >
      探査・評価活動の根拠となる鉱業権（mining rights）・探査ライセンス（exploration license）・
      生産分与契約（PSC: Production Sharing Contract）等の権利に係る開示。
      権利の性質・地域・面積・有効期間・更新条件・主要な義務（最低作業義務・
      最低支出コミットメント等）を開示する。
      権利の取得コスト（取得時のプレミアム・権利金）は無形資産として認識し
      探査・評価資産の一部として計上する。
      権利の有効期間・更新可能性は減損テストの重要なインプットであり（ifrs6-2025-003参照）、
      近い将来に更新されない権利や失効リスクのある権利は減損指標として取り扱う。
      生産分与契約（PSC）の場合は、政府との契約構造（コストリカバリー・プロフィットオイル
      の配分条件）の概要も開示する。
    target_sections:
      - "探査・評価資産の注記（鉱業権・ライセンス）"
      - "重要なコミットメントの注記"
    required_items:
      - "保有する主要な鉱業権・探査ライセンスの地域・面積・有効期間"
      - "権利の取得コストの帳簿価額（鉱業権・ライセンス別または地域別）"
      - "最低作業義務・最低支出コミットメントの残存額（期間別内訳）"
      - "当期に失効・放棄した権利の帳簿価額と損失認識額"
      - "PSC等の特殊な権利構造がある場合: 主要な契約条件の概要"
    applicable_markets:
      - "プライム"
      - "スタンダード"
    notes: "日本のIFRS適用資源企業の場合、海外での探鉱権益が主体であり、現地法規制・政治リスクに関する定性的開示も投資家にとって重要"
    tier_requirement:
      ume: "推奨"
      take: "必須"
      matsu: "必須"

  - id: "ifrs6-2025-007"
    category: "IFRS（鉱物資源探査評価）"
    change_type: "継続必須"
    effective_from: "2025-04-01"
    title: "IFRS 6 — 環境修復義務の引当金（IAS 37連携・坑廃水処理・原状回復）"
    source: "https://www.ifrs.org/issued-standards/list-of-standards/ifrs-6-exploration-for-and-evaluation-of-mineral-resources/"
    source_confirmed: false
    summary: >
      探査・評価活動に伴い発生する環境修復義務（decommissioning and site restoration obligations）に
      係る引当金の認識・測定・開示（IAS 37に準拠）。
      探査・評価段階においても、試掘孔の廃坑処理・地表面の原状回復・
      坑廃水処理設備の撤去等の義務が法令または契約により発生することがある。
      引当金の認識要件（IAS 37 第14項）: (1) 過去の事象による現在の債務（法的または推定的）、
      (2) 資源流出の可能性が高い、(3) 金額の信頼性ある見積りが可能。
      引当金の測定: 義務履行に要する支出の最良の見積り（現在価値で割り引き）。
      IAS 16との接点: 資産除去費用が探査・評価資産の取得コストの一部として計上され、
      対応する引当金（ARO: Asset Retirement Obligation）がB/S負債に計上される。
      引当金の期中変動（時の経過による利息費用・見積り変更・新規認識・利用）も開示する。
    target_sections:
      - "引当金の注記（環境修復・原状回復義務）"
      - "探査・評価資産の注記（資産除去費用の計上）"
      - "重要な会計上の見積り（修復費用の現在価値）"
    required_items:
      - "環境修復引当金の期中変動表（期首残高・新規認識・時の経過・見積り変更・利用・期末残高）"
      - "引当金の測定に使用した主要な仮定（割引率・修復コスト単価・修復時期の見積り）"
