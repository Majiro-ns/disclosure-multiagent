# disclosure-multiagent — 法令・ガイダンス情報 YAML
# カテゴリ: IFRS（有形固定資産）
# 対象期間: 2025年度（2025-04-01〜2026-03-31）
# スキーマ定義: docs/law_yaml_schema.md
# 作成者: Majiro-ns
#
# 根拠法令・基準:
#   IAS 16 Property, Plant and Equipment（有形固定資産）
#   IAS 16 BC (Basis for Conclusions)
#   IAS 37 Provisions, Contingent Liabilities and Contingent Assets（資産除去債務関連）
#   IAS 20 Accounting for Government Grants（政府補助金関連）
#   IASB 2023年開示イニシアティブ（IAS 16開示要件の明確化）
#
# 松竹梅レベル定義:
#   梅（ume）: 資産クラス別帳簿残高 + 減価償却方法の定性的説明のみ
#   竹（take）: 増減調整表 + 耐用年数根拠の説明 + 資産除去債務の金額開示
#   松（matsu）: 再評価モデルの詳細（独立評価人・評価手法） + 資産戦略 + CAPEXコミットメント計画

version: "1.0"
effective_period:
  from: "2025-04-01"
  to: "2026-03-31"

amendments:

  # ──────────────────────────────────────────
  # 【第1群】認識・測定の基本要件
  # ──────────────────────────────────────────

  - id: "ias16-2025-001"
    category: "IFRS（有形固定資産）"
    change_type: "既存必須"
    effective_from: "2025-04-01"
    title: "有形固定資産の認識要件と取得原価の構成要素"
    source: "IAS 16.7-28"
    source_confirmed: true
    summary: >
      有形固定資産の認識要件：（1）資産に関連する将来の経済的便益が企業に
      流入することが蓋然的、（2）資産の取得原価が信頼をもって測定できる。
      取得原価の構成要素：購入価格（輸入関税・還付不能な仕入税額を含む）、
      資産を経営者が意図する方法で稼働できる状態にするための直接帰属コスト
      （設置費用・専門家報酬・輸送費・試運転費用）、資産の解体・除去および
      設置場所の原状回復コストの当初見積額（IAS 37準拠）。
      認識対象外コスト：新製品・新サービスの導入コスト、新地域での事業展開コスト、
      管理費・その他の一般管理費、稼働後の維持修繕費。
    target_sections:
      - "会計方針（有形固定資産）"
      - "注記（有形固定資産）"
    required_items:
      - "有形固定資産の認識基準の会計方針説明"
      - "取得原価に含まれる構成要素の説明"
      - "資産除去債務（原状回復コスト）の当初見積計上の有無"
      - "自家建設資産がある場合の原価算入範囲の説明"
    applicable_markets:
      - "プライム"
      - "スタンダード"
      - "グロース"
    notes: "借入費用（IAS 23）の資産化方針と認識要件の整合性確認が実務上重要。適格資産への借入費用算入は別途IAS 23で規定"
    tier_requirement:
      ume: "認識基準と取得原価の定性的方針説明のみ"
      take: "構成要素の種類別開示 + 自家建設・借入費用算入の有無"
      matsu: "取得原価算定の詳細プロセス + 判断が必要なケースの説明（試運転費用・解体費見積等）"

  - id: "ias16-2025-002"
    category: "IFRS（有形固定資産）"
    change_type: "既存必須"
    effective_from: "2025-04-01"
    title: "減価償却方法・耐用年数・残存価額の開示"
    source: "IAS 16.43-62, IAS 16.73(b)(c)"
    source_confirmed: true
    summary: >
      各資産クラスの減価償却方法（定額法・定率法・生産高比例法）、
      耐用年数（または償却率）、残存価額を開示する。
      減価償却方法は資産の将来の経済的便益の消費パターンを反映して選択し、
      少なくとも毎期末に見直す。耐用年数は物理的・技術的陳腐化・法的制限等を
      考慮した経済的使用可能期間として見積もり、少なくとも毎期末に見直す。
      残存価額は現在の状態での売却見積額から処分コストを控除した金額で、
      少なくとも毎期末に見直す。方法・耐用年数・残存価額の変更は
      IAS 8会計上の見積の変更として将来に向けて処理する。
    target_sections:
      - "会計方針（有形固定資産）"
      - "注記（有形固定資産）"
      - "重要な会計上の見積もり"
    required_items:
      - "資産クラス別の減価償却方法（定額法・定率法等の区分）"
      - "資産クラス別の耐用年数（または償却率）の範囲"
      - "資産クラス別の残存価額の設定方針"
      - "当期中の方法・耐用年数・残存価額変更の有無と影響額"
      - "耐用年数の根拠となる主要な判断要素の説明"
    applicable_markets:
      - "プライム"
      - "スタンダード"
      - "グロース"
    notes: "J-GAAPとの相違点として、IAS 16では残存価額ゼロへの機械的設定を認めない。経済的耐用年数と法定耐用年数の乖離説明が実務上重要"
    tier_requirement:
      ume: "資産クラス別の償却方法と耐用年数の数値のみ"
      take: "耐用年数の根拠説明 + 残存価額の設定方針 + 変更有無の開示"
      matsu: "耐用年数の定期見直しプロセスの説明 + 技術的陳腐化リスクへの対応方針"

  - id: "ias16-2025-003"
    category: "IFRS（有形固定資産）"
    change_type: "既存必須"
    effective_from: "2025-04-01"
    title: "原価モデル vs 再評価モデルの選択と会計方針開示"
    source: "IAS 16.29-42, IAS 16.73(a), IAS 16.77"
    source_confirmed: true
    summary: >
      有形固定資産の事後測定モデルとして原価モデルまたは再評価モデルを
      資産クラス単位で選択し、選択した方針を開示する。
      原価モデル：取得原価から減価償却累計額および減損損失累計額を控除した額。
      再評価モデル：再評価日現在の公正価値から再評価日後の減価償却累計額および
      減損損失累計額を控除した再評価額。再評価は公正価値が帳簿価額と重要な差異を
      生じさせないよう十分な頻度で実施する（通常3〜5年ごと）。
      再評価モデル採用の場合、同一クラスの全資産を再評価する。
    target_sections:
      - "会計方針（有形固定資産）"
      - "注記（有形固定資産）"
    required_items:
      - "資産クラス別の測定モデル（原価 or 再評価）の選択方針"
      - "再評価モデル採用の場合：再評価の頻度と最終再評価日"
      - "再評価モデル採用の場合：公正価値の算定手法と評価者の属性（独立・内部）"
      - "再評価モデル採用の場合：原価モデルを使用した場合の仮定的帳簿価額"
    applicable_markets:
      - "プライム"
      - "スタンダード"
      - "グロース"
    notes: "日本のIFRS採用企業では土地・建物に再評価モデルを採用するケースが増加。不動産投資比率の高い企業は特に開示粒度への注意が必要"
    tier_requirement:
      ume: "測定モデルの選択方針（原価 or 再評価）の記述のみ"
      take: "再評価採用クラスの再評価頻度・最終日・評価手法の説明"
      matsu: "独立評価人の活用・IFRS 13公正価値ヒエラルキー適用・再評価サイクルの詳細"

  # ──────────────────────────────────────────
  # 【第2群】再評価・除去債務の処理
  # ──────────────────────────────────────────

  - id: "ias16-2025-004"
    category: "IFRS（有形固定資産）"
    change_type: "既存必須"
    effective_from: "2025-04-01"
    title: "再評価剰余金の処理とOCI認識"
    source: "IAS 16.39-42, IAS 16.77(e)(f)"
    source_confirmed: true
    summary: >
      再評価モデル採用時の再評価差額の処理：
      （1）帳簿価額が増加した場合：OCIで認識し、再評価剰余金（その他の包括利益
      累計額）に計上。ただし同一資産で過去に費用計上した減少額がある場合は
      その範囲で損益に認識。
      （2）帳簿価額が減少した場合：損益で認識。ただし同一資産で過去に計上した
      再評価剰余金の残高がある場合はその範囲でOCIで認識（再評価剰余金を減額）。
      再評価剰余金は資産の使用に伴い利益剰余金に振り替えることができる
      （帳簿価額ベースの減価償却費と取得原価ベースの差額相当）。
      資産の処分時には再評価剰余金残高を利益剰余金に直接振り替える。
    target_sections:
      - "注記（有形固定資産）"
      - "その他の包括利益"
      - "純資産変動計算書"
    required_items:
      - "再評価剰余金の期首・期末残高と当期変動額（クラス別）"
      - "再評価による帳簿価額の増減額（損益処理・OCI処理の区分）"
      - "再評価剰余金から利益剰余金への振替額（使用に伴う振替）"
      - "処分に伴う再評価剰余金の利益剰余金への振替額"
    applicable_markets:
      - "プライム"
      - "スタンダード"
      - "グロース"
    notes: "再評価剰余金はOCIで認識後、将来の損益に再分類（リサイクリング）しない。処分時の直接振替処理はJ-GAAPとの重要な相違点"
    tier_requirement:
      ume: "再評価剰余金の期末残高のみ（再評価モデル採用企業）"
      take: "期中変動の内訳（評価差額・使用振替・処分振替）の開示"
      matsu: "クラス別・資産別の再評価剰余金の動態表 + 将来の再評価予定と影響見通し"

  - id: "ias16-2025-005"
    category: "IFRS（有形固定資産）"
    change_type: "既存必須"
    effective_from: "2025-04-01"
    title: "資産除去債務（IAS 37連携）の見積りと開示"
    source: "IAS 16.16(c), IAS 37.14-26, IFRIC 1"
    source_confirmed: true
    summary: >
      有形固定資産の解体・除去・設置場所の原状回復に関して法的または推定的義務が
      存在する場合、取得時点でその現在価値を取得原価に算入し、同額の引当金を
      計上する（IAS 37：資産除去債務引当金）。
      IFRIC 1：原状回復・解体・環境修復引当金の変動の処理。
      割引率の変動・時間の経過（unwinding of discount）・見積りの変更による
      引当金の変動は、原則として資産の帳簿価額に加減する。
      ただし帳簿価額をゼロに減額後の引当金減少は損益に計上。
      開示要件：対象資産の説明、見積額の前提（割引率・除去時期・除去コスト）、
      引当金残高の変動明細。
    target_sections:
      - "注記（有形固定資産）"
      - "注記（引当金）"
      - "重要な会計上の見積もり"
    required_items:
      - "資産除去債務の計上対象資産クラスの説明"
      - "見積りに用いた割引率・除去予定時期・除去コストの説明"
      - "引当金の期首・当期計上・使用・割引戻入・見積変更・期末残高の変動表"
      - "資産帳簿価額への加算額（取得原価算入分）の変動"
      - "財務上の重要な不確実性（除去時期・コストの範囲）の説明"
    applicable_markets:
      - "プライム"
      - "スタンダード"
      - "グロース"
    notes: "原子力・石油・ガス・化学・不動産リースの原状回復で計上金額が大きくなるケースが多い。IFRIC 1の適用によりunwinding of discountは金融費用（利息費用）に計上"
    tier_requirement:
      ume: "資産除去債務引当金の計上有無と期末残高のみ"
      take: "割引率・除去時期の前提 + 引当金変動表（unwinding of discount含む）"
      matsu: "除去コスト見積りの感応度分析 + 割引率変動シナリオ + 環境規制変更リスクの説明"

  # ──────────────────────────────────────────
  # 【第3群】増減調整表・コミットメント・補助金
  # ──────────────────────────────────────────

  - id: "ias16-2025-006"
    category: "IFRS（有形固定資産）"
    change_type: "既存必須"
    effective_from: "2025-04-01"
    title: "資産クラス別増減調整表（期首〜期末の帳簿価額の連結）"
    source: "IAS 16.73(d)(e)"
    source_confirmed: true
    summary: >
      各資産クラスについて、期首から期末までの帳簿価額の変動を示す
      調整表（roll-forward table）を開示する（IAS 16.73(e)）。
      調整表の記載項目：
      （1）期首帳簿価額（または取得原価と減価償却累計額・減損損失累計額の区分表示）
      （2）当期取得額
      （3）企業結合による取得額
      （4）処分額（帳簿価額）
      （5）当期減価償却費
      （6）当期減損損失（IAS 36）
      （7）減損損失の戻入れ（IAS 36）
      （8）再評価による増減（再評価モデルの場合）
      （9）為替換算差額（外貨換算資産の場合）
      （10）その他の変動
      （11）期末帳簿価額
      資産クラスの区分：土地・建物・機械装置・工具器具備品・建設仮勘定・使用権資産等。
    target_sections:
      - "注記（有形固定資産）"
    required_items:
      - "資産クラス別の増減調整表（期首・取得・処分・減価償却・減損・期末の全項目）"
      - "取得原価と減価償却累計額・減損累計額の区分表示（期首・期末）"
      - "建設仮勘定の残高と当期の本勘定振替額"
      - "企業結合による取得が重要な場合の内訳説明"
      - "処分による損益（売却価格と帳簿価額の差）の説明"
    applicable_markets:
      - "プライム"
      - "スタンダード"
      - "グロース"
    notes: "IFRS 16使用権資産を有形固定資産に含める場合は区分して表示。建設仮勘定の長期滞留がある場合はその理由説明が実務上求められる"
    tier_requirement:
      ume: "資産クラス別期末帳簿残高と当期減価償却費のみ"
      take: "期首〜期末の全項目増減調整表（取得原価・累計額の区分含む）"
      matsu: "セグメント別内訳 + 主要な個別資産の取得・処分説明 + 地域別内訳（グローバル企業）"

  - id: "ias16-2025-007"
    category: "IFRS（有形固定資産）"
    change_type: "既存必須"
    effective_from: "2025-04-01"
    title: "担保設定・購入コミットメントおよびCAPEX計画の開示"
    source: "IAS 16.74"
    source_confirmed: true
    summary: >
      有形固定資産に関する追加開示事項（IAS 16.74）：
      （1）担保設定：借入や社債の担保として差し入れている有形固定資産の
      帳簿価額を開示する。担保設定の条件・制限の説明も必要。
      （2）購入コミットメント：将来の有形固定資産の取得に関して契約済みの
      支出額（コミットメント）を開示する。
      （3）一時的に稼働を停止している資産・廃棄予定資産の帳簿価額
      （IAS 16.79(a)(b)）。
      （4）完全償却済みだが使用中の資産の取得原価（IAS 16.79(c)）。
      （5）廃棄目的保有に分類されていない処分予定資産の帳簿価額
      （IAS 16.79(d)）。
    target_sections:
      - "注記（有形固定資産）"
      - "コミットメント及び偶発債務"
    required_items:
      - "担保設定済み有形固定資産の帳簿価額（種類別）"
      - "購入コミットメントの契約済み金額（1年以内・1〜5年・5年超の区分）"
      - "完全償却済みで引き続き使用中の資産の取得原価"
      - "一時的稼働停止資産の帳簿価額と停止理由"
      - "廃棄予定・処分予定資産の帳簿価額"
    applicable_markets:
      - "プライム"
      - "スタンダード"
      - "グロース"
    notes: "CAPEX計画の開示は法的要件ではないが、投資家の意思決定に有用であり、IAS 16.74(b)コミットメントと合わせて積極的な開示が実務上推奨される"
    tier_requirement:
      ume: "担保設定の有無と金額 + 購入コミットメント総額のみ"
      take: "コミットメントの年限別内訳 + 完全償却資産・稼働停止資産の説明"
      matsu: "中期CAPEXコミットメント計画 + 担保条件の詳細 + 投資戦略との整合性説明"

  - id: "ias16-2025-008"
    category: "IFRS（有形固定資産）"
    change_type: "既存必須"
    effective_from: "2025-04-01"
    title: "政府補助金受領資産の会計処理と開示（IAS 20連携）"
    source: "IAS 16.28, IAS 20.24-31"
    source_confirmed: true
    summary: >
      政府補助金（grants, subsidies, 助成金）を受領して取得した有形固定資産の
      会計処理と開示（IAS 20連携）。
      資産取得に関する政府補助金の処理方法：
      （1）繰延収益法（deferred income approach）：補助金を繰延収益として計上し、
      資産の耐用年数にわたって規則的に損益認識する。
      （2）資産控除法（deduction from asset approach）：補助金を資産の帳簿価額から
      控除し、残額を取得原価として減価償却する（日本実務での採用は限定的）。
      IAS 20では両方法を許容するが、方針を選択して継続適用する。
      開示要件：補助金の性質・金額・条件（返還条件含む）、
      未充足の条件・偶発事象、政府援助の内容。
    target_sections:
      - "会計方針（政府補助金）"
      - "注記（有形固定資産）"
      - "注記（政府補助金）"
    required_items:
