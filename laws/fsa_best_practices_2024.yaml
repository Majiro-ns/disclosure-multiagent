# disclosure-multiagent — 法令・ガイダンス情報 YAML
# カテゴリ: 好事例（金融庁 記述情報の開示の好事例集2024）
# 対象期間: 2024年度（2024-11-08〜2025-03-24 公表）
# スキーマ定義: docs/law_yaml_schema.md
# 作成者: Majiro-ns
#
# 出典: 金融庁「記述情報の開示の好事例集2024」
#   第1弾: 2024-11-08公表（サステナビリティ①）
#   第2弾: 2024-12-13公表（サステナビリティ②）
#   第3弾: 2025-01-17公表（サステナビリティ③）
#   第4弾: 2025-02-03公表（コーポレートガバナンス）
#   最終版: 2025-03-24公表（重要契約・MD&A・中堅中小追加）
#
# ★好事例は義務ではなくベストプラクティス → change_type: "修正推奨"
# ★文言は独自表現（金融庁原文の直接引用ではない）

version: "1.0"
effective_period:
  from: "2024-04-01"
  to: "2025-03-31"

amendments:

  # ──────────────────────────────────────────
  # 好事例カテゴリ（4件）
  # ──────────────────────────────────────────

  - id: "bp-2024-001"
    category: "好事例"
    change_type: "修正推奨"
    effective_from: "2024-11-08"
    title: "金融庁好事例集2024 — サステナビリティ開示の充実ポイント"
    source: "https://www.fsa.go.jp/news/r6/singi/20241108.html"
    source_confirmed: true
    summary: >
      金融庁「記述情報の開示の好事例集2024」（第1弾〜第3弾）で示された
      サステナビリティに関する考え方及び取組の好事例ポイント。
      ガバナンス体制の実態・リスクと機会の特定プロセス・シナリオ分析の開示など、
      投資家が判断に活用できる具体性・独自性を重視した開示が評価された。
    target_sections:
      - "サステナビリティに関する考え方及び取組"
      - "経営方針、経営環境及び対処すべき課題等"
    disclosure_items:
      - "取締役会・委員会等のガバナンス体制を、役割・審議頻度・意思決定権限まで踏み込んで説明する"
      - "マテリアリティ（重要課題）の特定プロセスを、事業特性との関連を示しながら開示する"
      - "気候変動シナリオ分析では使用シナリオの前提・分析結果・対応策を一貫して記述する"
      - "KPIは定義・計算方法・基準年・目標年度を明示し、期中進捗も追って報告する"
      - "人的資本（人材戦略）とサステナビリティ方針の連動関係を明示する"
      - "投資家・アナリストが他社比較できるよう、自社固有の認識・考え方を具体的に示す"
    applicable_markets:
      - "プライム"
      - "スタンダード"
      - "グロース"
    notes: "第1弾はサステナビリティ全般、第2弾はTCFD等の気候関連、第3弾は人的資本との連携が重点テーマ"

  - id: "bp-2024-002"
    category: "好事例"
    change_type: "修正推奨"
    effective_from: "2025-03-24"
    title: "金融庁好事例集2024 — 経営上の重要な契約等の開示ポイント"
    source: "https://www.fsa.go.jp/news/r6/singi/20250324-2.html"
    source_confirmed: true
    summary: >
      金融庁「記述情報の開示の好事例集2024」最終版で追加された
      経営上の重要な契約等に関する好事例ポイント。
      2025年3月期から適用される同開示欄について、合弁・ライセンス・
      業務提携等の契約が事業継続に与える影響・リスクまで踏み込んだ開示が評価された。
    target_sections:
      - "経営上の重要な契約等"
    disclosure_items:
      - "合弁・ライセンス・資本業務提携等の契約について、名称・相手方・目的・主要条件を特定して記載する"
      - "チェンジ・オブ・コントロール条項（事前承諾・事前協議・報告義務）を区別して開示する"
      - "契約終了・解除・期間満了が事業継続に与えるリスクと代替手段を示す"
      - "親会社・主要株主との取引条件や独立性の担保について、具体的な根拠を示して説明する"
      - "複数の重要契約がある場合は、事業への影響度で優先度を付けて開示する"
    applicable_markets:
      - "プライム"
      - "スタンダード"
      - "グロース"
    notes: "2025年3月期（2025年4月以降提出の有報）から適用。開示義務化に合わせた好事例提示"

  - id: "bp-2024-003"
    category: "好事例"
    change_type: "修正推奨"
    effective_from: "2025-03-24"
    title: "金融庁好事例集2024 — 経営方針・経営環境・MD&Aの開示ポイント"
    source: "https://www.fsa.go.jp/news/r6/singi/20250324-2.html"
    source_confirmed: true
    summary: >
      金融庁「記述情報の開示の好事例集2024」最終版で追加された
      経営方針・経営環境・MD&Aに関する好事例ポイント。
      マクロ環境の羅列ではなく自社事業に直結する環境認識の開示、
      独自経営指標の説明と計画達成状況の分析が高く評価された。
    target_sections:
      - "経営方針、経営環境及び対処すべき課題等"
      - "経営者による財政状態、経営成績及びキャッシュ・フローの状況の分析"
    disclosure_items:
      - "マクロ環境の紹介にとどまらず、自社事業に直結するセミマクロ・ミクロ環境の認識を独自の言葉で示す"
      - "経営上の重要課題を絞り込み、解決に向けた具体的施策と時間軸を開示する"
      - "独自経営指標（ROIC・EVA・NPS等）は定義・計算方法・業界水準との対比を示して説明する"
      - "中長期計画で掲げた目標に対する進捗を、定量的根拠とともに毎期継続して報告する"
      - "計画未達の場合は要因を具体的に分析し、翌期に向けた軌道修正策を明示する"
      - "財務数値の変動要因（数量・価格・為替・コスト）を分解して説明し、再現可能性を示す"
    applicable_markets:
      - "プライム"
      - "スタンダード"
      - "グロース"
    notes: "第5回勉強会（テーマ：重要な契約等・経営方針等・MD&A）の議論を踏まえて作成"

  - id: "bp-2024-004"
    category: "好事例"
    change_type: "修正推奨"
    effective_from: "2025-03-24"
    title: "金融庁好事例集2024 — 中堅中小上場企業の開示ポイント"
    source: "https://www.fsa.go.jp/news/r6/singi/20250324-2.html"
    source_confirmed: true
    summary: >
      金融庁「記述情報の開示の好事例集2024」最終版で追加された
      中堅中小上場企業（売上高300億円以下を目安）向けの開示好事例ポイント。
      網羅的な情報列挙より「重要課題の絞り込みと深掘り開示」が評価された。
      大企業と異なる事業特性・成長フェーズに応じた開示スタイルが推奨されている。
    target_sections:
      - "経営方針、経営環境及び対処すべき課題等"
      - "事業等のリスク"
      - "サステナビリティに関する考え方及び取組"
    disclosure_items:
      - "全項目を網羅するのではなく、自社にとって経営上の最重要課題を特定し、そこに深掘り記載を集中させる"
      - "事業モデルや競争優位の源泉を投資家が理解できるよう、業界特性・自社ポジションから説明する"
      - "主要顧客・仕入先・技術・人材への集中リスクを認識した上で、リスク低減施策を具体的に示す"
      - "成長ロードマップ（事業フェーズ・投資計画・KPI目標）を時間軸とともに提示する"
      - "代表者（創業者・オーナー）への依存リスクと後継者育成・経営体制の整備状況を開示する"
      - "リソース制約の中でのサステナビリティ対応について、優先テーマと取組状況を示す"
    applicable_markets:
      - "スタンダード"
      - "グロース"
      - "プライム"
    notes: "第6回勉強会（テーマ：中堅中小上場企業の開示例）の議論を踏まえて作成。売上高300億円以下が一般的な対象目安"

  - id: "bp-2024-005"
    category: "好事例"
    change_type: "修正推奨"
    effective_from: "2025-02-03"
    title: "金融庁好事例集2024 — コーポレートガバナンスの開示ポイント"
    source: "https://www.fsa.go.jp/news/r6/singi/20250203.html"
    source_confirmed: true
    summary: >
      金融庁「記述情報の開示の好事例集2024」第4弾（2025年2月3日公表）で示された
      コーポレートガバナンスに関する好事例ポイント。
      取締役会の実効性評価・役員報酬（業績連動KPI）・政策保有株式の縮減方針など、
      形式的記載にとどまらず実態に基づいた具体的な開示が評価された。
    target_sections:
      - "コーポレート・ガバナンスの概要"
      - "役員の状況"
      - "経営方針、経営環境及び対処すべき課題等"
    disclosure_items:
      - "取締役会の実効性評価について、評価プロセス・結果の概要・課題と対応策を具体的に記載する"
      - "社外取締役の選任理由を、独立性要件の充足だけでなく、スキルセット・経験と自社課題との適合を具体的に示す"
      - "業績連動型報酬のKPI（指標・ウエイト・達成判定方法）を開示し、経営戦略との連動を説明する"
      - "政策保有株式について、保有目的・保有継続の合理性・縮減方針（目標・スケジュール）を示す"
      - "指名・報酬委員会の審議プロセス・委員構成・独立性の担保状況を記載する"
      - "コンプライアンス・リスク管理委員会等の体制と取締役会への報告頻度・内容を具体的に示す"
    applicable_markets:
      - "プライム"
      - "スタンダード"
      - "グロース"
    notes: "第4弾はコーポレートガバナンス特化。CGコード対応の開示と有報記載の一体的充実が主なテーマ"
