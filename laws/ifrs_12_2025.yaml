# disclosure-multiagent — 法令・ガイダンス情報 YAML
# カテゴリ: IFRS 12（他企業への関与の開示）
# 対象期間: 2025年度（2025-04-01〜2026-03-31）
# スキーマ定義: docs/law_yaml_schema.md
# 作成者: Majiro-ns
#
# 根拠法令・基準:
#   IFRS 12 Disclosure of Interests in Other Entities（IASB, 2011年公表 / 2013年1月1日以降適用）
#   IFRS 10 Consolidated Financial Statements（支配の定義・連結範囲）
#   IFRS 11 Joint Arrangements（共同支配の分類）
#   IAS 28 Investments in Associates and Joint Ventures（持分法適用）
#   IFRS 12 改訂: 2014年（投資企業の免除）/ 2017年（IFRS 9との整合）
#
# 主要ポイント（IFRS 12の骨子）:
#   (1) 対象範囲 — 子会社・共同支配企業・関連会社・連結外組成された企業（SE）
#   (2) 重要な判断・仮定の開示 — 支配・重要な影響力・共同支配の判断根拠
#   (3) 非連結組成企業（unconsolidated SE）— 最大損失エクスポージャーの開示
#   (4) NCI（非支配持分）— 重要なNCIを有する子会社の要約財務情報
#   (5) 資産・利益へのアクセス制限 — 規制・契約・少数株主保護等による制約
#   (6) 投資企業の免除 — 子会社を公正価値測定する投資企業の特別開示
#
# 松竹梅の基準:
#   梅 = 連結範囲の概要 + 重要な子会社一覧 + 関連会社・JVの持分法損益
#   竹 = NCI要約財務情報 + 非連結SEエクスポージャー + 重要な判断・仮定の根拠
#   松 = 支援義務の定量化 + アクセス制限の数値影響 + SE別最大損失の感応度

version: "1.0"
effective_period:
  from: "2025-04-01"
  to: "2026-03-31"

amendments:

  # ──────────────────────────────────────────
  # 【第1群】支配・連結範囲に関する判断と仮定
  # ──────────────────────────────────────────

  - id: "ifrs12-2025-001"
    category: "IFRS（他企業関与）"
    change_type: "継続必須"
    effective_from: "2025-04-01"
    title: "IFRS 12 — 子会社への関与に関する重要な判断と仮定"
    source: "https://www.ifrs.org/issued-standards/list-of-standards/ifrs-12-disclosure-of-interests-in-other-entities/"
    source_confirmed: false
    summary: >
      IFRS 12 第7〜9項が求める、子会社・共同支配企業・関連会社・組成された企業への
      関与の性質を判断するうえで行った重要な判断・仮定の開示。
      IFRS 10の支配の定義（パワー・変動リターン・パワーとリターンの連動）に基づき、
      議決権が過半数未満でも支配が存在すると判断した場合、または過半数以上でも
      支配が存在しないと判断した場合はその根拠を開示する。
      実質的権利（substantive rights）と形式的権利（protective rights）の区別、
      代理人（agent）と主体（principal）の判断も重要な判断事項に含まれる。
      ストラクチャードファイナンス・SPV・投資ファンド等において支配の有無の判断が
      困難な場合、どの要素をどのように評価したかの説明が求められる。
    target_sections:
      - "連結の範囲に関する注記"
      - "重要な会計上の判断・見積り"
    required_items:
      - "議決権割合が50%未満で支配ありと判断した場合の根拠（契約上の権利・事実上の支配等）"
      - "議決権割合が50%超で支配なしと判断した場合の根拠"
      - "共同支配企業・関連会社の分類において重要な判断が伴った場合の根拠"
      - "代理人・主体の判断が関与した場合の評価プロセスの概要"
    applicable_markets:
      - "プライム"
      - "スタンダード"
    notes: "IFRS 10との相互参照必須。投資ファンドをSPV経由で保有する場合は実質的支配の判断を詳述すること"
    tier_requirement:
      ume: "推奨"
      take: "必須"
      matsu: "必須"

  - id: "ifrs12-2025-002"
    category: "IFRS（他企業関与）"
    change_type: "継続必須"
    effective_from: "2025-04-01"
    title: "IFRS 12 — 連結対象外の組成された企業（structured entities）の性質と目的"
    source: "https://www.ifrs.org/issued-standards/list-of-standards/ifrs-12-disclosure-of-interests-in-other-entities/"
    source_confirmed: false
    summary: >
      連結の範囲に含まれない組成された企業（unconsolidated structured entities: SE）への
      関与の性質・目的・規模に関する開示（IFRS 12 第24〜31項）。
      組成された企業とは、企業の議決権が支配の判断において主要な要素とならないよう
      設計された企業（証券化SPV・資産担保CP発行体・投資ファンド・レポ取引相手等）。
      開示事項: 非連結SEの性質・目的・規模・活動、関与の形態（融資・流動性供与・
      保証・持分投資等）、関与から生じるリスクの性質、SEが発行した商品・サービスの内容。
      連結SEについては別途開示が不要だが、非連結SEへの関与は最大損失エクスポージャーと
      ともに開示する（ifrs12-2025-006参照）。
    target_sections:
      - "組成された企業への関与に関する注記"
      - "オフバランスエクスポージャーの開示"
    required_items:
      - "非連結組成企業の類型（証券化SPV・投資ファンド・レポ相手方等）と数量・規模"
      - "各類型の組成された企業の事業目的・活動の概要"
      - "関与の形態（資産保有・融資・保証・流動性枠・持分等）の説明"
      - "組成された企業から得る便益（手数料・利回り・キャピタルゲイン等）の概要"
    applicable_markets:
      - "プライム"
      - "スタンダード"
    notes: "金融機関・リース会社・不動産投資会社は非連結SEへの関与が多く、特に詳細な開示が求められる"
    tier_requirement:
      ume: "推奨"
      take: "必須"
      matsu: "必須"

  # ──────────────────────────────────────────
  # 【第2群】子会社・NCI・要約財務情報
  # ──────────────────────────────────────────

  - id: "ifrs12-2025-003"
    category: "IFRS（他企業関与）"
    change_type: "継続必須"
    effective_from: "2025-04-01"
    title: "IFRS 12 — 子会社のNCI情報（利益配分・累計NCI残高・配当制限）"
    source: "https://www.ifrs.org/issued-standards/list-of-standards/ifrs-12-disclosure-of-interests-in-other-entities/"
    source_confirmed: false
    summary: >
      重要な非支配持分（NCI）を有する子会社に係る開示（IFRS 12 第12〜19項）。
      「重要な」NCIの判断は定量的・定性的に評価し、重要な子会社ごとに個別開示する。
      開示事項: 子会社の名称・所在地・主要な事業活動、グループの持分比率・議決権比率、
      当期にNCIに帰属した損益（利益・損失の配分額）、期末時点のNCI累計残高、
      当期にNCIに支払われた配当金額。
      また、親会社が子会社の資産・利益へのアクセスに際して存在する制限（規制資本要件・
      外国為替規制・少数株主との合意・担保設定等）も開示する。
      配当支払制限（規制上の最低資本要件・融資契約上の財務制限条項等）は
      制限金額の定量的開示が求められる。
    target_sections:
      - "子会社のNCI注記"
      - "連結財務諸表の注記（資本の制限）"
    required_items:
      - "重要なNCIを持つ子会社の名称・所在地・持分比率・議決権比率"
      - "NCIに帰属した当期純損益（包括損益含む）"
      - "期末NCIの累計残高"
      - "当期にNCIへ支払った配当金額"
      - "配当支払制限の有無と制限金額（規制資本要件・財務制限条項等）"
    applicable_markets:
      - "プライム"
      - "スタンダード"
    notes: "議決権比率と持分比率が異なる場合（種類株式・潜在株式）は両方を開示。NCIが累積的優先配当権を持つ場合は配分方法を説明"
    tier_requirement:
      ume: "推奨"
      take: "必須"
      matsu: "必須"

  - id: "ifrs12-2025-004"
    category: "IFRS（他企業関与）"
    change_type: "継続必須"
    effective_from: "2025-04-01"
    title: "IFRS 12 — 重要な子会社の要約財務情報（NCI保有会社）"
    source: "https://www.ifrs.org/issued-standards/list-of-standards/ifrs-12-disclosure-of-interests-in-other-entities/"
    source_confirmed: false
    summary: >
      重要なNCIを有する子会社について、連結前の要約財務情報（IFRS 12 第B10〜B16項）の開示。
      開示する要約財務情報は連結調整前（子会社単体ベース）の数値であり、
      グループ内の消去前の金額を記載する。
      開示項目: 流動資産・非流動資産・流動負債・非流動負債（各合計または主要項目）、
      収益・損益・包括損益（当期純損益・その他包括損益・合計包括損益）、
      営業・投資・財務活動によるキャッシュフロー。
      グループ内取引・残高は連結消去前の金額のため、連結財務諸表数値と
      調整が必要な場合はその対応を示す。
      重要性のない複数子会社を集約して開示することも認められるが、
      集約した場合はその旨と集約の基準を開示する。
    target_sections:
      - "子会社の要約財務情報注記"
      - "セグメント情報との連携"
    required_items:
      - "流動資産・非流動資産・流動負債・非流動負債の各合計額"
      - "収益・当期純損益・その他包括損益・合計包括損益"
      - "営業活動・投資活動・財務活動によるキャッシュフロー"
      - "要約財務情報からNCI残高・当期帰属損益への調整表"
    applicable_markets:
      - "プライム"
      - "スタンダード"
    notes: "子会社の決算期がグループ決算期と異なる場合（3ヶ月以内）は決算日差異と調整内容を説明"
    tier_requirement:
      ume: "対象外"
      take: "推奨"
      matsu: "必須"

  - id: "ifrs12-2025-005"
    category: "IFRS（他企業関与）"
    change_type: "継続必須"
    effective_from: "2025-04-01"
    title: "IFRS 12 — 関連会社・共同支配企業の要約財務情報と持分法損益"
    source: "https://www.ifrs.org/issued-standards/list-of-standards/ifrs-12-disclosure-of-interests-in-other-entities/"
    source_confirmed: false
    summary: >
      持分法適用関連会社および共同支配企業（JV）に関する開示（IFRS 12 第20〜23項、B12〜B16項）。
      重要な関連会社・JVについては要約財務情報の個別開示、重要でないものは集約開示が認められる。
      要約財務情報の開示項目（関連会社・JV単体ベース）: 流動資産・非流動資産・流動負債・
      非流動負債・収益・継続事業損益・非継続事業損益・OCI・合計包括損益。
      連結財務諸表上の数値（帳簿価額）への調整: 純資産の持分法相当額 + 未実現損益消去 +
      のれん（関連会社のれん） = 持分法による投資の帳簿価額。
      重要な制限（関連会社からの配当受取制限・持分比率とは異なる利益分配等）も開示する。
      持分法適用中止の理由（損失超過・重要な影響力喪失等）も開示対象。
    target_sections:
      - "持分法適用投資の注記"
      - "関連会社・共同支配企業の要約財務情報"
    required_items:
      - "重要な関連会社・JVの名称・所在地・主要な事業内容・持分比率"
      - "要約財務情報（資産・負債・収益・当期純損益）"
      - "持分法による帳簿価額への調整表（純資産持分 + のれん ± 未実現損益消去）"
      - "当期の持分法による投資損益（利益・損失）"
      - "当期に受け取った配当金（関連会社・JVから）"
      - "持分法適用中止の場合: 中止理由と損失累計額"
    applicable_markets:
      - "プライム"
      - "スタンダード"
    notes: "関連会社のれんはIAS 28に基づき投資の帳簿価額に含め、独立した減損テストはIAS 36でなくIAS 28で実施"
    tier_requirement:
      ume: "必須"
      take: "必須"
      matsu: "必須"

  # ──────────────────────────────────────────
  # 【第3群】非連結組成企業・支援義務・制限
  # ──────────────────────────────────────────

  - id: "ifrs12-2025-006"
    category: "IFRS（他企業関与）"
    change_type: "継続必須"
    effective_from: "2025-04-01"
    title: "IFRS 12 — 非連結組成企業へのエクスポージャー（最大損失額）"
    source: "https://www.ifrs.org/issued-standards/list-of-standards/ifrs-12-disclosure-of-interests-in-other-entities/"
    source_confirmed: false
    summary: >
      連結対象外の組成された企業（非連結SE）へのエクスポージャーに係る定量的開示
      （IFRS 12 第29〜31項）。最大エクスポージャーの概念: 関与から生じうる最大損失額であり、
      保有資産の帳簿価額・付与した融資コミットメントの残枠・提供した保証の最大支払額・
      流動性枠の未使用コミットメント等を合算して算定する。
      開示項目: 非連結SEの資産総額（グループの関与に係る部分）、
      連結B/S上に計上している関与に係る資産・負債の帳簿価額（資産の種類別・負債の種類別）、
      最大エクスポージャー（損失額の上限）。
      SEの類型（証券化SPV・投資ファンド・レポ相手方・オフバランスビークル等）ごとに
      表形式で開示することが推奨される。
    target_sections:
      - "非連結組成企業へのエクスポージャー注記"
      - "オフバランスリスク・コミットメントの注記"
    required_items:
      - "非連結SEの種類別の資産総額（SEの規模感）"
      - "連結B/S上に計上した資産の帳簿価額（資産種類別）"
      - "連結B/S上に計上した負債の帳簿価額（負債種類別）"
      - "最大エクスポージャー（損失上限額）の総額および種類別内訳"
      - "最大エクスポージャーが帳簿価額と異なる場合の理由（コミットメント・保証等）"
    applicable_markets:
      - "プライム"
      - "スタンダード"
    notes: "金融機関の場合、バーゼルIII第3の柱（市場規律）との重複開示になりうるが、IFRS 12独自の開示要件（最大損失額）は別途開示が必要"
    tier_requirement:
      ume: "推奨"
      take: "必須"
      matsu: "必須"

  - id: "ifrs12-2025-007"
    category: "IFRS（他企業関与）"
    change_type: "継続必須"
    effective_from: "2025-04-01"
    title: "IFRS 12 — 子会社・非連結SEへの支援義務（契約上・暗黙の支援）"
    source: "https://www.ifrs.org/issued-standards/list-of-standards/ifrs-12-disclosure-of-interests-in-other-entities/"
    source_confirmed: false
    summary: >
      グループが子会社または非連結組成された企業に対して負う支援義務に係る開示
      （IFRS 12 第16〜17項、第30項）。
      契約上の支援義務: 財務支援契約・流動性供与ライン・キャピタルサポート合意・
      最低純資産維持条項・損失補償協定等。開示では義務の性質・金額・条件・期間を記載する。
      暗黙の支援（implicit support）: 法的義務はないが、企業の評判・ビジネス関係の維持・
      市場の期待等から事実上の支援が予想される場合。IFRS 12はグループが
      契約義務のない支援を提供した実績・または将来提供する意図がある場合の開示を求める。
      また、財務的困難に陥った非連結SEへ支援を提供した当期実績（金額・形態）も開示対象。
    target_sections:
      - "コミットメント・偶発債務の注記"
      - "非連結SEへの関与注記（支援義務）"
    required_items:
      - "契約上の支援義務の性質・金額・主要条件（財務支援契約・保証等）"
      - "暗黙の支援が存在すると判断した根拠および見積り支援規模"
      - "当期に契約義務のない支援を提供した事実と金額"
      - "支援提供によりグループが認識した損失・費用の金額"
    applicable_markets:
      - "プライム"
      - "スタンダード"
    notes: "暗黙の支援は定量化が困難な場合、定性的説明で代替可だが支援の性質と判断根拠は必須。評判リスクによる暗黙支援はIAS 37の偶発負債との整理も必要"
    tier_requirement:
      ume: "推奨"
      take: "必須"
      matsu: "必須"

  - id: "ifrs12-2025-008"
    category: "IFRS（他企業関与）"
    change_type: "継続必須"
    effective_from: "2025-04-01"
    title: "IFRS 12 — 連結範囲の変更（支配獲得・喪失）の影響開示"
    source: "https://www.ifrs.org/issued-standards/list-of-standards/ifrs-12-disclosure-of-interests-in-other-entities/"
    source_confirmed: false
    summary: >
      当期中に連結範囲が変更（支配獲得・喪失・追加取得・一部売却）した場合の
      財務的影響の開示（IFRS 12 第B12〜B13項、IFRS 3との連携）。
      支配獲得の場合（企業結合）: IFRS 3の企業結合開示（取得日・対価・識別可能資産等）
      と整合させつつ、連結範囲への追加による財務諸表への影響を示す。
      支配喪失の場合: 売却収入・残存持分の公正価値・売却損益の各金額、
      売却により除外されたグループ資産・負債の帳簿価額、売却後の残存関与
      （関連会社・単純投資等）の性質と金額。
      追加取得（支配維持）と一部売却（支配維持）は資本取引として処理し、
      損益は認識しない（資本内の持分変動として処理）。
    target_sections:
      - "連結範囲の変更注記"
      - "企業結合・事業譲渡の注記"
    required_items:
      - "支配獲得の場合: 取得日・被取得企業名・取得対価・のれん（IFRS 3との連携）"
      - "支配喪失の場合: 売却収入・残存持分公正価値・認識した売却損益"
      - "連結除外時に除外した資産・負債の主要項目と帳簿価額"
      - "持分変動（追加取得・一部売却で支配維持）: 対価と資本への影響額"
    applicable_markets:
      - "プライム"
      - "スタンダード"
    notes: "子会社株式売却で支配喪失し関連会社化した場合、残存持分を公正価値再測定して生じる評価益・損をP/Lに認識（IFRS 10との整合）"
    tier_requirement:
      ume: "必須"
      take: "必須"
      matsu: "必須"

  - id: "ifrs12-2025-009"
    category: "IFRS（他企業関与）"
    change_type: "継続必須"
    effective_from: "2025-04-01"
    title: "IFRS 12 — 投資企業の免除適用と関連する開示要件"
    source: "https://www.ifrs.org/issued-standards/list-of-standards/ifrs-12-disclosure-of-interests-in-other-entities/"
    source_confirmed: false
    summary: >
      投資企業（investment entity）が子会社をIFRS 9に基づく公正価値測定で処理する
      免除適用に関する開示（IFRS 10 第27〜33項、IFRS 12 第9A〜9B項）。
      投資企業の定義: (1)複数の投資家から資金調達、(2)キャピタルゲインまたは
      投資収益のためのみに投資する事業目的、(3)投資先のパフォーマンスを
      公正価値ベースで測定・評価する。3条件すべてを満たす企業のみ免除適用可。
      免除を適用した場合の開示: 投資企業に該当すると判断した根拠、
      公正価値で測定した子会社の名称・所在地・持分比率・公正価値、
      子会社を連結した場合の財務諸表への影響（感応度として有用）、
      投資企業に提供したサービスの内容（運用管理会社等）。
    target_sections:
      - "投資企業の開示注記"
      - "重要な会計上の判断（投資企業該当性）"
    required_items:
      - "投資企業該当性の判断根拠（3条件の充足説明）"
      - "公正価値測定した子会社の名称・所在地・持分比率"
      - "各子会社の公正価値（期首・期末）と当期変動"
      - "子会社に対する制限（資産移転制限・流動性制約等）"
    applicable_markets:
      - "プライム"
      - "スタンダード"
    notes: "投資企業の親会社が非投資企業の場合、親会社は子会社を含む全ての企業を連結する（免除の連鎖不可）"
    tier_requirement:
      ume: "対象外"
      take: "推奨"
      matsu: "必須"

  - id: "ifrs12-2025-010"
    category: "IFRS（他企業関与）"
    change_type: "継続必須"
    effective_from: "2025-04-01"
    title: "IFRS 12 — 子会社の資産・利益へのアクセス制限（規制・契約・少数株主保護）"
    source: "https://www.ifrs.org/issued-standards/list-of-standards/ifrs-12-disclosure-of-interests-in-other-entities/"
    source_confirmed: false
    summary: >
      子会社の資産や利益への親会社・グループのアクセスを制限する要因に係る開示
      （IFRS 12 第13項）。制限の類型: (1) 規制上の制限 — 金融業の自己資本規制・
      保険業のソルベンシー規制・海外子会社の為替管理規制・中央銀行の配当制限。
      (2) 契約上の制限 — 融資契約の財務制限条項（コベナンツ）による配当制限・
      担保設定による資産処分制限・リース契約の担保資産・劣後ローンの優先弁済条件。
      (3) 少数株主保護 — 合弁契約・株主間協定による配当決議要件・一定割合のNCI同意要件。
      開示は制限の性質・制限対象の資産・負債の帳簿価額・
      制限により親会社に移転できない金額の定量的開示（可能な範囲）が求められる。
    target_sections:
      - "資産へのアクセス制限注記"
      - "連結財務諸表の注記（子会社・関連会社との取引）"
    required_items:
      - "重要な制限の性質・発生源（規制 / 契約 / 少数株主保護）"
      - "制限の対象となる資産・負債の帳簿価額（制限ごと）"
      - "制限により親会社に移転不可能な利益・配当の見積額（可能な範囲）"
      - "制限の解除条件・期限（あれば）"
    applicable_markets:
      - "プライム"
      - "スタンダード"
    notes: "外国子会社の為替管理制限は各国ごとに状況が異なる。定量化が困難な場合は定性的説明と制限対象の子会社名・持分比率を開示"
    tier_requirement:
      ume: "推奨"
      take: "必須"
      matsu: "必須"
