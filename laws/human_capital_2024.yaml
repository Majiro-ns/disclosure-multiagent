# disclosure-multiagent — 法令・ガイダンス情報 YAML
# カテゴリ: 人的資本・多様性
# 対象期間: 2024年度（2024-04-01〜2025-03-31）
# スキーマ定義: docs/law_yaml_schema.md
#
# CHECK-7b 手確認メモ:
#   開示府令改正: 2022年11月15日改正・2023年1月31日施行・2024年3月期（2024-04-01以降開始）から適用
#   人的資本可視化指針: 内閣官房 非財務情報可視化研究会 2022年8月30日公表
#   SSBJ公開草案: 2024年3月29日公表
#   SSBJの確定基準: 2025年3月予定（大規模企業の強制適用は2027年3月期から）

version: "1.0"
effective_period:
  from: "2024-04-01"
  to: "2025-03-31"

amendments:

  # ──────────────────────────────────────────
  # 人的資本カテゴリ（4件）
  # ──────────────────────────────────────────

  - id: "hc-2024-001"
    category: "人的資本"
    change_type: "追加必須"
    effective_from: "2024-04-01"
    title: "開示府令改正 — 人的資本・多様性の記載義務化（2024年3月期以降）"
    source: "https://www.fsa.go.jp/news/r4/sonota/20230131/20230131.html"
    source_confirmed: true
    summary: >
      2022年11月改正（2023年1月施行）の有報改革。有価証券報告書様式第二号に
      「人的資本」および「多様性」に関する記載欄が追加された。
      2024年3月期（2024年4月1日以降開始の事業年度）の有報から全上場企業に適用。
    target_sections:
      - "経営方針、経営環境及び対処すべき課題等"
      - "人的資本"
      - "サステナビリティに関する考え方及び取組"
    required_items:
      - "人材の確保・育成・定着の方針"
      - "平均給与増減率（正規従業員）"
      - "女性管理職比率（連結）"
      - "男性育児休業取得率"
      - "育児休業取得率（女性）"
    applicable_markets:
      - "プライム"
      - "スタンダード"
      - "グロース"
    notes: "3月決算企業は2024年6月提出の有報から適用。12月決算等は対象年度の開始日に準ずる"

  - id: "hc-2024-002"
    category: "人的資本"
    change_type: "修正推奨"
    effective_from: "2022-08-30"
    title: "内閣官房「人的資本可視化指針」（2022年8月）"
    source: "https://www.cas.go.jp/jp/houdou/20220830jintekisihon.html"
    source_confirmed: true
    summary: >
      内閣官房 非財務情報可視化研究会が公表したガイドライン。
      人的資本に関する定量・定性的指標の開示方針を示す。法令ではないが
      金融庁・取引所のレビューで参照される実質的な基準。
      §3（戦略）・§4（指標と目標）の活用推奨。
    target_sections:
      - "人的資本"
      - "経営方針、経営環境及び対処すべき課題等"
    required_items:
      - "人材戦略（確保・育成・定着の方針）"
      - "平均給与増減率（算出方法含む）"
      - "従業員数・離職率（算出方法含む）"
    applicable_markets:
      - "プライム"
      - "スタンダード"
    notes: "法令ではないが有報・CGレポートでの参照が一般化している"

  - id: "hc-2024-003"
    category: "人的資本"
    change_type: "追加必須"
    effective_from: "2024-04-01"
    title: "開示府令改正 — 平均給与増減率の算出方法の明確化（様式第二号）"
    source: "https://www.fsa.go.jp/news/r4/sonota/20230131/20230131.html"
    source_confirmed: true
    summary: >
      様式第二号の記載要領において、平均給与増減率の算出方法が明確化された。
      正規従業員の年間総支給額（基本給・手当・賞与を含み退職金を除く）を
      期末在籍者数で除した値を用いることが例示されている。
      非正規従業員の取扱いも要注記。
    target_sections:
      - "人的資本"
    required_items:
      - "平均給与増減率の数値"
      - "算出方法の説明"
      - "非正規従業員の取扱いの注記"
    applicable_markets:
      - "プライム"
      - "スタンダード"
      - "グロース"

  - id: "hc-2024-004"
    category: "人的資本"
    change_type: "修正推奨"
    effective_from: "2024-04-01"
    title: "人材版伊藤レポート2.0（経済産業省、2022年5月）"
    source: "https://www.meti.go.jp/policy/economy/jinteki_shihon/pdf/report2.0.pdf"
    source_confirmed: false  # タイムアウト: PDF直接リンクのため現環境アクセス不可（URLは有効と推定）
    summary: >
      経済産業省が公表した人的資本経営の実践ガイド（法的拘束力なし）。
      「人的資本経営コンソーシアム」の開示例が参考になる。プライム大企業の
      有報でKPI設定・経営戦略との紐づけを記載する際に参照推奨。
    target_sections:
      - "人的資本"
      - "経営方針、経営環境及び対処すべき課題等"
    applicable_markets:
      - "プライム"
    notes: "任意開示。プライム大企業（松水準）の有報では参照事例が増加"

  # ──────────────────────────────────────────
  # SSBJカテゴリ（4件）
  # ──────────────────────────────────────────

  - id: "sb-2024-001"
    category: "SSBJ"
    change_type: "参考"
    effective_from: "2024-03-29"
    title: "SSBJ「サステナビリティ開示基準（公開草案）」（2024年3月）"
    source: "https://www.fasf-j.jp/jp/domestic_standards/exposure_draft/y2024/2024-0329.html"
    source_confirmed: false  # SSLError: ssb-j.jp 中間証明書欠落のためHTTPS検証不可。verify=Falseで HTTP 200 確認済み・コンテンツ存在。
    summary: >
      サステナビリティ基準委員会（SSBJ）が2024年3月29日に公表した公開草案。
      IFRS S1（全般的要求事項）・S2（気候関連開示）に準拠した日本版基準。
      大規模上場企業（プライム）は2027年3月期（2028年6月提出）から強制適用予定。
      2024年3月期時点では任意適用・準備段階。
    target_sections:
      - "サステナビリティに関する考え方及び取組"
    required_items:
      - "適用時期の確認（将来対象の場合）"
      - "体制・データ収集の準備状況"
    applicable_markets:
      - "プライム"
      - "スタンダード"
    notes: "確定基準は2025年3月予定。2024年度の有報では「準備中」等の記載が多い"

  - id: "sb-2024-002"
    category: "SSBJ"
    change_type: "参考"
    effective_from: "2024-03-29"
    title: "SSBJ基準 — ガバナンス・指標と目標（4柱）の開示要件"
    source: "https://www.fasf-j.jp/jp/domestic_standards/exposure_draft/y2024/2024-0329.html"
    source_confirmed: false  # SSLError: ssb-j.jp 中間証明書欠落のためHTTPS検証不可。verify=Falseで HTTP 200 確認済み・コンテンツ存在。
    summary: >
      SSBJ公開草案における4柱（ガバナンス・戦略・リスク管理・指標と目標）の
      開示要件。特にガバナンス（取締役会の監督体制）と指標（Scope1/2/3排出量、
      気候関連KPI）の開示が求められる。大規模企業では段階的な準備が推奨。
    target_sections:
      - "サステナビリティに関する考え方及び取組"
      - "ガバナンス"
    required_items:
      - "ガバナンス体制（取締役会の監督・経営陣の役割）"
      - "気候関連リスク・機会の特定プロセス"
      - "Scope1・2排出量（可能な場合はScope3）"
    applicable_markets:
      - "プライム"
    notes: "2024年度は準備段階。対象企業・非対象企業ともに体制整備状況の開示が推奨"

  - id: "sb-2024-003"
    category: "SSBJ"
    change_type: "修正推奨"
    effective_from: "2023-04-01"
    title: "TCFD提言準拠開示（気候関連財務情報）の有報への記載推奨"
    source: "https://www.fsa.go.jp/singi/singi_kinyu/tosin/20221227.html"
    source_confirmed: true
    summary: >
      金融審議会の方針に基づき、プライム上場企業を中心にTCFD提言（または同等の
      国際フレームワーク）に準拠した気候関連情報の有報記載が推奨されている。
      シナリオ分析（1.5℃・4℃等）・移行リスク・物理リスクの記載が増加。
    target_sections:
      - "サステナビリティに関する考え方及び取組"
      - "リスク"
    applicable_markets:
      - "プライム"
    notes: "任意だが、プライム大企業では実質的に標準化しつつある"

  - id: "sb-2024-004"
    category: "SSBJ"
    change_type: "参考"
    effective_from: "2024-03-29"
    title: "SSBJ基準 適用スケジュール（大規模企業 2027年3月期から強制）"
    source: "https://www.fasf-j.jp/jp/domestic_standards/exposure_draft/y2024/2024-0329.html"
    source_confirmed: false  # SSLError: ssb-j.jp 中間証明書欠落のためHTTPS検証不可。verify=Falseで HTTP 200 確認済み・コンテンツ存在。
    summary: >
      SSBJ公開草案（2024年3月）に基づく適用スケジュール案。
      大規模上場企業（主にプライム・資産2兆円超等）は2027年3月期（2028年6月提出）
      から強制適用。スタンダード・グロースは別途検討中。確定基準は2025年3月予定。
    target_sections:
      - "サステナビリティに関する考え方及び取組"
    required_items:
      - "適用時期の確認（自社が対象か否か）"
      - "適用に向けた準備状況"
    applicable_markets:
      - "プライム"
      - "スタンダード"
    notes: "スケジュールは審議中のため変動あり。確定次第このエントリを更新すること"

  # ──────────────────────────────────────────
  # 人的資本ガイダンスカテゴリ（4件）
  # cmd_360k_a2c 追加: CRITICAL_CATEGORIES「人的資本ガイダンス」の解消
  # ──────────────────────────────────────────

  - id: "hcg-2024-001"
    category: "人的資本ガイダンス"
    change_type: "修正推奨"
    effective_from: "2022-08-30"
    title: "内閣官房「人的資本可視化指針」（2022年8月30日）"
    source: "https://www.cas.go.jp/jp/houdou/20220830jintekisihon.html"
    source_confirmed: true
    summary: >
      内閣官房 非財務情報可視化研究会が公表した人的資本開示の実践ガイドライン。
      19項目・7分野（健康・安全、エンゲージメント、流動性、多様性、
      スキル、コンプライアンス、労働慣行）の開示指標を提示。
      法的拘束力はないが、金融庁・東証の実質的参照基準として機能しており、
      プライム・スタンダード上場企業の有報で広く参照されている。
    target_sections:
      - "人的資本"
      - "サステナビリティに関する考え方及び取組"
      - "経営方針、経営環境及び対処すべき課題等"
    required_items:
      - "人材戦略の方針（確保・育成・定着）"
      - "KPI設定の根拠（19項目からの選択・自社独自指標）"
      - "経営戦略との紐づけ（How→What→KPI の論理構成）"
    applicable_markets:
      - "プライム"
      - "スタンダード"
    notes: "法令ではないが有報・統合報告書・CGレポートでの参照が一般化。金融庁審査でも参照される"

  - id: "hcg-2024-002"
    category: "人的資本ガイダンス"
    change_type: "修正推奨"
    effective_from: "2022-05-13"
    title: "経済産業省「人材版伊藤レポート2.0」（2022年5月）"
    source: "https://www.meti.go.jp/policy/economy/jinteki_shihon/pdf/report2.0.pdf"
    source_confirmed: false  # タイムアウト: PDF直接リンクのため現環境アクセス不可（URLは有効と推定）
    summary: >
      経済産業省「人的資本経営の実現に向けた検討会」が公表した実践ガイド。
      企業が「人的資本経営」を実践するための3つの視点（変革・協創・プロセス）と
      5つの共通要素（動的人材ポートフォリオ、知・経験のダイバーシティ&インクルージョン、
      リスキル・学び直し、従業員エンゲージメント、時間や場所にとらわれない働き方）を提示。
      プライム大企業の有報においてKPI設定・経営戦略との紐づけの参考資料として推奨。
    target_sections:
      - "人的資本"
      - "経営方針、経営環境及び対処すべき課題等"
    required_items:
      - "人的資本経営の3視点（変革・協創・プロセス）の開示方針"
      - "KPI選定の根拠（伊藤レポート2.0の5共通要素との対応）"
    applicable_markets:
      - "プライム"
    notes: "任意開示。人的資本経営コンソーシアムの開示事例集も参照推奨"

  - id: "hcg-2024-003"
    category: "人的資本ガイダンス"
    change_type: "参考"
    effective_from: "2018-12-01"
    title: "ISO 30414（人的資本報告のガイドライン）"
    source: "https://www.iso.org/standard/69338.html"
    source_confirmed: true
    summary: >
      国際標準化機構（ISO）が2018年12月に策定した人的資本報告の国際ガイドライン。
      11分野・58指標（コンプライアンス・倫理、多様性、リーダーシップ、
      生産性、採用・異動・退職、安全衛生、スキル・能力、後継者育成、
      従業員エンゲージメント、技術・革新、労働力コスト）を定義。
      日本国内での法的拘束力はないが、外資系企業や国際投資家向け開示の
      参考フレームワークとして活用されている。
    target_sections:
      - "人的資本"
      - "サステナビリティに関する考え方及び取組"
    required_items:
      - "ISO 30414準拠指標の選択と開示根拠"
      - "主要11分野のうち適用分野の説明"
    applicable_markets:
      - "プライム"
    notes: "外資系企業・グローバル投資家向け有報では参照事例が増加。JIS化検討中"

  - id: "hcg-2024-004"
    category: "人的資本ガイダンス"
    change_type: "参考"
    effective_from: "2016-10-19"
    title: "GRIスタンダード（GRI 400シリーズ: 社会分野 — 人的資本関連）"
    source: "https://www.globalreporting.org/standards/standards-development/universal-standards/"
    source_confirmed: true
    summary: >
      Global Reporting Initiative（GRI）が策定した持続可能性報告の国際スタンダード。
      GRI 400シリーズ（社会分野）に人的資本関連の指標が含まれる:
      GRI 401（雇用）、GRI 402（労使関係）、GRI 403（安全衛生）、
      GRI 404（研修・教育）、GRI 405（多様性と機会均等）、GRI 406（非差別）、
      GRI 407（結社の自由・団体交渉）。
      有価証券報告書のサステナビリティ欄でGRIとの対照表を掲載する企業が増加。
    target_sections:
      - "サステナビリティに関する考え方及び取組"
      - "人的資本"
    required_items:
      - "GRI対照表（GRI Content Index）の掲載または参照リンク"
      - "GRI 401〜407の適用状況"
    applicable_markets:
      - "プライム"
    notes: "2021年10月改訂版（GRI Universal Standards 2021）が現行。GRI 2: 一般開示に人材情報あり"
