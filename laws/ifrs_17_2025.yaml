version: "1.0"
effective_period:
  from: "2025-04-01"
  to: "2026-03-31"

amendments:

  # ──────────────────────────────────────────
  # 【第1群】測定モデルの識別と適用
  # ──────────────────────────────────────────

  - id: "ifrs17-2025-001"
    category: "IFRS（保険契約）"
    change_type: "継続必須"
    effective_from: "2025-04-01"
    title: "保険契約の識別と範囲（保険リスクの移転・投資要素の分離）"
    source: "IFRS 17.2-8, IFRS 17.B2-B30"
    source_confirmed: true
    summary: >
      IFRS 17は保険契約を「重大な保険リスクを引き受けることにより、
      契約者を不確実な将来事象から保護することを約束する契約」と定義する。
      適用範囲の判定では、保険リスクの「重大性」（重大な追加給付が発生する
      シナリオが存在するか）を評価する。投資要素（保険事故発生の有無にかかわらず
      必ず返還される金額）が「区別可能」な場合は分離計上する。
      裁量参加特性（DPF）を持つ契約の処理方針、金融保証契約・ローン約定の
      IFRS 17 vs IFRS 9の選択適用方針も開示する。
    target_sections:
      - "重要な会計方針"
      - "保険契約の注記"
    required_items:
      - "保険契約の識別基準と保険リスクの重大性判定方針"
      - "投資要素の分離基準と分離した投資要素の測定方針"
      - "IFRS 17適用対象と除外対象の区分（金融保証・DPF等）"
      - "裁量参加特性（DPF）を持つ契約の会計処理方針"
    applicable_markets:
      - "プライム"
      - "スタンダード"
    notes: >
      日本の生命保険・損害保険会社はIFRS 17の強制適用対象。
      変額保険・外貨建保険の保険リスクと投資リスクの分離判定が実務上の主要論点となる
    tier_requirement:
      ume: "保険契約の定義と適用範囲の概括的説明"
      take: "投資要素の分離方針＋DPF契約の処理方針＋IFRS 9との選択適用の根拠"
      matsu: "契約種類別の識別フロー説明＋境界線事例（保険 vs 投資）の詳細開示"

  - id: "ifrs17-2025-002"
    category: "IFRS（保険契約）"
    change_type: "継続必須"
    effective_from: "2025-04-01"
    title: "一般測定モデル（GMM/BBA）の概要と主要仮定"
    source: "IFRS 17.32-52, IFRS 17.B36-B119"
    source_confirmed: true
    summary: >
      一般測定モデル（GMM: General Measurement Model、またはBBA: Building Block Approach）は
      IFRS 17の基本測定モデルだ。保険契約負債は四つの構成要素で測定される。
      第一に将来キャッシュ・フローの現在価値（確率加重した見積りキャッシュ・フロー）、
      第二に貨幣の時間価値（割引）、第三にリスク調整（非金融リスクに関する不確実性）、
      第四に契約サービスマージン（CSM：将来の未稼得利益）。
      主要な仮定（解約率・死亡率・損害率・費用率・割引率）の設定根拠と
      感応度を開示することが求められる。
    target_sections:
      - "重要な会計方針"
      - "保険契約の注記"
      - "重要な会計上の見積りの仮定"
    required_items:
      - "GMMの四構成要素（FCF・割引・RA・CSM）の測定方針概要"
      - "将来キャッシュ・フロー見積りの主要仮定（解約率・死亡率・損害率等）"
      - "割引率の設定方法（ボトムアップ or トップダウン）"
      - "ロック・イン仮定とカレント仮定の区分（CSMの再測定対象）"
    applicable_markets:
      - "プライム"
      - "スタンダード"
    notes: >
      GMMはVFA（変動手数料アプローチ）またはPAA（保険料配分アプローチ）の
      要件を満たさない全ての保険契約に適用される。
      長期生命保険契約（終身保険・年金保険等）が主な適用対象となる
    tier_requirement:
      ume: "GMMの四構成要素の名称と概要説明"
      take: "主要仮定の設定方針＋割引率算定アプローチ（ボトムアップ/トップダウン）の説明"
      matsu: "主要仮定の定量的範囲（最小・最大・加重平均）＋仮定変更の財務影響分析"

  - id: "ifrs17-2025-003"
    category: "IFRS（保険契約）"
    change_type: "継続必須"
    effective_from: "2025-04-01"
    title: "変動手数料アプローチ（VFA）適用条件と開示"
    source: "IFRS 17.45-52, IFRS 17.B101-B118"
    source_confirmed: true
    summary: >
      変動手数料アプローチ（VFA）は、基礎となる項目のプールに参加する直接連動型の
      保険契約に適用する。VFA適用要件は三つだ。第一に、保険契約者が基礎となる項目の
      特定されたプールの持分を受け取る権利を持つこと。第二に、保険会社が
      基礎となる項目のリターンの実質的な割合を保険契約者に支払うことを期待すること
      （変動手数料）。第三に、保険会社が支払う金額が基礎となる項目の公正価値の
      変動に実質的に連動すること。VFA適用契約では、基礎となる項目の公正価値変動が
      CSMを通じて吸収され、損益の変動性が抑制される。
    target_sections:
      - "重要な会計方針"
      - "保険契約の注記"
    required_items:
      - "VFA適用契約の種類と適用判定根拠"
      - "基礎となる項目（underlying items）の構成と測定方針"
      - "変動手数料の算定方法（固定手数料との区分）"
      - "VFA適用契約に係るCSMの増減要因（基礎項目公正価値変動の吸収額を含む）"
    applicable_markets:
      - "プライム"
      - "スタンダード"
    notes: >
      日本の変額保険・変額年金保険はVFA適用の主要候補。
      VFAではCSMが基礎項目の公正価値変動を吸収するため、
      市場変動が損益に直接反映されない設計となる
    tier_requirement:
      ume: "VFA適用契約の有無と適用対象契約の概要"
      take: "VFA適用判定根拠の詳細＋基礎となる項目の構成説明＋CSMへの吸収額"
      matsu: "基礎項目別の公正価値変動とCSM吸収の関係テーブル＋VFA vs GMM適用効果の比較"

  - id: "ifrs17-2025-004"
    category: "IFRS（保険契約）"
    change_type: "継続必須"
    effective_from: "2025-04-01"
    title: "保険料配分アプローチ（PAA）適用条件と簡便法の開示"
    source: "IFRS 17.53-59, IFRS 17.B126"
    source_confirmed: true
    summary: >
      保険料配分アプローチ（PAA）はカバー期間が1年以内の保険契約、
      またはカバー期間が1年超であってもGMMとの差異が重要でない保険契約に
      適用できる簡便法だ。PAAでは残存カバーの負債を未経過保険料に基づいて
      測定し、CSMを明示的に認識しない。発生保険金の負債はGMMと同様に
      現在推計（PV FCF）で測定する。PAA適用の前提となる重要性の判断、
      適用した契約の種類・金額、GMMとの差異の評価結果を開示する。
    target_sections:
      - "重要な会計方針"
      - "保険契約の注記"
    required_items:
      - "PAA適用契約の種類と適用判定根拠（1年以内 or 重要性判断）"
      - "PAAにおける残存カバー負債の測定方法"
      - "発生保険金負債の測定方法（PAAでのGMM準拠適用）"
      - "損失要素の認識基準（残存カバーが損失契約となる場合）"
    applicable_markets:
      - "プライム"
      - "スタンダード"
    notes: >
      日本の損害保険会社の多くはPAA適用が見込まれる。
      自動車保険・火災保険・傷害保険等の短期契約がPAAの主な適用対象。
      自然災害リスクの高い契約では損失要素の認識判断が重要
    tier_requirement:
      ume: "PAA適用契約の種類と残存カバー負債の測定概要"
      take: "PAA適用の重要性判断プロセス＋損失契約の識別基準＋発生保険金負債の測定方針"
      matsu: "PAA vs GMM の測定差異の定量的評価＋損失要素の感応度分析"

  # ──────────────────────────────────────────
  # 【第2群】CSM・リスク調整・金融収益
  # ──────────────────────────────────────────

  - id: "ifrs17-2025-005"
    category: "IFRS（保険契約）"
    change_type: "継続必須"
    effective_from: "2025-04-01"
    title: "契約サービスマージン（CSM）の認識・増減・償却の開示"
    source: "IFRS 17.38-46, IFRS 17.B119-B125"
    source_confirmed: true
    summary: >
      CSMは当初認識時に損益を認識しないために計上される保険契約の未稼得利益だ。
      当初認識時のCSMは初期直接費用控除後の将来キャッシュ・フロー現在価値と
      リスク調整の合計がゼロになるよう設定される（利益契約の場合）。
      CSMは契約期間にわたりサービス提供パターンに応じて収益として認識される（償却）。
      CSMの増減要因として、新契約取得・金利変動の影響（GMM）・非金融仮定変更・
      経験差異（非金融）・振替（損失要素との相互振替）がある。
      CSMのポートフォリオ別・測定モデル別の増減調整表を開示する。
    target_sections:
      - "保険契約の注記"
      - "CSM増減調整表"
    required_items:
      - "CSMの期首・期末残高と増減調整表（ポートフォリオ別）"
      - "CSM償却の認識パターン（対応するサービス単位の定義）"
      - "非金融仮定変更・経験差異によるCSMの増減額"
      - "損失要素の逆転によるCSMへの振替額（該当する場合）"
      - "CSMの期末残高が将来の保険収益として認識される見込み期間"
    applicable_markets:
      - "プライム"
      - "スタンダード"
    notes: >
      CSMは投資家が将来の利益を評価するための重要な指標。
      CSMの増減構造を詳細に開示することが、IFRS 17導入後の財務諸表の
      有用性を大きく左右する
    tier_requirement:
      ume: "CSMの期首・期末残高と主要増減項目（新契約・償却・仮定変更）"
      take: "ポートフォリオ別CSM増減表＋償却パターンの説明＋将来収益化見込み期間"
      matsu: "測定モデル別（GMM/VFA）CSM増減の詳細＋CSM残高の割引前・割引後比較＋感応度分析"

  - id: "ifrs17-2025-006"
    category: "IFRS（保険契約）"
    change_type: "継続必須"
    effective_from: "2025-04-01"
    title: "リスク調整（RA）の測定方法・信頼度水準・増減の開示"
    source: "IFRS 17.37, IFRS 17.119, IFRS 17.B86-B92"
    source_confirmed: true
    summary: >
      リスク調整（RA: Risk Adjustment）は、非金融リスク（保険リスク・費用リスク等）から
      生じるキャッシュ・フローの不確実性に対して保険会社が要求する補償を測定したものだ。
      IFRSはRAの測定技法（信頼度水準アプローチ・コスト・オブ・キャピタルアプローチ・
      条件付き尾部期待値アプローチ等）を規定しないが、
      使用した技法と信頼度水準（またはそれ相当の水準）の開示を要求する。
      RAの増減は保険サービス費用（解放分）と保険金融収益費用（金利配分分）に区分される。
      信頼度水準の開示はRAの測定に関する比較可能性を確保するための重要な情報だ。
    target_sections:
      - "重要な会計方針"
      - "保険契約の注記"
    required_items:
      - "RA測定技法の名称と概要説明"
      - "信頼度水準（またはコスト・オブ・キャピタル率等の相当水準）"
      - "RAの期首・期末残高と増減内訳（保険サービス費用への解放額・金利配分額）"
      - "RA測定に使用した主要な仮定と感応度"
    applicable_markets:
      - "プライム"
      - "スタンダード"
    notes: >
      信頼度水準の開示は異なる保険会社間のRA水準比較を可能にする。
      コスト・オブ・キャピタルアプローチを使用する場合は使用資本コスト率（通常4〜6%）の開示が必要
    tier_requirement:
      ume: "RA測定技法の名称と信頼度水準（または相当水準）の開示"
      take: "RA増減調整表＋主要仮定の説明＋保険サービス費用・金融収益費用への区分"
      matsu: "保険リスク別RA内訳＋信頼度水準別RA試算（±5%の感応度）＋他社比較可能な水準説明"

  - id: "ifrs17-2025-007"
    category: "IFRS（保険契約）"
    change_type: "継続必須"
    effective_from: "2025-04-01"
    title: "保険金融収益費用のPL/OCI選択と利息配分方針の開示"
    source: "IFRS 17.87-92, IFRS 17.B130-B136"
    source_confirmed: true
    summary: >
      IFRS 17では保険金融収益費用（割引の巻き戻しと割引率変動の影響）について、
      全額を損益計算書（P&L）に認識するか、割引率変動効果を
      その他の包括利益（OCI）に認識するかを選択できる。
      OCI選択の場合、P&Lには当初認識時の割引率（ロック・イン金利）に基づく金融収益費用を計上し、
      割引率変動効果はOCIに計上する。この選択はポートフォリオ単位で一貫して適用し、
      IFRS 9の金融資産との会計ミスマッチ削減の観点から重要な設計選択となる。
    target_sections:
      - "重要な会計方針"
      - "保険契約の注記"
    required_items:
      - "保険金融収益費用のPL/OCI選択方針（ポートフォリオ別）"
      - "OCI選択の場合：ロック・イン金利の水準と割引率変動効果のOCI累積残高"
      - "IFRS 9金融資産との会計ミスマッチへの対応方針"
      - "保険金融収益費用の内訳（利息の巻き戻し・割引率変動・CSMへの利息配分）"
    applicable_markets:
      - "プライム"
      - "スタンダード"
    notes: >
      OCI選択は長期保険（生命保険）で広く採用される見込み。
      IFRS 9との整合性（IFRS 9でFVOCI選択の債券とのミスマッチ）を考慮した
      方針選択が財務諸表の比較可能性に重要な影響を与える
    tier_requirement:
      ume: "PL/OCI選択方針の明示（ポートフォリオ別）"
      take: "OCI累積残高の開示＋IFRS 9との整合性説明＋割引率変動のOCI影響額"
      matsu: "金利±1%変動によるP&L・OCI・純資産への影響シナリオ分析"

  # ──────────────────────────────────────────
  # 【第3群】損益表示・増減調整表・感応度
  # ──────────────────────────────────────────

  - id: "ifrs17-2025-008"
    category: "IFRS（保険契約）"
    change_type: "継続必須"
    effective_from: "2025-04-01"
    title: "保険収益の表示と分解（CSM償却・RA解放・損失要素除外等）"
    source: "IFRS 17.83-86, IFRS 17.B120-B127"
    source_confirmed: true
    summary: >
      IFRS 17における保険収益は従来の保険料収入とは大きく異なる概念だ。
      保険収益はカバー期間中に提供された保険サービスを反映し、
      CSMの償却額、RA解放額（非金融リスク）、保険取得キャッシュ・フローの
      回収分（対応する費用計上分）、および期待損害額（損失要素除外後）から構成される。
      受け取った保険料は収益として認識されず、保険契約負債の増減として処理される。
      保険収益の構成要素の内訳と保険料収入との調整表を開示することが
      財務諸表利用者の理解に不可欠だ。
    target_sections:
      - "保険収益の注記"
      - "損益計算書（保険サービス損益セクション）"
    required_items:
      - "保険収益の構成要素の内訳（CSM償却・RA解放・期待損害・取得費用回収等）"
      - "受取保険料から保険収益への調整表"
      - "損失要素を除外した場合の保険収益の算定根拠"
      - "PAA適用契約における保険収益の認識方法"
    applicable_markets:
      - "プライム"
      - "スタンダード"
    notes: >
      投資家にとって保険料収入と保険収益の概念の違いは最重要の理解事項。
      保険収益が保険料より少ない（または多い）理由の説明が財務諸表の有用性を左右する
    tier_requirement:
      ume: "保険収益の合計額と主要構成要素（CSM償却・RA解放）の開示"
      take: "保険収益の全構成要素の内訳＋受取保険料との調整表"
      matsu: "ポートフォリオ別・測定モデル別の保険収益分解＋前期比較・増減要因分析"

  - id: "ifrs17-2025-009"
    category: "IFRS（保険契約）"
    change_type: "継続必須"
    effective_from: "2025-04-01"
    title: "保険サービス費用の内訳（発生損害・損失要素・取得費用）"
    source: "IFRS 17.83-86, IFRS 17.103-105"
    source_confirmed: true
    summary: >
      保険サービス費用は損益計算書の保険サービス損益セクションに計上され、
      発生保険金・費用（RA変動を除く見積りキャッシュ・フロー実績）、
      残存カバーの損失要素の増減、保険取得キャッシュ・フローの償却（取得費用）、
      非金融リスクのRA変動（解放以外の変動）から構成される。
      損失要素は損失契約認識時にまず計上し、その後の有利な変動を逆転として
      保険収益へ振り替える。保険サービス費用の内訳とその変動要因を
      開示することが財務諸表利用者の損益理解に重要だ。
    target_sections:
      - "保険サービス費用の注記"
      - "損益計算書（保険サービス損益セクション）"
    required_items:
      - "保険サービス費用の構成要素の内訳（発生損害・取得費用・損失要素等）"
      - "損失要素の期首・期末残高と増減内訳"
      - "取得費用（保険取得キャッシュ・フロー）の償却方針と残高"
      - "保険サービス費用に含まれる経験差異の金額"
    applicable_markets:
      - "プライム"
      - "スタンダード"
    notes: >
      自然災害多発年は発生損害と損失要素の変動が大きくなる傾向。
      損害率（損害額/保険料）はIFRS 17では直接算出されないため、
      内部管理指標との橋渡し説明が必要となる場合がある
    tier_requirement:
      ume: "保険サービス費用の合計と主要構成要素（発生損害・取得費用）"
      take: "全構成要素の内訳＋損失要素の増減調整表＋経験差異の金額"
      matsu: "ポートフォリオ別・地域別の費用内訳＋損害率等の内部指標との調整表"

  - id: "ifrs17-2025-010"
    category: "IFRS（保険契約）"
    change_type: "継続必須"
    effective_from: "2025-04-01"
    title: "発生保険金負債と残存カバー負債の期末残高・開示"
    source: "IFRS 17.78-82, IFRS 17.100-109"
    source_confirmed: true
    summary: >
      IFRS 17では保険契約負債を「残存カバーの負債」と「発生保険金の負債」に区分して表示する。
      残存カバーの負債はCSM・RA・将来FCFの現在価値から構成される未経過保険リスク部分。
      発生保険金の負債は既に発生した保険事故に関する未払保険金・未決保険金の現在価値部分だ。
      各負債の期末残高、残存カバー期間、発生保険金の決済見込み時期の情報が
      財務諸表利用者の流動性リスク評価に不可欠だ。
    target_sections:
      - "保険契約の注記"
      - "貸借対照表（保険契約負債の区分表示）"
    required_items:
      - "残存カバー負債の期末残高（損失要素含む）の構成要素別開示"
      - "発生保険金負債の期末残高（RA・割引・未割引金額の区分）"
      - "残存カバー期間の分布（1年以内・1〜5年・5年超等）"
      - "発生保険金の決済見込み時期の分布（満期分析）"
    applicable_markets:
      - "プライム"
      - "スタンダード"
    notes: >
      発生保険金負債の満期分析は流動性リスク管理の観点から特に重要。
      長尾リスク（特に賠償責任保険・労災補償等）を抱える保険会社では
      5年超の部分の開示が投資家の重大関心事項となる
    tier_requirement:
      ume: "残存カバー負債・発生保険金負債の期末残高（区分表示）"
      take: "負債の構成要素別内訳＋残存カバー期間の分布＋発生保険金の満期分析"
      matsu: "ポートフォリオ別の負債構成＋割引効果の定量化＋長尾リスクの詳細分析"

  - id: "ifrs17-2025-011"
    category: "IFRS（保険契約）"
    change_type: "継続必須"
    effective_from: "2025-04-01"
    title: "感応度分析（保険リスク・金利リスク・為替リスク）"
    source: "IFRS 17.125-127, IFRS 7.40-42"
    source_confirmed: true
    summary: >
      保険リスクおよび金融リスクの変動が財務諸表に与える影響を定量的な
      感応度分析として開示する。保険リスク感応度では死亡率・罹患率・
      解約率・損害率の変動（例：±10%）が保険契約負債・純利益・純資産に
      与える影響を示す。金利リスク感応度では割引率の変動（例：±100bps）が
      CSM・残存カバー負債・発生保険金負債・P&L・OCIに与える影響を示す。
      為替リスクについては主要通貨別の保険契約負債残高と
      為替変動（例：±10%）の影響を開示する。
    target_sections:
      - "保険リスク管理の注記"
      - "感応度分析の注記"
    required_items:
      - "主要な保険リスク変数の感応度分析（死亡率・解約率・損害率等の±変動）"
      - "金利感応度（±100bps の保険契約負債・P&L・OCI への影響）"
      - "為替感応度（主要通貨別の保険契約負債と為替変動の影響）"
      - "感応度分析のパラメータ選択根拠と分析方法の説明"
    applicable_markets:
      - "プライム"
      - "スタンダード"
    notes: >
      IFRS 17とIFRS 9の統合的な感応度分析（保険負債と対応する資産の双方を含む）が
      投資家に最も有用な情報を提供する。資産負債総合管理（ALM）の観点からの開示が推奨される
    tier_requirement:
      ume: "主要リスク変数の感応度（金額表示）"
      take: "保険リスク・金利・為替の感応度テーブル＋分析方法の説明"
      matsu: "資産負債統合感応度（IFRS 9資産との相殺効果含む）＋ストレステスト結果＋複合シナリオ分析"

  - id: "ifrs17-2025-012"
    category: "IFRS（保険契約）"
    change_type: "継続必須"
    effective_from: "2025-04-01"
    title: "ポートフォリオ別の保険契約負債増減調整表"
    source: "IFRS 17.100-109, IFRS 17.127"
    source_confirmed: true
    summary: >
      保険契約負債（残存カバー負債・発生保険金負債）の期首から期末への
      増減調整表を開示する。調整表は保険サービス損益・保険金融収益費用・
      その他の包括利益の各区分に対応した要因別で作成する。
      主な調整項目は新契約取得・保険サービス費用（発生損害等）・保険収益・
      保険金融収益費用（P&L分・OCI分）・為替換算差額・その他だ。
      ポートフォリオ単位で開示することが原則だが、集約が許容される範囲での
      集計方針も開示する。
    target_sections:
      - "保険契約の注記"
      - "ポートフォリオ別増減調整表"
    required_items:
      - "保険契約負債の増減調整表（残存カバー・発生保険金の区分別）"
      - "保険サービス損益・金融収益費用・OCI への対応関係"
      - "新契約取得額・保険金等の支払額・為替換算差額"
      - "ポートフォリオ集計方針（どの単位で集計・開示するか）"
    applicable_markets:
      - "プライム"
      - "スタンダード"
    notes: >
      増減調整表は損益計算書・その他の包括利益計算書・貸借対照表の
      三表を統合的に理解するための最重要開示。
      IFRS 4との比較において最も大きく変化する開示項目の一つ
    tier_requirement:
      ume: "保険契約負債合計の増減調整表（主要項目）"
      take: "残存カバー・発生保険金の区分別調整表＋三表との対応関係の説明"
      matsu: "ポートフォリオ別（生命・損害・医療等）の詳細調整表＋測定モデル別の内訳"

  # ──────────────────────────────────────────
  # 【第4群】再保険・移行・リスク管理
  # ──────────────────────────────────────────

  - id: "ifrs17-2025-013"
    category: "IFRS（保険契約）"
    change_type: "継続必須"
    effective_from: "2025-04-01"
    title: "再保険契約の開示（出再・受再の測定と増減調整表）"
    source: "IFRS 17.60-70A, IFRS 17.78-82"
    source_confirmed: true
    summary: >
      IFRS 17は出再保険（ceded reinsurance）を再保険資産として別個に測定する。
      再保険資産はCSMを持ち、原保険契約のCSMとは独立して認識・償却される。
      再保険回収可能額の信用リスク調整も必要だ。
      2020年の改訂により、損失契約の原保険に対する再保険回収の処理が明確化され、
      損失契約認識時に再保険資産から損益を認識する特別規定が設けられた。
      再保険資産の期末残高・CSM・RA・増減調整表を原保険の対応する開示と
      対応させて開示する。
    target_sections:
      - "再保険契約の注記"
      - "保険契約の注記"
    required_items:
      - "再保険資産の期末残高（CSM・RA・FCF現在価値の区分）"
      - "再保険資産の信用リスク調整の方法と金額"
      - "再保険資産の増減調整表（原保険の調整表との対応関係）"
      - "損失契約の原保険に対する再保険回収の処理方針と金額"
    applicable_markets:
      - "プライム"
      - "スタンダード"
    notes: >
      再保険スキームの複雑性（比例再保険・超過損害再保険・キャプティブ等）が
      高い保険会社では、スキームの概要説明が投資家理解に不可欠
    tier_requirement:
      ume: "再保険資産の期末残高と主要な増減（回収額・CSM償却）"
      take: "信用リスク調整の方法と金額＋原保険との対応関係＋損失契約回収の処理"
      matsu: "再保険スキームの詳細説明＋スキーム別の再保険資産・負債の内訳＋集中リスクの軽減効果定量化"

  - id: "ifrs17-2025-014"
    category: "IFRS（保険契約）"
    change_type: "継続必須"
    effective_from: "2025-04-01"
    title: "移行アプローチの選択（完全遡及・修正遡及・公正価値）と影響開示"
    source: "IFRS 17.C1-C28, IFRS 17.C9-C19（修正遡及）, IFRS 17.C20-C24（公正価値）"
    source_confirmed: true
    summary: >
      IFRS 17の初回適用（多くの企業で2023年1月1日または4月1日）における
      移行アプローチの選択（完全遡及・修正遡及・公正価値）とその影響を開示する。
      完全遡及が実務的に不可能な場合、修正遡及アプローチ（過去データを最大限利用）
      または公正価値アプローチ（移行日の公正価値でCSMを設定）を使用できる。
      移行日における各アプローチの選択根拠、CSMへの影響額、
      IFRS 4からIFRS 17への移行調整額（純資産・OCI）を開示する。
    target_sections:
      - "重要な会計方針の変更（初回適用年度）"
      - "移行情報の注記"
    required_items:
      - "採用した移行アプローチの種類と選択根拠"
      - "ポートフォリオ別の移行アプローチの選択状況"
      - "移行日における調整額（IFRS 4残高からの純資産・OCI・CSMへの影響）"
      - "移行日のCSMの設定根拠（公正価値アプローチの場合は評価方法）"
      - "完全遡及が実務的に不可能と判断した根拠（修正遡及・公正価値選択の場合）"
    applicable_markets:
      - "プライム"
      - "スタンダード"
    notes: >
      2025年度は初回適用から3期目または2期目となる企業が多く、
      移行時の情報は比較情報として引き続き参照される。
      移行アプローチの相違が企業間比較の障害となる点を注記で明示することが望ましい
    tier_requirement:
      ume: "移行アプローチの選択（名称）と移行日のCSM設定額"
      take: "ポートフォリオ別の移行アプローチ選択状況＋移行調整額の構成要素"
      matsu: "完全遡及との差異分析（試算値）＋移行アプローチの選択が将来損益に与える影響の定量的説明"

  - id: "ifrs17-2025-015"
    category: "IFRS（保険契約）"
    change_type: "継続必須"
    effective_from: "2025-04-01"
    title: "保険リスク管理方針・集中リスク・最大エクスポージャーの開示"
    source: "IFRS 17.121-132"
    source_confirmed: true
    summary: >
      保険リスクの引受方針・管理方針・軽減策（再保険・デリバティブ）を開示する。
      死亡リスク・長生きリスク・疾病リスク・損害リスク・費用リスク等の
      保険リスクの種類別に、リスクの性質・量・管理方針を説明する。
      地域・業種・被保険者属性等による集中リスクを開示し、
      保険引受リスクのエクスポージャー（被保険金額・危険保険金額等）を定量的に示す。
      再保険による軽減効果（純額エクスポージャーと総額エクスポージャーの対比）も
      開示することが求められる。
    target_sections:
      - "リスク管理方針の注記"
      - "保険リスクの注記"
    required_items:
      - "主要な保険リスクの種類別管理方針説明"
      - "集中リスクの性質・量・管理方法（地域・業種・被保険者属性等）"
      - "保険引受リスクのエクスポージャー（危険保険金額等の定量的開示）"
      - "再保険による軽減効果（グロスとネットの対比）"
      - "過去の保険金発生実績と現在の見積りとの乖離（発生損害の過去比較表）"
    applicable_markets:
      - "プライム"
      - "スタンダード"
    notes: >
      自然災害集中リスク（地震・台風・洪水）については、PML（予想最大損失額）の開示が
      投資家から強く求められる。2025年度も気候変動に起因する保険リスクへの
      投資家の注目度が高い
    tier_requirement:
      ume: "主要保険リスクの種類と管理方針の概括的説明"
      take: "リスク別エクスポージャーの定量開示＋再保険軽減効果＋発生損害の過去比較表"
      matsu: "集中リスクの地域・業種別マップ＋PML試算＋気候変動シナリオ別保険リスク影響分析"
