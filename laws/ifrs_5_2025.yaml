# disclosure-multiagent — 法令・ガイダンス情報 YAML
# カテゴリ: IFRS（非継続事業）
# 対象期間: 2025年度（2025-04-01〜2026-03-31）
# スキーマ定義: docs/law_yaml_schema.md
# 作成者: Majiro-ns
#
# 根拠法令・基準:
#   IFRS 5 Non-current Assets Held for Sale and Discontinued Operations
#   IFRS 5 BC (Basis for Conclusions)
#   IAS 36 Impairment of Assets（減損テスト連携）
#   IFRS 13 Fair Value Measurement（公正価値測定連携）
#
# 松竹梅レベル定義:
#   梅（ume）: 非継続事業損益の一行表示 + 売却目的資産の残高のみ
#   竹（take）: 損益内訳注記 + CF区分開示 + 処分グループの資産・負債内訳
#   松（matsu）: 処分戦略の詳細説明 + OCI組替 + セグメント対応 + 処分後影響シナリオ

version: "1.0"
effective_period:
  from: "2025-04-01"
  to: "2026-03-31"

amendments:

  # ──────────────────────────────────────────
  # 【第1群】売却目的保有の分類・測定
  # ──────────────────────────────────────────

  - id: "ifrs5-2025-001"
    category: "IFRS（非継続事業）"
    change_type: "既存必須"
    effective_from: "2025-04-01"
    title: "売却目的保有に分類される非流動資産の要件"
    source: "IFRS 5.6-12"
    source_confirmed: true
    summary: >
      非流動資産（または処分グループ）を売却目的保有に分類するための要件
      （IFRS 5.7）：
      （1）資産が現在の状態で直ちに売却可能であること（usual and customary
      terms for sales of such assets）。
      （2）売却の完了が高度に蓋然的（highly probable）であること。
      高度に蓋然的の要件：経営者が売却計画を確約している、当該資産の売り手を
      積極的に探している、売却価格が現在の公正価値と比較して合理的である、
      1年以内に売却完了が見込まれる（例外あり）、かつ計画の大幅な変更・
      撤回の可能性が低い。
      1年超となる例外（IFRS 5.9）：企業の行為を超えた事象または状況により
      1年以内に売却が完了しない場合でも、企業が継続して売却計画にコミットして
      いれば売却目的保有の分類を維持できる。
    target_sections:
      - "会計方針（売却目的保有資産）"
      - "注記（売却目的保有の非流動資産）"
    required_items:
      - "売却目的保有に分類した非流動資産（または処分グループ）の説明"
      - "分類の根拠となる売却計画の概要"
      - "1年以内売却完了の見通しまたは例外事由の説明"
      - "売却計画の確約日と予定売却時期"
    applicable_markets:
      - "プライム"
      - "スタンダード"
      - "グロース"
    notes: >
      売却目的保有の分類は財務諸表日現在の状況に基づく。
      経営者の確約は取締役会決議等の客観的証拠が必要。
      分類後に要件を満たさなくなった場合は売却目的保有から除外し、
      IAS 16等の規定に従って再測定する
    tier_requirement:
      ume: "売却目的保有資産の帳簿残高と売却計画の定性説明のみ"
      take: "分類要件の充足状況説明 + 売却スケジュールの開示"
      matsu: "処分グループの詳細構成 + 売却プロセスの進捗 + 買い手との交渉状況の開示"

  - id: "ifrs5-2025-002"
    category: "IFRS（非継続事業）"
    change_type: "既存必須"
    effective_from: "2025-04-01"
    title: "売却目的保有資産の測定 — 帳簿価額と公正価値マイナス処分コストの低い方"
    source: "IFRS 5.15-18"
    source_confirmed: true
    summary: >
      売却目的保有に分類された非流動資産（または処分グループ）は、
      帳簿価額と処分コスト控除後の公正価値（FVLCTS: Fair Value Less Costs
      to Sell）のいずれか低い金額で測定する（IFRS 5.15）。
      処分コストには、売却に直接起因する増分コスト（仲介手数料・法務費用・
      登録費用等）を含み、金融費用および法人税費用は含まない。
      FVLCTS < 帳簿価額の場合、差額を減損損失として認識し損益に計上。
      当初分類時と各報告日に測定を行い、FVLCTS が上昇した場合は
      過去に認識した減損損失の範囲で戻入れを認識する（IFRS 5.21）。
      ただし戻入し得る損失は、売却目的保有に分類されていなかった場合の
      帳簿価額（減価償却後）を超えられない。
    target_sections:
      - "注記（売却目的保有の非流動資産）"
      - "注記（減損損失）"
    required_items:
      - "売却目的保有資産のFVLCTSの算定根拠（公正価値の算定手法）"
      - "処分コストの内容と見積額"
      - "当期認識した評価損（帳簿価額超過分）の金額と計上区分"
      - "FVLCTS上昇による戻入れがある場合の金額と根拠"
      - "公正価値のIFRS 13ヒエラルキーレベルの区分"
    applicable_markets:
      - "プライム"
      - "スタンダード"
      - "グロース"
    notes: >
      FVLCTSの測定はIFRS 13の定義に基づく公正価値から処分コストを控除。
      処分グループの場合はグループ全体のFVLCTSと各資産・負債の帳簿価額合計を比較。
      のれんが含まれる処分グループへの配分は特別な取扱いが必要
    tier_requirement:
      ume: "測定方法の方針説明 + 評価損の金額のみ"
      take: "FVLCTS算定手法（IFRS 13レベル）+ 処分コスト内訳"
      matsu: "複数シナリオ別FVLCTS感応度 + 独立評価人の活用状況"

  - id: "ifrs5-2025-003"
    category: "IFRS（非継続事業）"
    change_type: "既存必須"
    effective_from: "2025-04-01"
    title: "売却目的保有分類後の減価償却中止と減損テスト"
    source: "IFRS 5.25-26, IFRS 5.18-19"
    source_confirmed: true
    summary: >
      売却目的保有に分類された非流動資産（または処分グループ内の非流動資産）は、
      分類日以降、減価償却（または償却）を行わない（IFRS 5.25）。
      処分グループ内の負債についても同様に利息費用その他の費用は継続して認識する。
      減損テスト：分類時および各報告日においてFVLCTS vs 帳簿価額の比較による
      減損テストを実施（IFRS 5.15-18）。IAS 36の減損テスト手続きとは別に、
      IFRS 5固有の測定要件が適用されることに注意。
      売却目的保有から除外した場合（IFRS 5.26）：非流動資産は売却目的保有に
      分類されなかった場合の帳簿価額（減価償却累計後）で再測定し、
      その差額を損益に計上する。
    target_sections:
      - "会計方針（売却目的保有資産）"
      - "注記（売却目的保有の非流動資産）"
    required_items:
      - "分類日以降に減価償却を中止した資産クラスの説明"
      - "分類がなかった場合の仮定的減価償却費（重要な場合）"
      - "各報告日時点のFVLCTS再評価の実施状況"
      - "売却目的保有から除外した資産がある場合の再測定差額"
    applicable_markets:
      - "プライム"
      - "スタンダード"
      - "グロース"
    notes: >
      減価償却中止は分類日から適用されるため、売却目的保有への分類時期が
      損益に大きく影響する。四半期開示における分類タイミングの開示が重要。
      処分グループ内の流動資産（棚卸資産等）はIFRS 5の測定規定の対象外で
      各自の基準（IAS 2等）が引き続き適用される
    tier_requirement:
      ume: "減価償却中止の方針記述のみ"
      take: "中止した減価償却費の影響額 + 報告日時点の再評価の説明"
      matsu: "分類から売却完了までの期間別損益影響シミュレーション"

  # ──────────────────────────────────────────
  # 【第2群】非継続事業の定義・損益表示
  # ──────────────────────────────────────────

  - id: "ifrs5-2025-004"
    category: "IFRS（非継続事業）"
    change_type: "既存必須"
    effective_from: "2025-04-01"
    title: "非継続事業の定義と分類基準"
    source: "IFRS 5.32"
    source_confirmed: true
    summary: >
      非継続事業（discontinued operation）は以下のいずれかに該当するコンポーネント
      （IFRS 5.32）：
      （1）企業の主要な事業ラインまたは地理的事業地域を表すコンポーネントで、
      売却済みまたは売却目的保有に分類されているもの。
      （2）単独の協調計画において主要な事業ラインまたは地理的事業地域を
      売却する目的で取得した子会社。
      コンポーネントの定義：独立して識別可能なキャッシュフローを持ち、
      財務上・経営上の独立性が認められる事業の構成部分。
      主要な事業ラインまたは地理的地域：企業全体の事業規模・損益・資産に
      占める割合が重要なコンポーネント。
      非継続事業の分類基準は売却目的保有の分類（IFRS 5.6-12）より厳格であることに注意。
    target_sections:
      - "注記（非継続事業）"
      - "損益計算書（非継続事業損益）"
    required_items:
      - "非継続事業として分類したコンポーネントの説明"
      - "主要な事業ラインまたは地理的地域に該当する根拠"
      - "非継続事業の分類日と売却・廃止の予定・完了日"
      - "当該コンポーネントの事業内容および継続事業との関係"
    applicable_markets:
      - "プライム"
      - "スタンダード"
      - "グロース"
    notes: >
      非継続事業の分類は比較期間の損益計算書にも遡及的に組み替えが必要（IFRS 5.34）。
      売却目的保有（IFRS 5.6-12）と非継続事業（IFRS 5.32）は独立した概念であり、
      必ずしも同時に両方が適用されるわけではない。
      IFRS 8事業セグメントとコンポーネントの対応関係の説明も有用
    tier_requirement:
      ume: "非継続事業の名称・分類日・対象事業の概要のみ"
      take: "主要事業ライン該当の根拠 + セグメント対応関係 + 比較期間の組替説明"
      matsu: "コンポーネントの独立的CF構造の詳細 + 戦略的売却理由と企業価値への影響説明"

  - id: "ifrs5-2025-005"
    category: "IFRS（非継続事業）"
    change_type: "既存必須"
    effective_from: "2025-04-01"
    title: "非継続事業の損益のPL区分表示 — 税引後一行表示と注記内訳"
    source: "IFRS 5.33-36A"
    source_confirmed: true
    summary: >
      非継続事業に帰属する損益は、損益計算書において継続事業の損益とは
      別に単一の金額（税引後の合計一行）で表示する（IFRS 5.33(a)）。
      当該単一金額は以下の合計：
      （i）非継続事業の税引後損益。
      （ii）非継続事業を構成する資産または処分グループの公正価値マイナス
      処分コストによる測定または売却により認識した税引後利益または損失。
      注記または損益計算書の補足表示として、上記金額の内訳（収益・費用・
      税引前損益・法人税費用・税引後損益の区分）を開示する（IFRS 5.33(b)）。
      比較期間の損益計算書も非継続事業区分に組み替えて表示する（IFRS 5.34）。
    target_sections:
      - "損益計算書（非継続事業損益）"
      - "注記（非継続事業）"
    required_items:
      - "非継続事業の税引後損益（一行表示）の金額"
      - "内訳：非継続事業の営業損益（税引前）・法人税費用"
      - "内訳：売却・評価損益（税引前）・法人税費用"
      - "比較期間の組替後の非継続事業損益"
      - "一株当たり利益（EPS）への非継続事業の影響額"
    applicable_markets:
      - "プライム"
      - "スタンダード"
      - "グロース"
    notes: >
      IFRS 5.36Aにより、継続事業のEPS（基本・希薄化後）とは別に
      非継続事業のEPSを開示することも求められる。
      比較期間の組替は当初分類した期間に遡って行うため、過去のセグメント情報との
      整合性確認が実務上重要。セグメント報告（IFRS 8）との組替対応も必要
    tier_requirement:
      ume: "非継続事業損益の一行表示金額のみ（比較期間組替含む）"
      take: "損益内訳注記（営業・売却損益・税効果の区分）+ EPS影響"
      matsu: "四半期別非継続事業損益の推移 + 売却完了後の継続事業EPSへの影響試算"

  # ──────────────────────────────────────────
  # 【第3群】CF・処分グループの開示
  # ──────────────────────────────────────────

  - id: "ifrs5-2025-006"
    category: "IFRS（非継続事業）"
    change_type: "既存必須"
    effective_from: "2025-04-01"
    title: "非継続事業のキャッシュフロー開示"
    source: "IFRS 5.33(c)"
    source_confirmed: true
    summary: >
      非継続事業に帰属するキャッシュフローの純額を、営業活動・投資活動・
      財務活動の3区分で開示する（IFRS 5.33(c)）。
      開示方法：損益計算書の非継続事業損益と同様に、キャッシュフロー計算書において
      継続事業と区分した表示、または注記での補足開示のいずれかを選択できる。
      ただし開示を省略してはならない。
      比較期間についても同様に組み替えた数値を開示する。
      売却代金の受取（投資活動）は非継続事業のCFに含める。
      グループ内取引のキャッシュフロー（親会社との資金取引等）の処理方針と
      その金額の開示も、開示の有用性の観点から推奨される。
    target_sections:
      - "キャッシュフロー計算書"
      - "注記（非継続事業）"
    required_items:
      - "非継続事業の営業活動CF（純額）"
      - "非継続事業の投資活動CF（純額、売却代金含む）"
      - "非継続事業の財務活動CF（純額）"
      - "比較期間の非継続事業CF（組替後）"
      - "グループ内CF取引がある場合の処理方針と金額"
    applicable_markets:
      - "プライム"
      - "スタンダード"
      - "グロース"
    notes: >
      IFRS 5.33(c)は非継続事業CFの開示を義務付けているが、
      表示方法（CF計算書本体 vs 注記）は選択できる。
      実務上は注記での補足開示が多い。
      処分グループ全体の売却代金の受取は投資活動CFに分類されるため、
      売却完了年度のCF計算書への影響説明が投資家にとって重要
    tier_requirement:
      ume: "非継続事業の3区分CF純額のみ（注記開示）"
      take: "CF主要項目の内訳 + 売却代金の投資CFへの影響 + 比較期間対応"
      matsu: "売却完了後の継続事業CFへの影響試算 + フリーCF指標への影響説明"

  - id: "ifrs5-2025-007"
    category: "IFRS（非継続事業）"
    change_type: "既存必須"
    effective_from: "2025-04-01"
    title: "処分グループの開示 — 資産・負債の内訳・累積OCI"
    source: "IFRS 5.38-40"
    source_confirmed: true
    summary: >
      売却目的保有に分類された処分グループに含まれる主要な資産クラスおよび
      負債クラスを、貸借対照表上において他の資産・負債とは区分して開示する
      （IFRS 5.38）。相殺せずに別建てで表示する。
      開示内訳（IFRS 5.38）：非流動資産（有形固定資産・のれん・使用権資産等）、
      棚卸資産・受取債権・その他流動資産の主要な内訳、
      金融負債・退職給付債務・引当金・その他負債の主要な内訳。
      累積OCI（IFRS 5.38A）：処分グループの売却または廃棄によって損益に
      再分類（リサイクリング）されることになるOCI累積額を開示する。
      具体的には、為替換算調整勘定（FVOCI金融資産評価差額金・ヘッジ手段の評価差額等）が
      処分グループに帰属する金額を開示する。
    target_sections:
      - "貸借対照表（売却目的保有資産・負債）"
      - "注記（売却目的保有の非流動資産）"
      - "注記（非継続事業）"
    required_items:
      - "売却目的保有として区分した資産の主要クラス別帳簿価額"
      - "売却目的保有として区分した負債の主要クラス別帳簿価額"
      - "処分グループに帰属する累積OCI（為替換算・FVOCI・ヘッジ手段の区分）"
      - "処分グループに配分されているのれんの帳簿価額"
      - "FVLCTS算定に用いた測定手法と重要な前提の説明"
    applicable_markets:
      - "プライム"
      - "スタンダード"
      - "グロース"
    notes: >
      処分グループに含まれるのれんは売却目的保有の規定（IFRS 5.15）に従い測定するが、
      IAS 36ののれん減損テストも分類時に実施が必要。
      累積OCIのリサイクリングタイミングは売却完了日であり、
      売却前後の包括利益計算書への影響を投資家が理解できるよう説明することが重要。
      IFRS 16使用権資産が処分グループに含まれる場合の取扱いにも注意が必要
    tier_requirement:
      ume: "売却目的保有資産・負債の合計額のみ（B/S区分表示）"
      take: "主要クラス別の資産・負債内訳 + 累積OCIの金額区分"
      matsu: "処分グループの詳細資産マップ + 累積OCIのリサイクリング時期と影響額試算 + のれん配分明細"
