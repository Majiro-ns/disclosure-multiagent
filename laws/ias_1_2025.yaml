# disclosure-multiagent — 法令・ガイダンス情報 YAML
# カテゴリ: IFRS（財務諸表表示）
# 対象期間: 2025年度（2025-04-01〜2026-03-31）
# スキーマ定義: docs/law_yaml_schema.md
# 作成者: Majiro-ns
#
# 根拠法令・基準:
#   IAS 1 Presentation of Financial Statements (amended 2023): 流動非流動分類・継続企業・資本開示
#   IAS 1 Amendment "Classification of Liabilities as Current or Non-current" (effective 2024-01-01)
#   IAS 1 Amendment "Non-current Liabilities with Covenants" (effective 2024-01-01)
#   IFRS Practice Statement 2 Making Materiality Judgements (2021): 重要な会計方針選定プロセス
#   企業会計基準委員会（ASBJ）日本語版: https://www.asb.or.jp/jp/ifrs/ifrs_all/ias.html
#   注記: IFRS 18（2027年発効予定）がIAS 1を置き換えるため2025年度は移行準備期

version: "1.0"
effective_period:
  from: "2025-04-01"
  to: "2026-03-31"

amendments:

  # ──────────────────────────────────────────
  # 【第1群】財務諸表の基本要件
  # ──────────────────────────────────────────

  - id: "ias1-2025-001"
    category: "IFRS（財務諸表表示）"
    change_type: "追加必須"
    effective_from: "2025-04-01"
    title: "財務諸表の完全なセットの構成要件 — IAS 1.10に基づく必須要素"
    source: "https://www.ifrs.org/issued-standards/list-of-standards/ias-1-presentation-of-financial-statements/"
    source_confirmed: true
    summary: >
      IAS 1.10に基づく完全な財務諸表の構成要素の開示要件。
      完全な財務諸表は、期末財政状態計算書・当期の包括利益計算書（1表または2表形式）・
      持分変動計算書・キャッシュ・フロー計算書・重要な会計方針の注記を含む
      その他の注記から構成される。比較期間の変更・遡及修正が生じた場合は
      最初の比較期間の期首時点の財政状態計算書（第3バランスシート）も必要となる。
      各表の表示形式・最低限の表示科目（IAS 1.54、1.82）を遵守しなければならない。
      IAS 1.10〜44が適用根拠。
    target_sections:
      - "財務諸表本表（連結・単体）"
      - "重要な会計方針"
    required_items:
      - "財政状態計算書（期末残高・比較期間残高）"
      - "包括利益計算書（当期純損益＋その他の包括利益）"
      - "持分変動計算書（期首残高から期末残高への調整）"
      - "キャッシュ・フロー計算書（営業・投資・財務活動別）"
      - "重要な会計方針の注記（IAS 1.117〜124参照）"
      - "その他の注記（法令・基準が要求する開示）"
    applicable_markets:
      - "プライム"
      - "スタンダード"
      - "グロース"
    notes: >
      2表形式（損益計算書＋包括利益計算書）または1表形式のどちらも許容される。
      IAS 1.82Aに基づき、「純損益」区分と「その他の包括利益」区分の明確な分離が必要。
      IFRS 18（2027年1月1日発効）への移行準備として、営業利益区分の定義変更を先行確認することを推奨。
    tier_requirement:
      ume: "必須"
      take: "必須"
      matsu: "必須"

  - id: "ias1-2025-002"
    category: "IFRS（財務諸表表示）"
    change_type: "追加必須"
    effective_from: "2025-04-01"
    title: "継続企業の前提の評価と開示 — IAS 1.25〜26に基づく経営者の評価義務"
    source: "https://www.ifrs.org/issued-standards/list-of-standards/ias-1-presentation-of-financial-statements/"
    source_confirmed: true
    summary: >
      IAS 1.25〜26に基づく継続企業の前提に関する評価と開示要件。
      経営者は財務諸表作成にあたり継続企業として事業継続する能力を評価しなければならない。
      重要な疑義（material uncertainty）が存在する場合は、その事実・関連するリスク・
      対応方針を財務諸表に開示することが必要である。継続企業の前提を用いない場合は、
      財務諸表がその事実を反映した別の基礎で作成された旨と理由を開示する。
      評価対象期間は原則として報告日から少なくとも12ヶ月間。
      IAS 1.25〜26、IAS 10（後発事象）と連動して適用する。
    target_sections:
      - "継続企業の前提に関する注記"
      - "重要な会計上の見積りおよび判断"
    required_items:
      - "継続企業として事業継続できると判断した根拠（重要な疑義がない場合も確認義務あり）"
      - "重要な不確実性が存在する場合の当該事実の開示"
      - "重要な不確実性への対応方針（流動性確保・財務支援・事業計画等）"
      - "継続企業の前提を使用しない場合の代替基礎の説明"
    applicable_markets:
      - "プライム"
      - "スタンダード"
      - "グロース"
    notes: >
      IAS 570（監査基準）とも連動。監査人が継続企業の重要な疑義に
      関する強調事項段落を付す場合、開示内容との整合性が審査で確認される。
      COVID-19以降、格付機関・機関投資家が継続企業評価の開示水準を注視している。
    tier_requirement:
      ume: "必須"
      take: "必須"
      matsu: "必須"

  # ──────────────────────────────────────────
  # 【第2群】会計方針・判断・見積り
  # ──────────────────────────────────────────

  - id: "ias1-2025-003"
    category: "IFRS（財務諸表表示）"
    change_type: "改訂対応"
    effective_from: "2023-01-01"
    title: "重要な会計方針の開示 — IFRS PS 2準拠による「重要性」判断プロセス"
    source: "https://www.ifrs.org/issued-standards/list-of-standards/ias-1-presentation-of-financial-statements/"
    source_confirmed: true
    summary: >
      IAS 1.117〜124の改訂（2021年）およびIFRS Practice Statement 2に基づく
      重要な会計方針の開示要件。2021年改訂以前は「主要な（significant）」会計方針の
      開示が求められたが、改訂後は「重要な（material）」会計方針のみを開示することが
      明確化された。重要性の判断にあたっては、（a）適用した会計基準が重要性に
      関係しているか、（b）当該会計方針に関する情報が財務諸表利用者の意思決定に
      影響を与えるかを検討する。典型的かつ企業固有の情報を含まない
      「ボイラープレート」開示は重要性がないと判断される可能性がある。
      IAS 1.117改訂（2023年1月1日発効）が適用根拠。
    target_sections:
      - "重要な会計方針の概要"
      - "会計方針の適用"
    required_items:
      - "重要な会計方針（方針の種類・適用判断の根拠）の列挙"
      - "選択適用が認められる方針の選択理由（例：棚卸資産の評価方法）"
      - "重要性なしと判断した会計方針の除外根拠（監査調書レベルでの文書化）"
      - "IFRS PS 2に基づく重要性判断プロセスの文書化（内部手続き）"
    applicable_markets:
      - "プライム"
      - "スタンダード"
      - "グロース"
    notes: >
      2023年1月1日以降開始事業年度から強制適用。
      日本のIFRS適用企業では2023年度有報から対応が求められている。
      「IFRSを初めて採用した」旨の定型文句等はボイラープレートとして
      重要性なしと判断されうるため、企業固有の事情を記載することが重要。
    tier_requirement:
      ume: "任意"
      take: "必須"
      matsu: "必須"

  - id: "ias1-2025-004"
    category: "IFRS（財務諸表表示）"
    change_type: "追加必須"
    effective_from: "2025-04-01"
    title: "経営者の判断（見積り以外）の開示 — 会計方針適用における重要な判断"
    source: "https://www.ifrs.org/issued-standards/list-of-standards/ias-1-presentation-of-financial-statements/"
    source_confirmed: true
    summary: >
      IAS 1.122〜124に基づく、財務諸表に認識した金額に重要な影響を与える
      会計方針適用上の経営者の判断（見積りプロセスから独立したもの）の開示要件。
      典型例として、リース取引がファイナンス・リースかオペレーティング・リースかの
      判断、事業体が支配・重要な影響力・共同支配を有するかの判断、
      収益認識における履行義務の識別・独立販売価格の決定方法等が挙げられる。
      IAS 1.122では、財務諸表に認識した資産・負債・収益・費用に重要な影響を与えた
      判断のみを開示すれば足りるとされている。
      IAS 1.122〜124が適用根拠。
    target_sections:
      - "重要な会計上の見積りおよび判断"
      - "会計方針の適用"
    required_items:
      - "財務諸表に重要な影響を与えた会計方針適用上の判断の列挙"
      - "各判断事項における結論（適用した会計処理）とその根拠"
      - "IFRS 10/11/12（連結・持分法・共同契約）関連の支配・影響力判断"
      - "IFRS 15の履行義務識別・本人代理人区分・変動対価の判断"
    applicable_markets:
      - "プライム"
      - "スタンダード"
      - "グロース"
    notes: >
      IAS 1.125（見積りの不確実性）と混同されやすい。
      「判断（judgement）」は見積りプロセスを伴わない質的な選択であり、
      「見積り（estimation）」は将来の不確実な結果に依存する量的な評価。
      実務では両者を同一注記にまとめて記載することが多いが、
      審査では区分の明確性を確認される。
    tier_requirement:
      ume: "任意"
      take: "必須"
      matsu: "必須"

  - id: "ias1-2025-005"
    category: "IFRS（財務諸表表示）"
    change_type: "追加必須"
    effective_from: "2025-04-01"
    title: "見積りの不確実性の主要な発生源 — IAS 1.125〜133に基づく定量・定性開示"
    source: "https://www.ifrs.org/issued-standards/list-of-standards/ias-1-presentation-of-financial-statements/"
    source_confirmed: true
    summary: >
      IAS 1.125〜133に基づく、翌期に資産・負債の帳簿価額に重要な修正を
      生じさせる重要なリスクを有する見積り不確実性の発生源の開示要件。
      各不確実性発生源について、（a）資産・負債の性質および帳簿価額、
      （b）主要な仮定の内容、（c）仮定が変化した場合に生じる影響（感応度）を
      注記に開示する。典型例として、将来キャッシュ・フロー予測（減損テスト）、
      公正価値測定のLevel 3インプット、退職給付債務の割引率・昇給率の仮定、
      引当金の計算基礎等が挙げられる。IAS 1.125〜133が適用根拠。
    target_sections:
      - "重要な会計上の見積りおよび判断"
      - "減損テストに関する注記"
      - "退職給付に関する注記"
    required_items:
      - "見積り不確実性の主要発生源の識別（資産・負債の名称・帳簿価額）"
      - "各発生源の主要仮定（割引率・成長率・昇給率等）の数値と根拠"
      - "合理的に起こりうる仮定変化による影響額（感応度分析）"
      - "翌期中に見積りを改訂する可能性の説明"
    applicable_markets:
      - "プライム"
      - "スタンダード"
      - "グロース"
    notes: >
      IAS 36（減損）・IAS 37（引当金）・IFRS 13（公正価値測定）と連動する開示。
      松ランクでは確率加重シナリオ（ベース・アップサイド・ダウンサイド）による
      感応度の定量開示が期待される。IAS 1.129では、「合理的に起こりうる変化」の
      範囲についての説明も求められることに留意。
    tier_requirement:
      ume: "任意"
      take: "必須"
      matsu: "必須"

  # ──────────────────────────────────────────
  # 【第3群】資本管理・分類・比較情報
  # ──────────────────────────────────────────

  - id: "ias1-2025-006"
    category: "IFRS（財務諸表表示）"
    change_type: "追加必須"
    effective_from: "2025-04-01"
    title: "資本管理の方針と手続き — IAS 1.134〜136に基づく開示"
    source: "https://www.ifrs.org/issued-standards/list-of-standards/ias-1-presentation-of-financial-statements/"
    source_confirmed: true
    summary: >
      IAS 1.134〜136に基づく、資本管理の目的・方針・手続きに関する開示要件。
      企業が管理する資本の構成（規制上の資本要件との関係を含む）、
      資本管理の目標（最低自己資本比率の維持・配当方針・株主還元等）、
      当期中の変化および資本規制への適合状況を開示する。
      金融機関については自己資本比率規制（バーゼルIII）への適合状況、
      一般事業会社については財務制限条項（コベナンツ）の遵守状況が
      主要な開示内容となる。IAS 1.134〜136が適用根拠。
    target_sections:
      - "資本管理に関する注記"
      - "財務リスク管理"
    required_items:
      - "資本管理の目標（最低自己資本比率・信用格付目標・配当方針等）"
      - "管理対象とする資本の構成（資本の定義・測定方法）"
      - "資本管理の目標達成のための方針・手続き"
      - "外部から課される資本規制（コベナンツ・規制上の最低水準）への適合状況"
    applicable_markets:
      - "プライム"
      - "スタンダード"
      - "グロース"
    notes: >
      配当方針・自社株買い計画も資本管理の文脈で開示される。
      財務制限条項（ネットデット/EBITDA等）の違反がある場合は
      継続企業の前提（ias1-2025-002）との連動開示が必要。
      ESG投資家向けに自己資本コスト（WACC）の開示を付加する企業も増加している。
    tier_requirement:
      ume: "任意"
      take: "必須"
      matsu: "必須"

  - id: "ias1-2025-007"
    category: "IFRS（財務諸表表示）"
    change_type: "改訂対応"
    effective_from: "2024-01-01"
    title: "流動・非流動分類と表示 — 2024年発効の負債分類改訂への対応"
    source: "https://www.ifrs.org/issued-standards/list-of-standards/ias-1-presentation-of-financial-statements/"
    source_confirmed: true
    summary: >
      IAS 1.60〜76に基づく流動・非流動の分類基準と、2024年1月1日発効の
      改訂（負債の流動・非流動分類、非流動負債のコベナンツ条件）への対応。
      負債の非流動分類には、報告期間終了後少なくとも12ヶ月は決済を延期する
      権利（substance over form）が必要であり、同権利が当該期間末時点で
      存在しなければならない。また、「Non-current Liabilities with Covenants」
      改訂により、コベナンツの条件（決算日後12ヶ月以内に条件判定日があるもの等）が
      非流動分類に影響する場合の詳細な注記開示が求められる。
      IAS 1.69〜76、改訂IAS 1.72A〜72Bが適用根拠。
    target_sections:
      - "財政状態計算書の注記"
      - "借入金に関する注記"
      - "財務リスク管理（流動性リスク）"
    required_items:
      - "流動・非流動の分類基準（12ヶ月基準・営業循環基準）の会計方針"
      - "非流動に分類した長期借入金のコベナンツ条件の詳細"
      - "コベナンツ違反または違反リスクがある場合の開示（条件内容・期日・影響額）"
      - "流動分類に影響するリファイナンス合意の有無と条件"
    applicable_markets:
      - "プライム"
      - "スタンダード"
      - "グロース"
    notes: >
      2024年1月1日以降開始事業年度から強制適用（日本: 2024年4月1日以降開始年度）。
      遡及適用が原則。主要な変更点は「コベナンツ」に関する規定の詳細化であり、
      従来の実務では非流動に分類していた負債が流動に変わるケースがある。
      財務制限条項の管理部署（財務・経理）との連携確認が必要。
    tier_requirement:
      ume: "必須"
      take: "必須"
      matsu: "必須"

  - id: "ias1-2025-008"
    category: "IFRS（財務諸表表示）"
    change_type: "追加必須"
    effective_from: "2025-04-01"
    title: "比較情報の開示要件 — 最低2期間の比較情報と第3バランスシートの条件"
    source: "https://www.ifrs.org/issued-standards/list-of-standards/ias-1-presentation-of-financial-statements/"
    source_confirmed: true
    summary: >
      IAS 1.36〜44に基づく比較情報の開示要件。財務諸表の全ての数値について、
      直前期（1期）との比較情報を提供することが最低要件である。
      会計方針の変更・誤謬の修正・項目の組み替えが行われた場合は、
      最早期間比較期首（3期分の期首）時点の財政状態計算書（第3バランスシート）を
      追加開示しなければならない（IAS 1.40A〜40D）。
      企業は比較情報以上の追加期間情報を任意で提供することができるが、
      その場合は同等の注記情報を付さなければならない（IAS 1.38C）。
      IAS 1.36〜44が適用根拠。
    target_sections:
      - "財務諸表本表（全表）"
      - "会計方針の変更に関する注記"
    required_items:
      - "全ての主要財務諸表における前期比較数値の開示"
      - "科目の組み替えが生じた場合の組み替え内容・理由・金額の注記"
      - "会計方針変更・誤謬修正時の第3バランスシート（最早期間比較期首）"
      - "第3バランスシート作成時の遡及修正の内容・影響額の注記"
    applicable_markets:
      - "プライム"
      - "スタンダード"
      - "グロース"
    notes: >
      IFRS 18（2027年発効）への移行時も同様に2期比較＋第3バランスシートの
      ルールが適用される見込みであるため、IFRS 18への早期任意適用を検討する企業は
      2025年度から第3バランスシートの準備が必要となる場合がある。
      FSA（金融庁）・TSE（東証）の有価証券報告書審査でも比較情報の
      継続性・整合性が確認される。
    tier_requirement:
      ume: "必須"
      take: "必須"
      matsu: "必須"
