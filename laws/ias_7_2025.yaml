# disclosure-multiagent — 法令・ガイダンス情報 YAML
# カテゴリ: IFRS（CF計算書）
# 対象期間: 2025年度（2025-04-01〜2026-03-31）
# スキーマ定義: docs/law_yaml_schema.md
# 作成者: Majiro-ns
#
# 根拠法令:
#   IAS 7 キャッシュ・フロー計算書（IAS 7 Statement of Cash Flows）
#   IASB 2025年度確認版（改訂なし、既存要件の適用継続）
#   関連: IFRS 16リース（リース負債の財務CF連携）

version: "1.0"
effective_period:
  from: "2025-04-01"
  to: "2026-03-31"

amendments:

  # ──────────────────────────────────────────
  # 【第1群】営業活動CF
  # ──────────────────────────────────────────

  - id: "ias7-2025-001"
    category: "IFRS（CF計算書）"
    change_type: "継続要件"
    effective_from: "2025-04-01"
    title: "IAS 7 — 営業活動CFの表示方法（直接法 vs 間接法の選択と方針）"
    source: "https://www.ifrs.org/issued-standards/list-of-standards/ias-7-statement-of-cash-flows/"
    source_confirmed: true
    summary: >
      営業活動によるキャッシュ・フローの表示方法として直接法と間接法の
      いずれも認められる（IASBは直接法を推奨）。直接法は現金収入・現金支出の
      主要類型（顧客からの収入・仕入先への支出・従業員への支出・法人税等の
      支払い等）を総額で表示する。間接法は税引前当期純利益からスタートし、
      非資金取引（減価償却費・減損損失・引当金増減等）の調整、および運転資本
      変動（売掛金・棚卸資産・買掛金等の増減）を経て営業活動CFを算出する。
      選択した方法は継続適用が原則であり、変更する場合は会計方針変更として
      過去期間の遡及修正が必要。利息受取・配当受取は営業または投資CF、
      利息支払・配当支払は営業または財務CFとして表示する（方針の一貫適用）。
    target_sections:
      - "キャッシュ・フロー計算書"
      - "重要な会計方針"
    required_items:
      - "直接法または間接法の選択の開示"
      - "営業活動CFの主要構成項目（直接法：顧客収入等 / 間接法：調整項目）"
      - "利息・配当の表示区分の方針"
      - "法人税等の支払額（IAS 7.35: 別掲）"
    applicable_markets:
      - "プライム"
      - "スタンダード"
      - "グロース"
    notes: "日本基準企業は間接法が圧倒的多数。IFRS移行時に直接法採用を検討する企業あり"
    tier_requirement:
      ume: "必須"
      take: "必須"
      matsu: "必須"

  # ──────────────────────────────────────────
  # 【第2群】投資・財務活動CF
  # ──────────────────────────────────────────

  - id: "ias7-2025-002"
    category: "IFRS（CF計算書）"
    change_type: "継続要件"
    effective_from: "2025-04-01"
    title: "IAS 7 — 投資活動CFの開示項目（有形固定資産・子会社取得処分・金融資産）"
    source: "https://www.ifrs.org/issued-standards/list-of-standards/ias-7-statement-of-cash-flows/"
    source_confirmed: true
    summary: >
      投資活動によるキャッシュ・フローは将来の収益・CF創出のための資産取得・処分
      に関する現金収支を表示する。主要な開示項目として①有形固定資産・無形資産の
      取得支出および売却収入（総額表示が原則）、②子会社・事業の取得支出（取得時
      の現金残高控除後の純額）・処分収入、③関連会社・共同支配企業への投資、
      ④持分証券・負債証券（投資目的）の取得・処分、⑤貸付金の実行・回収。
      IAS 7.22に基づき取得した子会社の現金同等物は投資CFで総額開示し、
      取得資産・引受負債の総額を別途注記する。重要な取得・処分がある期は
      対価の内訳（現金部分・非現金部分）を注記する。
    target_sections:
      - "キャッシュ・フロー計算書"
      - "企業結合・関連会社投資"
    required_items:
      - "有形固定資産・無形資産の取得支出（総額）"
      - "有形固定資産・無形資産の売却収入（総額）"
      - "子会社取得支出（取得時現金控除後の純額）"
      - "子会社処分収入（処分時現金控除後の純額）"
      - "投資有価証券の取得・売却"
    applicable_markets:
      - "プライム"
      - "スタンダード"
    notes: "M&Aが多い企業は取得・処分に伴う現金フローの注記が重要性を持つ"
    tier_requirement:
      ume: "必須"
      take: "必須"
      matsu: "必須"

  - id: "ias7-2025-003"
    category: "IFRS（CF計算書）"
    change_type: "継続要件"
    effective_from: "2025-04-01"
    title: "IAS 7 — 財務活動CFの開示項目（借入金・社債・配当・リース負債）"
    source: "https://www.ifrs.org/issued-standards/list-of-standards/ias-7-statement-of-cash-flows/"
    source_confirmed: true
    summary: >
      財務活動によるキャッシュ・フローは資本・負債の調達・返済に関する現金収支を
      表示する。主要な開示項目として①借入金の借入（短期・長期）・返済、
      ②社債・CP等の発行・償還、③株式の発行収入、④自己株式の取得・処分、
      ⑤配当金の支払（親会社・非支配持分）、⑥IFRS 16適用によるリース負債の
      元本返済部分（リース負債の支払いは財務CFに分類）。リース負債の利息部分は
      方針に応じて財務CFまたは営業CFに表示。財務活動に係る負債の期中変動（借入・
      返済・非資金取引・為替差額）はIAS 7.44Aの調整表で別途開示する（後述 004）。
    target_sections:
      - "キャッシュ・フロー計算書"
      - "財務活動"
    required_items:
      - "借入金の借入（短期・長期別）"
      - "借入金の返済"
      - "社債・CP等の発行・償還"
      - "配当金の支払（株主・非支配持分）"
      - "リース負債の元本返済額"
      - "株式発行収入・自己株式取得支出"
    applicable_markets:
      - "プライム"
      - "スタンダード"
      - "グロース"
    notes: >
      配当支払の区分（財務CF vs 営業CF）は選択可能だが継続適用が必要。
      大半のIFRS適用企業は財務CFに計上
    tier_requirement:
      ume: "必須"
      take: "必須"
      matsu: "必須"

  - id: "ias7-2025-004"
    category: "IFRS（CF計算書）"
    change_type: "継続要件"
    effective_from: "2025-04-01"
    title: "IAS 7 — 財務活動から生じる負債の増減調整表（IFRS 16連携）"
    source: "https://www.ifrs.org/issued-standards/list-of-standards/ias-7-statement-of-cash-flows/"
    source_confirmed: true
    summary: >
      IAS 7.44A（2016年改正、2017年1月1日以降強制適用）に基づき、財務活動から
      生じる負債について期中変動の調整表を開示する。開示対象は①短期借入金、
      ②長期借入金（1年内返済予定含む）、③社債・CP等、④IFRS 16リース負債。
      調整表の構成：期首残高→資金収支（CF計算書の財務CFと一致）→非資金取引
      （新規リース契約・変動リース料・利息の未払計上・為替換算差額・
      公正価値変動等）→期末残高。リース負債は使用権資産の新規計上に対応する
      非資金増加（新規リース開始）が重要な構成要素となる。この調整表により
      財務諸表間の整合性（BS・CF計算書・注記）が検証可能になる。
    target_sections:
      - "財務活動から生じる負債の調整表"
      - "キャッシュ・フロー計算書注記"
      - "借入金・リース負債"
    required_items:
      - "財務活動負債の期首残高・期末残高"
      - "財務CF部分（資金収支）の期中変動"
      - "非資金取引部分の期中変動（リース新規・為替差額等）"
      - "負債の種類別（借入金・社債・リース負債等）の内訳"
    applicable_markets:
      - "プライム"
      - "スタンダード"
    notes: "IFRS 16適用により新規リース開始を非資金取引として調整表に記載する重要性が増した"
    tier_requirement:
      ume: "推奨"
      take: "必須"
      matsu: "必須"

  # ──────────────────────────────────────────
  # 【第3群】現金同等物・非資金取引
  # ──────────────────────────────────────────

  - id: "ias7-2025-005"
    category: "IFRS（CF計算書）"
    change_type: "継続要件"
    effective_from: "2025-04-01"
    title: "IAS 7 — 現金及び現金同等物の定義と構成開示"
    source: "https://www.ifrs.org/issued-standards/list-of-standards/ias-7-statement-of-cash-flows/"
    source_confirmed: true
    summary: >
      現金及び現金同等物の定義と構成要素を会計方針として開示し、期末残高を
      貸借対照表との照合表（reconciliation）で示す。現金同等物の要件は
      ①短期（通常3ヶ月以内に満期）、②容易に一定の現金額に転換可能、
      ③価値変動リスクが重要でないこと。当座預金・普通預金は通常現金として
      取り扱い、定期預金（3ヶ月以内満期）・MMF・短期国債等は現金同等物と
      なりうる。銀行借越（overdraft）は現金同等物の一部として取り扱う場合が
      ある（期末残高が頻繁にプラスマイナスする場合）。CF計算書期末残高と
      貸借対照表上の現金及び現金同等物との照合は必須開示（IAS 7.45）。
    target_sections:
      - "重要な会計方針"
      - "現金及び現金同等物"
      - "キャッシュ・フロー計算書注記"
    required_items:
      - "現金同等物の定義と構成要素の方針説明"
      - "CF計算書期末残高とBS現金同等物の照合表"
      - "外貨建て現金同等物の金額（重要な場合）"
      - "利用制限のある現金（restricted cash）の説明"
    applicable_markets:
      - "プライム"
      - "スタンダード"
      - "グロース"
    notes: >
      利用制限のある現金（担保提供・子会社の現金規制等）は現金同等物から
      除外し、投資CFまたは別掲で開示。重要性がある場合は注記で説明
    tier_requirement:
      ume: "必須"
      take: "必須"
      matsu: "必須"

  - id: "ias7-2025-006"
    category: "IFRS（CF計算書）"
    change_type: "継続要件"
    effective_from: "2025-04-01"
    title: "IAS 7 — 非資金取引の開示（現物出資・リース開始・転換社債の転換等）"
    source: "https://www.ifrs.org/issued-standards/list-of-standards/ias-7-statement-of-cash-flows/"
    source_confirmed: true
    summary: >
      投資活動・財務活動に関連するが現金収支を伴わない重要な取引（非資金取引）は
      CF計算書本体には含めず、別途注記で開示する（IAS 7.43）。開示の対象となる
      典型的な非資金取引として①現物出資（株式・資産の受入・交付）、②IFRS 16に
      よる使用権資産・リース負債の新規認識（右側：リース負債増加、左側：使用権資産増加）、
      ③転換社債の株式転換（負債の資本化）、④現物配当（非現金資産による配当）、
      ⑤資産の物々交換取引、⑥負債の資産への転換（デット・エクイティ・スワップ）、
      ⑦延払条件による設備取得（取得時の現金支出なし）。松ティアでは非資金取引の
      財務的影響（翌期以降のCF見通しへの影響）についても説明が期待される。
    target_sections:
      - "非資金取引"
      - "キャッシュ・フロー計算書注記"
    required_items:
      - "重要な非資金取引の内容と金額"
      - "IFRS 16新規リース（使用権資産・リース負債の同時認識額）"
      - "現物出資・株式転換等の非資金取引の説明"
      - "非資金取引が翌期以降のCFに与える影響の説明（松ティア）"
    applicable_markets:
      - "プライム"
      - "スタンダード"
      - "グロース"
    notes: >
      IFRS 16適用後、新規リースは全て非資金取引として開示対象になる。
      リース集約型の企業（小売・航空・物流等）では非資金取引の規模が大きくなる
    tier_requirement:
      ume: "推奨"
      take: "必須"
      matsu: "必須"
