# disclosure-multiagent — 法令・ガイダンス情報 YAML
# カテゴリ: IFRS（資産の減損）
# 対象期間: 2025年度（2025-04-01〜2026-03-31）
# スキーマ定義: docs/law_yaml_schema.md
# 作成者: Majiro-ns
#
# 根拠法令・基準:
#   IAS 36 Impairment of Assets（資産の減損）
#   IAS 36 BC (Basis for Conclusions)
#   IASB 2023年開示イニシアティブ（IAS 36 開示要件の明確化）
#
# 松竹梅レベル定義:
#   梅（ume）: 減損損失の有無・認識金額のみ。定性的な減損の有無説明
#   竹（take）: DCF前提（割引率・成長率）+ 感応度分析（割引率±1%・成長率変更）
#   松（matsu）: ESG・気候変動影響 + 複数シナリオ + CGU詳細マッピング + セグメント別内訳

version: "1.0"
effective_period:
  from: "2025-04-01"
  to: "2026-03-31"

amendments:

  # ──────────────────────────────────────────
  # 【第1群】のれん・CGUの減損テスト
  # ──────────────────────────────────────────

  - id: "ias36-2025-001"
    category: "IFRS（資産の減損）"
    change_type: "既存必須"
    effective_from: "2025-04-01"
    title: "のれんの年次減損テスト — CGU配分・割引率・回収可能価額の開示"
    source: "IAS 36.80-99, IAS 36.134-135"
    source_confirmed: true
    summary: >
      のれんは年1回以上の減損テストが必須（IAS 36.96）。取得したのれんを
      相乗効果が期待されるCGU（資金生成単位）または複数のCGUグループに
      配分し、帳簿価額と回収可能価額（使用価値または処分コスト控除後の公正価値の
      いずれか高い方）を比較する。回収可能価額が帳簿価額を下回る場合に
      減損損失を認識。のれんの減損は戻入不可（IAS 36.124）。
      開示要件：CGU（またはCGUグループ）ごとの帳簿価額・使用価値の算定に
      用いた主要前提（割引率・成長率・予測期間）、のれんが配分されているCGUの
      説明、回収可能価額がどの方法で算定されたかの明示。
    target_sections:
      - "注記（減損損失）"
      - "のれん及びその他の無形資産"
      - "重要な会計上の見積もり"
    required_items:
      - "のれんが配分されているCGU（またはCGUグループ）の説明"
      - "各CGUへの帳簿価額（のれん配分額）"
      - "回収可能価額の算定方法（使用価値 or FVLCD）の明示"
      - "使用価値算定に用いた税引前割引率"
      - "予測キャッシュフローの予測期間と長期成長率"
      - "減損テスト実施時期（年次の場合はその時期）"
    applicable_markets:
      - "プライム"
      - "スタンダード"
      - "グロース"
    notes: "のれんの減損テストはIFRS 3企業結合と連動。CGUの変更は理由とともに開示が必要"
    tier_requirement:
      ume: "CGUへの配分額と減損損失の有無のみ"
      take: "割引率・成長率・予測期間の開示 + CGUごとの回収可能価額"
      matsu: "複数シナリオ別感応度 + CGU詳細マッピング + 経営計画との整合性説明"

  - id: "ias36-2025-002"
    category: "IFRS（資産の減損）"
    change_type: "既存必須"
    effective_from: "2025-04-01"
    title: "有形固定資産・無形資産の減損兆候判定 — 外部・内部指標の評価"
    source: "IAS 36.12-14"
    source_confirmed: true
    summary: >
      各報告日において、資産（のれん以外）に減損の兆候がないかを評価する。
      外部指標：市場価値の著しい下落、技術・市場・経済・法律環境の悪化、
      金利上昇による割引率への影響、市場時価総額が純資産帳簿価額を下回る。
      内部指標：陳腐化・物理的損傷の証拠、資産の利用方法の重大な変更、
      資産からのキャッシュフローが予算を大幅に下回る実績。
      兆候が存在する場合に回収可能価額の推定が必要。
      兆候がない場合でも、のれん・耐用年数不確定の無形資産・未稼働の無形資産は
      年次テストを要する。
    target_sections:
      - "注記（減損損失）"
      - "有形固定資産"
      - "無形資産"
    required_items:
      - "報告期間中に識別した減損兆候の説明（外部・内部指標別）"
      - "回収可能価額テストを実施した資産またはCGUの識別"
      - "主要な減損兆候に対する経営者の判断の説明"
    applicable_markets:
      - "プライム"
      - "スタンダード"
      - "グロース"
    notes: "気候変動・ESG関連の環境変化が外部指標となるケースが増加。2024年以降の開示実務では特に注目"
    tier_requirement:
      ume: "減損兆候の有無のみ（定性的記述）"
      take: "兆候の具体的内容と対応した回収可能価額テストの説明"
      matsu: "ESG・気候変動要因を含む外部指標の体系的評価と経営者判断の詳細開示"

  # ──────────────────────────────────────────
  # 【第2群】回収可能価額の算定
  # ──────────────────────────────────────────

  - id: "ias36-2025-003"
    category: "IFRS（資産の減損）"
    change_type: "既存必須"
    effective_from: "2025-04-01"
    title: "使用価値の算定 — DCF前提・割引率・成長率の開示"
    source: "IAS 36.30-57, IAS 36.134(d)"
    source_confirmed: true
    summary: >
      使用価値（value in use）は、資産の継続使用および耐用年数終了時の処分から
      生じる将来キャッシュフローの現在価値。DCF計算における主要前提：
      （1）予算・予測期間（通常最長5年）中のキャッシュフロー予測。
      （2）最終年度以降の長期成長率（通常GDPインフレ率を超えない水準）。
      （3）税引前割引率（加重平均資本コストWACCのリスク反映版、または
      資産固有リスクを加味したレート）。
      市場の前提（インフレ・為替・業界成長率）との整合性説明も必要。
    target_sections:
      - "注記（減損損失）"
      - "重要な会計上の見積もり"
    required_items:
      - "税引前割引率（複数CGUの場合はCGU別）"
      - "長期成長率（最終年度以降）"
      - "予測キャッシュフローの基礎となる経営計画の期間と策定根拠"
      - "過去実績との整合性の説明"
      - "市場前提（インフレ・業界成長率）との整合性"
    applicable_markets:
      - "プライム"
      - "スタンダード"
      - "グロース"
    notes: "IAS 36.134(d)はのれん配分CGUに感応度分析を要求。2023年IASB開示イニシアティブで開示粒度が明確化"
    tier_requirement:
      ume: "使用価値算定の有無と割引率・成長率の数値のみ"
      take: "予測期間の根拠 + 市場前提との整合性 + 感応度分析（割引率±1%）"
      matsu: "CGU別詳細前提 + 複数シナリオ（楽観・基本・悲観）+ 過去実績との乖離分析"

  - id: "ias36-2025-004"
    category: "IFRS（資産の減損）"
    change_type: "既存必須"
    effective_from: "2025-04-01"
    title: "処分コスト控除後の公正価値（FVLCD）— レベル別・評価手法の開示"
    source: "IAS 36.25-29, IFRS 13との連動"
    source_confirmed: true
    summary: >
      処分コスト控除後の公正価値（Fair Value Less Costs of Disposal; FVLCD）は、
      独立した取引において知識ある取引当事者間で資産を売却して得られる価格から
      処分コストを控除した金額。算定手法：
      （1）拘束力ある売買契約に基づく価格。
      （2）活発な市場での市場価格から処分コストを控除。
      （3）最善の情報に基づく見積もり（DCF、類似資産の市場取引価格等）。
      IFRS 13の公正価値ヒエラルキー（レベル1〜3）を適用し、
      重要な見積もりに使用したインプットを開示する。
    target_sections:
      - "注記（減損損失）"
      - "公正価値測定"
    required_items:
      - "FVLCD算定に使用した手法（レベル1/2/3の区分）"
      - "重要な観察不能インプット（レベル3の場合）"
      - "処分コストの内訳と見積もり根拠"
      - "評価の前提となった市場取引データの説明（レベル2の場合）"
    applicable_markets:
      - "プライム"
      - "スタンダード"
      - "グロース"
    notes: "不動産・設備等の固定資産売却に際してFVLCDが使用価値を上回るケースでは特に詳細開示が求められる"
    tier_requirement:
      ume: "FVLCDの使用有無と算定手法の区分（レベル）のみ"
      take: "レベル別の開示 + 重要インプットの説明"
      matsu: "レベル3の場合の感応度分析 + 評価者（独立第三者）情報の開示"

  # ──────────────────────────────────────────
  # 【第3群】CGUの識別と減損損失の処理
  # ──────────────────────────────────────────

  - id: "ias36-2025-005"
    category: "IFRS（資産の減損）"
    change_type: "既存必須"
    effective_from: "2025-04-01"
    title: "CGU（資金生成単位）の識別・変更開示"
    source: "IAS 36.65-90, IAS 36.130(d)"
    source_confirmed: true
    summary: >
      CGU（Cash-Generating Unit）は、他の資産または資産グループからの
      キャッシュインフローとほぼ独立したキャッシュインフローを生み出す
      最小の識別可能な資産グループ。識別基準：
      独立した事業ライン、地域別事業、製品ライン別事業等。
      のれんのCGU配分は、取得当初の配分方法と現状の整合性を毎期確認する。
      CGUの再編・変更（事業統合・分割・報告セグメント変更等）が生じた場合は、
      変更の内容、理由、変更前後のCGUへの資産配分額の変動を開示する。
    target_sections:
      - "注記（減損損失）"
      - "のれん及びその他の無形資産"
      - "セグメント情報"
    required_items:
      - "CGUの識別根拠（事業ラインの説明）"
      - "CGU変更の有無と変更理由"
      - "変更前後のCGUへののれん・資産配分額の変動"
      - "複数CGUグループへのれんを配分している場合の理由説明"
    applicable_markets:
      - "プライム"
      - "スタンダード"
      - "グロース"
    notes: "M&A後の統合プロセスやセグメント再編時にCGU変更が頻発。変更理由と影響額の明示が実務上重要"
    tier_requirement:
      ume: "CGUの一覧と識別根拠の定性説明のみ"
      take: "CGU変更の経緯と影響額 + のれん配分額の一覧表"
      matsu: "CGUとセグメント情報・経営組織の対応マッピング + 変更感応度の定量分析"

  - id: "ias36-2025-006"
    category: "IFRS（資産の減損）"
    change_type: "既存必須"
    effective_from: "2025-04-01"
    title: "減損損失の認識・測定・配分 — のれんから資産への配分順序"
    source: "IAS 36.104-108, IAS 36.126-128"
    source_confirmed: true
    summary: >
      CGUレベルで回収可能価額が帳簿価額を下回る場合に減損損失を認識。
      CGU内の資産への配分順序：
      （1）まずCGUに配分されているのれんの帳簿価額を減額。
      （2）次に、CGU内の各資産の帳簿価額に比例して残余の減損損失を配分。
      ただし、個別資産への配分は回収可能価額（個別算定可能な場合）または
      ゼロを下限とする。
      減損損失が損益計算書に与える影響（税引後・セグメント別）を開示。
      減損の発生した事業・資産クラスの説明および発生原因の記載が必要。
    target_sections:
      - "注記（減損損失）"
      - "損益計算書（特別損失区分）"
      - "セグメント情報"
    required_items:
      - "CGUごとの減損損失額（のれん配分分・その他資産配分分の区分）"
      - "減損損失の損益計算書上の表示区分"
      - "減損の発生した事業・資産クラスの説明"
      - "減損の発生原因（外部環境変化・内部要因の説明）"
      - "セグメント情報との対応"
    applicable_markets:
      - "プライム"
      - "スタンダード"
      - "グロース"
    notes: "のれん減損は戻入不可のため認識後の管理体制の開示も実務上有用"
    tier_requirement:
      ume: "減損損失の総額と発生原因の定性説明のみ"
      take: "CGU別内訳（のれん分・資産分）+ セグメント対応表"
      matsu: "減損後の継続使用計画 + 追加減損リスクの定量説明 + 資産クラス別詳細"

  - id: "ias36-2025-007"
    category: "IFRS（資産の減損）"
    change_type: "既存必須"
    effective_from: "2025-04-01"
    title: "減損損失の戻入れ（のれん以外）— 判定条件・開示要件"
    source: "IAS 36.110-123, IAS 36.131"
    source_confirmed: true
    summary: >
      のれん以外の資産については、過去に認識した減損損失を戻入れることができる
      （IAS 36.110）。戻入れの要件：前期に減損損失を認識した後に状況が改善し、
      回収可能価額の推定値が帳簿価額を上回るようになった場合。
      戻入限度額：減損損失がなかった場合の帳簿価額（減価償却累計後）を超えない。
      開示要件：戻入れの金額・対象資産・戻入れの根拠となった状況変化の説明。
      なお、のれんに係る減損損失の戻入れは禁止（IAS 36.124）。
    target_sections:
      - "注記（減損損失）"
      - "有形固定資産"
      - "無形資産"
    required_items:
      - "戻入れの対象資産（またはCGU）の説明"
      - "戻入れ額と戻入限度額の算定根拠"
      - "戻入れを正当化する状況変化の説明"
      - "戻入後の帳簿価額と増分減価償却費への影響"
    applicable_markets:
      - "プライム"
      - "スタンダード"
      - "グロース"
    notes: "のれん以外の減損戻入れはJ-GAAPには存在しない。IFRS採用企業で特有の開示要件として注意が必要"
    tier_requirement:
      ume: "戻入れの有無と金額のみ"
      take: "戻入れ根拠（状況変化）の定量的説明 + 戻入限度額の計算過程"
      matsu: "戻入後の資産グループ全体の回収可能価額の見通し + 将来リスクの感応度"

  # ──────────────────────────────────────────
  # 【第4群】感応度分析と非財務的開示
  # ──────────────────────────────────────────

  - id: "ias36-2025-008"
    category: "IFRS（資産の減損）"
    change_type: "既存必須"
    effective_from: "2025-04-01"
    title: "感応度分析 — 割引率±1%・成長率変更が減損認識に与える影響額"
    source: "IAS 36.134(f)"
    source_confirmed: true
    summary: >
      のれんが配分されているCGU（またはCGUグループ）について、
      回収可能価額が帳簿価額に近接している場合（reasonable possible change in
      a key assumption）には感応度分析の開示が必要（IAS 36.134(f)）。
      開示内容：（1）回収可能価額が帳簿価額と等しくなる前提値の水準。
      （2）主要前提を合理的に変更した場合に減損損失が発生する（または
      既存の損失額が増加する）金額への影響。
      一般的な実務では割引率±0.5〜1.0%・長期成長率±0.5%の
      感応度を開示するケースが多い。
    target_sections:
      - "注記（減損損失）"
      - "重要な会計上の見積もり"
    required_items:
      - "割引率変動（+1%）による回収可能価額への影響額"
      - "割引率変動（-1%）による回収可能価額への影響額"
      - "長期成長率変動（+/-0.5%）による影響額"
      - "現時点で帳簿価額が回収可能価額に近接しているCGUの識別"
      - "減損が発生することとなる前提値の閾値"
    applicable_markets:
      - "プライム"
      - "スタンダード"
      - "グロース"
    notes: "IAS 36.134(f)は帳簿価額と回収可能価額が近接するCGUにのみ要求されるが、実務上は全CGUに開示するケースが増加"
    tier_requirement:
      ume: "感応度分析不要（減損が十分余裕をもって回避されている場合）"
      take: "割引率±1%・成長率±0.5%の影響額の開示"
      matsu: "複数前提の組み合わせシナリオ別感応度マトリクス + CGU別影響額表"

  - id: "ias36-2025-009"
    category: "IFRS（資産の減損）"
    change_type: "追加推奨"
    effective_from: "2025-04-01"
    title: "気候変動・ESG要因が減損評価に与える影響の開示"
    source: "IAS 36.12(b), IAS 36.30-57, TCFD連動, ISSB IFRS S2"
    source_confirmed: true
    summary: >
      気候変動関連のリスク（政策規制強化・物理的リスク・移行リスク）が
      資産の将来キャッシュフローや割引率に与える影響を減損評価に反映し、
      その内容を開示する。具体的な影響：炭素税導入による収益力低下・
      座礁資産リスク（化石燃料関連設備の早期陳腐化）・自然災害による
      物理的損傷リスクが使用価値の前提に与える影響。
      TCFDシナリオ（1.5℃・2℃・4℃シナリオ）の採用が増加しており、
      各シナリオでの回収可能価額への感応度の開示が推奨されている。
      IAS 36は明示的にESGを要求しないが、IAS 36.12(b)の
      外部環境変化の兆候としてESGリスクが包含されると解釈される。
    target_sections:
      - "注記（減損損失）"
      - "気候関連リスク情報"
      - "重要な会計上の見積もり"
    required_items:
      - "減損評価においてESG・気候変動リスクを反映した場合の説明"
      - "採用した気候シナリオと主要前提への影響"
      - "座礁資産リスクが識別された場合の資産・CGUの特定"
      - "ESGリスクが割引率・成長率・キャッシュフロー予測に与えた調整内容"
    applicable_markets:
      - "プライム"
      - "スタンダード"
      - "グロース"
    notes: >
      2025年以降、プライム市場のTCFD/ISSB S2開示義務化と連動して
      IAS 36の減損評価へのESG統合が実務課題となっている。
      IAS 36単独では明示的規定がないが、SSBJサステナビリティ開示基準との整合が求められる
    tier_requirement:
      ume: "ESG要因の定性的言及のみ（または不適用の旨）"
      take: "気候リスクが特定された資産・CGUの説明 + 減損評価への定性的影響"
      matsu: "TCFDシナリオ別回収可能価額感応度 + 座礁資産リスクの定量分析 + ISSB S2との連動"

  # ──────────────────────────────────────────
  # 【第5群】セグメント・CGU別の内訳開示
  # ──────────────────────────────────────────

  - id: "ias36-2025-010"
    category: "IFRS（資産の減損）"
    change_type: "既存必須"
    effective_from: "2025-04-01"
    title: "セグメント別・CGU別の減損損失内訳開示"
    source: "IAS 36.129-131, IFRS 8との連動"
    source_confirmed: true
    summary: >
      報告期間中に認識した重要な減損損失および戻入れについて、
      資産クラス別・セグメント別（IFRS 8事業セグメント対応）の
      内訳を開示する。開示要件（IAS 36.130）：
      （1）減損の認識または戻入れの原因となった事象・状況の説明。
      （2）認識した減損損失または戻入れの金額。
      （3）資産の性質（有形固定資産・のれん・無形資産等）。
      （4）使用した回収可能価額の種類（使用価値またはFVLCD）および
      使用価値またはFVLCDの算定に用いた主要前提の説明。
      （5）減損損失の損益計算書上の表示区分。
      （6）セグメント情報との対応関係。
    target_sections:
      - "注記（減損損失）"
      - "セグメント情報"
      - "有形固定資産 / 無形資産 / のれん"
    required_items:
      - "資産クラス別（有形固定資産・のれん・無形資産・使用権資産等）の減損損失内訳"
      - "IFRS 8セグメント別の減損損失内訳"
      - "回収可能価額の算定方法（使用価値 or FVLCD）のCGU別明示"
      - "損益計算書における表示区分（売上原価・販管費・その他）"
      - "連結・個別の対応関係と子会社における重要な減損の説明"
    applicable_markets:
      - "プライム"
      - "スタンダード"
      - "グロース"
    notes: >
      IFRS 8との連動により、事業セグメントの分解粒度がCGUと一致しない場合に
      どのレベルで開示するかが実務上の課題。
      IAS 36.130の要件は重要性（materiality）に基づく開示であり、
      軽微な減損への適用範囲については判断が必要
    tier_requirement:
      ume: "減損損失の総額と資産クラスの定性的説明のみ"
      take: "資産クラス別・セグメント別の金額内訳表"
      matsu: "CGU別詳細内訳 + セグメントとCGUのクロスマッピング表 + 前期比較分析"
