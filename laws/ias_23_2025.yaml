# disclosure-multiagent — 法令・ガイダンス情報 YAML
# カテゴリ: IFRS（借入コスト）
# 対象期間: 2025年度（2025-04-01〜2026-03-31）
# スキーマ定義: docs/law_yaml_schema.md
# 作成者: Majiro-ns
#
# 根拠法令:
#   IAS 23 借入コスト（IAS 23 Borrowing Costs）
#   IASB 2025年度確認版（改訂なし、既存要件の適用継続）

version: "1.0"
effective_period:
  from: "2025-04-01"
  to: "2026-03-31"

amendments:

  - id: "ias23-2025-001"
    category: "IFRS（借入コスト）"
    change_type: "継続要件"
    effective_from: "2025-04-01"
    title: "IAS 23 — 適格資産の定義と借入コスト資産計上の要件"
    source: "https://www.ifrs.org/issued-standards/list-of-standards/ias-23-borrowing-costs/"
    source_confirmed: true
    summary: >
      IAS 23に基づき、適格資産（qualifying asset）の取得・建設・製造に直接帰属する
      借入コストは当該資産のコストの一部として資産計上する（強制適用）。適格資産とは
      意図した使用または販売が可能な状態になるまでに相当の期間を必要とする資産であり、
      建設中の不動産・製造設備・電力設備・長期建造物等が典型例。棚卸資産であっても
      大量生産・反復製造されるものや、取得時点で使用・販売可能な状態にあるものは
      適格資産に該当しない。開示として①採用した会計方針（適格資産の判定基準）、
      ②当期に資産計上した借入コストの金額、③資産計上に使用した資本化利率を記載する。
    target_sections:
      - "重要な会計方針"
      - "借入コスト"
      - "有形固定資産・建設仮勘定"
    required_items:
      - "借入コスト資産計上の会計方針の説明"
      - "当期に資産計上した借入コストの金額"
      - "適格資産の種類・内容の説明"
    applicable_markets:
      - "プライム"
      - "スタンダード"
    notes: >
      IFRS適用企業は借入コストの資産計上が強制要件（選択肢なし）。
      日本基準では費用処理が原則のため、IFRS移行時の差異として現れやすい
    tier_requirement:
      ume: "必須"
      take: "必須"
      matsu: "必須"

  - id: "ias23-2025-002"
    category: "IFRS（借入コスト）"
    change_type: "継続要件"
    effective_from: "2025-04-01"
    title: "IAS 23 — 資産計上利率の算定（特定借入 vs 一般借入の加重平均）"
    source: "https://www.ifrs.org/issued-standards/list-of-standards/ias-23-borrowing-costs/"
    source_confirmed: true
    summary: >
      資産計上する借入コストの金額は適格資産への支出額に資本化利率を乗じて算定する。
      特定借入（適格資産の取得・建設のために特定的に実行した借入）がある場合、
      実際に発生した借入コストからその借入金の一時的運用益を控除した金額を上限として
      資産計上する。一般借入（特定借入以外）を使用した場合は当期中の借入金残高に
      対する加重平均利率（weighted average borrowing rate）を算定し、適格資産への
      支出額（期中平均）に乗じて資産計上額を計算する。特定借入と一般借入が混在する
      場合は、特定借入相当の支出には特定借入利率、超過支出には加重平均利率を適用する。
      資産計上した借入コスト総額は実際発生コスト総額を超えてはならない。
      竹・松ティアでは加重平均資本化利率の数値と算定方法の詳細を開示する。
    target_sections:
      - "借入コスト"
      - "会計上の見積りと判断"
      - "有形固定資産・建設仮勘定の注記"
    required_items:
      - "当期の資本化利率（加重平均）"
      - "特定借入がある場合の実際利率と一時運用益の控除額"
      - "資産計上した借入コストの総額"
      - "資産計上の対象となった適格資産の支出額（期中平均）"
    applicable_markets:
      - "プライム"
      - "スタンダード"
    notes: "大規模インフラ投資・不動産開発・プラント建設を行う企業で特に重要性が高い"
    tier_requirement:
      ume: "推奨"
      take: "必須"
      matsu: "必須"

  - id: "ias23-2025-003"
    category: "IFRS（借入コスト）"
    change_type: "継続要件"
    effective_from: "2025-04-01"
    title: "IAS 23 — 資産計上の開始・中断・終了の判定と開示"
    source: "https://www.ifrs.org/issued-standards/list-of-standards/ias-23-borrowing-costs/"
    source_confirmed: true
    summary: >
      借入コストの資産計上は①適格資産への支出が発生している、②借入コストが
      発生している、③資産を意図した使用・販売可能な状態にするための活動が
      実施されている、の3要件を全て満たした日に開始する。活動の中断が相当期間
      （延長された非活動期間）にわたる場合は中断期間中の借入コスト資産計上を
      停止する（通常の技術的・管理的遅延は中断に該当しない。悪天候・長期承認待ちは
      中断に該当しうる）。適格資産が意図した使用・販売可能な状態になった日に
      資産計上を終了する。適格資産を複数の部分に分けて完成させる場合、各部分が
      完成した時点でその部分に係る資産計上を終了する。開示として資産計上の
      開始・中断・終了の状況（重要な変更がある場合）と資本化利率の適用期間を示す。
      松ティアでは建設プロジェクトの進捗状況・予想完成時期・残存資産計上予定期間の
      感応度（金利上昇シナリオ等）も開示が期待される。
    target_sections:
      - "借入コスト"
      - "建設仮勘定・有形固定資産"
      - "会計上の見積りと判断"
    required_items:
      - "資産計上開始日・終了日の説明（重要な適格資産ごと）"
      - "中断があった場合の期間と理由"
      - "資産計上終了の判定根拠（使用・販売可能状態の判断）"
      - "金利上昇シナリオへの感応度（松ティア）"
    applicable_markets:
      - "プライム"
      - "スタンダード"
    notes: >
      不動産・エネルギー・インフラセクターで長期建設プロジェクトを持つ企業は
      開始・中断・終了の判定が投資家の注目点となる。IFRS 16リース資産も
      適格資産となりうる点に留意
    tier_requirement:
      ume: "推奨"
      take: "必須"
      matsu: "必須"
