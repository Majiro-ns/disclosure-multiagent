# disclosure-multiagent — 法令・ガイダンス情報 YAML
# カテゴリ: IFRS（リース）— IFRS 16 Leases
# 対象期間: 2025年度（2025-04-01〜2026-03-31）
# スキーマ定義: docs/law_yaml_schema.md
# 作成者: Majiro-ns
#
# 根拠法令:
#   IFRS 16 Leases (IASB, 2016年1月発行 / 2019年1月1日以降の事業年度に適用)
#   IFRS 16 Amendment — Covid-19-Related Rent Concessions (2020年5月発行)
#   IFRS 16 Amendment — Covid-19-Related Rent Concessions beyond 30 June 2021 (2021年3月発行)
#   東京証券取引所 上場規程・開示ガイドライン（IFRSを任意適用する上場会社向け）

version: "1.0"
effective_period:
  from: "2025-04-01"
  to: "2026-03-31"

amendments:

  # ──────────────────────────────────────────
  # 【第1群】使用権資産（Right-of-Use Asset）
  # ──────────────────────────────────────────

  - id: "ifrs16-2025-001"
    category: "IFRS（リース）"
    change_type: "継続必須"
    effective_from: "2019-01-01"
    title: "使用権資産の認識・測定・減価償却方針の開示"
    source: "https://www.ifrs.org/issued-standards/list-of-standards/ifrs-16-leases/"
    source_confirmed: true
    summary: >
      IFRS 16第47条〜50条に基づく使用権資産（ROU資産）の認識・測定・
      減価償却方針の開示要件。リース開始時に計上するROU資産の当初測定額
      （リース負債の現在価値＋前払リース料＋直接費用＋原状回復費用の見積額）、
      減価償却方法（定額法が原則、リース期間と経済的耐用年数の短い方にわたり計上）、
      ならびに期末残高（取得原価・減価償却累計額・減損損失累計額）を
      資産クラス別に注記する。IAS36との関連で減損テストの適用状況も含める。
    target_sections:
      - "重要な会計方針"
      - "注記事項（リース）"
      - "使用権資産の増減表"
    required_items:
      - "使用権資産の当初認識金額の算定方法（リース負債現在価値＋付随費用）"
      - "減価償却方法（定額法等）および適用期間（リース期間 vs 経済的耐用年数）"
      - "期末における使用権資産帳簿価額（取得原価・累計減価償却額）"
      - "当期に認識した減価償却費の金額"
      - "減損損失の認識状況（認識がある場合は金額と理由）"
    applicable_markets:
      - "プライム"
      - "スタンダード"
      - "グロース"
    notes: >
      IFRS任意適用会社（約260社、2025年時点）が対象。
      J-GAAP適用会社は開示不要（ASC 842相当の日本基準改定議論中）。
      ROU資産残高が連結総資産の5%超の場合、取締役会報告での言及が推奨される。
    tier_requirement:
      ume: "必須"
      take: "必須"
      matsu: "必須"

  # ──────────────────────────────────────────
  # 【第2群】リース負債（Lease Liability）
  # ──────────────────────────────────────────

  - id: "ifrs16-2025-002"
    category: "IFRS（リース）"
    change_type: "継続必須"
    effective_from: "2019-01-01"
    title: "リース負債の認識・測定・割引率決定方針の開示"
    source: "https://www.ifrs.org/issued-standards/list-of-standards/ifrs-16-leases/"
    source_confirmed: true
    summary: >
      IFRS 16第26条〜36条に基づくリース負債の認識・測定・割引率方針の開示要件。
      リース負債はリース料の現在価値として当初測定し、実効金利法により
      期中で利息費用を認識する。割引率として、①リース契約に内在する利率
      （Implicit Rate）が算定可能な場合はそれを使用し、算定困難な場合は
      ②借手の追加借入利子率（IBR: Incremental Borrowing Rate）を適用する。
      IBRの決定方法（同等の担保付き借入に基づく市場金利の観察等）、
      リース期間・通貨・信用力を反映した調整の概要を注記する。
    target_sections:
      - "重要な会計方針"
      - "注記事項（リース）"
      - "リース負債の増減表"
    required_items:
      - "リース負債の当初測定方法（将来リース料の現在価値）"
      - "割引率の決定方針（内在利率 / IBRの適用基準）"
      - "IBR算定の主要前提条件（参照市場金利・調整の概要）"
      - "期末リース負債残高（流動・非流動の区分）"
      - "当期に認識した利息費用の金額"
    applicable_markets:
      - "プライム"
      - "スタンダード"
      - "グロース"
    notes: >
      IBRは通貨・期間・信用力別に複数レートを設定している企業が多い。
      金利上昇局面では前期比でIBRが大きく変動する場合があり、
      リース負債の再測定に影響するため、レート水準と変動理由の説明が推奨される。
    tier_requirement:
      ume: "推奨"
      take: "必須"
      matsu: "必須"

  # ──────────────────────────────────────────
  # 【第3群】免除規定（短期リース・少額資産）
  # ──────────────────────────────────────────

  - id: "ifrs16-2025-003"
    category: "IFRS（リース）"
    change_type: "継続必須"
    effective_from: "2019-01-01"
    title: "短期リース・少額資産リースの免除適用と開示"
    source: "https://www.ifrs.org/issued-standards/list-of-standards/ifrs-16-leases/"
    source_confirmed: true
    summary: >
      IFRS 16第5条〜8条に規定する、借手に認められる2つの適用免除の開示要件。
      ①短期リース免除（リース期間12ヶ月以内）および②少額資産リース免除
      （基礎資産が新品時に低価値：IASBの指針ではおよそUS$5,000以下が目安）
      の適用方針を注記する。これらの免除を適用した場合、定額法等による
      リース料を損益として認識し、当期に損益認識した総額を開示する。
      企業が採用した「少額」の基準額（閾値）の定義も開示対象となる。
    target_sections:
      - "重要な会計方針"
      - "注記事項（リース）"
    required_items:
      - "短期リース免除の適用有無および適用対象資産クラスの説明"
      - "少額資産リース免除の適用有無および少額の定義（閾値）"
      - "短期リース・少額資産リースとして当期損益に計上したリース料総額"
    applicable_markets:
      - "プライム"
      - "スタンダード"
      - "グロース"
    notes: >
      少額基準は各社が方針として定めるもので、IFRSの定義は絶対額でなく
      基礎資産の性質に依存する。実務上はUS$5,000相当（約75万円）を
      閾値とする企業が多いが、方針の一貫性が重要。
    tier_requirement:
      ume: "必須"
      take: "必須"
      matsu: "必須"

  # ──────────────────────────────────────────
  # 【第4群】変動リース料
  # ──────────────────────────────────────────

  - id: "ifrs16-2025-004"
    category: "IFRS（リース）"
    change_type: "継続必須"
    effective_from: "2019-01-01"
    title: "変動リース料の会計処理（指数連動・業績連動）の開示"
    source: "https://www.ifrs.org/issued-standards/list-of-standards/ifrs-16-leases/"
    source_confirmed: true
    summary: >
      IFRS 16第38条・第42条・第58条に基づく変動リース料の会計処理と開示要件。
      変動リース料には2種類ある。①指数または利率連動の変動リース料
      （例: CPI連動・LIBORまたはSOFR連動）はリース負債に含めて測定し、
      指数等の変動時に再測定する。②業績連動またはその他変動要因に基づく変動リース料
      （例: 売上高連動・使用量連動）はリース負債に含めず、発生時に費用計上する。
      各分類の金額・対象リース契約の概要・当期損益への影響額を開示する。
    target_sections:
      - "重要な会計方針"
      - "注記事項（リース）"
    required_items:
      - "指数・利率連動の変動リース料の測定方法および当期末残高への影響額"
      - "業績連動等の変動リース料として当期損益に計上した金額"
      - "変動リース料が含まれる主要なリース契約の概要"
    applicable_markets:
      - "プライム"
      - "スタンダード"
      - "グロース"
    notes: >
      2024〜2025年にかけての金利上昇局面では、SOFR・TIBOR連動のリース料が
      増加した企業が多い。指数連動部分の再測定による影響を定量的に説明することが
      投資家の理解向上に資する。業績連動型は小売・ホテル業で多く見られる。
    tier_requirement:
      ume: "任意"
      take: "必須"
      matsu: "必須"

  # ──────────────────────────────────────────
  # 【第5群】リース期間の判定
  # ──────────────────────────────────────────

  - id: "ifrs16-2025-005"
    category: "IFRS（リース）"
    change_type: "継続必須"
    effective_from: "2019-01-01"
    title: "リース期間の判定（延長・解約オプションの考慮）の開示"
    source: "https://www.ifrs.org/issued-standards/list-of-standards/ifrs-16-leases/"
    source_confirmed: true
    summary: >
      IFRS 16第19条〜21条に基づくリース期間の判定方針の開示要件。
      リース期間は、リースが解約不能な期間に、借手が行使することが
      合理的に確実（reasonably certain）な延長オプション期間を加え、
      行使しないことが合理的に確実な解約オプション期間を除いて算定する。
      「合理的に確実」の判定における重要な経済的インセンティブ
      （カスタマイズ投資・立地の代替困難性等）の評価方法、
      リース期間の見直し（再評価）のトリガー条件を注記する。
    target_sections:
      - "重要な会計方針"
      - "注記事項（リース）"
    required_items:
      - "延長・解約オプション行使の合理的確実性判断の方針"
      - "「合理的に確実」と判断した主な経済的インセンティブの説明"
      - "リース期間の重要な前提条件・見直しのトリガー"
      - "延長オプション保有リースのうちリース負債に含めていない潜在的リース料"
    applicable_markets:
      - "プライム"
      - "スタンダード"
      - "グロース"
    notes: >
      2019年以降の実務では延長オプションの取り扱いが監査上の論点となりやすい。
      IFRSICアジェンダ決定（2019年11月）では「合理的に確実」の判断基準が
      より厳格に解釈されており、過去に短いリース期間で計上していた場合は
      見直しの必要性を検討する。
    tier_requirement:
      ume: "推奨"
      take: "必須"
      matsu: "必須"

  # ──────────────────────────────────────────
  # 【第6群】リースの条件変更（リモディフィケーション）
  # ──────────────────────────────────────────

  - id: "ifrs16-2025-006"
    category: "IFRS（リース）"
    change_type: "継続必須"
    effective_from: "2019-01-01"
    title: "リースの条件変更（リモディフィケーション）の会計処理の開示"
    source: "https://www.ifrs.org/issued-standards/list-of-standards/ifrs-16-leases/"
    source_confirmed: true
    summary: >
      IFRS 16第44条〜46条に基づくリース条件変更（リモディフィケーション）の
      会計処理方針の開示要件。条件変更には、①別個リースとして処理する場合
      （リースの範囲が拡大し対価が市場価格相当の場合）と、
      ②既存リースを修正する場合（範囲縮小・対価変更等）の2パターンがある。
      条件変更時に改訂したIBRを用いてリース負債を再測定し、
      ROU資産の調整を行うプロセスを説明する。重要な条件変更が発生した
      事業年度には、変更内容・再測定額・損益影響を開示することが求められる。
    target_sections:
      - "重要な会計方針"
      - "注記事項（リース）"
    required_items:
      - "リース条件変更の会計処理方針（別個リース vs 既存リースの修正）"
      - "重要な条件変更が発生した場合の変更内容および財務影響（再測定額）"
      - "条件変更時に使用した割引率（IBR）の概要"
    applicable_markets:
      - "プライム"
      - "スタンダード"
      - "グロース"
    notes: >
      COVID-19後の賃料交渉や不動産市況の変化に伴うリース条件見直しが
      2023〜2025年に多数発生している。条件変更が多い企業は開示の充実が望ましい。
      別個リースか既存修正かの判定は監査上の注目事項となりやすい。
    tier_requirement:
      ume: "任意"
      take: "推奨"
      matsu: "必須"

  # ──────────────────────────────────────────
  # 【第7群】サブリース・セールアンドリースバック
  # ──────────────────────────────────────────

  - id: "ifrs16-2025-007"
    category: "IFRS（リース）"
    change_type: "継続必須"
    effective_from: "2019-01-01"
    title: "サブリース・セールアンドリースバックの開示"
    source: "https://www.ifrs.org/issued-standards/list-of-standards/ifrs-16-leases/"
    source_confirmed: true
    summary: >
      IFRS 16第56条〜71条に基づくサブリースおよびセールアンドリースバックの
      開示要件。サブリースでは、中間借手として保有するROU資産を原資産として
      第三者に転貸する場合、サブリースのリース分類（ファイナンスリース /
      オペレーティングリース）とそれに応じた会計処理・収益認識を開示する。
      セールアンドリースバックでは、売却取引がIFRS 15の「顧客への資産の移転」
      要件を満たすか否かで会計処理が分岐するため、移転要件の充足有無と
      リースバック分の利得・損失の認識方針を注記する（IFRS 16改訂2022年により
      売手兼借手の変動リース料認識方法が明確化）。
    target_sections:
      - "重要な会計方針"
      - "注記事項（リース）"
    required_items:
      - "サブリースのリース分類（ファイナンス / オペレーティング）と会計処理方針"
      - "セールアンドリースバックの売却認識要件充足の判断方針"
      - "セールアンドリースバックに係る利得・損失の認識金額"
      - "IFRS 16改訂（2022年）の変動リース料処理方法の適用状況"
    applicable_markets:
      - "プライム"
      - "スタンダード"
      - "グロース"
    notes: >
      IFRS 16の2022年9月改訂（セールアンドリースバックの変動リース料測定）は
      2024年1月1日以降の事業年度から強制適用。早期適用を選択した企業は
      その旨と適用影響額を開示する必要がある。
    tier_requirement:
      ume: "任意"
      take: "推奨"
      matsu: "必須"

  # ──────────────────────────────────────────
  # 【第8群】使用権資産の資産クラス別内訳
  # ──────────────────────────────────────────

  - id: "ifrs16-2025-008"
    category: "IFRS（リース）"
    change_type: "継続必須"
    effective_from: "2019-01-01"
    title: "使用権資産の資産クラス別内訳（オフィス・車両・設備等）の開示"
    source: "https://www.ifrs.org/issued-standards/list-of-standards/ifrs-16-leases/"
    source_confirmed: true
    summary: >
      IFRS 16第53条(j)に基づく使用権資産の資産クラス別内訳の開示要件。
      借手は、ROU資産の帳簿価額を資産クラス別（例: 不動産・オフィス、
      製造設備、車両・フリート、IT機器等）に区分して開示する。
      各クラスについて期中増減（新規リース・解約・減価償却・減損）を
      増減表形式で示すことが推奨される。また、IAS 16（有形固定資産）との
      比較可能性の観点から、同一財務諸表の表示様式に統合する場合は
      その旨と金額を注記で別掲する。
    target_sections:
      - "注記事項（使用権資産）"
      - "注記事項（リース）"
    required_items:
      - "資産クラス別ROU資産帳簿価額（期首・当期増加・当期減少・期末）"
      - "主要な資産クラスの定義（分類基準の説明）"
      - "有形固定資産と統合表示する場合の区分金額の別掲注記"
      - "当期末における重要なリース物件の概要（件数・総床面積等）"
    applicable_markets:
      - "プライム"
      - "スタンダード"
      - "グロース"
    notes: >
      不動産リースのウェイトが高い小売・ホテル・物流業では、
      オフィス・店舗・倉庫別の内訳開示が投資家から特に注目される。
      ESG観点からは占有面積・エネルギー効率との連動情報も有用。
    tier_requirement:
      ume: "任意"
      take: "必須"
      matsu: "必須"

  # ──────────────────────────────────────────
  # 【第9群】リース負債の満期分析
  # ──────────────────────────────────────────

  - id: "ifrs16-2025-009"
    category: "IFRS（リース）"
    change_type: "継続必須"
    effective_from: "2019-01-01"
    title: "リース負債の満期分析（1年以内・1〜5年・5年超）の開示"
    source: "https://www.ifrs.org/issued-standards/list-of-standards/ifrs-16-leases/"
    source_confirmed: true
    summary: >
      IFRS 16第58条(b)に基づくリース負債の満期分析の開示要件。
      借手は、リース負債のキャッシュフローを残存リース期間別に区分して
      「1年以内」「1年超5年以内」「5年超」の最低3区分で開示する（割引前）。
      この満期分析は流動性リスク開示（IFRS 7第39条）の一部を構成する。
      IFRS 16第58条との整合性を確認し、財務活動のキャッシュフローで
      認識されるリース負債の返済額（IFRS 16第50条(b)）と
      金額が対応していることを担保する。
    target_sections:
      - "注記事項（リース）"
      - "流動性リスク管理"
    required_items:
      - "リース負債の残存期間別将来キャッシュフロー（割引前）：1年以内"
      - "リース負債の残存期間別将来キャッシュフロー（割引前）：1〜5年"
      - "リース負債の残存期間別将来キャッシュフロー（割引前）：5年超"
      - "割引前合計と財務諸表上のリース負債帳簿価額との調整表"
    applicable_markets:
      - "プライム"
      - "スタンダード"
      - "グロース"
    notes: >
      IFRS 7の流動性リスク開示と重複するため、一体化した表で開示する企業が多い。
      長期不動産リース（10年・20年超）を多数保有する企業では5年超区分の
      金額が大きくなるため、その内容と管理方針の説明が求められる。
    tier_requirement:
      ume: "必須"
      take: "必須"
      matsu: "必須"

  # ──────────────────────────────────────────
  # 【第10群】リース関連キャッシュフロー
  # ──────────────────────────────────────────

  - id: "ifrs16-2025-010"
    category: "IFRS（リース）"
    change_type: "継続必須"
    effective_from: "2019-01-01"
    title: "リースに関連するキャッシュフロー情報の開示"
    source: "https://www.ifrs.org/issued-standards/list-of-standards/ifrs-16-leases/"
    source_confirmed: true
    summary: >
      IFRS 16第50条・第53条に基づくリース関連キャッシュフロー情報の開示要件。
      借手は、①リース負債の元本返済額（財務活動）、②リース負債の利息支払額
      （財務活動または営業活動、会計方針に従い分類）、③短期リース・少額資産
      リース料・変動リース料の支払額（営業活動）を区分して開示する。
      また、リース負債のノンキャッシュ取引（新規リースの開始・条件変更による
      負債の増減）についても、キャッシュフロー計算書の補足情報として開示する。
    target_sections:
      - "注記事項（リース）"
      - "キャッシュフロー計算書関連注記"
    required_items:
      - "リース負債の元本返済額（当期キャッシュアウトフロー）"
      - "リース負債の利息支払額（当期キャッシュアウトフロー）"
      - "短期リース・少額資産・変動リース料の支払総額"
      - "リース契約の新規締結等によるノンキャッシュ取引額（ROU資産・リース負債増加）"
    applicable_markets:
      - "プライム"
      - "スタンダード"
      - "グロース"
    notes: >
      IFRS 16導入によりキャッシュフロー計算書の財務活動CFが増加するため、
      オペレーティングリース料が営業CFから財務CF（元本）＋財務CF（利息）に
      移行した影響を、比較期間の遡及適用有無と合わせて説明することが有用。
    tier_requirement:
      ume: "必須"
      take: "必須"
      matsu: "必須"

  # ──────────────────────────────────────────
  # 【第11群】COVID-19後の賃料減免
  # ──────────────────────────────────────────

  - id: "ifrs16-2025-011"
    category: "IFRS（リース）"
    change_type: "修正推奨"
    effective_from: "2021-04-01"
    title: "COVID-19後の賃料減免（Rent Concessions）の実務対応の開示"
    source: "https://www.ifrs.org/news-and-events/news/2021/03/iasb-extends-covid-19-related-rent-concessions/"
    source_confirmed: true
    summary: >
      IFRS 16改訂（2020年5月・2021年3月）で導入された、COVID-19に関連する
      賃料減免の実務的救済措置（Practical Expedient）の開示要件。
      借手は、リース条件変更に通常求められる判定（別個リースか否か）を行わずに、
      賃料減免を変動リース料として直接損益認識することが認められる。
      2021年3月の改訂では適用期限を2022年6月末まで延長し、
      さらに一部の賃料減免は2023年以降も継続対応を求める事例がある。
      2025年においては過渡期適用の最終状況および通常処理への移行完了を開示する。
    target_sections:
      - "重要な会計方針"
      - "注記事項（リース）"
      - "COVID-19関連の会計上の影響"
    required_items:
      - "賃料減免実務的救済措置の適用有無（適用している場合は適用期間）"
      - "救済措置を適用して損益認識した賃料減免額（当期・累計）"
      - "通常のリース条件変更処理への移行完了の確認または残存対応の概要"
      - "2025年度以降も継続する賃料交渉・減免合意がある場合の影響額"
    applicable_markets:
      - "プライム"
      - "スタンダード"
      - "グロース"
    notes: >
      2025年度は多くの企業でCOVID-19救済措置の適用が終了しているが、
      長期不動産リースの賃料再交渉が継続している企業では通常の
      リース条件変更（ifrs16-2025-006参照）として処理する。
      適用終了した場合でも、累計影響額を参考開示する企業が見られる。
    tier_requirement:
      ume: "任意"
      take: "任意"
      matsu: "推奨"
