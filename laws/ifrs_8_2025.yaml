# disclosure-multiagent — 法令・ガイダンス情報 YAML
# カテゴリ: IFRS 8（事業セグメント）
# 対象期間: 2025年度（2025-04-01〜2026-03-31）
# スキーマ定義: docs/law_yaml_schema.md
# 作成者: Majiro-ns
#
# 根拠法令・基準:
#   IFRS 8 Operating Segments（IASB, 2006年公表 / 2009年1月1日以降適用）
#   IFRS 18 Presentation and Disclosure in Financial Statements
#     （IFRS 8への結果的修正: 営業利益の定義・CODMの開示要件強化）
#   IASB Post-implementation Review of IFRS 8 Operating Segments（2013年）
#
# 主要ポイント（IFRS 8の骨子）:
#   (1) マネジメントアプローチ — CODMへの内部報告情報を基礎とするセグメント識別
#   (2) 量的閾値（10%ルール）— 収益・利益・資産のいずれかが全体の10%以上
#   (3) セグメント損益はIFRS準拠でなく経営管理ベースの数値の開示が認められる
#   (4) 企業全体の情報（地域別・主要顧客）— セグメント開示と独立した要件
#   (5) IFRS 18結果的修正 — 営業利益の定義・CODMの役割開示が新たに強化
#
# 注意事項:
#   日本においてIFRS任意適用企業（2025年3月末時点 約270社）が主な対象。
#   マネジメントアプローチのため、同業他社比較が困難になる課題が指摘されている。
#   IFRS 18の強制適用（2027年1月1日〜）に伴い、IFRS 8への結果的修正が生じる。
#   松竹梅の基準:
#     梅 = セグメント損益の開示 + 地域別収益（最低限のセグメント情報）
#     竹 = CODM説明 + セグメント資産 + セグメント間取引方針
#     松 = IFRS 18整合性 + CODM意思決定プロセス + 戦略的セグメント説明

version: "1.0"
effective_period:
  from: "2025-04-01"
  to: "2026-03-31"

amendments:

  # ──────────────────────────────────────────
  # 【第1群】報告セグメントの識別・決定
  # ──────────────────────────────────────────

  - id: "ifrs8-2025-001"
    category: "IFRS（事業セグメント）"
    change_type: "継続必須"
    effective_from: "2025-04-01"
    title: "IFRS 8 — セグメントの識別基準（CODM・マネジメントアプローチ）"
    source: "https://www.ifrs.org/issued-standards/list-of-standards/ifrs-8-operating-segments/"
    source_confirmed: false
    summary: >
      IFRS 8の根幹となるマネジメントアプローチに基づくセグメント識別の開示要件。
      最高経営意思決定者（CODM: Chief Operating Decision Maker）が
      業績の評価・資源配分の意思決定に使用する内部報告情報を基礎として
      事業セグメントを識別する。CODMの定義（個人またはグループ）、
      CODMが定期的に受領・使用する内部報告の構造・頻度・内容、
      セグメントを構成するビジネス活動の性質についての説明が求められる。
      セグメントの識別においては、収益を稼得しかつ費用を発生させる
      ビジネス活動、CODM による定期的な業績評価、
      個別財務情報が入手可能であることの3条件をすべて満たすことが必要。
    target_sections:
      - "セグメント情報"
      - "重要な会計方針（セグメント会計方針）"
    required_items:
      - "CODMの定義（役職名・委員会名等）と役割の説明"
      - "事業セグメントの識別根拠（マネジメントアプローチの適用方針）"
      - "各セグメントを構成するビジネス活動の性質の説明"
      - "CODMへの内部報告と外部開示セグメントの対応関係の説明"
    applicable_markets:
      - "プライム"
      - "スタンダード"
      - "グロース"
    notes: >
      CODMは経営者個人（CEO・CFO等）のほか取締役会・経営会議等の
      グループとなる場合もあり、その実態を開示することが求められる。
      IFRS 18結果的修正によりCODM開示要件がさらに強化される（ifrs8-2025-008参照）。
    tier_requirement:
      ume: "必須"
      take: "必須"
      matsu: "必須"

  - id: "ifrs8-2025-002"
    category: "IFRS（事業セグメント）"
    change_type: "継続必須"
    effective_from: "2025-04-01"
    title: "IFRS 8 — 報告セグメントの決定（量的閾値10%ルール・集約基準）"
    source: "https://www.ifrs.org/issued-standards/list-of-standards/ifrs-8-operating-segments/"
    source_confirmed: false
    summary: >
      事業セグメントを報告セグメントとして外部開示するかどうかを決定する基準の開示要件。
      量的閾値（10%ルール）として、(a)収益合計が全セグメント収益合計の10%以上、
      (b)利益または損失の絶対値が全報告セグメントの利益合計または損失合計の
      大きいほうの10%以上、(c)資産合計が全セグメント資産合計の10%以上、
      のいずれかを満たすセグメントは報告セグメントとなる。
      また、複数のセグメントを集約して1つの報告セグメントとして開示するためには、
      事業の性質・製品サービス・生産プロセス・顧客の種類・流通方法・
      規制環境が類似しているという集約基準を満たす必要がある。
      報告セグメントの外部収益合計が企業全体収益の75%以上になるまで
      セグメントを追加することも規定されており（75%テスト）、
      その判断根拠の開示が求められる。
    target_sections:
      - "セグメント情報"
      - "重要な会計方針（セグメント会計方針）"
    required_items:
      - "報告セグメントの数と各セグメントの名称"
      - "量的閾値（10%ルール）の適用結果と報告セグメント決定の根拠"
      - "セグメント集約を行った場合は集約根拠（類似性の説明）"
      - "75%テストの充足状況（報告セグメント外部収益の合計比率）"
      - "その他セグメントに含まれるビジネス活動の概要"
    applicable_markets:
      - "プライム"
      - "スタンダード"
      - "グロース"
    notes: >
      集約基準の適用は慎重な判断が求められ、画一的な適用は認められない。
      報告セグメント数が多い場合（概ね10超）は過剰細分化の観点から
      集約の検討が必要。一方で少なすぎる場合は情報有用性の懸念がある。
    tier_requirement:
      ume: "必須"
      take: "必須"
      matsu: "必須"

  # ──────────────────────────────────────────
  # 【第2群】セグメント損益・資産・負債の測定と開示
  # ──────────────────────────────────────────

  - id: "ifrs8-2025-003"
    category: "IFRS（事業セグメント）"
    change_type: "継続必須"
    effective_from: "2025-04-01"
    title: "IFRS 8 — セグメント損益の測定基準（IFRS準拠 vs 経営管理ベース）"
    source: "https://www.ifrs.org/issued-standards/list-of-standards/ifrs-8-operating-segments/"
    source_confirmed: false
    summary: >
      IFRS 8では、セグメント損益の測定はCODMへの内部報告に用いられる
      経営管理ベースの数値（IFRS準拠でない場合を含む）を開示することが認められる。
      このマネジメントアプローチのため、セグメント損益と連結財務諸表の損益との間に
      差異が生じることがある。開示に際しては、(a)CODMへ報告されるセグメント損益の
      測定方法（含まれる項目・除外される項目の説明）、(b)IFRS採用企業との
      差異が生じる項目（株式報酬費用・のれん償却・組替調整等）の調整表、
      (c)セグメント合計から連結損益への調整（セグメント間消去・本社費用配賦等）が
      求められる。また、IFRS 18の強制適用（2027年〜）以降は、
      セグメント合計の利益措置が連結の営業利益と整合するよう調整表を
      追加開示することが求められる。
    target_sections:
      - "セグメント情報"
      - "セグメント損益の調整表"
    required_items:
      - "各報告セグメントの収益（外部顧客・セグメント間を区分）"
      - "各報告セグメントの損益（CODMへ報告される測定基準による）"
      - "セグメント損益の測定方法の説明（含まれる/除外される主要項目）"
      - "セグメント合計損益から連結損益への調整表（差異の内訳）"
    applicable_markets:
      - "プライム"
      - "スタンダード"
      - "グロース"
    notes: >
      調整表の「調整・消去」欄は、セグメント間利益消去・本社費用・
      未配賦項目等の内訳を分解して記載することで投資家の理解度が向上する。
      IFRS 18適用後は調整表に連結営業利益との対応関係の追加が必要。
    tier_requirement:
      ume: "必須"
      take: "必須"
      matsu: "必須"

  - id: "ifrs8-2025-004"
    category: "IFRS（事業セグメント）"
    change_type: "継続必須"
    effective_from: "2025-04-01"
    title: "IFRS 8 — セグメント資産・負債の開示（CODMに定期報告されている場合）"
    source: "https://www.ifrs.org/issued-standards/list-of-standards/ifrs-8-operating-segments/"
    source_confirmed: false
    summary: >
      セグメント資産・負債の開示は、CODMに対してその情報が
      定期的に提供・使用されている場合にのみ要求される。
      セグメント資産については、資産額がCODMへの内部報告に含まれる場合、
      各報告セグメントの資産合計と連結資産合計への調整表の開示が必要。
      セグメント負債も同様の条件（CODMへの定期報告）が満たされる場合に
      開示が求められる。また、資産測定に重要な影響を及ぼす項目として、
      持分法適用会社への投資残高（CODMに報告される場合）および
      設備投資額・減価償却費・のれん等の追加情報の開示が必要となる。
      セグメント資産合計と連結総資産との調整表（未配賦資産・消去を含む）も必須。
    target_sections:
      - "セグメント情報"
      - "セグメント資産・負債の調整表"
    required_items:
      - "各報告セグメントの資産合計（CODMへ報告される測定基準による）"
      - "セグメント資産合計から連結総資産への調整表"
      - "設備投資額（有形固定資産・無形資産の取得額）の各セグメント内訳"
      - "減価償却費・重要な非現金項目の各セグメント内訳（CODMへ報告される場合）"
      - "持分法適用会社への投資残高（CODMへ報告される場合）"
    applicable_markets:
      - "プライム"
      - "スタンダード"
      - "グロース"
    notes: >
      セグメント負債の開示はCODMへの報告がない場合は不要だが、
      開示する場合は連結負債合計との調整表も必要。
      多くの企業では負債をセグメントに配賦していないため未開示が多いが、
      金融セグメントを持つ企業では開示が求められるケースが多い。
    tier_requirement:
      ume: "推奨"
      take: "必須"
      matsu: "必須"

  # ──────────────────────────────────────────
  # 【第3群】セグメント間取引・企業全体の情報
  # ──────────────────────────────────────────

  - id: "ifrs8-2025-005"
    category: "IFRS（事業セグメント）"
    change_type: "継続必須"
    effective_from: "2025-04-01"
    title: "IFRS 8 — セグメント間取引の会計方針と消去方法"
    source: "https://www.ifrs.org/issued-standards/list-of-standards/ifrs-8-operating-segments/"
    source_confirmed: false
    summary: >
      セグメント間取引（内部売上・内部振替等）の会計方針および
      連結消去の方法に関する開示要件。IFRS 8では、セグメント間収益を
      外部顧客からの収益と区分して開示することが要求される。
      セグメント間取引の測定基準（移転価格の設定方針：市場価格・コストプラス・
      ネゴシエーション方式等）を注記で説明することが求められる。
      また、連結損益計算書や連結貸借対照表への調整においては、
      セグメント間収益・費用の消去額を調整表の独立した項目として表示し、
      重要なセグメント間取引の性質・条件についての説明も推奨される。
    target_sections:
      - "セグメント情報"
      - "重要な会計方針（セグメント間取引）"
      - "関連当事者取引（内部取引が重要な場合）"
    required_items:
      - "セグメント間収益の金額（各報告セグメント別）"
      - "セグメント間取引の測定基準（移転価格設定方針）の説明"
      - "調整表におけるセグメント間消去額の内訳"
    applicable_markets:
      - "プライム"
      - "スタンダード"
      - "グロース"
    notes: >
      セグメント間取引の移転価格は企業グループ内のビジネス実態を反映するため、
      恣意的な価格設定がないことを説明することが投資家対応として重要。
      移転価格の変更があった場合はその旨と財務諸表への影響額の開示が必要。
    tier_requirement:
      ume: "推奨"
      take: "必須"
      matsu: "必須"

  - id: "ifrs8-2025-006"
    category: "IFRS（事業セグメント）"
    change_type: "継続必須"
    effective_from: "2025-04-01"
    title: "IFRS 8 — 企業全体の情報（製品サービス別・地域別・主要顧客別）"
    source: "https://www.ifrs.org/issued-standards/list-of-standards/ifrs-8-operating-segments/"
    source_confirmed: false
    summary: >
      IFRS 8第31〜34項に規定される企業全体の情報開示要件。
      セグメント別の開示とは独立した要件として、3つの観点からの情報開示が求められる。
      (1)製品・サービス別収益: 各製品ラインまたはサービス類型ごとの
      外部顧客からの収益（実務上不可能な場合を除く）。
      (2)地域別情報: 国内と海外を区分した外部顧客からの収益、
      および非流動資産（有形固定資産・無形資産・使用権資産等）の
      所在地別合計額（重要な単一国は個別開示、その他は一括）。
      (3)主要顧客情報: 単一外部顧客が企業全体収益の10%以上を占める場合、
      その顧客の存在と当該顧客に帰属するセグメント別収益の開示（顧客名の開示は不要）。
    target_sections:
      - "セグメント情報"
      - "地域別情報"
      - "主要顧客情報"
    required_items:
      - "製品・サービス類型別の外部顧客からの収益"
      - "地域別外部顧客収益（国内・海外の主要国別）"
      - "地域別非流動資産（国内・海外の主要国別）"
      - "10%以上の外部顧客が存在する場合の当該顧客帰属収益とセグメント"
    applicable_markets:
      - "プライム"
      - "スタンダード"
      - "グロース"
    notes: >
      地域別収益は梅レベルの最低限開示要件として位置づける。
      製品サービス別収益はIFRS 15との連携（収益認識注記との整合）が重要。
      IFRS 15の契約区分とIFRS 8の製品サービス区分が異なる場合は
      相互の調整表または説明を付すことが推奨される。
    tier_requirement:
      ume: "必須"
      take: "必須"
      matsu: "必須"

  # ──────────────────────────────────────────
  # 【第4群】IFRS 18との整合性・CODM開示強化（新要件）
  # ──────────────────────────────────────────

  - id: "ifrs8-2025-007"
    category: "IFRS（事業セグメント）"
    change_type: "追加推奨"
    effective_from: "2027-01-01"
    title: "IFRS 8 × IFRS 18 — 営業利益のセグメント間一致（結果的修正）"
    source: "https://www.ifrs.org/issued-standards/list-of-standards/ifrs-18-presentation-and-disclosure-in-financial-statements/"
    source_confirmed: false
    summary: >
      IFRS 18の公表に伴うIFRS 8への結果的修正（consequential amendments）として、
      セグメント損益の合計と連結損益計算書の営業利益（IFRS 18定義）との
      整合性を確保するための調整開示が新たに求められる。
      IFRS 18ではすべての企業に営業利益の小計（IFRS 18が定義する営業区分の合計）の
      表示が義務化され、この連結営業利益とセグメント損益の合計との差異（存在する場合）を
      調整表で説明する必要がある。具体的には、(a)経営管理ベースのセグメント損益に
      含まれるIFRS 18営業区分外の項目（投資区分・財務区分の収益費用等）、
      (b)連結調整（セグメント間消去・本社費用・のれん等）の性質別内訳を
      IFRS 18の区分と対応させた形式で開示することが求められる。
    target_sections:
      - "セグメント情報"
      - "セグメント損益の調整表"
      - "損益計算書（IFRS 18区分対応）"
    required_items:
      - "セグメント損益合計とIFRS 18定義の連結営業利益との調整表"
      - "調整項目の性質別内訳（IFRS 18の区分への分類付き）"
      - "経営管理ベース測定値とIFRS基準値の主要差異の説明"
    applicable_markets:
      - "プライム"
      - "スタンダード"
      - "グロース"
    notes: >
      IFRS 18強制適用は2027年1月1日以降開始年度（3月決算は2027年3月期〜）。
      2025〜2026年度は移行準備期間として影響分析・開示プロセス設計を推奨。
      早期適用企業は2025年度から本要件への対応が必要。
    tier_requirement:
      ume: "任意"
      take: "推奨"
      matsu: "必須"

  - id: "ifrs8-2025-008"
    category: "IFRS（事業セグメント）"
    change_type: "追加推奨"
    effective_from: "2027-01-01"
    title: "IFRS 8 × IFRS 18 — CODMの役割・意思決定プロセスの開示強化"
    source: "https://www.ifrs.org/issued-standards/list-of-standards/ifrs-18-presentation-and-disclosure-in-financial-statements/"
    source_confirmed: false
    summary: >
      IFRS 18の結果的修正によりIFRS 8に追加されるCODM開示要件の強化内容。
      IFRS 18はMPM（Management Performance Measures: 経営陣が定義する非GAAP指標）
      の開示を義務化しており、これとIFRS 8のCODM概念の整合性を確保する観点から、
      CODMの意思決定プロセスに関するより詳細な開示が求められる。
      具体的には、(a)CODMが業績評価に使用するKPI・指標の名称と定義、
      (b)当該指標がIFRS 18のMPMに該当するかの判定根拠、
      (c)CODMへの報告頻度・報告形式の概要、(d)セグメント業績評価の
      目標設定プロセス（予算・中期計画とのリンク）についての説明が
      財務諸表注記または経営者説明部分に記載されることが推奨される。
    target_sections:
      - "セグメント情報"
      - "経営成績等の状況（CODM説明）"
      - "重要な会計方針（セグメント会計方針）"
    required_items:
      - "CODMが業績評価に使用する主要指標の名称・定義・算出方法"
      - "当該指標とIFRS 18 MPMとの関係（該当・非該当の判定）"
      - "CODMへの内部報告の頻度・形式・内容の概要"
      - "セグメント業績目標の設定プロセスの概要（任意だが推奨）"
    applicable_markets:
      - "プライム"
      - "スタンダード"
      - "グロース"
    notes: >
      MPMに該当する指標（例: 調整後EBITDA・コアEPS等）はIFRS 18の
      MPM開示規定（IFRS 8との調整表を含む）が適用される。
      CODMが使用する指標とMPMの整合性確保が2027年以降の実務上の主要課題。
    tier_requirement:
      ume: "推奨"
      take: "推奨"
      matsu: "必須"

  # ──────────────────────────────────────────
  # 【第5群】セグメント変更・遡及修正
  # ──────────────────────────────────────────

  - id: "ifrs8-2025-009"
    category: "IFRS（事業セグメント）"
    change_type: "継続必須"
    effective_from: "2025-04-01"
    title: "IFRS 8 — セグメント変更時の過年度遡及修正再表示"
    source: "https://www.ifrs.org/issued-standards/list-of-standards/ifrs-8-operating-segments/"
    source_confirmed: false
    summary: >
      報告セグメントの定義・構成・測定方法に変更が生じた場合の
      遡及修正再表示（restatement）に関する開示要件。
      企業が組織再編・事業再構築・M&A等によりセグメント構成を変更した場合、
      または内部管理体制の変更によりCODMへの報告構造が変わった場合には、
      比較年度（通常は前連結会計年度）のセグメント情報を新たな
      セグメント区分に基づいて遡及修正再表示することが原則として求められる。
      遡及修正が実務上不可能な場合は、新旧両方のセグメント区分による
      セグメント情報を変更年度に開示する経過措置が認められる。
      変更の理由・内容・影響についての定性的・定量的説明が必要。
    target_sections:
      - "セグメント情報"
      - "会計方針の変更・遡及修正"
    required_items:
      - "セグメント変更の理由と変更内容の説明（組織再編・CODMの変更等）"
      - "変更後セグメント区分による比較年度セグメント情報の遡及修正再表示"
      - "遡及修正が不可能な場合は新旧両区分のセグメント情報の開示"
      - "変更によるセグメント損益・資産への影響額の説明"
    applicable_markets:
      - "プライム"
      - "スタンダード"
      - "グロース"
    notes: >
      セグメント変更は投資家・アナリストの継続的な業績比較を困難にするため、
      変更の必要性・背景の十分な説明と複数年分の比較データの提供が
      投資家対応として重要。特に大型M&A・事業売却後の再編は
      詳細な説明が期待される。
    tier_requirement:
      ume: "必須"
      take: "必須"
      matsu: "必須"
