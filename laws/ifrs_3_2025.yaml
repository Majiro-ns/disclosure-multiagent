# disclosure-multiagent — 法令・ガイダンス情報 YAML
# カテゴリ: IFRS 3（企業結合）
# 対象期間: 2025年度（2025-04-01〜2026-03-31）
# スキーマ定義: docs/law_yaml_schema.md
# 作成者: Majiro-ns
#
# 根拠法令・基準:
#   IFRS 3 Business Combinations（IASB, 2008年改訂 / 2009年7月1日以降適用）
#   IFRS 10 Consolidated Financial Statements（支配概念との整合）
#   IAS 36 Impairment of Assets（のれん減損テストとの連携）
#   IAS 38 Intangible Assets（識別可能無形資産のPPA）
#   IASB Post-implementation Review of IFRS 3（2015年）
#
# 主要ポイント（IFRS 3の骨子）:
#   (1) 取得法 — 全ての企業結合に取得法を適用（持分の結合法は廃止）
#   (2) 取得日の識別 — 支配獲得日が取得日（合意日・クロージング日ではない）
#   (3) 対価の公正価値測定 — 現金・株式・条件付対価・既存関係の清算含む
#   (4) 識別可能資産・負債の公正価値計上 — PPA（Purchase Price Allocation）
#   (5) のれん = 移転対価 + NCI + 取得前持分 − 識別可能純資産公正価値
#   (6) 非支配持分（NCI）の測定は公正価値法または純資産持分法の選択制
#   (7) 取得関連コスト（法務費・アドバイザリー費）は費用処理（資産計上禁止）
#
# 松竹梅の基準:
#   梅 = 取得の概要（取得日・取得企業名・事業内容） + 移転対価合計 + のれん額
#   竹 = 公正価値測定詳細（識別可能資産の内訳・PPA主要項目） + NCI測定方法選択 + 条件付対価
#   松 = シナジー分析（定量・定性） + PPAの主要仮定と感応度 + 取得後業績への影響

version: "1.0"
effective_period:
  from: "2025-04-01"
  to: "2026-03-31"

amendments:

  # ──────────────────────────────────────────
  # 【第1群】取得法の適用・識別
  # ──────────────────────────────────────────

  - id: "ifrs3-2025-001"
    category: "IFRS（企業結合）"
    change_type: "継続必須"
    effective_from: "2025-04-01"
    title: "IFRS 3 — 取得法の適用（取得日・取得企業の識別）"
    source: "https://www.ifrs.org/issued-standards/list-of-standards/ifrs-3-business-combinations/"
    source_confirmed: false
    summary: >
      IFRS 3は全ての企業結合に取得法の適用を求める。取得法の適用にあたり、
      まず取得企業（acquirer）を識別し、次に取得日（acquisition date）を決定する。
      取得企業の識別は「どの結合企業が他方の企業を支配するに至ったか」の判断であり、
      通常は対価を支払った企業・大多数の持分を取得した企業が取得企業となるが、
      リバースアクイジション（逆取得）の場合は例外的な取り扱いとなる。
      取得日は被取得企業に対する支配が移転した日であり、通常はクロージング日（決済完了日）だが、
      契約条件によっては異なる場合がある。開示においては取得日・取得企業名・被取得企業の
      主要な事業内容・取得の主要な目的（戦略的理由・シナジー）の説明が求められる。
    target_sections:
      - "企業結合の注記（概要）"
      - "重要な会計方針（企業結合の会計処理）"
    required_items:
      - "取得日（acquisition date）の明示"
      - "取得企業および被取得企業の名称・事業概要"
      - "取得の主要な目的（戦略的理由・期待シナジーの説明）"
      - "取得後に被取得企業をどのように統合するかの概要"
    applicable_markets:
      - "プライム"
      - "スタンダード"
    notes: "リバースアクイジションの場合、法的取得企業が会計上の被取得企業となる。IFRS 10の支配概念との整合を確認すること"
    tier_requirement:
      ume: "必須"
      take: "必須"
      matsu: "必須"

  # ──────────────────────────────────────────
  # 【第2群】移転対価・識別可能資産負債の測定
  # ──────────────────────────────────────────

  - id: "ifrs3-2025-002"
    category: "IFRS（企業結合）"
    change_type: "継続必須"
    effective_from: "2025-04-01"
    title: "IFRS 3 — 移転対価の測定（条件付対価・株式交換・非現金対価）"
    source: "https://www.ifrs.org/issued-standards/list-of-standards/ifrs-3-business-combinations/"
    source_confirmed: false
    summary: >
      取得法における移転対価（consideration transferred）は、取得日の公正価値で測定する。
      対価の構成要素には現金・現金同等物のほか、発行した持分金融商品（株式）、
      条件付対価（contingent consideration）、既存関係の清算（pre-existing relationships）が含まれる。
      条件付対価は取得日時点の公正価値で計上し、負債に分類された場合は取得日後も
      公正価値で再測定して損益計上する（資本に分類の場合は再測定不要）。
      株式を対価とする場合は取得日の株価で測定。分割払いや繰延対価は現在価値に割り引く。
      対価の内訳（現金・株式・条件付対価・その他）と各構成要素の公正価値算定方法を開示する。
    target_sections:
      - "企業結合の注記（移転対価の内訳）"
      - "金融商品の公正価値測定"
    required_items:
      - "移転対価の総額（公正価値ベース）"
      - "対価の内訳（現金・株式・条件付対価・その他の区分）"
      - "条件付対価の条件・上限額・公正価値算定方法"
      - "株式対価の場合: 交付株式数・取得日株価・時価総額"
      - "繰延対価の割引率および現在価値計算根拠"
    applicable_markets:
      - "プライム"
      - "スタンダード"
    notes: "条件付対価がIFRS 9金融商品基準の適用を受けるか検討が必要。アーンアウト条項の分類（負債vs資本）に注意"
    tier_requirement:
      ume: "必須"
      take: "必須"
      matsu: "必須"

  - id: "ifrs3-2025-003"
    category: "IFRS（企業結合）"
    change_type: "継続必須"
    effective_from: "2025-04-01"
    title: "IFRS 3 — 識別可能資産・負債の公正価値測定（PPA）"
    source: "https://www.ifrs.org/issued-standards/list-of-standards/ifrs-3-business-combinations/"
    source_confirmed: false
    summary: >
      取得日において被取得企業の識別可能な資産および負債を公正価値で認識・測定する
      購買価格配分（PPA: Purchase Price Allocation）の開示要件。
      識別可能資産には、被取得企業の財務諸表に計上されていなかった無形資産
      （顧客関係・ブランド・技術・特許・受注残・有利リース等）も含めて認識が必要。
      IFRS 13公正価値測定の3階層（レベル1〜3）に基づき各資産・負債の公正価値を算定する。
      偶発負債は信頼性をもって測定できる場合に認識する。
      使用権資産（IFRS 16）の公正価値認識に係る実務上の簡便法の適用可否も検討が必要。
    target_sections:
      - "企業結合の注記（PPA・識別可能資産負債）"
      - "無形資産の注記"
      - "公正価値ヒエラルキー"
    required_items:
      - "取得した識別可能資産・引き受けた負債の主要項目と公正価値"
      - "取得前財務諸表に計上されていなかった無形資産の識別と評価額"
      - "無形資産の種類・耐用年数・公正価値算定方法（収益還元法・ロイヤルティ免除法等）"
      - "偶発負債の認識額と主要な前提条件"
      - "公正価値階層（レベル1〜3）への分類と主要観察不能インプット"
    applicable_markets:
      - "プライム"
      - "スタンダード"
    notes: "PPA未確定の場合（測定期間中）は暫定金額で開示し、確定後に遡及修正する（ifrs3-2025-007参照）"
    tier_requirement:
      ume: "推奨"
      take: "必須"
      matsu: "必須"

  # ──────────────────────────────────────────
  # 【第3群】のれん・非支配持分
  # ──────────────────────────────────────────

  - id: "ifrs3-2025-004"
    category: "IFRS（企業結合）"
    change_type: "継続必須"
    effective_from: "2025-04-01"
    title: "IFRS 3 — のれんの算定（正ののれん・負ののれん）"
    source: "https://www.ifrs.org/issued-standards/list-of-standards/ifrs-3-business-combinations/"
    source_confirmed: false
    summary: >
      のれん（goodwill）は以下の算式で算定する:
      のれん = 移転対価の公正価値 + 非支配持分の測定額 + 段階取得の既保有持分公正価値
               − 識別可能純資産の公正価値
      正ののれんは非償却で計上し、IAS 36に基づき毎年（兆候があればより頻繁に）
      減損テストを実施するCGU（資金生成単位）または複数CGUのグループに配分する。
      負ののれん（bargain purchase）が生じた場合は、識別可能資産・負債の再評価後も
      負の金額が残存する場合のみ、全額を取得日に利得として損益認識する。
      のれん発生の主な理由（シナジー・超過収益力・人的資本等）について定性的な説明が求められる。
    target_sections:
      - "企業結合の注記（のれんの算定）"
      - "のれんの注記"
      - "減損テスト（IAS 36）"
    required_items:
      - "のれんの算定表（移転対価・NCI・既保有持分・識別可能純資産・のれん額の内訳）"
      - "のれん発生の主要な理由（シナジーの性質・超過収益力の源泉）"
      - "のれんが配分されたCGUまたはCGUグループの識別"
      - "負ののれんが生じた場合: 認識額および利得の発生理由"
    applicable_markets:
      - "プライム"
      - "スタンダード"
    notes: "IAS 36減損テストとの連携が必須。回収可能価額の算定方法（使用価値vs売却コスト控除後公正価値）を記載すること"
    tier_requirement:
      ume: "必須"
      take: "必須"
      matsu: "必須"

  - id: "ifrs3-2025-005"
    category: "IFRS（企業結合）"
    change_type: "継続必須"
    effective_from: "2025-04-01"
    title: "IFRS 3 — 非支配持分（NCI）の測定方法選択（公正価値法 vs 純資産持分法）"
    source: "https://www.ifrs.org/issued-standards/list-of-standards/ifrs-3-business-combinations/"
    source_confirmed: false
    summary: >
      IFRS 3は、企業結合ごとに非支配持分（NCI: Non-controlling interests）の
      測定方法を選択することを認める（会計方針として固定ではなく取引ごとの選択）。
      選択肢は2つ: (1) 公正価値法（full goodwill method）— NCIを取得日の公正価値で測定し、
      のれん全額（取得企業分 + NCI分）を計上する。
      (2) 純資産持分法（proportionate share method）— NCIを識別可能純資産公正価値の
      持分割合相当額で測定し、のれんは取得企業持分分のみを計上する。
      選択した測定方法により計上されるのれん額が異なるため、選択理由・測定額の開示が重要。
    target_sections:
      - "企業結合の注記（NCI測定方法）"
      - "重要な会計方針（非支配持分）"
    required_items:
      - "NCI測定方法の選択（公正価値法 / 純資産持分法）"
      - "選択した測定方法によるNCIの金額"
      - "公正価値法の場合: NCI公正価値の算定根拠（株価・類似企業比較・DCF等）"
      - "各測定方法を選択した場合ののれん比較額（感応度情報として松レベルで推奨）"
    applicable_markets:
      - "プライム"
      - "スタンダード"
    notes: "部分取得（過半数未満取得）や段階取得の場合、NCIの測定方法選択が取得後の追加取得・売却の会計処理に影響する"
    tier_requirement:
      ume: "推奨"
      take: "必須"
      matsu: "必須"

  # ──────────────────────────────────────────
  # 【第4群】段階取得・特殊ケース
  # ──────────────────────────────────────────

  - id: "ifrs3-2025-006"
    category: "IFRS（企業結合）"
    change_type: "継続必須"
    effective_from: "2025-04-01"
    title: "IFRS 3 — 段階取得（step acquisition）の会計処理"
    source: "https://www.ifrs.org/issued-standards/list-of-standards/ifrs-3-business-combinations/"
    source_confirmed: false
    summary: >
      段階取得（step acquisition）とは、既に持分を保有している企業について
      追加取得により支配を獲得するケース。IFRS 3では取得日に既保有持分（previously held interest）を
      公正価値で再測定し、帳簿価額との差額を損益または その他の包括利益に認識する。
      のれん算定においては、再測定後の既保有持分公正価値を移転対価と同様に加算する。
      支配取得前に関連会社・共同支配投資先として持分法適用していた場合、
      取得日の公正価値への再測定により生じる差額はIFRS 3に基づき損益認識する。
      開示では取得前の持分比率・帳簿価額・再測定後公正価値・認識した損益の各金額が必要。
    target_sections:
      - "企業結合の注記（段階取得の詳細）"
      - "関連会社・共同支配投資の注記"
    required_items:
      - "支配獲得前に保有していた持分の比率および帳簿価額"
      - "取得日における既保有持分の公正価値"
      - "公正価値再測定により損益認識した金額"
      - "段階取得ののれん算定への影響額（既保有持分公正価値の算入額）"
    applicable_markets:
      - "プライム"
      - "スタンダード"
    notes: "取得前に持分法適用関連会社であった場合、IAS 28の持分法中止タイミングと損益認識に注意"
    tier_requirement:
      ume: "推奨"
      take: "必須"
      matsu: "必須"

  # ──────────────────────────────────────────
  # 【第5群】測定期間・費用処理・開示
  # ──────────────────────────────────────────

  - id: "ifrs3-2025-007"
    category: "IFRS（企業結合）"
    change_type: "継続必須"
    effective_from: "2025-04-01"
    title: "IFRS 3 — 測定期間中の暫定金額と確定後の遡及修正"
    source: "https://www.ifrs.org/issued-standards/list-of-standards/ifrs-3-business-combinations/"
    source_confirmed: false
    summary: >
      取得日から最長12ヶ月の測定期間（measurement period）において、
      PPA（識別可能資産・負債・のれんの公正価値測定）が確定していない場合は
      暫定金額（provisional amounts）で計上し、確定後に取得日へ遡及修正する。
      測定期間中に入手した新情報が取得日時点に存在した事実・状況を示す場合のみ遡及修正が認められ、
      取得日後に発生した事象（条件付対価の実績確定・偶発負債の解消等）は遡及修正ではなく
      期間損益として認識する。暫定金額を開示した場合、測定期間終了後に確定した金額と
      遡及修正の内容・金額・影響を開示する義務がある。
    target_sections:
      - "企業結合の注記（測定期間・暫定金額）"
      - "比較情報の遡及修正"
    required_items:
      - "暫定金額として計上した項目と金額"
      - "暫定計上の理由（未確定PPA項目の特定）"
      - "測定期間終了（確定）後の修正額と各財務諸表科目への影響"
      - "遡及修正した比較期間の開示（修正前・修正後の対比表）"
    applicable_markets:
      - "プライム"
      - "スタンダード"
    notes: "測定期間は取得日から最長12ヶ月。確定が早まった場合は早期終了する。測定期間後の修正は通常の誤謬訂正（IAS 8）として処理"
    tier_requirement:
      ume: "推奨"
      take: "必須"
      matsu: "必須"

  - id: "ifrs3-2025-008"
    category: "IFRS（企業結合）"
    change_type: "継続必須"
    effective_from: "2025-04-01"
    title: "IFRS 3 — 取得関連コストの費用処理"
    source: "https://www.ifrs.org/issued-standards/list-of-standards/ifrs-3-business-combinations/"
    source_confirmed: false
    summary: >
      取得関連コスト（acquisition-related costs）はIFRS 3のもとで費用処理が求められ、
      移転対価や識別可能資産・のれんに含めることは認められない。
      対象となる費用は法務費用・デューデリジェンス費用・ファイナンシャルアドバイザリー費用・
      会計士・バリュエーション専門家費用・組織再編費用・登録費用等。
      ただし、株式または負債証券の発行に直接帰属するコストはIFRS 9・IAS 32の規定に従い、
      それぞれ資本控除または実効金利に含めて処理する（費用処理の例外）。
      費用処理した取得関連コストの金額は開示が必要であり、大型M&Aでは
      アドバイザリー費用が数十億円規模となるため実務的な重要性が高い。
    target_sections:
      - "企業結合の注記（取得関連コスト）"
      - "販売費及び一般管理費の内訳"
    required_items:
      - "費用処理した取得関連コストの総額"
      - "主要なコスト区分（法務費・アドバイザリー費・DD費用等）の内訳"
      - "損益計算書上の計上区分（SG&A・その他費用等）の明示"
    applicable_markets:
      - "プライム"
      - "スタンダード"
    notes: "従来のIFRS 3（2004年版）では一部資産計上が認められていたが、2008年改訂で全額費用処理に変更。J-GAAPとの比較では重要な差異"
    tier_requirement:
      ume: "必須"
      take: "必須"
      matsu: "必須"

  - id: "ifrs3-2025-009"
    category: "IFRS（企業結合）"
    change_type: "継続必須"
    effective_from: "2025-04-01"
    title: "IFRS 3 — 開示要件（取得の概要・対価内訳・のれん発生要因・取得後業績）"
    source: "https://www.ifrs.org/issued-standards/list-of-standards/ifrs-3-business-combinations/"
    source_confirmed: false
    summary: >
      IFRS 3 第59〜63項が定める包括的な開示要件。財務諸表利用者が
      企業結合の性質・財務的影響を評価できるよう、以下の情報を開示する。
      (1) 取得概要: 取得日・企業名・事業内容・取得割合・取得の主要目的。
      (2) 移転対価の内訳: 現金・株式・条件付対価の区分別金額と算定方法。
      (3) 識別可能資産・負債の公正価値内訳（PPA完了済みの場合）。
      (4) のれん発生要因の定性的説明（期待シナジー・超過収益力・人的資本等）。
      (5) 取得後業績への影響: 取得後に含まれた収益・純損益。
          仮に期首に取得していた場合の連結収益・純損益（pro forma情報）。
      (6) 取得後の被取得企業の取得後業績が連結に含まれた金額。
