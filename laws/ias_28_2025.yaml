# disclosure-multiagent — 法令・ガイダンス情報 YAML
# カテゴリ: IFRS（持分法）
# 対象期間: 2025年度（2025-04-01〜2026-03-31）
# スキーマ定義: docs/law_yaml_schema.md
# 作成者: Majiro-ns
#
# 根拠法令・基準:
#   IAS 28 Investments in Associates and Joint Ventures (revised 2011): 持分法の適用
#   IFRS 10 Consolidated Financial Statements: 支配の定義（IAS 28との境界）
#   IFRS 11 Joint Arrangements: 共同支配企業・共同支配事業の区分
#   IFRS 12 Disclosure of Interests in Other Entities: 持分投資の開示要件
#   IAS 36 Impairment of Assets: 持分法適用投資の減損テスト
#   企業会計基準委員会（ASBJ）日本語版: https://www.asb.or.jp/jp/ifrs/ifrs_all/ias.html

version: "1.0"
effective_period:
  from: "2025-04-01"
  to: "2026-03-31"

amendments:

  # ──────────────────────────────────────────
  # 【第1群】識別・適用判定
  # ──────────────────────────────────────────

  - id: "ias28-2025-001"
    category: "IFRS（持分法）"
    change_type: "追加必須"
    effective_from: "2025-04-01"
    title: "関連会社・共同支配企業の識別と重要な影響力の判定"
    source: "https://www.ifrs.org/issued-standards/list-of-standards/ias-28-investments-in-associates-and-joint-ventures/"
    source_confirmed: true
    summary: >
      IAS 28.2〜25に基づく関連会社（associate）および共同支配企業（joint venture）の
      識別基準と重要な影響力（significant influence）の判定要件。
      重要な影響力とは、投資先の財務・営業方針の意思決定に参加する権限であり、
      支配（IFRS 10）または共同支配（IFRS 11）には至らないものを指す。
      議決権の20%以上50%以下を保有する場合は重要な影響力があると推定するが、
      反証が可能である（IAS 28.5〜7）。
      重要な影響力の存在を示すその他の指標として、（a）投資先の取締役会への参加、
      （b）配当・その他の分配に関する意思決定への参加、（c）重要な内部取引、
      （d）技術情報の交換、（e）管理職の相互派遣がある（IAS 28.6）。
      共同支配企業はIFRS 11に基づき持分法を適用し、共同支配事業は比例連結に類似した
      資産・負債・収益・費用の直接認識を行う（IFRS 11.24〜26）。
    target_sections:
      - "連結の範囲および持分法適用に関する注記"
      - "重要な会計方針（連結・持分法の方針）"
    required_items:
      - "重要な影響力ありと判定した根拠（議決権比率・指標の有無）"
      - "20%未満保有で重要な影響力ありと判断した関連会社の根拠"
      - "20%以上保有で重要な影響力なしと判断した場合の反証根拠"
      - "共同支配企業の持分法適用とIFRS 11に基づく区分（JV vs JO）"
      - "関連会社・共同支配企業の名称・所在地・持分比率・事業内容"
    applicable_markets:
      - "プライム"
      - "スタンダード"
      - "グロース"
    notes: >
      実質的支配概念（IFRS 10）の検討も並行して必要。
      外形上20%未満でも実質的影響力がある場合は関連会社に含める。
      投資先がファンド・特別目的会社（SPC）である場合は
      IFRS 10/11との関係整理が特に重要。
    tier_requirement:
      ume: "必須"
      take: "必須"
      matsu: "必須"

  - id: "ias28-2025-002"
    category: "IFRS（持分法）"
    change_type: "追加必須"
    effective_from: "2025-04-01"
    title: "持分法の適用手順 — 取得原価への持分変動の累積加算"
    source: "https://www.ifrs.org/issued-standards/list-of-standards/ias-28-investments-in-associates-and-joint-ventures/"
    source_confirmed: true
    summary: >
      IAS 28.26〜42に基づく持分法の適用手順と会計処理の開示要件。
      持分法の下では、投資をまず取得原価で認識し、その後、
      取得日以降の投資先の純資産の変動のうち投資者の持分に相当する部分を
      投資の帳簿価額に加減する（IAS 28.11）。
      投資先の当期純損益のうち投資者の持分相当額は「持分法による投資利益（損失）」として
      損益計算書に認識する。投資先のOCIの変動については、
      投資者のOCIとして認識する。
      取得時には投資先の識別可能な資産・負債の公正価値との差額（のれん相当分）を
      投資の帳簿価額に含め、別途のれんとして認識しない（IAS 28.32）。
      取得日以降に投資者の持分が変化する場合（持分の増減）は
      追加取得・一部処分として処理する。
    target_sections:
      - "持分法適用に関する注記"
      - "関連会社投資の増減表"
    required_items:
      - "期首帳簿価額・持分法損益・OCI・配当受取・為替換算・期末帳簿価額の増減表"
      - "取得原価とのれん相当額（取得時の公正価値差額）の開示"
      - "持分法による投資利益（損失）の金額と損益計算書上の表示区分"
      - "投資先のOCI変動のうち持分相当額の内容・金額"
    applicable_markets:
      - "プライム"
      - "スタンダード"
      - "グロース"
    notes: >
      IFRS 3（企業結合）の取得法に基づき投資先の取得日時点の識別可能資産・負債を
      公正価値で測定するが、持分法では連結貸借対照表に個別計上しない。
      のれん相当額は投資の帳簿価額の一部として含まれるため、
      IAS 36減損テストは投資全体に対して実施する（ias28-2025-004参照）。
    tier_requirement:
      ume: "必須"
      take: "必須"
      matsu: "必須"

  - id: "ias28-2025-003"
    category: "IFRS（持分法）"
    change_type: "追加必須"
    effective_from: "2025-04-01"
    title: "内部取引の未実現利益の消去 — 上流・下流取引の持分按分消去"
    source: "https://www.ifrs.org/issued-standards/list-of-standards/ias-28-investments-in-associates-and-joint-ventures/"
    source_confirmed: true
    summary: >
      IAS 28.28〜30に基づく、投資者と関連会社・共同支配企業間の
      内部取引（上流・下流取引）に係る未実現利益・損失の消去要件。
      投資者から関連会社への販売（下流取引：downstream）および
      関連会社から投資者への販売（上流取引：upstream）に係る未実現利益は、
      いずれも投資者の持分比率に応じて消去する（持分按分消去）。
      未実現損失については、移転された資産の減損の証拠がある場合は消去しない。
      連結子会社への全額消去（IAS 27/IFRS 10）とは異なり、
      持分比率按分の部分消去である点に注意が必要。
    target_sections:
      - "持分法適用に関する注記"
      - "関連当事者取引に関する注記（IAS 24）"
    required_items:
      - "重要な内部取引（上流・下流）の種類と金額"
      - "未実現利益消去の会計方針（持分按分消去の適用）"
      - "消去対象となった取引高・未実現利益消去額の開示"
      - "IAS 24（関連当事者）との重複開示の整合性確認"
    applicable_markets:
      - "プライム"
      - "スタンダード"
      - "グロース"
    notes: >
      グループ会社間の商品・サービス取引・不動産取引・金融取引が
      内部取引消去の対象となる。実務では下流取引（親→関連会社）のほうが
      管理しやすく、上流取引（関連会社→親）は関連会社側の在庫・固定資産に
      含まれる未実現利益の把握が難しい場合がある。
    tier_requirement:
      ume: "任意"
      take: "必須"
      matsu: "必須"

  # ──────────────────────────────────────────
  # 【第2群】減損・要約財務情報
  # ──────────────────────────────────────────

  - id: "ias28-2025-004"
    category: "IFRS（持分法）"
    change_type: "追加必須"
    effective_from: "2025-04-01"
    title: "関連会社投資の減損テスト — IAS 36との連携による回収可能価額評価"
    source: "https://www.ifrs.org/issued-standards/list-of-standards/ias-28-investments-in-associates-and-joint-ventures/"
    source_confirmed: true
    summary: >
      IAS 28.40〜43およびIAS 36に基づく、持分法適用投資（関連会社・共同支配企業）の
      減損テストの実施要件と開示。
      持分法適用投資の帳簿価額が回収可能価額（使用価値または正味売却価額のうち高い方）を
      超える場合に減損損失を認識する。IAS 36に基づき投資全体（のれん相当額を含む）を
      単一の資産として減損テストを実施する。
      減損の判定指標（IAS 28.41A）として、（a）重要な財務困難、（b）債務不履行・期限前返済、
      （c）借換えの困難、（d）倒産の可能性等がある場合に減損の客観的な証拠を検討する。
      減損損失の認識後に価値が回復した場合は、過去に認識した減損損失の範囲内で
      戻入れが可能（IAS 28.40→IAS 36.117〜119）。
    target_sections:
      - "持分法適用に関する注記"
      - "減損損失に関する注記"
    required_items:
      - "減損の判定指標の有無とその内容"
      - "回収可能価額の算定方法（使用価値DCF・正味売却価額）と主要仮定"
      - "認識した減損損失の金額・対象投資・損益計算書上の表示区分"
      - "減損損失戻入れがある場合の金額と根拠"
      - "持分法損失の累積により帳簿価額がゼロに達した投資の取り扱い"
    applicable_markets:
      - "プライム"
      - "スタンダード"
      - "グロース"
    notes: >
      持分法損失が持分投資額を超える場合、追加損失は認識しない
      （IAS 28.38）。ただし投資者が法的・推定的債務を負担している場合は例外。
      松ランクではDCF感応度（割引率・ターミナルグロースレートの変化による
      回収可能価額の変動）の開示が期待される。
    tier_requirement:
      ume: "必須"
      take: "必須"
      matsu: "必須"

  - id: "ias28-2025-005"
    category: "IFRS（持分法）"
    change_type: "追加必須"
    effective_from: "2025-04-01"
    title: "重要な関連会社の要約財務情報開示 — IFRS 12.B12〜B16に基づく開示"
    source: "https://www.ifrs.org/issued-standards/list-of-standards/ias-28-investments-in-associates-and-joint-ventures/"
    source_confirmed: true
    summary: >
      IFRS 12.B12〜B16に基づく、重要な（material）関連会社・共同支配企業の
      要約財務情報の開示要件。
      各重要な関連会社および共同支配企業について、（a）流動資産・非流動資産・
      流動負債・非流動負債の期末残高、（b）収益・当期純損益・継続事業損益・
      非継続事業損益・その他の包括利益・包括利益合計額を開示する（IFRS 12.B12）。
      共同支配企業については、（c）現金・現金同等物、（d）流動金融負債・非流動金融負債
      （引当金・貿易債務を除く）も追加開示が必要（IFRS 12.B14）。
      投資者の帳簿価額と投資先の純資産の持分相当額との調整表も含める。
    target_sections:
      - "重要な関連会社・共同支配企業に関する注記"
      - "持分法適用投資の開示"
    required_items:
      - "流動資産・非流動資産・流動負債・非流動負債の期末残高（各社別）"
      - "収益・当期純損益・OCI・包括利益合計（各社別）"
      - "共同支配企業の現金・流動/非流動金融負債（追加開示）"
      - "投資帳簿価額と持分相当純資産額の調整表（のれん・公正価値差額等）"
      - "重要性の判断基準（関連会社を重要・非重要に区分した基準）の説明"
    applicable_markets:
      - "プライム"
      - "スタンダード"
      - "グロース"
    notes: >
      上場関連会社については公開済み財務情報を引用でき、
      その場合はIFRS 12.B16が適用される。
      関連会社の決算日が投資者と異なる場合（3ヶ月以内）は
      最新の財務情報を使用するか、報告日の差異の影響を注記する。
    tier_requirement:
      ume: "任意"
      take: "必須"
      matsu: "必須"

  - id: "ias28-2025-006"
    category: "IFRS（持分法）"
    change_type: "追加必須"
    effective_from: "2025-04-01"
    title: "非重要な関連会社の集約開示 — IFRS 12.B16に基づくグループ開示"
    source: "https://www.ifrs.org/issued-standards/list-of-standards/ias-28-investments-in-associates-and-joint-ventures/"
    source_confirmed: true
    summary: >
      IFRS 12.B16に基づく、個別には重要でない（immaterial）関連会社・
      共同支配企業を集約してグループとして開示する要件。
      非重要な関連会社については、（a）当期純損益合計（継続事業・非継続事業別）、
      （b）その他の包括利益合計、（c）包括利益合計をグループとして集約開示する。
      集約開示は、重要な関連会社・共同支配企業の個別開示（ias28-2025-005）とは
      別に、残余グループとして一括表示する。
      重要性の判定は、投資帳簿価額・持分法損益・持分純資産等を基準に
      各社の定性・定量基準を組み合わせて行う。
    target_sections:
      - "重要でない関連会社・共同支配企業の集約開示"
      - "持分法適用投資の開示"
    required_items:
      - "非重要な関連会社グループの当期純損益合計（継続・非継続事業別）"
      - "非重要な関連会社グループのその他の包括利益合計"
      - "非重要な関連会社グループの包括利益合計"
      - "集約対象とした企業数と重要性判断の基準"
    applicable_markets:
      - "プライム"
      - "スタンダード"
      - "グロース"
    notes: >
      非重要な関連会社が多数（数十社以上）ある場合は集約開示が実務的。
      重要性の閾値設定（例：投資帳簿価額が連結純資産の1%未満）を
      会計方針として一貫して適用することが重要。
      松ランクでは、非重要扱いの境界に位置する企業について
      重要性判断の過程を追加開示する場合がある。
    tier_requirement:
      ume: "任意"
      take: "必須"
      matsu: "必須"

  # ──────────────────────────────────────────
  # 【第3群】会計方針統一・中止・開示
  # ──────────────────────────────────────────

  - id: "ias28-2025-007"
    category: "IFRS（持分法）"
    change_type: "追加必須"
    effective_from: "2025-04-01"
    title: "関連会社の会計方針の統一と報告日の差異の取り扱い"
    source: "https://www.ifrs.org/issued-standards/list-of-standards/ias-28-investments-in-associates-and-joint-ventures/"
    source_confirmed: true
    summary: >
      IAS 28.34〜37に基づく、関連会社・共同支配企業の会計方針の統一および
      報告日の差異に関する取り扱いの開示要件。
      持分法を適用する際、関連会社が投資者と異なる会計方針を使用している場合は、
      投資者の会計方針に合わせた調整を行った上で持分法を適用する（IAS 28.36）。
      ただし実務的でない場合はその旨を開示する。
      関連会社の報告期間が投資者と異なる場合（3ヶ月以内の差異まで許容）は、
      最新の財務諸表を使用するか、差異期間中の重要な取引・事象を調整する
      （IAS 28.33）。報告日の差異が3ヶ月を超える場合は同一決算日を使用しなければならない。
    target_sections:
      - "持分法適用に関する注記"
      - "重要な会計方針"
    required_items:
      - "関連会社の会計方針と投資者の方針が異なる場合の調整方針"
      - "実務的でない理由で調整を省略した場合の開示"
      - "報告日が異なる関連会社の決算日・差異日数と調整方法"
      - "報告日の差異期間中に発生した重要な取引・事象の内容"
    applicable_markets:
      - "プライム"
      - "スタンダード"
      - "グロース"
    notes: >
      日本の上場関連会社（3月決算）と海外関連会社（12月決算）の差異は
      最大3ヶ月で許容範囲内。ただし差異期間中に重要な取引（大型M&A・
      希薄化イベント等）がある場合は調整が必要。
      会計方針の差異としては、IFRS適用会社と現地基準適用会社の差異が典型例。
    tier_requirement:
      ume: "任意"
      take: "必須"
      matsu: "必須"

  - id: "ias28-2025-008"
    category: "IFRS（持分法）"
    change_type: "追加必須"
    effective_from: "2025-04-01"
    title: "持分法適用の中止判定と投資の処分・一部売却の会計処理"
    source: "https://www.ifrs.org/issued-standards/list-of-standards/ias-28-investments-in-associates-and-joint-ventures/"
    source_confirmed: true
    summary: >
      IAS 28.22〜24および28.44〜46に基づく、持分法適用の中止条件および
      投資の一部処分・全部処分時の会計処理と開示要件。
      重要な影響力を喪失した場合は持分法の適用を中止し、残存持分があれば
      IFRS 9（金融商品）として公正価値で再測定する（IAS 28.22）。
      再測定による差額は当期損益として認識する（IAS 28.22(a)）。
      投資の一部処分（持分比率の引き下げ）によって重要な影響力が維持される場合は、
      処分した比率に対応する持分法適用投資の帳簿価額を減額し、
      売却対価との差額を処分損益として認識する（IAS 28.23）。
      IFRS 5（売却目的保有）への分類判定も並行して確認する。
    target_sections:
      - "持分法適用の中止・関連会社の処分に関する注記"
      - "関連会社投資の増減表"
    required_items:
      - "重要な影響力喪失の判定根拠（議決権比率の変化・その他の指標）"
      - "持分法中止時の残存持分の公正価値再測定額と認識した損益"
      - "一部処分の処分対価・認識した処分損益・残余帳簿価額"
      - "IFRS 5売却目的保有への分類可否の検討結果"
      - "関連OCIの取り崩し（持分法中止時に損益への組み替え）"
    applicable_markets:
      - "プライム"
      - "スタンダード"
      - "グロース"
    notes: >
      持分法中止と同時に関連会社がグループ会社（子会社）に移行する場合は
      IFRS 3（企業結合）の取得法を適用し、既保有持分も公正価値で再測定する。
      持分法中止に際して認識していたOCI（為替換算差額・年金数理差異等）は
      損益に組み替える（リサイクリング）かどうかを各IFRS基準に従って判断する。
    tier_requirement:
      ume: "任意"
      take: "必須"
      matsu: "必須"

  - id: "ias28-2025-009"
    category: "IFRS（持分法）"
    change_type: "追加必須"
    effective_from: "2025-04-01"
    title: "持分法適用による損益・OCI・包括利益の損益計算書上の表示と開示"
    source: "https://www.ifrs.org/issued-standards/list-of-standards/ias-28-investments-in-associates-and-joint-ventures/"
    source_confirmed: true
    summary: >
      IAS 28.11および IFRS 12.B12〜B16に基づく、持分法適用による
      損益・その他の包括利益（OCI）・包括利益合計の表示と開示要件。
      持分法による投資利益（損失）は、損益計算書上の「営業利益」または
      「財務収益・費用」の直前に独立した行項目として表示することが一般的（IAS 28.11、
      IFRS 18 Appendix B以降はカテゴリ区分への対応も必要）。
      投資先のOCIのうち持分相当額（為替換算差額・確定給付制度の再測定・
      FVOCIの金融資産の評価差額等）は投資者のOCIとして認識する。
      各関連会社別の持分法損益の内訳開示（IFRS 12.B12）および
      当期と累積の未分配利益（制限送金がある場合）の開示も含まれる。
    target_sections:
      - "持分法適用に関する注記"
      - "財務諸表本表（包括利益計算書）"
    required_items:
      - "持分法による投資利益（損失）の合計額と損益計算書上の表示区分"
      - "各重要関連会社別の持分法損益の内訳"
      - "投資先OCI持分相当額の内訳（為替換算・確定給付・FVOCI等）"
      - "関連会社からの配当受取額（投資帳簿価額から控除した金額）"
      - "送金制限等により分配不能となっている留保利益の累積額"
    applicable_markets:
      - "プライム"
      - "スタンダード"
      - "グロース"
    notes: >
      IFRS 18（2027年発効）により損益計算書の区分表示が変更される予定であり、
      持分法損益の区分（投資カテゴリへの帰属）について2025年度から
      移行準備の検討が推奨される。
      送金制限がある国（外国為替管理法・資本規制）での関連会社については
      未分配利益の開示が機関投資家・審査機関から重視される。
    tier_requirement:
      ume: "任意"
      take: "必須"
      matsu: "必須"
