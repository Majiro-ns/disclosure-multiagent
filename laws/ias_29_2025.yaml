# disclosure-multiagent — 法令・ガイダンス情報 YAML
# カテゴリ: IFRS（超インフレ経済）IAS 29 Financial Reporting in Hyperinflationary Economies
# 対象期間: 2025年度（2025-04-01〜2026-03-31）
# スキーマ定義: docs/law_yaml_schema.md
# 作成者: Majiro-ns
#
# 根拠法令:
#   IAS 29 Financial Reporting in Hyperinflationary Economies（超インフレ経済における財務報告）
#   IAS 21 The Effects of Changes in Foreign Exchange Rates（在外事業体の換算との連動）
#   IAS 8 Accounting Policies, Changes in Accounting Estimates and Errors（会計方針変更）
#   IASB Staff Paper: Hyperinflationary Economies (IAS 29) — applicable countries list

version: "1.0"
effective_period:
  from: "2025-04-01"
  to: "2026-03-31"

amendments:

  # ──────────────────────────────────────────
  # 【第1群】超インフレ経済の判定と適用
  # ──────────────────────────────────────────

  - id: "ias29-2025-001"
    category: "IFRS（超インフレ経済）"
    change_type: "継続必須"
    effective_from: "2025-04-01"
    title: "超インフレ経済の判定基準（3年累積100%・定性指標）"
    source: "IAS 29.3"
    source_confirmed: true
    summary: >
      IAS 29は超インフレ経済を客観的な閾値で定義せず、複数の定性・定量指標を
      総合的に判断して適用を決定する。IAS 29.3が列挙する指標として、
      第一に一般人口が富を現地通貨でなく比較的安定した外貨または現物資産で保有すること。
      第二に一般人口が価格を現地通貨でなく比較的安定した外貨で表示すること。
      第三に掛売・掛買の価格が信用期間中の購買力喪失を補償するために設定されること。
      第四に金利・賃金・物価がインフレ指数に連動すること。
      第五に過去3年間の累積インフレ率が100%に近づく、または超過すること。
      2025年度においてIAS 29適用国として指定されている主要国（トルコ・アルゼンチン・
      ベネズエラ・スーダン・ジンバブエ・エチオピア等）への事業エクスポージャーがある
      企業は適用要否を評価し、開示することが求められる。
    target_sections:
      - "重要な会計方針"
      - "超インフレ経済の注記"
      - "在外事業体に関する注記"
    required_items:
      - "超インフレ経済に該当すると判断した国・地域の一覧"
      - "判定に使用した指標（累積インフレ率・定性指標）と判定時期"
      - "当該国・地域への事業エクスポージャーの概要（子会社・関連会社・支店等）"
      - "適用開始年度（または継続適用の場合はその旨）"
      - "IAS 29適用が財務諸表に与える重大性の評価"
    applicable_markets:
      - "プライム"
      - "スタンダード"
      - "グロース"
    notes: >
      2025年度においてトルコは累積インフレ率が引き続き高水準にあり、
      IAS 29適用対象として継続的に扱われる見込み。
      アルゼンチンも超インフレ経済として継続適用が見込まれる。
      日本企業でもトルコ・アルゼンチンに子会社を持つ企業は適用要否の開示が必要
    tier_requirement:
      ume: "超インフレ経済適用国の一覧と累積インフレ率の数値開示"
      take: "判定プロセスの説明（定性・定量指標の評価）＋事業エクスポージャーの規模"
      matsu: "国別の詳細インフレ指標推移＋適用開始・終了の時期と判断根拠の詳細＋将来の超インフレ経済離脱見通し"

  - id: "ias29-2025-002"
    category: "IFRS（超インフレ経済）"
    change_type: "継続必須"
    effective_from: "2025-04-01"
    title: "財務諸表の修正再表示手続き（一般物価指数による購買力調整）"
    source: "IAS 29.8-35"
    source_confirmed: true
    summary: >
      超インフレ経済において、財務諸表はすべて決算日現在の測定単位（報告日の購買力）で
      表示することが必要だ。原価主義で測定された財務諸表の修正再表示は次の手順で行う。
      貸借対照表上の非貨幣性項目（有形固定資産・棚卸資産・資本等）は
      取得日から決算日までの一般物価指数の変化を乗じて修正再表示する。
      損益計算書の収益・費用は取引発生日の物価指数と決算日の物価指数の比率で調整する。
      使用する一般物価指数は信頼性があり包括的なものを選択し、
      期間を通じて一貫して使用する。公正価値で測定される資産・負債（投資不動産・
      金融資産等）は既に現在の測定単位で表示されているため修正再表示不要だ。
      修正再表示の結果生じる「純貨幣性ポジションの購買力損益」は当期損益に認識する。
    target_sections:
      - "重要な会計方針"
      - "超インフレ経済の注記"
    required_items:
      - "使用した一般物価指数の名称・出所・期末指数値と前期比変化率"
      - "非貨幣性項目の修正再表示方法の説明（取得日別インデックス適用等）"
      - "損益計算書の修正再表示方法（期中平均指数の使用等）"
      - "修正再表示に伴う純貨幣性ポジションの購買力損益（当期損益認識額）"
      - "比較財務諸表の修正再表示方針（前期も決算日の測定単位に修正）"
    applicable_markets:
      - "プライム"
      - "スタンダード"
      - "グロース"
    notes: >
      トルコでは公式CPI（Turkish Statistical Institute）が一般的に使用される指数。
      アルゼンチンではINDECのCPI、ただし省により発表指数が異なる場合があるため
      使用指数の明示が特に重要。
      修正再表示後の連結財務諸表作成においてはIAS 21の換算手続きと連動する
    tier_requirement:
      ume: "使用した物価指数の名称と期末指数値（修正再表示額の合計）"
      take: "修正再表示手続きの方法説明＋非貨幣性項目・損益計算書の調整方法＋購買力損益の金額"
      matsu: "修正再表示前・後の主要財務指標比較表＋物価指数の過去推移グラフ水準＋修正再表示に使用した取得日別インデックスの詳細"

  # ──────────────────────────────────────────
  # 【第2群】貨幣性・非貨幣性項目と購買力損益
  # ──────────────────────────────────────────

  - id: "ias29-2025-003"
    category: "IFRS（超インフレ経済）"
    change_type: "継続必須"
    effective_from: "2025-04-01"
    title: "貨幣性項目 vs 非貨幣性項目の区分・純貨幣性ポジションと購買力損益"
    source: "IAS 29.11-35"
    source_confirmed: true
    summary: >
      IAS 29の修正再表示の核心は貨幣性項目と非貨幣性項目の区分にある。
      貨幣性項目（現金・売掛金・買掛金・借入金・社債等の固定金額で受取・支払う項目）は
      既に決算日の測定単位で表示されているため修正再表示を行わない。
      しかしインフレ環境下では貨幣性資産を保有することは購買力の喪失を意味し、
      貨幣性負債を保有することは購買力の利得を意味する。
      この購買力損益（純貨幣性ポジション×インフレ率）は当期損益として認識する。
      非貨幣性項目（有形固定資産・無形資産・棚卸資産・資本剰余金等）は
      取得日の物価指数から決算日の物価指数までの変化率を乗じて修正再表示する。
      純貨幣性ポジション（貨幣性資産－貨幣性負債）の期中変動を追跡し、
      購買力損益の算定根拠を開示することが求められる。
    target_sections:
      - "超インフレ経済の注記"
      - "税金費用の注記（購買力損益への税効果）"
    required_items:
      - "貨幣性項目と非貨幣性項目の区分方針"
      - "純貨幣性ポジション（期首・期末・加重平均）の金額"
      - "購買力損益の金額と損益計算書の計上行"
      - "重要な非貨幣性項目（有形固定資産・棚卸資産等）の修正再表示額"
      - "購買力損益に対する税効果（繰延税金への影響）"
    applicable_markets:
      - "プライム"
      - "スタンダード"
      - "グロース"
    notes: >
      純貨幣性ポジションがプラス（貨幣性資産超過）の企業はインフレにより購買力損失を計上。
      純貨幣性ポジションがマイナス（貨幣性負債超過）の企業は購買力利得を計上。
      超インフレ国に多額の現地通貨建て借入金を持つ企業は購買力利得が発生する逆説的構造に留意
    tier_requirement:
      ume: "購買力損益の金額（当期損益認識額）と純貨幣性ポジションの期末残高"
      take: "貨幣性・非貨幣性項目の区分説明＋純貨幣性ポジションの期中変動＋税効果への影響"
      matsu: "貨幣性・非貨幣性項目の詳細内訳テーブル＋購買力損益の月次算定推移＋ポジション管理戦略の説明"

  # ──────────────────────────────────────────
  # 【第3群】超インフレ経済からの離脱
  # ──────────────────────────────────────────

  - id: "ias29-2025-004"
    category: "IFRS（超インフレ経済）"
    change_type: "継続必須"
    effective_from: "2025-04-01"
    title: "超インフレ経済からの離脱時の処理と開示（IAS 29適用終了）"
    source: "IAS 29.38, IAS 29.40"
    source_confirmed: true
    summary: >
      ある経済が超インフレ状態から離脱したと判断した場合、企業はIAS 29の適用を
      終了する。IAS 29は適用終了時の具体的な手続きを詳細に規定しないが、
      実務上の取扱いとして、適用最終期の修正再表示後の財務諸表上の金額が
      次期以降の財務諸表の取得原価または原価基礎として引き継がれる。
      これにより、超インフレ期間に修正再表示された非貨幣性項目の帳簿価額が
      そのまま将来の減価償却・売却損益計算の基礎となる。
      適用終了の判断時期・根拠、適用終了が財務諸表に与えた影響、
      ならびに比較期間の表示方法（修正再表示後の数値と現在の数値の混在）について
      開示することが求められる。
    target_sections:
      - "重要な会計方針の変更"
      - "超インフレ経済の注記"
      - "在外事業体に関する注記"
    required_items:
      - "IAS 29適用終了の判断時期と根拠（累積インフレ率の低下・定性指標の改善等）"
      - "適用終了時の修正再表示後帳簿価額が次期以降の原価基礎となる旨の説明"
      - "適用終了が有形固定資産・棚卸資産等の帳簿価額に与えた影響"
      - "比較財務諸表における超インフレ修正再表示期間と非修正期間の混在の説明"
      - "適用終了後に適用が再開される場合の方針（再適用基準）"
    applicable_markets:
      - "プライム"
      - "スタンダード"
      - "グロース"
    notes: >
      過去にトルコは2005年頃に超インフレ適用を一時終了した後、
      2022年以降に再適用が必要となった事例がある。
      適用終了後も修正再表示された資産の帳簿価額が高水準に留まり、
      減価償却費が増大する点が財務諸表利用者の理解を要する事項だ
    tier_requirement:
      ume: "IAS 29適用終了の時期と根拠の開示（終了した場合のみ）"
      take: "適用終了が主要資産・負債の帳簿価額に与えた影響額＋比較期間の表示方針"
      matsu: "修正再表示前後の貸借対照表比較＋適用終了後の減価償却費への影響分析＋再適用リスクの評価"
