# disclosure-multiagent — 法令・ガイダンス情報 YAML
# カテゴリ: IFRS（投資不動産）IAS 40 Investment Property
# 対象期間: 2025年度（2025-04-01〜2026-03-31）
# スキーマ定義: docs/law_yaml_schema.md
# 作成者: Majiro-ns
#
# 根拠法令:
#   IAS 40 Investment Property（投資不動産）
#   IFRS 13 Fair Value Measurement（公正価値測定との連動）
#   IAS 16 Property, Plant and Equipment（有形固定資産との区分）
#   IAS 2 Inventories（棚卸資産との区分）
#   IAS 36 Impairment of Assets（原価モデル採用時の減損）

version: "1.0"
effective_period:
  from: "2025-04-01"
  to: "2026-03-31"

amendments:

  # ──────────────────────────────────────────
  # 【第1群】分類・測定モデルの選択
  # ──────────────────────────────────────────

  - id: "ias40-2025-001"
    category: "IFRS（投資不動産）"
    change_type: "継続必須"
    effective_from: "2025-04-01"
    title: "投資不動産の分類基準（自己使用不動産・棚卸資産との区分）"
    source: "IAS 40.5-15"
    source_confirmed: true
    summary: >
      IAS 40は投資不動産を「賃貸収益もしくは資本増価またはその両方を目的として
      保有する不動産（土地または建物）」と定義する。自己使用不動産（IAS 16）および
      通常の営業過程において販売する目的で保有する不動産（IAS 2）とは区別される。
      複合用途不動産（一部を自己使用・一部を賃貸）については、
      自己使用部分と賃貸部分を独立して売却できる場合は区分計上し、
      できない場合は自己使用部分が軽微であれば全体を投資不動産として扱う。
      分類の判断が困難な場合には、判断の根拠と採用した方針を開示する。
    target_sections:
      - "重要な会計方針"
      - "投資不動産の注記"
    required_items:
      - "投資不動産の定義と分類基準の説明"
      - "自己使用不動産・棚卸資産との区分方針"
      - "複合用途不動産の処理方針（区分可否の判断基準）"
      - "分類の判断に重要な見積りが伴う場合はその旨と根拠"
    applicable_markets:
      - "プライム"
      - "スタンダード"
      - "グロース"
    notes: >
      不動産賃貸業・商社・金融機関では投資不動産と自己使用不動産の区分が
      財務諸表の構造に大きく影響する。グループ会社間の賃貸（IAS 40.15）については
      連結財務諸表では投資不動産に該当しない点に留意
    tier_requirement:
      ume: "投資不動産の定義と分類方針の概括的記述"
      take: "複合用途不動産の区分基準＋自己使用との境界事例の説明"
      matsu: "分類変更が生じた場合の詳細説明＋複合用途不動産の面積・金額の区分内訳"

  - id: "ias40-2025-002"
    category: "IFRS（投資不動産）"
    change_type: "継続必須"
    effective_from: "2025-04-01"
    title: "公正価値モデル vs 原価モデルの選択と測定方針の開示"
    source: "IAS 40.30-56, IAS 40.75-79"
    source_confirmed: true
    summary: >
      IAS 40は当初認識後の測定として公正価値モデルと原価モデルの選択を認めるが、
      全ての投資不動産に一貫して適用することが必要だ（IAS 40.30）。
      公正価値モデルを採用する場合、公正価値の変動は当期損益に認識する。
      原価モデルを採用する場合、IAS 16に基づき減価償却を行い、IFRS 13に基づく
      公正価値を注記で開示する。採用したモデルの種類、変更があった場合の影響額、
      公正価値モデル採用企業では評価方法（外部鑑定士の使用有無・評価頻度）を開示する。
    target_sections:
      - "重要な会計方針"
      - "投資不動産の注記"
    required_items:
      - "採用した測定モデル（公正価値 or 原価）の明示"
      - "公正価値モデル採用の場合：評価頻度・外部鑑定士の使用有無・鑑定士の資格"
      - "原価モデル採用の場合：減価償却方法・耐用年数・残存価額＋IFRS 13に基づく公正価値の注記開示"
      - "測定モデルの変更があった場合：変更理由・影響額"
    applicable_markets:
      - "プライム"
      - "スタンダード"
      - "グロース"
    notes: >
      日本のIFRS適用企業では原価モデル採用が多い傾向があるが、
      不動産賃貸業・REITでは公正価値モデルが一般的。
      公正価値モデル採用企業は外部独立鑑定士の使用が信頼性の観点から強く推奨される
    tier_requirement:
      ume: "採用モデルの名称と減価償却方針（原価モデルの場合）または評価頻度（公正価値モデルの場合）"
      take: "評価方法の詳細（鑑定士資格・評価アプローチ・評価頻度）＋原価モデルの場合はIFRS 13公正価値の注記"
      matsu: "公正価値モデル変更シナリオの影響試算＋評価アプローチ別（収益還元・DCF・比較売買事例）の感応度比較"

  # ──────────────────────────────────────────
  # 【第2群】公正価値測定とIFRS 13連携
  # ──────────────────────────────────────────

  - id: "ias40-2025-003"
    category: "IFRS（投資不動産）"
    change_type: "継続必須"
    effective_from: "2025-04-01"
    title: "公正価値の測定とIFRS 13ヒエラルキーレベル別開示"
    source: "IAS 40.33-55, IFRS 13.72-90"
    source_confirmed: true
    summary: >
      公正価値モデルを採用する場合（または原価モデル採用企業の注記開示）において、
      IFRS 13の公正価値ヒエラルキーに基づくレベル分類を開示する。
      投資不動産の多くはレベル3（観察不能インプット）に分類される。
      主要な評価技法（収益還元法・DCF法・比較売買事例法）と
      重要な観察不能インプット（還元利回り・割引率・市場賃料・空室率等）の
      定量的範囲を開示する。公正価値の変動額（当期損益認識額）の内訳も
      損益計算書の行項目と対応させて開示することが求められる。
    target_sections:
      - "投資不動産の注記"
      - "公正価値測定の注記"
    required_items:
      - "投資不動産のIFRS 13ヒエラルキーレベル分類（L1/L2/L3の別）"
      - "採用した評価技法の名称と概要"
      - "主要な観察不能インプットの定量的範囲（還元利回り・割引率・空室率等）"
      - "公正価値変動額と損益計算書計上行の対応関係"
      - "外部独立鑑定士を使用した場合：鑑定士の資格・評価日"
    applicable_markets:
      - "プライム"
      - "スタンダード"
      - "グロース"
    notes: >
      2025年度は金利上昇局面が継続する可能性があり、還元利回り・割引率の変動が
      投資不動産の公正価値に重大な影響を与えるリスクがある。
      感応度分析（還元利回り±0.25%の影響等）の開示が投資家から強く求められる
    tier_requirement:
      ume: "ヒエラルキーレベル分類と主要評価技法名の開示"
      take: "観察不能インプットの定量的範囲（最小・最大・加重平均）＋公正価値変動の内訳"
      matsu: "インプット感応度分析テーブル（還元利回り・割引率・空室率別）＋鑑定評価書の主要仮定の全開示"

  # ──────────────────────────────────────────
  # 【第3群】増減調整表・振替・収益開示
  # ──────────────────────────────────────────

  - id: "ias40-2025-004"
    category: "IFRS（投資不動産）"
    change_type: "継続必須"
    effective_from: "2025-04-01"
    title: "投資不動産の増減調整表（取得・処分・公正価値変動・振替・為替換算）"
    source: "IAS 40.76, IAS 40.79"
    source_confirmed: true
    summary: >
      投資不動産の期首残高から期末残高への増減調整表を開示する。
      調整項目として、当期取得額（企業結合による取得と個別取得の区分）、
      処分額（帳簿価額と売却収入・売却損益）、公正価値変動による増減（公正価値モデルの場合）、
      減価償却費・減損損失（原価モデルの場合）、カテゴリ間振替額、外貨換算差額を含める。
      比較期間との対比表示が原則だ。建設中の投資不動産（開発段階のもの）については
      完成済みの投資不動産と区分して開示することが望ましい。
    target_sections:
      - "投資不動産の注記"
    required_items:
      - "投資不動産の増減調整表（期首残高・各増減項目・期末残高）"
      - "企業結合による取得と個別取得の区分"
      - "公正価値変動額（公正価値モデルの場合）または減価償却費・減損損失（原価モデルの場合）"
      - "カテゴリ間振替額（IAS 40.57-65に基づく振替）"
      - "外貨建投資不動産の換算差額（海外不動産がある場合）"
    applicable_markets:
      - "プライム"
      - "スタンダード"
      - "グロース"
    notes: "建設中投資不動産（IAS 40.8(d)）は完成後に投資不動産へ振り替えられる。開発段階の公正価値測定は信頼性の問題が生じやすい"
    tier_requirement:
      ume: "増減調整表（取得・処分・公正価値変動・期末残高）"
      take: "企業結合取得の区分表示＋振替理由の記述＋外貨換算差額の別個表示"
      matsu: "物件別または地域別の詳細増減調整表＋建設中投資不動産の進捗状況"

  - id: "ias40-2025-005"
    category: "IFRS（投資不動産）"
    change_type: "継続必須"
    effective_from: "2025-04-01"
    title: "カテゴリ間振替の開示（自己使用→投資不動産・投資不動産→棚卸資産・開発完了振替）"
    source: "IAS 40.57-65, IAS 40.80"
    source_confirmed: true
    summary: >
      投資不動産と他のカテゴリ間の振替は、用途変更の証拠が生じた日に行う。
      振替のパターンとして、自己使用不動産から投資不動産への振替（使用目的変更）、
      投資不動産から自己使用不動産への振替（自己使用開始）、
      投資不動産から棚卸資産への振替（売却目的の開発開始）、
      開発完了による建設中から投資不動産への振替がある。
      公正価値モデル採用企業が自己使用不動産を投資不動産へ振り替える場合、
      振替日の公正価値と帳簿価額の差額の処理（過去の再評価余剰金または損益）を開示する。
    target_sections:
      - "投資不動産の注記"
      - "有形固定資産の注記（振替元・振替先の記述）"
    required_items:
      - "当期に発生した振替の種類・金額・振替日"
      - "振替の根拠となった用途変更の証拠の説明"
      - "公正価値モデル採用時の振替日公正価値と帳簿価額の差額処理"
      - "振替前後の資産分類と適用される測定基準の変化"
    applicable_markets:
      - "プライム"
      - "スタンダード"
      - "グロース"
    notes: >
      投資不動産から棚卸資産への振替（販売目的の開発）は振替日の公正価値が
      棚卸資産の取得原価となる（IAS 40.63）。
      自己使用から投資不動産への振替後に公正価値モデルへ変更する場合の
      累積差額の処理は実務上の判断が求められる
    tier_requirement:
      ume: "振替の種類・金額の開示（振替が生じた場合）"
      take: "振替理由の詳細説明＋振替日の公正価値・帳簿価額・差額処理の開示"
      matsu: "振替が損益・OCI・純資産に与えた影響の定量分析＋将来の振替予定（開発計画等）"

  - id: "ias40-2025-006"
    category: "IFRS（投資不動産）"
    change_type: "継続必須"
    effective_from: "2025-04-01"
    title: "賃貸収益・直接営業費用の開示（賃貸収益を生まない投資不動産の費用含む）"
    source: "IAS 40.75(f)(g)"
    source_confirmed: true
    summary: >
      投資不動産から生じた賃貸収益の金額、および当期に賃貸収益を生じた投資不動産に
      係る直接営業費用（修繕費・維持管理費・固定資産税等）を開示する。
      さらに、当期に賃貸収益を生じなかった投資不動産に係る直接営業費用も
      別個に開示することが求められる（IAS 40.75(g)）。
      これにより投資不動産の実質的な収益性（空室・遊休資産の保有コスト）が
      財務諸表利用者に明確に伝わる構造となる。
      長期賃貸借契約（IFRS 16借手側の使用権資産から生じる収益含む）の
      重要な条件についても必要に応じて言及する。
    target_sections:
      - "投資不動産の注記"
      - "収益の注記"
    required_items:
      - "投資不動産からの賃貸収益合計額"
      - "賃貸収益を生じた投資不動産の直接営業費用"
      - "賃貸収益を生じなかった投資不動産の直接営業費用（別個表示）"
      - "重要な賃貸借契約の主要条件（残存期間・固定賃料・変動賃料条項等）"
    applicable_markets:
      - "プライム"
      - "スタンダード"
      - "グロース"
    notes: >
      賃貸収益と直接営業費用の対比は投資不動産の実質NOI（純収益）の計算根拠となる。
      空室率が高い投資不動産の保有コストを別開示することで、遊休資産リスクの
      透明性が高まる
    tier_requirement:
      ume: "賃貸収益合計と直接営業費用合計（稼働・空室の区分なし）"
      take: "稼働物件・空室物件の直接営業費用の区分表示＋主要賃貸借契約の残存期間"
      matsu: "物件別または地域別の賃貸収益・NOI・空室率一覧＋将来賃料改定スケジュール"

  # ──────────────────────────────────────────
  # 【第4群】公正価値測定困難な場合の代替開示
  # ──────────────────────────────────────────

  - id: "ias40-2025-007"
    category: "IFRS（投資不動産）"
    change_type: "継続必須"
    effective_from: "2025-04-01"
    title: "公正価値を信頼性をもって測定できない場合の代替開示"
    source: "IAS 40.53-55, IAS 40.78-79"
    source_confirmed: true
    summary: >
      公正価値モデル採用企業が、例外的に投資不動産の公正価値を
      信頼性をもって継続的に測定できないと判断した場合、
      当該投資不動産については原価モデルで測定し、その旨・理由・金額を開示する。
      この例外はきわめて限定的に適用されるべきものであり（IAS 40.53）、
      IAS 16に基づく原価（減価償却・残存価額）を適用して測定する。
      当該不動産の処分を意図している場合は、処分から生じる損益の見積りも開示する。
      また、公正価値モデル採用企業が当該例外を一度も使用しない場合も、
      「例外の適用がない旨」を明示することが実務上望ましい。
    target_sections:
      - "投資不動産の注記"
      - "重要な会計上の見積りの仮定"
    required_items:
      - "公正価値測定困難と判断した投資不動産の概要・帳簿価額"
      - "公正価値の信頼性ある測定が困難と判断した根拠"
      - "原価モデルを適用した場合の減価償却方法・耐用年数・残存価額"
      - "当該不動産の処分意図がある場合の見込み損益"
      - "例外適用がない場合はその旨の明示（公正価値モデル採用企業のみ）"
    applicable_markets:
      - "プライム"
      - "スタンダード"
      - "グロース"
    notes: >
      IAS 40は2003年の改訂以降、公正価値測定困難による例外を
      きわめて限定的な状況（市場価格が全く存在せず代替評価技法も使用不能な場合）
      にのみ認める。実務上この例外が適用されるケースは少ないが、
      開発途上国所在の不動産や特殊用途不動産で例外適用される場合がある
    tier_requirement:
      ume: "例外適用の有無と対象不動産の帳簿価額（例外あり）または例外なしの旨（例外なし）"
      take: "例外適用の根拠説明＋原価測定の詳細（耐用年数・減価償却方法）＋処分意図の有無"
      matsu: "例外適用不動産の取得経緯・特性説明＋将来の公正価値測定移行可能性の評価＋比較可能な類似不動産の公正価値参考値"
