# disclosure-multiagent — 法令・ガイダンス情報 YAML
# カテゴリ: IFRS（個別FS）
# 対象期間: 2025年度（2025-04-01〜2026-03-31）
# スキーマ定義: docs/law_yaml_schema.md
# 作成者: Majiro-ns
#
# 根拠法令・基準:
#   IAS 27 Separate Financial Statements（個別財務諸表）
#   IAS 27 BC (Basis for Conclusions)
#   IFRS 9 Financial Instruments（FVTPL測定連携）
#   IAS 28 Investments in Associates and Joint Ventures（持分法連携）
#   IAS 36 Impairment of Assets（減損判定連携）
#
# 松竹梅レベル定義:
#   梅（ume）: 測定方法の選択方針記述 + 投資先リストと帳簿価額のみ
#   竹（take）: 測定方法別の金額内訳 + 配当認識の説明 + 減損テスト概要
#   松（matsu）: 投資先ごとの詳細（測定根拠・減損判定・連結FSとの差異分析）

version: "1.0"
effective_period:
  from: "2025-04-01"
  to: "2026-03-31"

amendments:

  # ──────────────────────────────────────────
  # 【第1群】子会社・関連会社投資の測定
  # ──────────────────────────────────────────

  - id: "ias27-2025-001"
    category: "IFRS（個別FS）"
    change_type: "既存必須"
    effective_from: "2025-04-01"
    title: "個別FSにおける子会社投資の測定方法選択（原価法 / FVTPL / 持分法）"
    source: "IAS 27.10-11"
    source_confirmed: true
    summary: >
      個別財務諸表において、子会社への投資は以下のいずれかの方法で測定する
      （IAS 27.10）：
      （1）原価法（cost method）：取得原価で測定し、減損損失があれば帳簿価額を
      減額する。受取配当は損益に計上。
      （2）IFRS 9に従った測定（FVTPL）：公正価値で測定し、公正価値変動を
      損益または OCIに認識する。
      （3）IAS 28に従った持分法（equity method）：個別FSにおいても持分法の
      適用が選択可能（2014年の改訂により追加）。
      選択した方法は同一カテゴリの全投資に一貫して適用する。
      方法の変更はIAS 8の会計方針の変更として遡及処理する。
    target_sections:
      - "会計方針（子会社株式）"
      - "注記（関係会社投資）"
    required_items:
      - "子会社投資の測定方法（原価法・FVTPL・持分法）の選択方針"
      - "測定方法別の投資残高（取得原価・公正価値・持分法簿価の区分）"
      - "測定方法を変更した場合の変更理由と影響額"
      - "原価法適用の場合：取得原価と連結純資産持分額との差異説明"
    applicable_markets:
      - "プライム"
      - "スタンダード"
      - "グロース"
    notes: >
      日本のIFRS採用企業では個別FSに親会社単体の財務諸表を使用するケースが多い。
      原価法が最も一般的だが、投資持株会社や中間持株会社ではFVTPLまたは
      持分法の採用が増加。連結FSとの測定差異が生じる原価法採用時は
      配当収入のタイミングと金額の説明が重要
    tier_requirement:
      ume: "測定方法の方針記述 + 子会社投資の合計帳簿価額"
      take: "測定方法別の金額内訳 + 主要子会社の投資帳簿価額リスト"
      matsu: "全子会社の帳簿価額と持分純資産の対比表 + 測定方法選択の経済的合理性説明"

  - id: "ias27-2025-002"
    category: "IFRS（個別FS）"
    change_type: "既存必須"
    effective_from: "2025-04-01"
    title: "関連会社・合弁事業（JV）投資の測定方法"
    source: "IAS 27.10, IAS 28.1"
    source_confirmed: true
    summary: >
      個別財務諸表において、関連会社（significant influence, 通常議決権の
      20〜50%保有）および共同支配企業（JV）への投資も、子会社と同様に
      原価法・IFRS 9測定（FVTPL）・持分法（IAS 28）のいずれかで測定する
      （IAS 27.10）。連結財務諸表で持分法を適用する関連会社・JVについても、
      個別FSでは異なる方法を選択できる。
      持分法適用の場合は、取得原価に被投資会社の純資産の持分変動分を加減し、
      取得後利益の持分は損益として認識する。
      連結FSとの整合性の観点から、個別FSにおける方法選択の説明が開示上重要。
    target_sections:
      - "会計方針（関連会社・JV投資）"
      - "注記（関係会社投資）"
    required_items:
      - "関連会社・JV投資の測定方法の選択方針"
      - "測定方法別の投資残高"
      - "連結FSで持分法を適用している場合との個別FSでの取扱いの差異説明"
      - "重要な関連会社・JVの名称・保有比率・帳簿価額"
    applicable_markets:
      - "プライム"
      - "スタンダード"
      - "グロース"
    notes: >
      連結FSでIAS 28持分法を適用している関連会社に対し、
      個別FSで原価法を採用している場合、受取配当額と持分法損益の差額が
      連結と個別の利益差異の主要な原因となる。
      この差異は投資家の理解のために注記で説明することが推奨される
    tier_requirement:
      ume: "測定方法の方針 + 関連会社・JV投資の合計帳簿価額"
      take: "主要な関連会社・JVの名称・比率・帳簿価額の一覧"
      matsu: "連結FSとの持分法損益差異の説明 + 個別FSでの測定方法選択の根拠"

  # ──────────────────────────────────────────
  # 【第2群】配当・減損・開示要件
  # ──────────────────────────────────────────

  - id: "ias27-2025-003"
    category: "IFRS（個別FS）"
    change_type: "既存必須"
    effective_from: "2025-04-01"
    title: "子会社・関連会社からの配当の認識"
    source: "IAS 27.12, IFRS 9.5.7, IAS 27 BC10-BC11"
    source_confirmed: true
    summary: >
      個別FSにおいて、原価法または持分法で測定している投資に関して、
      子会社・関連会社からの配当は受取権利が確立した時点（配当宣言日等）に
      損益として認識する（IAS 27.12）。
      IFRIC 17（現物配当）：子会社が親会社への配当として非現金資産を移転する場合、
      親会社は受取資産を公正価値で認識し、対応する配当収入を計上する。
      資本の払戻し（return of capital）との区別：投資の帳簿価額を超える
      配当受取が見込まれる場合、過去の利益の分配か資本の払戻しかを判断し、
      資本の払戻し部分は投資帳簿価額の回収として扱う。
    target_sections:
      - "注記（関係会社投資）"
      - "損益計算書（配当収入）"
    required_items:
      - "子会社からの受取配当金の認識方針（宣言日基準・入金日基準等）"
      - "当期受取配当金の金額（子会社・関連会社・JVの区分）"
      - "資本の払戻し部分がある場合の金額と判断根拠"
      - "現物配当がある場合の公正価値測定の説明"
    applicable_markets:
      - "プライム"
      - "スタンダード"
      - "グロース"
    notes: >
      2014年のIAS 27改訂前は、子会社投資の帳簿価額を超える配当の受取が
      減損の兆候として扱われる解釈が一般的だったが、現在は投資の評価を
      別途判断する。配当の規模が子会社の純利益を大幅に上回る場合は
      減損判定（IAS 27.14参照）との整合性説明が必要
    tier_requirement:
      ume: "当期受取配当金の総額のみ"
      take: "投資先区分（子会社・関連会社・JV）別の配当金額 + 認識方針"
      matsu: "主要投資先別の配当金額 + 帳簿価額との対比 + 資本の払戻し判断の開示"

  - id: "ias27-2025-004"
    category: "IFRS（個別FS）"
    change_type: "既存必須"
    effective_from: "2025-04-01"
    title: "子会社・関連会社投資の減損判定"
    source: "IAS 27.14, IAS 36.12"
    source_confirmed: true
    summary: >
      個別FSにおける子会社・関連会社投資（原価法または持分法適用）の減損は、
      IAS 36に従って帳簿価額が回収可能価額を超える場合に認識する（IAS 27.14）。
      原価法適用時の回収可能価額の算定：
      子会社・関連会社の事業価値（DCFベースの使用価値）または
      市場価格ベースの公正価値のいずれか高い方。
      減損の兆候（IAS 36.12連動）：
      被投資会社の継続損失・純資産毀損・市場株価の大幅下落・
      事業環境の著しい悪化・配当が子会社純利益を大幅に超過する場合等。
      持分法適用の場合：IAS 28.40-43の減損規定を適用し、帳簿価額全体
      （のれんを含む）を一つの資産として単一の回収可能価額と比較する。
    target_sections:
      - "注記（関係会社投資）"
      - "注記（減損損失）"
      - "重要な会計上の見積もり"
    required_items:
      - "減損テストを実施した投資の識別と減損兆候の説明"
      - "回収可能価額の算定手法（DCF・市場価格・FVLCD）"
      - "当期認識した減損損失の金額と対象投資先"
      - "重要な前提（割引率・成長率）の説明"
      - "戻入れがある場合の金額と根拠"
    applicable_markets:
      - "プライム"
      - "スタンダード"
      - "グロース"
    notes: >
      個別FSの子会社投資減損は、連結FSの子会社資産の減損（IAS 36/IFRS 10）と
      独立して発生し得る。連結FSで減損が生じていなくても個別FSで生じるケース
      （例：子会社の将来CFが親会社への配当に制約される場合）があるため
      個別FSと連結FSの差異説明が実務上重要
    tier_requirement:
      ume: "減損損失の有無と金額のみ"
      take: "減損兆候の説明 + 回収可能価額の算定手法 + 重要前提"
      matsu: "投資先別の回収可能価額と帳簿価額の対比表 + 感応度分析"

  - id: "ias27-2025-005"
    category: "IFRS（個別FS）"
    change_type: "既存必須"
    effective_from: "2025-04-01"
    title: "個別FSの開示要件（連結FSとの関係・免除規定）"
    source: "IAS 27.15-17"
    source_confirmed: true
    summary: >
      個別FSを作成する場合の追加開示要件（IAS 27.15-17）：
      （1）個別FSが連結FSに付随（supplementary）して作成されている旨、
      または連結FSを作成しない理由（免除適用）の説明。
      （2）子会社・関連会社・JVの名称および主要事業所（設立・所在地）・
      保有比率（議決権比率）・測定方法の一覧表。
      （3）非支配持分の持分比率と議決権比率が異なる場合の説明。
      連結FS作成免除（IAS 27.16-16A）：最終親会社または中間親会社が
      IFRS連結FSを公表しており、かつ一定要件（支配関係の説明と最終親会社FSへの
      参照）を満たす場合に免除可能。
      連結FSを作成しない場合、個別FSがその代替として機能することの説明が必要。
    target_sections:
      - "注記（関係会社投資）"
      - "会計方針（個別FS）"
    required_items:
      - "個別FSと連結FSの関係（付随 or 代替）の説明"
      - "子会社・関連会社・JVの一覧（名称・所在地・比率・測定方法）"
      - "連結FS作成免除を適用している場合の要件充足状況の説明"
      - "議決権比率と保有比率が異なる投資先の説明"
      - "IFRS連結FSを参照できる最終親会社の情報"
    applicable_markets:
      - "プライム"
      - "スタンダード"
      - "グロース"
    notes: >
      日本の上場親会社が個別FSをIFRSで作成する場合、連結FSとの関係の説明が
      投資家にとって重要。IAS 27の個別FSはJ-GAAP個別FSとは測定・開示が大幅に
      異なるため、IFRS移行企業では連結FSとの差異が生じる主要な論点の説明が推奨される
    tier_requirement:
      ume: "個別FSと連結FSの関係の定性説明 + 投資先一覧"
      take: "一覧表（名称・比率・測定方法・帳簿価額）+ 免除要件の充足説明"
      matsu: "連結FSとの主要な差異（持分法 vs 原価法等）の金額対比 + 最終親会社FSへの参照情報"
