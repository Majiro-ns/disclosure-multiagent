# disclosure-multiagent — 法令・ガイダンス情報 YAML
# カテゴリ: IFRS（法人所得税）IAS 12 + Pillar Two
# 対象期間: 2025年度（2025-04-01〜2026-03-31）
# スキーマ定義: docs/law_yaml_schema.md
# 作成者: Majiro-ns
#
# 根拠法令:
#   IAS 12 Income Taxes（法人所得税）
#   IFRIC 23 Uncertainty over Income Tax Treatments（不確実な税務ポジション）
#   Pillar Two Amendment to IAS 12 (IASB 2023-05 発効)
#   OECD GloBE Model Rules（グローバル最低税率15%）
#   日本: 法人税法・地方税法（グループ通算制度 2022年度改正）

version: "1.0"
effective_period:
  from: "2025-04-01"
  to: "2026-03-31"

amendments:

  # ──────────────────────────────────────────
  # 【第1群】繰延税金資産・負債の認識と評価
  # ──────────────────────────────────────────

  - id: "ias12-2025-001"
    category: "IFRS（法人所得税）"
    change_type: "継続必須"
    effective_from: "2025-04-01"
    title: "繰延税金資産の回収可能性評価（一時差異・タックスプランニング）"
    source: "IAS 12.24-45"
    source_confirmed: true
    summary: >
      IAS 12に基づく繰延税金資産の認識要件。将来の課税所得に対して一時差異等が
      利用できる可能性が高い（probable）と判断される場合にのみ認識する。
      回収可能性の評価には、タックスプランニング戦略の利用可能性、
      将来課税所得の十分性の見積り、過去の課税所得の実績を考慮する。
      評価に用いた主要な仮定（将来課税所得の見積り根拠、タックスプランニング
      の具体的内容）を注記に開示することが求められる。
    target_sections:
      - "税金費用の注記"
      - "繰延税金資産・負債の内訳"
      - "重要な会計上の見積りの仮定"
    required_items:
      - "繰延税金資産の残高および一時差異の内訳（科目別）"
      - "回収可能性の判断根拠（将来課税所得の見積額と期間）"
      - "タックスプランニング戦略を考慮した場合はその内容と金額"
      - "前期から当期の繰延税金資産変動明細"
    applicable_markets:
      - "プライム"
      - "スタンダード"
      - "グロース"
    notes: "日本の繰延税金資産の回収可能性は5年基準が実務上広く使用されるが、IFRSでは明示的な年数制限なし"
    tier_requirement:
      ume: "残高・内訳の数値開示のみ"
      take: "回収可能性の判断方針＋将来課税所得の見積り根拠の定性説明"
      matsu: "感応度分析（課税所得が10%減少した場合の繰延税金資産取崩額）＋シナリオ別回収可能性評価"

  - id: "ias12-2025-002"
    category: "IFRS（法人所得税）"
    change_type: "継続必須"
    effective_from: "2025-04-01"
    title: "繰延税金負債の認識（一時差異・のれん・子会社投資差額）"
    source: "IAS 12.15-23, IAS 12.38-45"
    source_confirmed: true
    summary: >
      IAS 12に基づく繰延税金負債の認識要件。将来加算一時差異に対して原則認識するが、
      のれんから生じる一時差異（IAS 12.15(a)）および子会社・関連会社への投資差額
      （IAS 12.39）については認識免除規定が適用される場合がある。
      認識免除を適用した繰延税金負債の金額、認識免除の根拠（一時差異の解消を
      コントロール可能かつ予見可能な将来に解消しない意図）を開示する。
    target_sections:
      - "税金費用の注記"
      - "繰延税金資産・負債の内訳"
      - "のれんの注記"
    required_items:
      - "繰延税金負債の残高および一時差異内訳（科目別）"
      - "認識免除を適用した一時差異の金額と根拠"
      - "子会社・関連会社投資差額に係る繰延税金負債の未認識額"
      - "のれんに係る一時差異の処理方針"
    applicable_markets:
      - "プライム"
      - "スタンダード"
      - "グロース"
    notes: "M&A取引後の子会社投資差額の開示は、のれん注記と連動して作成することが実務上望ましい"
    tier_requirement:
      ume: "繰延税金負債残高・主要な一時差異の開示"
      take: "認識免除適用額の開示＋のれん・投資差額との連動説明"
      matsu: "子会社持分の処分シナリオにおける潜在的税務影響の定量的開示"

  # ──────────────────────────────────────────
  # 【第2群】税率・税制改正の開示
  # ──────────────────────────────────────────

  - id: "ias12-2025-003"
    category: "IFRS（法人所得税）"
    change_type: "追加必須"
    effective_from: "2025-04-01"
    title: "税率変更の影響開示（2025年度税制改正対応）"
    source: "IAS 12.46-47, IAS 12.81(d)"
    source_confirmed: true
    summary: >
      決算日以前に制定または実質的に制定された税率・税法を用いて繰延税金を測定し、
      税率変更が繰延税金資産・負債の残高に与えた影響を開示する。
      日本では2025年度税制改正（法人税・地方法人税・事業税の改正を含む）が
      見込まれており、改正後の実効税率で繰延税金を再測定した場合の影響額を
      注記に記載することが求められる。
    target_sections:
      - "税金費用の注記"
      - "実効税率の調整表"
    required_items:
      - "適用した法定税率（連結実効税率）の明示"
      - "税率変更による繰延税金資産・負債への影響額"
      - "税率変更の内容（改正法令名・施行日）"
      - "未制定の税率変更が存在する場合はその旨と見込み影響額"
    applicable_markets:
      - "プライム"
      - "スタンダード"
      - "グロース"
    notes: "日本の連結実効税率は約30.6%（法人税23.2%＋地方税）が一般的基準値。Pillar Two適用後は実質的上昇の可能性あり"
    tier_requirement:
      ume: "適用税率と税率変更影響額の数値開示"
      take: "税率変更の内容説明＋財務諸表への影響額の定性・定量両面開示"
      matsu: "税率変更シナリオ分析（±5%の税率変動が純利益に与える感応度）"

  - id: "ias12-2025-004"
    category: "IFRS（法人所得税）"
    change_type: "継続必須"
    effective_from: "2025-04-01"
    title: "未認識繰延税金資産の開示（金額・失効期限・回収可能性の根拠）"
    source: "IAS 12.81(e)"
    source_confirmed: true
    summary: >
      回収可能性が認められないために認識していない繰延税金資産の金額、
      対応する一時差異・税務上の繰越欠損金の内訳、ならびに失効期限を開示する。
      未認識の判断根拠（なぜ回収可能でないと判断したか）についても
      定性的な説明が必要だ。繰越欠損金については、失効までの残存期間別の
      金額内訳（例：1年以内・2〜5年・5年超）を開示することが実務上求められる。
    target_sections:
      - "税金費用の注記"
      - "繰延税金資産・負債の内訳"
    required_items:
      - "未認識繰延税金資産の合計金額"
      - "対応する一時差異・繰越欠損金の内訳"
      - "繰越欠損金の失効期限別残高（期間区分別）"
      - "未認識の判断根拠の定性説明"
    applicable_markets:
      - "プライム"
      - "スタンダード"
      - "グロース"
    notes: "繰越欠損金の失効期限は国・地域により異なる。日本は原則10年（2017年度以後生成分）"
    tier_requirement:
      ume: "未認識繰延税金資産の総額開示"
      take: "失効期限別内訳＋未認識の判断方針説明"
      matsu: "将来課税所得の改善シナリオにおける認識可能性分析＋感応度"

  # ──────────────────────────────────────────
  # 【第3群】実効税率調整表・OCI税効果
  # ──────────────────────────────────────────

  - id: "ias12-2025-005"
    category: "IFRS（法人所得税）"
    change_type: "継続必須"
    effective_from: "2025-04-01"
    title: "税効果の実効税率調整表（法定税率と実効税率の差異説明）"
    source: "IAS 12.81(c)"
    source_confirmed: true
    summary: >
      会計上の税引前利益に法定税率を乗じた金額と、実際に計上した税金費用との
      差異を調整表形式で開示する。調整項目の例として、永久差異（交際費・
      受取配当金免税・寄附金等）、税率差異（海外子会社の現地税率との差）、
      未認識繰延税金資産の変動、Pillar Two上乗せ税額等が挙げられる。
      各調整項目は金額と税率相当額（%）の両方で表示することが要求される。
    target_sections:
      - "税金費用の注記"
      - "実効税率の調整表"
    required_items:
      - "法定税率（連結実効税率）の明示"
      - "主要な調整項目（金額および税率相当額%）"
      - "永久差異・税率差異・その他の区分別開示"
      - "Pillar Two に起因する調整項目（2025年以降）"
    applicable_markets:
      - "プライム"
      - "スタンダード"
      - "グロース"
    notes: >
      IAS 12.81(c)は調整表を二つの方法（①法定税率×税前利益、または
      ②法定税率×実際税率の差異）のいずれかで開示することを認めている。
      Pillar Two に関連する上乗せ税額は独立した調整項目として表示することが推奨される
    tier_requirement:
      ume: "主要な調整項目（3項目以上）の金額開示"
      take: "全調整項目の金額・税率相当額の開示＋Pillar Two調整項目の独立表示"
      matsu: "各調整項目の定性説明＋当期変動の要因分析＋次期予測との比較"

  - id: "ias12-2025-006"
    category: "IFRS（法人所得税）"
    change_type: "継続必須"
    effective_from: "2025-04-01"
    title: "OCI項目の税効果開示（FVOCI・退職給付再測定・キャッシュ・フロー・ヘッジ）"
    source: "IAS 12.61A, IAS 12.81(ab)"
    source_confirmed: true
    summary: >
      その他の包括利益（OCI）に含まれる各項目に係る税効果を開示する。
      対象はFVOCI（その他の包括利益を通じて公正価値で測定する金融資産）の
      評価差額、確定給付型退職給付の再測定（IAS 19）、キャッシュ・フロー・ヘッジの
      有効部分（IAS 39/IFRS 9）等。各OCI項目について税引前金額・税効果額・
      税引後金額の三欄表示が必要だ。
    target_sections:
      - "その他の包括利益計算書"
      - "税金費用の注記"
    required_items:
      - "OCI各項目の税引前金額・税効果額・税引後金額"
      - "当期に損益に組み替えられた（reclassified）OCI税効果"
      - "繰延税金資産・負債のOCI起因変動の内訳"
    applicable_markets:
      - "プライム"
      - "スタンダード"
      - "グロース"
    notes: "FVOCI株式の売却時には税効果が損益に組み替えられない（IFRS 9では組替調整なし）点に留意"
    tier_requirement:
      ume: "OCI各項目の税効果金額の三欄表示"
      take: "OCI税効果の当期変動要因説明＋組替調整の影響開示"
      matsu: "将来OCI変動の税務影響シナリオ分析（金利変動・退職給付数理仮定変更等）"

  # ──────────────────────────────────────────
  # 【第4群】Pillar Two グローバル最低税率 (2025年新要件)
  # ──────────────────────────────────────────

  - id: "ias12-2025-007"
    category: "IFRS（法人所得税）"
    change_type: "新規必須"
    effective_from: "2025-04-01"
    title: "Pillar Two グローバル最低税率（15%）初回適用開示"
    source: "IAS 12 Pillar Two Amendment (IASB 2023), Pillar Two Disclosure Amendment (IASB 2023-05)"
    source_confirmed: true
    summary: >
      IASBが2023年に発行したIAS 12の改訂（Pillar Two Amendment）に基づく開示要件。
      グローバル最低税率（実効税率15%）の適用対象となる企業は、Pillar Two
      法制が制定されている国・地域への事業進出状況、当期に認識したPillar Two
      上乗せ税額（Top-up Tax）の金額を開示する。
      IASBは経過措置として繰延税金へのPillar Two 影響を一時的に認識免除としており、
      その適用状況も開示対象だ。初回適用年度（多くの企業で2025年3月期または12月期）に
      おける比較情報の有無についても言及が必要となる。
    target_sections:
      - "税金費用の注記"
      - "実効税率の調整表"
      - "重要な会計方針の変更"
    required_items:
      - "Pillar Two 法制が制定されている主要進出国・地域の一覧"
      - "当期に認識したPillar Two 上乗せ税額（Top-up Tax）の金額"
      - "IASBの一時的認識免除措置の適用有無とその根拠"
      - "Pillar Two 適用が実効税率調整表に与えた影響額の独立表示"
      - "初回適用に関する経過情報（比較年度との差異の説明）"
    applicable_markets:
      - "プライム"
      - "スタンダード"
    notes: >
      日本では2024年1月1日以降開始事業年度からPillar Two（グローバル最低課税）が適用。
      連結グループの国別実効税率（ETR）が15%を下回る国・地域が存在する場合、
      Top-up Taxの認識が必要となる。対象外となる場合も「対象外である旨」の明示が望ましい
    tier_requirement:
      ume: "Pillar Two 適用対象か否かの表明と上乗せ税額（ゼロ含む）の開示"
      take: "主要進出国のETR水準説明＋Top-up Tax算定根拠の概要＋調整表での独立表示"
      matsu: "国別ETR詳細テーブル＋セーフハーバー適用状況＋将来的な実効税率への影響シナリオ"

  - id: "ias12-2025-008"
    category: "IFRS（法人所得税）"
    change_type: "新規必須"
    effective_from: "2025-04-01"
    title: "Pillar Two 適格国内最低課税（QDMTT）の影響開示"
    source: "OECD GloBE Model Rules Article 11, Pillar Two Amendment to IAS 12"
    source_confirmed: true
    summary: >
      各国・地域が導入する適格国内最低課税（QDMTT: Qualified Domestic Minimum Top-up Tax）
      について、グループが事業を行う主要国のQDMTT制定状況と、
      当該制度に基づき当期に認識した税額を開示する。
      QDMTTは国内で徴収される上乗せ税であり、GloBE所得課税（IIR）で
      他国に徴収される部分を軽減する効果を持つ。QDMTTと通常の法人税の
      区分が財務諸表利用者にとって明確になるよう、独立した開示が求められる。
    target_sections:
      - "税金費用の注記"
      - "実効税率の調整表"
    required_items:
      - "QDMTTが制定されている主要事業国・地域の一覧"
      - "当期に認識したQDMTT金額"
      - "QDMTTとIIRの相互関係の説明"
      - "QDMTTと通常法人税の区分表示"
    applicable_markets:
      - "プライム"
      - "スタンダード"
    notes: "日本のグローバル最低課税制度はIIR方式で2024年1月以降適用。韓国・EU各国等ではQDMTTの制定が進む"
    tier_requirement:
      ume: "QDMTT認識税額の数値開示（ゼロの場合もゼロと明示）"
      take: "主要事業国のQDMTT制定状況一覧＋IIRとの相互調整の説明"
      matsu: "国別QDMTT算定テーブル＋将来のQDMTT導入予定国の財務影響試算"

  - id: "ias12-2025-009"
    category: "IFRS（法人所得税）"
    change_type: "新規必須"
    effective_from: "2025-04-01"
    title: "Pillar Two 一時的セーフハーバー適用状況の開示"
    source: "OECD Transitional Safe Harbour Rules (December 2022), Pillar Two Amendment to IAS 12"
    source_confirmed: true
    summary: >
      OECDが定める移行期間中の一時的セーフハーバー（Transitional Safe Harbour）の
      適用状況を開示する。一時的セーフハーバーには三つの基準がある。
      第一に、国別報告書（CbCR）上の収益が1,000万ユーロ未満かつ税前利益が
      100万ユーロ未満（De Minimis基準）。第二に、CbCRの法人税額が
      最低税率（15%）を乗じた適格所得以上（Simplified ETR基準）。
      第三に、CbCR上の税前利益がCbCR上の実質ベースの所得控除額以下
      （Routine Profits基準）。いずれかに該当する国・地域はTop-up Taxの算定が
      免除されるため、適用国と基準の種類を開示する必要がある。
    target_sections:
      - "税金費用の注記"
      - "重要な会計方針"
    required_items:
      - "セーフハーバーを適用した国・地域の一覧"
      - "適用したセーフハーバー基準の種類（De Minimis / Simplified ETR / Routine Profits）"
      - "セーフハーバー適用により免除されたTop-up Tax額の合計（試算値）"
      - "セーフハーバーの一時的性格（移行期間終了後の継続適用の不確実性）の言及"
    applicable_markets:
      - "プライム"
      - "スタンダード"
    notes: "一時的セーフハーバーの適用期間は2026年12月31日以前終了事業年度まで。2027年以降は完全計算が必要"
    tier_requirement:
      ume: "セーフハーバー適用有無の表明"
      take: "適用国・基準種類の開示＋移行期間終了後リスクの言及"
      matsu: "セーフハーバー適用国の全ETR試算テーブル＋2027年以降の追加税務コスト推定"

  # ──────────────────────────────────────────
  # 【第5群】不確実な税務ポジション・日本特有事項
  # ──────────────────────────────────────────

  - id: "ias12-2025-010"
    category: "IFRS（法人所得税）"
    change_type: "継続必須"
    effective_from: "2025-04-01"
    title: "不確実な税務ポジション（IFRIC 23準拠）の開示"
    source: "IFRIC 23 Uncertainty over Income Tax Treatments"
    source_confirmed: true
    summary: >
      IFRIC 23に基づく不確実な税務ポジション（Uncertain Tax Position: UTP）の
      会計処理と開示要件。課税当局が税務申告を全て承認するか否かが不確実な場合、
      各不確実性について、企業は課税当局が税務調査で全情報を確認するとの前提で
      影響を評価する。最も可能性の高い金額法（Most Likely Amount）または
      期待値法（Expected Value）のいずれかで測定し、引当金または未認識の繰延税金として計上する。
      移転価格・事業再編・税務キャリーバック等に係る重要なUTPについては
      個別の定性・定量開示が求められる。
    target_sections:
      - "税金費用の注記"
      - "偶発負債・偶発資産の注記"
      - "重要な会計上の見積りの仮定"
    required_items:
      - "重要なUTPの内容（税務上の争点の性質）"
      - "適用した測定方法（最も可能性の高い金額法 or 期待値法）"
      - "認識した引当金または未認識税額の金額"
      - "課税当局との調査・訴訟が進行中の場合はその状況"
      - "UTPの解消が見込まれる時期の見通し"
    applicable_markets:
      - "プライム"
      - "スタンダード"
      - "グロース"
    notes: "移転価格に係るUTPはPillar Two のGloBE所得計算にも影響するため、相互の整合性確認が必要"
    tier_requirement:
      ume: "重要なUTPの有無の開示（存在する場合は金額の概算）"
      take: "主要なUTPの性質・測定方法・引当金額の開示"
      matsu: "UTP別の詳細開示（争点・測定根拠・解消時期・感応度分析）"

  - id: "ias12-2025-011"
    category: "IFRS（法人所得税）"
    change_type: "継続必須"
    effective_from: "2025-04-01"
    title: "グループ通算制度・連結納税廃止に伴う開示（日本特有）"
    source: "IAS 12.80, 法人税法第64条の9〜64条の14（グループ通算制度）"
    source_confirmed: true
    summary: >
      日本では2022年4月1日以降開始事業年度からグループ通算制度が開始（連結納税制度廃止）。
      IFRSを適用する日本企業は、グループ通算制度のもとでの税金の計上方法（各社独立課税方式 vs
      グループ全体での認識）、グループ通算制度参加法人の範囲、通算グループ内の損益通算の効果、
      ならびに通算制度特有の調整項目（通算税効果額の授受・欠損金の持分移転等）を開示する。
      グループ通算制度への移行に伴う繰延税金への影響額（移行年度の一時的影響）も
      引き続き比較情報として提示することが望ましい。
    target_sections:
      - "税金費用の注記"
      - "繰延税金資産・負債の内訳"
      - "グループ会社に関する注記"
    required_items:
      - "グループ通算制度の採用有無と通算グループの範囲"
      - "税金の計上方法（会社単位での独立課税方式）の説明"
      - "通算グループ内損益通算の効果額"
      - "通算税効果額の授受に関する方針と金額"
      - "グループ通算制度とPillar Two の相互関係（日本のQDMTT計算への影響）"
    applicable_markets:
      - "プライム"
      - "スタンダード"
      - "グロース"
    notes: >
      グループ通算制度はPillar Two のQDMTT計算において、個別会社単位の税額把握が
      必要となるため、通算グループ内の税額配分方針の明確化が重要。
      国際財務報告基準審議会（IASB）のPillar Two Amendmentと日本の国内制度の
      整合性確認が2025年度以降の開示作成で特に重要となる
    tier_requirement:
      ume: "グループ通算制度採用の有無と通算グループ範囲の開示"
      take: "損益通算効果額の開示＋通算税効果額の授受方針説明＋Pillar Twoとの関係言及"
      matsu: "通算グループ別のETRテーブル＋Pillar Two QDMTT計算への影響分析＋将来の制度変更への感応度"
