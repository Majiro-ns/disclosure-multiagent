# disclosure-multiagent — 法令・ガイダンス情報 YAML
# カテゴリ: IFRS（連結）
# 対象期間: 2025年度（2025-04-01〜2026-03-31）
# スキーマ定義: docs/law_yaml_schema.md
# 作成者: Majiro-ns
#
# 根拠法令・基準:
#   IFRS 10 Consolidated Financial Statements（連結財務諸表）
#   IFRS 10 BC (Basis for Conclusions)
#   IFRS 12 Disclosure of Interests in Other Entities（関係先開示連携）
#   IFRS 3 Business Combinations（企業結合連携）
#   IAS 27 Separate Financial Statements（個別FS連携）
#
# 松竹梅レベル定義:
#   梅（ume）: 連結範囲の一覧 + 支配判定の方針説明のみ
#   竹（take）: 支配の3要素の充足状況説明 + NCI測定方法 + 支配喪失損益
#   松（matsu）: 実質的支配の詳細判断 + 投資企業該当可否 + 支配喪失後の残余持分公正価値

version: "1.0"
effective_period:
  from: "2025-04-01"
  to: "2026-03-31"

amendments:

  # ──────────────────────────────────────────
  # 【第1群】支配の定義・判定
  # ──────────────────────────────────────────

  - id: "ifrs10-2025-001"
    category: "IFRS（連結）"
    change_type: "既存必須"
    effective_from: "2025-04-01"
    title: "支配の3要素 — パワー・変動リターン・リンク"
    source: "IFRS 10.5-18"
    source_confirmed: true
    summary: >
      IFRS 10における支配（control）の定義（IFRS 10.7）：
      投資企業が被投資企業を支配するのは、以下の3要素を全て満たす場合：
      （1）パワー（power）：被投資企業に対して現在の能力を生じさせる現在の権利を
      有すること（IFRS 10.10-14）。
      通常は議決権（過半数）によるが、潜在的議決権・契約上の権利・
      実質的権利も含む。
      （2）変動リターンへのエクスポージャーまたは権利（IFRS 10.15-16）：
      被投資企業への関与から生じる変動リターンに対するエクスポージャーまたは
      権利を有すること。リターンには配当・報酬・残余請求権等が含まれる。
      （3）パワーとリターンのリンク（IFRS 10.17-18）：
      リターンの金額に影響を与えるためにパワーを行使する能力を有すること
      （代理人・プリンシパルの区別）。
      3要素の評価は、議決権の割合だけでなく実質的な支配の有無を総合判断する。
    target_sections:
      - "会計方針（連結の基本方針）"
      - "注記（連結範囲）"
    required_items:
      - "支配の判定基準の会計方針説明（3要素の充足判断の説明）"
      - "連結範囲に含まれる子会社の一覧（名称・所在地・保有比率）"
      - "議決権過半数未満で連結している場合の支配判定の根拠"
      - "議決権過半数でも連結対象外とした場合の理由説明"
    applicable_markets:
      - "プライム"
      - "スタンダード"
      - "グロース"
    notes: >
      IFRS 10の支配概念はSIC-12（特別目的事業体）を統合した結果、
      議決権のない事業体（SPE・VIE等）についても実質支配判定が必要。
      エージェント・プリンシパルの判定（IFRS 10 B58-B72）は
      ファンド運用会社・資産管理会社において特に複雑な判断を要する
    tier_requirement:
      ume: "連結子会社一覧 + 支配判定の定性的方針説明"
      take: "議決権以外の要素による支配判定がある場合の詳細説明"
      matsu: "3要素別の充足状況の記述 + 境界事例（significant influence との区別）の説明"

  - id: "ifrs10-2025-002"
    category: "IFRS（連結）"
    change_type: "既存必須"
    effective_from: "2025-04-01"
    title: "実質的支配の判定 — 事実上の支配・潜在的議決権・代理人"
    source: "IFRS 10.B38-B72"
    source_confirmed: true
    summary: >
      議決権が50%以下でも実質的支配が認められるケースの判定基準
      （IFRS 10 Appendix B）：
      （1）事実上の支配（de facto control, IFRS 10.B38-B45）：
      他の株主が分散しており、被投資企業の意思決定において投資企業が
      実質的に単独で議決を支配できる状況。保有比率が40〜50%未満でも
      他株主の分散・組織的行動の困難性等を考慮して支配を認定する。
      （2）潜在的議決権（potential voting rights, IFRS 10.B47-B50）：
      転換社債・新株予約権・コールオプション等により現在行使可能な潜在的
      議決権は、支配の判定において考慮する（ただし名目上のものは除く）。
      （3）代理人・プリンシパルの判定（IFRS 10.B58-B72）：
      意思決定権を行使している当事者が自らのリターンのために行動している
      プリンシパルか、他者のために行動する代理人かの判定。
      委託報酬の多寡・キックアウト権の有無・変動リターンへのエクスポージャー等を
      総合して判断する。
    target_sections:
      - "会計方針（連結の基本方針）"
      - "注記（連結範囲）"
      - "重要な会計上の判断"
    required_items:
      - "議決権50%以下で連結している子会社がある場合の詳細判断根拠"
      - "潜在的議決権が支配判定に影響する場合の説明"
      - "代理人・プリンシパル判定を行った事業体（SPE・ファンド等）の説明"
      - "重要な判断を要した連結範囲の決定について経営者の判断を開示"
    applicable_markets:
      - "プライム"
      - "スタンダード"
      - "グロース"
    notes: >
      日本基準の実質基準（支配力基準）とIFRS 10の実質支配の概念は
      アプローチが異なる。IFRS 10では議決権以外の要因の証拠に基づく総合判断を
      要求するため、グレーゾーンの事業体についての経営者判断の開示が
      IAS 1.122（重要な判断）として求められる
    tier_requirement:
      ume: "連結範囲の変更がない場合は方針記述のみ"
      take: "議決権50%以下連結の根拠説明 + SPE・VIEがある場合の支配判定"
      matsu: "代理人・プリンシパル判定の詳細 + 境界事例ごとの判断根拠の説明"

  - id: "ifrs10-2025-003"
    category: "IFRS（連結）"
    change_type: "既存必須"
    effective_from: "2025-04-01"
    title: "投資企業（Investment Entity）の定義と連結免除"
    source: "IFRS 10.27-33, IFRS 10 B85-B101"
    source_confirmed: true
    summary: >
      投資企業（Investment Entity）に該当する場合、子会社（投資サービスを
      提供する子会社を除く）を連結せず、IFRS 9に従いFVTPLで測定する
      例外規定（IFRS 10.31）。
      投資企業の3要件（IFRS 10.27）：
      （1）投資管理サービスを提供することを目的として1以上の投資家から資金を取得している。
      （2）投資リターン（キャピタルゲイン・投資収益）のみのためにファンドを運用することを
      事業目的としていることを投資家に約束している。
      （3）投資業績の大部分を公正価値で測定・評価している。
      投資企業に該当するかどうかの判定は、すべての関連する事実と状況を
      考慮した上での経営者の判断を要する。
      投資企業の親会社が非投資企業の場合、当該親会社は子会社の子会社も含め
      全て連結しなければならない（IFRS 10.32）。
    target_sections:
      - "会計方針（連結の基本方針）"
      - "注記（連結範囲）"
    required_items:
      - "投資企業に該当する場合の3要件充足状況の説明"
      - "連結免除の対象となった子会社の一覧と帳簿価額（FVTPL測定）"
      - "連結子会社（投資サービス提供）と非連結子会社の区分"
      - "非投資企業の親会社が投資企業を保有する場合の連結処理の説明"
    applicable_markets:
      - "プライム"
      - "スタンダード"
      - "グロース"
    notes: >
      投資企業の典型例：ベンチャーキャピタルファンド・プライベートエクイティファンド・
      事業投資会社。日本では投資会社（ファンド形態の上場企業）において適用の
      検討が必要。事業会社が投資子会社を保有する場合の判定は実務上慎重な検討を要する
    tier_requirement:
      ume: "投資企業の該当・非該当の方針記述のみ"
      take: "3要件の充足状況の説明 + 免除対象子会社の一覧とFVTPL帳簿価額"
      matsu: "投資企業判定の詳細根拠 + 免除適用の影響額（仮に連結した場合の試算）"

  # ──────────────────────────────────────────
  # 【第2群】連結手続き・NCI・支配の喪失
  # ──────────────────────────────────────────

  - id: "ifrs10-2025-004"
    category: "IFRS（連結）"
    change_type: "既存必須"
    effective_from: "2025-04-01"
    title: "連結手続きの統一方針 — 報告日・会計方針の統一・内部取引消去"
    source: "IFRS 10.19-26, IFRS 10.B86-B93"
    source_confirmed: true
    summary: >
      連結財務諸表の作成手続き（IFRS 10.19-26）：
      （1）統一された会計方針：グループ全社が同一の会計方針を使用して
      連結FSを作成する。実務上困難な場合は修正して取り込む（IFRS 10.19）。
      （2）報告日の統一：子会社の報告日が親会社と異なる場合、差が3ヶ月を
      超えない範囲で、子会社の追加財務情報（報告日間の重要な取引）を
      作成するか、親会社の報告日時点の財務情報を使用する（IFRS 10.B92-B93）。
      （3）内部取引の消去：グループ内の資産・負債・資本・収益・費用・
      キャッシュフローは完全に消去する（IFRS 10.B86）。
      未実現利益（グループ内取引で生じた棚卸資産・固定資産の含み益）も消去。
      （4）連結範囲の変更：期中取得・売却の場合、取得日・処分日から
      損益に取り込む・除外する（IFRS 10 B88-B89）。
    target_sections:
      - "会計方針（連結の基本方針）"
      - "注記（連結範囲の変動）"
    required_items:
      - "グループ統一会計方針の旨の記述（または例外的相違の開示）"
      - "報告日が異なる重要な子会社がある場合の対応方針"
      - "期中に連結範囲に変更があった場合の取得日・処分日と影響"
      - "内部取引消去の方針（重要な内部取引がある場合の説明）"
    applicable_markets:
      - "プライム"
      - "スタンダード"
      - "グロース"
    notes: >
      海外子会社が多い企業では現地GAAP→IFRSへの調整が連結手続きの重要な一部となる。
      会計方針の統一が困難な場合の修正内容の開示が実務上求められることがある。
      期中取得の場合のPPA（Purchase Price Allocation）完了前の暫定処理
      （IFRS 3.45）との連携も必要
    tier_requirement:
      ume: "統一会計方針の旨の記述 + 連結範囲変動の有無"
      take: "期中変動の詳細（取得日・処分日・影響額）+ 報告日相違子会社の対応"
      matsu: "会計方針統一における主要な調整項目 + 重要な内部取引消去の説明"

  - id: "ifrs10-2025-005"
    category: "IFRS（連結）"
    change_type: "既存必須"
    effective_from: "2025-04-01"
    title: "NCI（非支配持分）の測定と変動 — 全部のれん法 / 部分のれん法"
    source: "IFRS 10.22-24, IFRS 3.19"
    source_confirmed: true
    summary: >
      NCI（非支配持分）の取得時の測定方法は取引ごとに選択できる（IFRS 3.19）：
      （1）全部のれん法（full goodwill method）：NCIを取得日の公正価値で測定。
      被支配企業全体ののれん（親会社・NCI双方の分）を認識する。
      （2）部分のれん法（partial goodwill method）：NCIを純資産の持分比率相当で
      測定。のれんは親会社持分のみを認識する。
      取得後のNCI変動：被支配企業の包括利益のうちNCI帰属分をNCIに配分。
      子会社との取引でNCIが変動する場合（支配喪失を伴わない持分変動）は
      資本取引として処理し損益に計上しない（IFRS 10.23）。
      NCIが負の残高となる場合：NCIが赤字である場合でも引き続きNCIに配分し、
      NCIが負の残高となることを認める（IFRS 10.B94-B96）。
    target_sections:
      - "会計方針（非支配持分）"
      - "注記（非支配持分）"
      - "純資産変動計算書"
    required_items:
      - "NCI測定方法（全部 or 部分のれん法）の選択方針"
      - "重要な子会社に係るNCIの残高（期首・期末）と期中変動"
      - "支配喪失を伴わないNCI持分変動がある場合の資本取引金額"
      - "NCIが負の残高となっている子会社がある場合の説明"
      - "重要な子会社のNCI比率・帳簿価額・当期純利益配分額"
    applicable_markets:
      - "プライム"
      - "スタンダード"
      - "グロース"
    notes: >
      部分のれん法が日本のIFRS採用企業では一般的だが、
      全部のれん法の採用でのれん総額が増加する。
      IFRS 3改訂議論（2024年以降のIASB議論）でNCI選択肢の廃止が検討されており、
      今後の基準改訂動向に注意が必要
    tier_requirement:
      ume: "NCI測定方法の方針 + 重要子会社のNCI残高"
      take: "NCI変動表（損益配分・OCI配分・配当・持分変動）+ のれん法別の影響"
      matsu: "重要子会社別のNCI詳細 + 持分変動取引の資本影響分析"

  - id: "ifrs10-2025-006"
    category: "IFRS（連結）"
    change_type: "既存必須"
    effective_from: "2025-04-01"
    title: "支配の喪失時の会計処理 — 残余持分の公正価値再測定と損益認識"
    source: "IFRS 10.25-26, IFRS 10.B98-B99"
    source_confirmed: true
    summary: >
      子会社に対する支配を喪失した場合の会計処理（IFRS 10.25）：
      （1）認識の中止：被売却子会社の資産（のれん含む）・負債・NCIを帳簿から除外。
      （2）受取対価の認識：受取対価（現金等）を公正価値で認識。
      （3）残余持分の再測定：支配喪失後も保有する持分（関連会社・JV・金融資産等に
      なる部分）を支配喪失日の公正価値で再測定し、その公正価値を以後の測定の
      開始帳簿価額とする。
      （4）損益の認識：上記（1）〜（3）の差額として支配喪失損益を認識し損益に計上。
      （5）OCI組替：子会社に関連して認識されていたOCI（為替換算差額・再評価剰余金等）は、
      子会社の直接売却を行ったと仮定した場合と同様の方法で処理する（損益または
      利益剰余金へ振替）。
    target_sections:
      - "注記（非継続事業または処分）"
      - "損益計算書（支配喪失損益）"
      - "注記（企業結合・子会社処分）"
    required_items:
      - "支配喪失した子会社の名称・事業内容・処分日"
      - "受取対価の金額と内訳"
      - "除外した純資産の帳簿価額（のれん・NCIの区分含む）"
      - "残余持分の公正価値再測定額とその後の分類（関連会社・FVTPL等）"
      - "認識した支配喪失損益の金額と構成要素"
      - "損益に振り替えたOCI累積額の内訳（為替換算差額・ヘッジ等）"
    applicable_markets:
      - "プライム"
      - "スタンダード"
      - "グロース"
    notes: >
      支配喪失損益の計算において残余持分の公正価値再測定が損益に大きく影響する。
      特に一部売却により関連会社化する場合（IFRS 10 + IAS 28の連動）は
      段階取得の逆の処理として残余持分の公正価値がキーとなる。
      IFRS 5（非継続事業）との関係では、売却対象が主要事業ラインに該当する場合に
      非継続事業として損益を区分表示する二重の開示要件が発生する
    tier_requirement:
      ume: "支配喪失損益の総額 + 処分した子会社の名称・事業"
      take: "損益構成要素の内訳（売却価格・純資産・残余持分・OCI組替）"
      matsu: "残余持分公正価値の算定根拠（IFRS 13レベル）+ OCI組替内訳 + 処分後の継続関与説明"
