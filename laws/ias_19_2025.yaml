# disclosure-multiagent — 法令・ガイダンス情報 YAML
# カテゴリ: IFRS（従業員給付）
# 対象期間: 2025年度（2025-04-01〜2026-03-31）
# スキーマ定義: docs/law_yaml_schema.md
# 作成者: Majiro-ns
#
# 根拠法令・基準:
#   IAS 19 Employee Benefits (revised 2011): 確定給付制度・確定拠出制度・その他長期給付
#   IFRIC 14 IAS 19—The Limit on a Defined Benefit Asset: 制度資産の上限
#   企業会計基準委員会（ASBJ）日本語版: https://www.asb.or.jp/jp/ifrs/ifrs_all/ias.html

version: "1.0"
effective_period:
  from: "2025-04-01"
  to: "2026-03-31"

amendments:

  # ──────────────────────────────────────────
  # 【第1群】確定給付制度 — 債務・資産の測定と開示
  # ──────────────────────────────────────────

  - id: "ias19-2025-001"
    category: "IFRS（従業員給付）"
    change_type: "追加必須"
    effective_from: "2025-04-01"
    title: "確定給付制度債務（DBO）の測定と開示 — PUC法・割引率の設定"
    source: "https://www.ifrs.org/issued-standards/list-of-standards/ias-19-employee-benefits/"
    source_confirmed: true
    summary: >
      IAS 19に基づく確定給付制度債務（DBO: Defined Benefit Obligation）の
      測定方法および開示要件。予測単位積増方式（PUC法）を用いてDBOを算定し、
      期末時点の高品質社債利回りを参照した割引率を適用する。
      割引率の選定根拠（参照した債券市場・通貨・期間の一致）、
      DBO残高（グロス）、純確定給付負債（資産）の期末残高を
      財務諸表または注記で開示することが求められる。
      IAS 19.57〜98（確定給付制度の測定）および
      IAS 19.135〜152（確定給付制度の開示）が適用根拠。
    target_sections:
      - "退職給付に関する注記"
      - "重要な会計方針"
      - "確定給付制度の概要"
    required_items:
      - "確定給付制度債務（DBO）の期末残高"
      - "割引率の数値および選定根拠（参照市場・通貨・期間）"
      - "純確定給付負債（資産）の期末残高"
      - "予測単位積増方式（PUC法）による測定方針の記載"
    applicable_markets:
      - "プライム"
      - "スタンダード"
      - "グロース"
    notes: >
      割引率は高品質社債（Aa格以上）の市場利回りを使用。
      当該市場が発達していない国では国債利回りを使用可（IAS 19.83）。
      日本では主に国内優良社債利回りまたは国債利回りを参照。
    tier_requirement:
      ume: "必須"
      take: "必須"
      matsu: "必須"

  - id: "ias19-2025-002"
    category: "IFRS（従業員給付）"
    change_type: "追加必須"
    effective_from: "2025-04-01"
    title: "制度資産の公正価値と資産構成の開示 — 株式・債券・不動産等の内訳"
    source: "https://www.ifrs.org/issued-standards/list-of-standards/ias-19-employee-benefits/"
    source_confirmed: true
    summary: >
      IAS 19.140(a)に基づく制度資産の開示要件。制度資産の公正価値合計および
      資産カテゴリ別の内訳（株式・債券・不動産・現金・その他）を開示する。
      市場価格が観察可能な資産（Level 1）とそれ以外（Level 2/3）の区分、
      企業自身が発行した金融商品・使用中の不動産が制度資産に含まれる場合は
      その金額の別掲も求められる。
      IAS 19.142（制度資産の構成に関する開示）が適用根拠。
    target_sections:
      - "退職給付に関する注記"
      - "制度資産の内訳"
    required_items:
      - "制度資産の公正価値合計（期末残高）"
      - "資産カテゴリ別内訳（株式・債券・不動産・現金預金・その他）と金額または割合"
      - "市場性のある（Level 1）資産と非市場性（Level 2/3）資産の区分"
      - "自社発行金融商品・使用中不動産が制度資産に含まれる場合の金額"
    applicable_markets:
      - "プライム"
      - "スタンダード"
      - "グロース"
    notes: >
      IFRIC 14はIAS 19制度資産の上限に関する解釈指針。
      制度資産がDBOを超過する場合（積立超過）は、
      IFRIC 14に基づき資産上限（asset ceiling）の適用を検討する必要がある。
    tier_requirement:
      ume: "必須"
      take: "必須"
      matsu: "必須"

  - id: "ias19-2025-003"
    category: "IFRS（従業員給付）"
    change_type: "追加必須"
    effective_from: "2025-04-01"
    title: "退職給付費用の内訳開示 — 勤務費用・利息費用・再測定の三区分"
    source: "https://www.ifrs.org/issued-standards/list-of-standards/ias-19-employee-benefits/"
    source_confirmed: true
    summary: >
      IAS 19.120に基づく退職給付費用の構成要素別開示要件。
      確定給付費用は（1）損益計上分と（2）OCI計上分（再測定）に区分される。
      損益計上分は当期勤務費用・過去勤務費用・清算損益・純利息費用（収益）の合計。
      OCI計上分は数理計算上の差異（人口動態・財務仮定の変化・経験調整）と
      制度資産収益から純利息を除いた差額で構成される。
      各構成要素の金額を注記で明示することが求められる（IAS 19.140(g)）。
    target_sections:
      - "退職給付に関する注記"
      - "退職給付費用の内訳"
    required_items:
      - "当期勤務費用（損益計上）"
      - "過去勤務費用・清算損益（損益計上）"
      - "純利息費用（収益）（損益計上）"
      - "数理計算上の差異による再測定（OCI計上）"
      - "制度資産の実際収益と純利息の差額（OCI計上）"
    applicable_markets:
      - "プライム"
      - "スタンダード"
      - "グロース"
    notes: >
      IAS 19では再測定はOCIに認識し損益への組替（リサイクル）は禁止（IAS 19.93）。
      日本基準では数理差異の遅延認識が認められているため、
      IFRS適用企業は三区分の明確な分離と開示が必要。
    tier_requirement:
      ume: "必須"
      take: "必須"
      matsu: "必須"

  # ──────────────────────────────────────────
  # 【第2群】再測定・数理計算の前提と感応度分析
  # ──────────────────────────────────────────

  - id: "ias19-2025-004"
    category: "IFRS（従業員給付）"
    change_type: "追加必須"
    effective_from: "2025-04-01"
    title: "数理計算上の差異（再測定）のOCI認識と累積額の開示"
    source: "https://www.ifrs.org/issued-standards/list-of-standards/ias-19-employee-benefits/"
    source_confirmed: true
    summary: >
      IAS 19.93およびIAS 19.122に基づく再測定のOCI認識と開示要件。
      当期に認識した再測定の金額（数理計算上の差異および制度資産の実際収益と
      純利息の差額）をOCIに即時認識し、その他の包括利益累計額（AOCI）に
      積み上げていく。当期発生額・累積残高・内訳（仮定変更による差異・
      経験調整による差異）を注記で開示することが求められる。
      IAS 19.140(c)(d)が具体的な開示根拠。
    target_sections:
      - "退職給付に関する注記"
      - "その他の包括利益の内訳"
      - "確定給付制度の再測定"
    required_items:
      - "当期OCI計上額（再測定：数理計算上の差異）"
      - "当期OCI計上額（再測定：制度資産の実際収益と純利息の差額）"
      - "再測定の累積残高（AOCI残高）"
      - "人口動態仮定の変化による差異と財務仮定の変化による差異の区分"
    applicable_markets:
      - "プライム"
      - "スタンダード"
      - "グロース"
    notes: >
      再測定のOCI即時認識はIAS 19改訂（2011年）で導入されたコリドー法廃止後の取扱い。
      OCI累積額は損益にリサイクルされない（IAS 19.93）。
      利益剰余金への直接振替は会社の選択が可能。
    tier_requirement:
      ume: "任意"
      take: "必須"
      matsu: "必須"

  - id: "ias19-2025-005"
    category: "IFRS（従業員給付）"
    change_type: "追加必須"
    effective_from: "2025-04-01"
    title: "主要な数理計算上の前提の開示 — 割引率・昇給率・死亡率・退職率"
    source: "https://www.ifrs.org/issued-standards/list-of-standards/ias-19-employee-benefits/"
    source_confirmed: true
    summary: >
      IAS 19.144に基づく主要な数理計算上の前提の開示要件。
      DBO算定に使用した主要前提として、割引率・将来の昇給率・
      医療費インフレ率（該当する場合）を開示することが義務付けられている。
      また退職率・死亡率（生命表の参照）についても
      実務上広く開示が行われている。前期との比較や
      変更がある場合はその理由と影響額も記載することが求められる。
    target_sections:
      - "退職給付に関する注記"
      - "数理計算上の前提"
    required_items:
      - "割引率（期末時点の数値）"
      - "将来の昇給率（数値と設定根拠）"
      - "死亡率の参照生命表（例: 第23回生命表等）"
      - "退職率（年齢別・勤続年数別等の設定方法）"
      - "前期比較および変更がある場合の変更理由と影響額"
    applicable_markets:
      - "プライム"
      - "スタンダード"
      - "グロース"
    notes: >
      割引率は毎期末に市場状況を反映して再設定する（IAS 19.83）。
      昇給率は企業の賃金政策・インフレ見通し・年功序列制度を考慮して設定。
      日本の確定給付企業年金では厚生労働省告示の標準的生命表（ER 諸表）も参照。
    tier_requirement:
      ume: "任意"
      take: "必須"
      matsu: "必須"

  - id: "ias19-2025-006"
    category: "IFRS（従業員給付）"
    change_type: "追加必須"
    effective_from: "2025-04-01"
    title: "感応度分析の開示 — 割引率±0.5%・昇給率±0.5%のDBO変動影響"
    source: "https://www.ifrs.org/issued-standards/list-of-standards/ias-19-employee-benefits/"
    source_confirmed: true
    summary: >
      IAS 19.145に基づく数理計算上の前提の感応度分析の開示要件。
      各主要前提（割引率・昇給率・死亡率等）を合理的に考えられる
      変化させた場合のDBO残高への影響額（増減額または変化率）を開示する。
      実務上、割引率±0.5%・昇給率±0.5%を用いた感応度分析が広く行われている。
      また感応度分析の手法（デュレーション法等）の説明および
      各前提が独立に変化するという仮定（相関関係を考慮していない旨）も
      注記することが求められる（IAS 19.145(b)(c)）。
    target_sections:
      - "退職給付に関する注記"
      - "感応度分析"
    required_items:
      - "割引率+0.5%変動時のDBO変動額（減少額）"
      - "割引率-0.5%変動時のDBO変動額（増加額）"
      - "昇給率+0.5%変動時のDBO変動額（増加額）"
      - "昇給率-0.5%変動時のDBO変動額（減少額）"
      - "感応度分析の手法（デュレーション近似法等）の説明"
      - "各前提が独立に変化するという仮定の明示"
    applicable_markets:
      - "プライム"
      - "スタンダード"
      - "グロース"
    notes: >
      IAS 19では±0.5%の変動幅は明示されていないが、
      日本のIFRS適用企業の実務では±0.5%が標準的な開示水準。
      死亡率（平均余命）の感応度も開示する企業が増加している。
      デュレーション法による近似計算は厳密な再計算ではない旨を注記すること。
    tier_requirement:
      ume: "対象外"
      take: "必須"
      matsu: "必須"

  # ──────────────────────────────────────────
  # 【第3群】確定拠出制度・複数事業主制度
  # ──────────────────────────────────────────

  - id: "ias19-2025-007"
    category: "IFRS（従業員給付）"
    change_type: "追加必須"
    effective_from: "2025-04-01"
    title: "確定拠出制度の費用認識と開示"
    source: "https://www.ifrs.org/issued-standards/list-of-standards/ias-19-employee-benefits/"
    source_confirmed: true
    summary: >
      IAS 19.51〜54および IAS 19.53に基づく確定拠出制度の費用認識と開示要件。
      確定拠出制度では拠出額を従業員が役務を提供した期間に費用認識する。
      注記では当期に費用認識した確定拠出制度の拠出額の合計と
      制度の概要（企業型確定拠出年金等）を開示することが求められる。
      対象となる確定拠出制度が複数ある場合（国内外の年金制度等）は
      制度別または地域別に金額を示すことが望ましい（IAS 19.53）。
    target_sections:
      - "退職給付に関する注記"
      - "確定拠出制度"
    required_items:
      - "当期に費用計上した確定拠出制度の拠出額合計"
      - "確定拠出制度の概要（企業型DC・国民年金基金等）"
      - "翌期以降に支払予定の未払拠出額（重要な場合）"
    applicable_markets:
      - "プライム"
      - "スタンダード"
      - "グロース"
    notes: >
      日本の確定拠出年金（DC）は企業型・個人型（iDeCo）ともに確定拠出制度に該当。
      確定拠出制度は企業側に将来の追加拠出義務がないため
      確定給付制度に比べて開示要件は限定的。
      ただし確定給付制度と確定拠出制度の両方を持つ企業は各制度を明確に区分して開示する。
    tier_requirement:
      ume: "必須"
      take: "必須"
      matsu: "必須"

  - id: "ias19-2025-008"
    category: "IFRS（従業員給付）"
    change_type: "追加必須"
    effective_from: "2025-04-01"
    title: "複数事業主制度の開示要件"
    source: "https://www.ifrs.org/issued-standards/list-of-standards/ias-19-employee-benefits/"
    source_confirmed: true
    summary: >
      IAS 19.32〜39に基づく複数事業主制度（multi-employer plans）の開示要件。
      確定給付型の複数事業主制度に参加しているが、制度全体のDBO・制度資産・
      費用を按分算定するための情報が得られない場合は確定拠出制度として
      処理することが認められる（IAS 19.34）。
      この場合、制度が確定給付型であること、会計処理が確定拠出型であること、
      制度の積立状況（超過/不足）に関する入手可能な情報、
      将来の拠出見込みの変化の可能性についても開示が必要（IAS 19.37〜38）。
      日本では基金型の総合型確定給付企業年金が複数事業主制度に該当することがある。
    target_sections:
      - "退職給付に関する注記"
      - "複数事業主制度"
    required_items:
      - "複数事業主制度への参加の事実と会計処理方針（確定給付型/確定拠出型処理）"
      - "制度の積立状況（過不足）に関する入手可能な情報"
      - "拠出予定額の変化の可能性（制度の積立不足がある場合）"
      - "確定拠出型として処理している場合はその理由"
    applicable_markets:
      - "プライム"
      - "スタンダード"
      - "グロース"
    notes: >
      複数事業主制度かつ確定給付型情報が入手可能な場合は
      通常の確定給付制度と同様の全開示が必要。
      日本の総合型企業年金基金は参加企業ごとの按分計算を行う基金と
      按分が困難な基金に分かれるため、個別確認が必要。
    tier_requirement:
      ume: "対象外"
      take: "推奨"
      matsu: "必須"

  # ──────────────────────────────────────────
  # 【第4群】増減調整表・将来キャッシュフロー
  # ──────────────────────────────────────────

  - id: "ias19-2025-009"
    category: "IFRS（従業員給付）"
    change_type: "追加必須"
    effective_from: "2025-04-01"
    title: "DBO・制度資産の増減調整表 — 期首残高から期末残高への変動要因分解"
    source: "https://www.ifrs.org/issued-standards/list-of-standards/ias-19-employee-benefits/"
    source_confirmed: true
    summary: >
      IAS 19.140(a)(b)に基づくDBO・制度資産の増減調整表（ロールフォワード）の開示要件。
      DBO残高については：期首残高・当期勤務費用・利息費用・再測定（数理計算上の差異）・
      支給による減少・過去勤務費用・清算・制度加入による取得・為替換算差額・期末残高
      の各項目を開示する。
      制度資産残高については：期首残高・制度資産の実際収益（純利息+再測定）・
      事業主拠出・従業員拠出・支給による減少・清算・為替換算差額・期末残高
      の各項目を開示する。
      純確定給付負債（資産）への増減調整表もあわせて開示することが望ましい。
    target_sections:
      - "退職給付に関する注記"
      - "DBOの増減調整表"
      - "制度資産の増減調整表"
    required_items:
      - "DBO期首残高・各変動項目・期末残高の内訳表"
      - "制度資産公正価値期首残高・各変動項目・期末残高の内訳表"
      - "純確定給付負債（資産）の期首・期末残高と増減要因"
      - "当期に発生した再測定の内訳（数理差異・経験調整・資産実際収益差）"
    applicable_markets:
      - "プライム"
      - "スタンダード"
      - "グロース"
    notes: >
      IAS 19.140ではDBO・制度資産・純確定給付負債（資産）の増減調整表は
      必須開示事項（required disclosure）。
      前期比較表を付すことが実務上標準的。
      複数の制度（国内/海外）がある場合は合計表および
      重要な制度の内訳を別掲することが求められる場合がある。
    tier_requirement:
      ume: "任意"
      take: "必須"
      matsu: "必須"

  - id: "ias19-2025-010"
    category: "IFRS（従業員給付）"
    change_type: "追加必須"
    effective_from: "2025-04-01"
    title: "将来のキャッシュフロー予測の開示 — 翌期拠出予定額・給付満期分析"
    source: "https://www.ifrs.org/issued-standards/list-of-standards/ias-19-employee-benefits/"
    source_confirmed: true
    summary: >
      IAS 19.146〜147に基づく将来キャッシュフローに関する開示要件。
      翌期に制度に拠出する予定額（事業主拠出予定額）を開示する（IAS 19.146）。
      また確定給付制度の給付満期分析（maturity profile）として、
      加重平均デュレーション（DBO全体のデュレーション）および
      予定給付額の年度別分布（翌1年・2〜5年・6〜10年・10年超等）を
      開示することが求められる（IAS 19.147）。
      これらは制度の流動性リスク・ALM戦略の開示とも接続する。
      積立不足がある場合の解消計画（拠出スケジュール）も記載することが望ましい。
    target_sections:
      - "退職給付に関する注記"
      - "将来キャッシュフロー予測"
      - "給付債務のデュレーション分析"
    required_items:
      - "翌期（1年以内）の事業主拠出予定額"
      - "DBOの加重平均デュレーション（年数）"
      - "予定給付支払額の年度別分布（翌1年・2〜5年・6〜10年・10年超）"
      - "制度が積立不足の場合：解消計画と将来拠出スケジュール"
    applicable_markets:
      - "プライム"
      - "スタンダード"
      - "グロース"
    notes: >
      ALM（資産負債管理）戦略の開示として、デュレーションマッチング方針や
      リスクヘッジ方針を追記することが松レベルの開示として推奨される。
      給付満期分析は確定額ではなく数理計算に基づく推計値であることを注記する。
      IAS 19.147は2011年改訂で追加された開示要件。
    tier_requirement:
      ume: "対象外"
      take: "任意"
      matsu: "必須"
